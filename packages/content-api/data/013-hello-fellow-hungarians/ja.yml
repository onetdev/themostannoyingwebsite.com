title: 調子はどう、日本の皆さん？ 絶好調ですか？
slug: choushi-wa-dou-nippon-no-mina-san-zekkouchou-desu-ka
intro: The Most Annoying Website についに日本語が登場。これからは母国語で、ポップアップや点滅、あらゆるデジタルの悪夢にイライラさせられることができます。
content: |-
  良いニュースと、悪いニュースがあります。良いニュースは、The Most Annoying Website が日本語で利用可能になったことです。そして悪いニュースは……ええ、全く同じことです。

  現代のウェブにおける最もイライラする慣習を集めて紹介することを主な目的とするサイトで、言語サポートを拡張する価値があるのかどうか、私たちは長い間考えました。そしてあることに気づいたのです。もしインターネットが世界中の人々をグローバルにイライラさせることができるのなら、それを複数の言語でやらない手はない、と。

  日本語は特に刺激的な選択肢です。一方で、複雑で、奇妙な助詞や長い熟語、外国人には「キーボードの上を猫が歩いたような」音に聞こえることもある独特の響きで知られています。しかし他方では、非常に表現力が豊かであり、ウェブサイトが最大音量で動画を自動再生した時のあの感情を正確に描写するのに最適なのです。

  これからは、日本語でも多種多様な迷惑機能があなたを歓迎します。ポップアップウィンドウ、終わりのないクッキーの質問、勝手に動き出すアニメーション、そして説明のつかないローディングスピナーたちが、あなたの忍耐力を母国語で試す準備を整えています。

  もちろん、翻訳は単なる言葉の置き換えではありません。私たちの目標は、その雰囲気も伝えることでした。プロジェクト全体を定義づける、不条理なユーモアと軽微なデジタルカオスのあの独特な混合物です。日本語では、「悪夢」、「完全なカオス」、あるいは「なぜまたこんなことが私に起きるのか」といった概念を実に見事に扱うことができるため、案外うまく機能するかもしれません。

  ここを初めて訪れた方は、この奇妙な実験へようこそ。以前からこのサイトを知っている方は、今度は新しい方法で同じデジタルの狂気を体験してみてください。結局のところ、このサイトはただあなたをイライラさせるためだけのものではありません。ウェブが時としていかに奇妙な方向へ進化してきたかを、少し笑い飛ばすためのものでもあるのです。

  それでは、どうぞくつろいで、遠慮なくクリックしてください。現代のインターネットのあらゆる小さな苛立ちが、これからは日本語であなたに語りかけます。

  世界一ウザいウェブサイトへようこそ。
