title: Salut les Français ! Alors, on est bien ?
slug: salut-les-francais
intro: La langue française est arrivée sur The Most Annoying Website. Maintenant, on peut vous agacer dans votre langue maternelle avec des pop-ups, des clignotements et toutes sortes de cauchemars numériques.
content: |-
  On a une bonne et une mauvaise nouvelle. La bonne nouvelle, c'est que The Most Annoying Website est désormais disponible en français. La mauvaise nouvelle, c'est… eh bien, exactement la même chose.

  On a longtemps hésité à étendre le support linguistique d'un site dont le but principal est de rassembler et de présenter les habitudes les plus agaçantes du web moderne. Puis on a réalisé un truc : si Internet est capable d'énerver les gens à l'échelle mondiale, alors pourquoi ne pas le faire dans plusieurs langues ?

  La langue française est un choix particulièrement croustillant. D'un côté, elle est réputée pour sa complexité, ses exceptions à n'en plus finir et ses conjugaisons qui ressemblent à un code secret. D'un autre côté, les Français sont connus pour être… disons, exigeants (pour ne pas dire râleurs). Quoi de mieux pour tester la patience d'un peuple que de lui proposer un site qui fait tout de travers, mais dans la langue de Molière ?

  Désormais, les fonctionnalités les plus irritantes vous saluent donc en français. Les fenêtres surgissantes, les questions infinies sur les cookies, les animations qui se lancent sans prévenir et les indicateurs de chargement inexplicables sont tous prêts à mettre vos nerfs à rude épreuve dans votre propre langue.

  Bien sûr, la traduction ne s'est pas limitée aux mots. Notre objectif était de conserver l'ambiance. Ce mélange particulier d'humour absurde et de chaos numérique léger qui définit tout le projet. En français, ça marche peut-être même encore mieux, car la langue sait si bien exprimer des concepts comme « l'enfer numérique », le « chaos total » ou le classique « mais pourquoi ça m'arrive encore à moi ».

  Si c'est votre première visite, bienvenue dans cette étrange expérience. Si vous connaissez déjà le site, vous pouvez maintenant vivre la même folie numérique sous un nouvel angle. Car au fond, ce site n'est pas seulement là pour vous agacer. Il est aussi là pour nous faire rire un peu de la direction parfois absurde qu'a prise le web.

  Alors installez-vous confortablement, cliquez sans crainte (ou avec beaucoup de crainte) et préparez-vous : toutes les petites contrariétés de l'Internet moderne vous disent désormais « bonjour » en français.

  Bienvenue sur le site le plus agaçant du monde.
