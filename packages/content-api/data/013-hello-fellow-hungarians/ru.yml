title: Ну что, венгры? Как житуха? Всё путём?
slug: nu-chto-vengry-kak-zhitukha-vse-putem
intro: Венгерский язык добрался до The Most Annoying Website. Теперь мы можем бесить вас на вашем родном языке всплывающими окнами, миганием и всяким цифровым маразмом.
content: |-
  У нас есть хорошая новость и плохая. Хорошая новость в том, что The Most Annoying Website теперь доступен на венгерском. Плохая новость... ну, она точно такая же.

  Мы долго думали, стоит ли расширять языковую поддержку на сайте, основная цель которого — собрать и показать самые раздражающие привычки современного интернета. А потом до нас дошло: если интернет может бесить людей по всему миру, то почему бы не делать это на нескольких языках?

  Венгерский язык — выбор особенно интересный. С одной стороны, он славится своей сложностью, кучей странных окончаний, длинными словами и звучанием, которое иностранцы часто описывают так, будто кто-то прокатил кота по клавиатуре. С другой стороны, он невероятно выразителен, что идеально подходит для описания того самого чувства, когда сайт внезапно врубает видео на полную громкость.

  Так что отныне самые разные бесячие фишки могут приветствовать вас и на венгерском. Всплывающие окна, бесконечные вопросы про куки, внезапные анимации и необъяснимые лоадеры — всё это готово испытывать ваше терпение на родном языке.

  Конечно, перевод — это не только слова. Нашей целью было передать атмосферу. Ту странную смесь абсурдного юмора и легкого цифрового хаоса, которая определяет весь проект. На венгерском это, пожалуй, работает даже лучше, потому что язык отлично справляется с такими понятиями, как «маразм», «полный трындец» или «почему это опять происходит со мной».

  Если вы здесь впервые — добро пожаловать в этот странный эксперимент. А если вы уже давно знаете сайт, то теперь сможете пережить то же самое цифровое безумие по-новому. Ведь в конечном счете этот сайт не только для того, чтобы бесить. Он и для того, чтобы мы могли немного посмеяться над тем, в каком странном направлении иногда развивается интернет.

  Так что расслабьтесь, смело кликайте и готовьтесь к тому, что все мелкие пакости современного интернета теперь будут здороваться с вами по-венгерски.

  Добро пожаловать на самый раздражающий сайт в мире.
