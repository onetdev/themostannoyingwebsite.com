title: Merhaba Türk arkadaşlar! Her şey yolunda mı?
slug: merhaba-turk-arkadaslar-her-sey-yolunda-mi
intro: Türk dili The Most Annoying Website'e geldi. Artık sizi pop-up'lar, yanıp sönen ışıklar ve her türlü dijital kabusla kendi ana dilinizde sinir edebiliriz.
content: |-
  Bir iyi, bir de kötü haberimiz var. İyi haber şu ki, The Most Annoying Website artık Türkçe olarak da yayında. Kötü haber ise… aslında tam olarak aynı şey.

  Asıl amacı modern web'in en sinir bozucu alışkanlıklarını bir araya getirmek ve sergilemek olan bir sitenin dil desteğini genişletmenin mantıklı olup olmadığını uzun süre düşündük. Sonra bir şeyi fark ettik: Eğer internet insanları küresel ölçekte sinir edebiliyorsa, bunu neden birden fazla dilde yapmasın?

  Türkçe özellikle heyecan verici bir seçim. Bir yandan karmaşıklığıyla, sonu gelmez ekleriyle, uzun kelimeleriyle ve yabancıların genellikle "bir kedi klavyenin üzerinde yürümüş gibi" diye tarif ettiği tınısıyla meşhur. Öte yandan ise son derece ifade gücü yüksek; bir web sitesi tam ses seviyesinde otomatik olarak bir video başlattığında hissettiklerinizi tam olarak tarif etmek için mükemmel.

  Artık en çeşitli sinir bozucu özellikler sizi Türkçe olarak da selamlayabilir. Pop-up pencereler, sonsuz çerez soruları, kafasına göre başlayan animasyonlar ve açıklanamayan yükleme çemberleri (loading spinners) ana dilinizde sabrınızı test etmeye hazır.

  Elbette çeviri sadece kelimelerden ibaret değil. Amacımız o atmosferi de yansıtmaktı. Tüm projeyi tanımlayan o absürt mizah ve hafif dijital kaosun özel karışımı. Türkçede belki biraz daha iyi bile işliyor, çünkü dilimiz "akıl karıncalanması", "tam kaos" veya o klasik "neden bu yine benim başıma geliyor" gibi kavramları ifade etmekte harika.

  Eğer buraya ilk kez geliyorsanız, bu tuhaf deneye hoş geldiniz. Eğer siteyi zaten uzun zamandır tanıyorsanız, şimdi aynı dijital çılgınlığı yeni bir perspektiften deneyimleyebilirsiniz. Çünkü sonuçta bu site sadece sizi sinir etmek için değil. Aynı zamanda web'in bazen ne kadar tuhaf bir yöne evrildiğine biraz gülebilmemiz için de var.

  Öyleyse arkaya yaslanın, cesurca (veya büyük bir korkuyla) tıklayın ve hazırlanın: Modern internetin her küçük can sıkıntısı artık size Türkçe olarak "merhaba" diyor.

  Dünyanın en sinir bozucu web sitesine hoş geldiniz.
