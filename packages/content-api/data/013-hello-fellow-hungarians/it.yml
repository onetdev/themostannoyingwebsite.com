title: Ciao agli Italiani! Allora, come va?
slug: ciao-agli-italiani
intro: La lingua italiana è arrivata su The Most Annoying Website. Ora possiamo infastidirvi nella vostra lingua madre con pop-up, sfarfallii e ogni sorta di incubo digitale.
content: |-
  Abbiamo una buona e una cattiva notizia. La buona notizia è che The Most Annoying Website è ora disponibile in italiano. La cattiva notizia è… beh, esattamente la stessa cosa.

  Abbiamo esitato a lungo prima di estendere il supporto linguistico a un sito il cui scopo principale è raccogliere e presentare le abitudini più fastidiose del web moderno. Poi abbiamo capito una cosa: se Internet è capace di irritare le persone su scala globale, allora perché non farlo in più lingue?

  La lingua italiana è una scelta particolarmente succulenta. Da un lato, è famosa per la sua complessità, le sue eccezioni infinite e le sue coniugazioni che sembrano un codice segreto. Dall'altro, gli italiani sono noti per essere… diciamo, esigenti (per non dire criticoni). Cosa c'è di meglio per testare la pazienza di un popolo che proporgli un sito che fa tutto male, ma nella lingua di Dante?

  D'ora in poi, le funzionalità più irritanti vi saluteranno quindi in italiano. Le finestre a comparsa, le infinite domande sui cookie, le animazioni che si avviano senza preavviso e gli inspiegabili indicatori di caricamento sono tutti pronti a mettere a dura prova i vostri nervi nella vostra lingua.

  Naturalmente, la traduzione non si è limitata alle parole. Il nostro obiettivo era mantenere l'atmosfera. Quel particolare mix di umorismo assurdo e leggero caos digitale che definisce l'intero progetto. In italiano funziona forse ancora meglio, perché la lingua sa esprimere così bene concetti come "l'inferno digitale", il "caos totale" o il classico "ma perché deve succedere di nuovo a me".

  Se questa è la vostra prima visita, benvenuti in questa strana esperienza. Se conoscete già il sito, ora potete vivere la stessa follia digitale da una nuova prospettiva. Perché in fondo, questo sito non è qui solo per infastidirvi. È qui anche per farci ridere un po' della direzione a volte assurda che ha preso il web.

  Quindi mettetevi comodi, cliccate senza timore (o con molto timore) e preparatevi: tutte le piccole seccature dell'Internet moderno ora vi dicono "buongiorno" in italiano.

  Benvenuti sul sito più fastidioso del mondo.
