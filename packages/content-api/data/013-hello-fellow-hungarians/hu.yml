title: Na mi a pálya, magyar arcok? Minden király meg zsír?
slug: na-mi-a-palya-magyar-arcok-minden-kiraly-meg-zsir
intro: Megérkezett a magyar nyelv a The Most Annoying Website-re. Mostantól anyanyelveden idegesíthetünk felugrókkal, villogással és mindenféle digitális agyrémmel.
content: |-
  Van egy jó hírünk, és egy rossz hírünk. A jó hír az, hogy a The Most Annoying Website mostantól magyarul is elérhető. A rossz hír az… nos, pontosan ugyanaz.

  Sokáig gondolkodtunk rajta, hogy érdemes-e bővíteni a nyelvi támogatást egy olyan oldalon, amelynek elsődleges célja a modern web legidegesítőbb szokásainak összegyűjtése és bemutatása. Aztán rájöttünk valamire: ha az internet képes globálisan idegesíteni az embereket, akkor miért ne tehetné ezt több nyelven is?

  A magyar nyelv különösen izgalmas választás. Egyrészt híres arról, hogy bonyolult, tele van furcsa ragokkal, hosszú szavakkal és olyan hangzással, amit a külföldiek gyakran úgy írnak le, mintha valaki egy billentyűzeten végiggurította volna a macskáját. Másrészt viszont rendkívül kifejező, ami tökéletesen alkalmas arra, hogy pontosan leírja azt az érzést, amikor egy weboldal automatikusan elindít egy videót teljes hangerőn.

  Mostantól tehát a legkülönfélébb bosszantó funkciók magyarul is köszönthetnek. A felugró ablakok, a végtelen cookie-kérdések, az önkényesen elinduló animációk és a megmagyarázhatatlan loading spinnerek mind készen állnak arra, hogy anyanyelveden tegyék próbára a türelmedet.

  Természetesen a fordítás nem csak szavakról szól. A célunk az volt, hogy a hangulat is átjöjjön. Az a különös keveréke az abszurd humornak és az enyhe digitális káosznak, ami az egész projektet meghatározza. Magyarul talán még egy kicsit jobban is működik, mert a nyelv remekül tudja kezelni az olyan fogalmakat, mint az „agyrém”, a „totális káosz”, vagy a „miért történik ez velem már megint”.

  Ha most jársz itt először, akkor üdvözlünk ebben a különös kísérletben. Ha pedig már régóta ismered az oldalt, akkor most egy új módon élheted át ugyanazt a digitális őrületet. Mert végső soron ez az oldal nem csak arról szól, hogy idegesítsen. Arról is szól, hogy egy kicsit nevetni tudjunk azon, mennyire furcsa irányba fejlődött néha a web.

  Szóval dőlj hátra, kattints bátran, és készülj fel arra, hogy a modern internet minden apró bosszúsága mostantól magyarul is rád köszön.

  Üdv a világ legidegesítőbb weboldalán.
