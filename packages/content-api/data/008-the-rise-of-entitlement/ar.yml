title: قصص عن وباء الاستحقاق المتصاعد
slug: the-rise-of-entitlement
intro: لا يحتوي على أي شيء من قرائنا على الإطلاق
content: |-
  في عالم أصبح فيه الإشباع الفوري هو القاعدة، هناك شعور متزايد بالاستحقاق يخرج عن نطاق السيطرة. سواء في خدمة العملاء، أو التفاعلات الاجتماعية، أو حتى الديناميكيات العائلية، يبدو أن المزيد من الناس يعتقدون أن العالم يدين لهم بشيء لمجرد وجودهم. في حين أن الثقة بالنفس والمطالبة بالحقوق هي سمات صحية، فإن الاستحقاق — حيث يتوقع الناس امتيازات أو مكافآت مفرطة دون استحقاق — قد انحرف إلى السخافة. من المضحك إلى المثير للاشمئزاز، توضح القصص من المجتمعات عبر الإنترنت، وخاصة منتدى "Entitled People" الشهير على ريديت، مدى انفصال بعض الأفراد عن الواقع.

  # 1. حالة "شكراً" بقيمة 100 دولار

  تتضمن إحدى القصص الأكثر إثارة للدهشة عروساً وطلبها الجريء من أحد ضيوف الزفاف بدفع 100 دولار لتعويض هدية اعتُبرت "غير كافية". كان الضيف قد قدم هدية مدروسة من قائمة الهدايا، ولكن بعد أسابيع من الزفاف، تلقى رسالة من العروس. قالت العروس: "لاحظت أن هديتك كانت قيمتها 25 دولاراً فقط، وهو ما لا يغطي حقاً تكلفة حضورك للزفاف. هل يمكنك التفضل بإرسال 100 دولار إضافية لنا؟"

  تجسد هذه القصة الاستحقاق الحديث — التوقع بأن الضيوف لا ينبغي عليهم فقط تلبية الدعوة ولكن أيضاً تغطية تكاليف الخيارات الباذخة للمضيف. تكمن سخافة هذا الموقف في الغياب التام للامتنان والشعور المبالغ فيه بما "يدين" به الآخرون مقابل دعوة للاحتفال.

  # 2. المطالبة بخصم على وجبة مجانية

  تأتي حكاية أخرى من عامل في مطعم للوجبات السريعة روى مواجهة صادمة مع زبون. خلال عرض ترويجي، عرضت السلسلة وجبة مجانية للزبائن. ومع ذلك، لم يكتفِ أحد الزبائن بتلقي الوجبة دون مقابل. "لماذا لا يوجد خصم على الصودا المجانية؟" هكذا طالب الزبون، مدعياً أنه على الرغم من أن الصودا كانت جزءاً من الوجبة المجانية، إلا أنها يجب أن تأتي بخصم إضافي على التكلفة غير الموجودة أصلاً.

  أوضح العامل المذهول أن الوجبة — بما في ذلك الصودا — كانت مجانية بالفعل. ومع ذلك، جادل الزبون لعدة دقائق، مصراً على أن الخصم على العنصر المجاني كان مستحقاً لأنه، على حد قوله، "يجب أن يأتي كل شيء مع صفقة".

  # 3. الوالد الذي طالب بمجالسة أطفال، للأبد

  منشور من امرأة شابة يروي تفاعلاً مع قريب بعيد يسلط الضوء على الاستحقاق داخل الديناميكيات العائلية. بعد مجالسة أطفال قريبها مرة واحدة، انهالت عليها الطلبات من القريب الذي افترض أنها ستكون مقدمة رعاية أطفال مجانية دائمة. عندما أوضحت الشابة أن لديها جدولاً مزدحماً ولا يمكنها التواجد دائماً، ثار قريبها قائلاً: "أنا من العائلة! ألا تهتمين بمساعدة عائلتك؟ أنا أستحق وقتك لأنك ابنة عمي!"

  يمكن أن يكون الاستحقاق داخل المواقف العائلية غالباً أكثر صعوبة في التعامل معه، حيث يفترض بعض الأفراد أن الروابط العائلية تعني عدم وجود حدود. ما كان ينبغي أن يكون معروفاً لمرة واحدة تصاعد بسرعة إلى توقعات غير معقولة بالخدمة — كل ذلك بسبب الاعتقاد بأن العائلة لا يجب أن تقول "لا" أبداً.

  # 4. "المؤثرون" يتوقعون كل شيء مجاناً

  ازدهرت نظرة حديثة للاستحقاق مع صعود المؤثرين على وسائل التواصل الاجتماعي، الذين يعتقد بعضهم أن "شهرتهم" يجب أن تترجم إلى خدمات مجانية. تتضمن إحدى القصص، التي تمت مشاركتها على نطاق واسع عبر الإنترنت، صاحب مطعم تلقى رسالة مباشرة من مؤثر يصف نفسه بأنه مؤثر ولديه عدد متواضع من المتابعين. وعد المؤثر بالنشر عن المطعم مقابل وجبة مجانية لنفسه وثلاثة من أصدقائه.

  عندما رفض المالك بأدب، موضحاً أن العديد من الزبائن الذين يدفعون يستمتعون بعروض المطعم دون السعي للحصول على هدايا مجانية، هاجم المؤثر المطعم، متهماً إياه بعدم فهم "قوة التعرض". والنتيجة؟ كان لدى المؤثر أقل من 2000 متابع. الجرأة في المطالبة بوجبة مجانية مقابل وعد بـ "التعرض" — الذي لا يقدم في الواقع أي ضمان للقيمة للمطعم — تسلط الضوء على مدى تضخم تقدير الناس لذواتهم في عصر وسائل التواصل الاجتماعي.

  # 5. المستأجر الذي طالب بمنزل مجاناً

  فصل أحد المنشورات المطالب الفاضحة لمستأجر اعتقد أنه لا ينبغي عليه دفع الإيجار لأنه "بقي هناك لفترة طويلة" لدرجة أن المالك يجب أن يكون ممتناً لوجوده. بعد العيش في الشقة لأكثر من عام بقليل، توقف المستأجر عن دفع الإيجار، وعند مواجهته، جادل بأنه "فعل ما يكفي" من خلال كونه مستأجراً مستقراً لمدة 12 شهراً.

  أصر على أن المالك كان طماعاً بتوقع استمرار الدفع وجادل بأنه يستحق إقامة مجانية لولائه. بطبيعة الحال، لم يقتنع المالك، لكن فكرة أن مجرد البقاء في عقار مستأجر تعني استحقاق السكن المجاني تؤكد مدى المدى الذي يمكن أن يصل إليه الاستحقاق.

  # أين ينتهي هذا؟

  يبدو أن الاستحقاق متجذر في نقص المنظور والشعور المبالغ فيه بأهمية المرء. الأمر الأكثر إثارة للقلق في هذه القصص هو أن مطالبهم بدت معقولة تماماً للأشخاص المعنيين. لم يكونوا يطلبون — كانوا يتوقعون.

  إذن ما الذي يغذي هذه العقلية؟ جزء منها ينبع من العيش في ثقافة تعطي الأولوية بشكل متزايد للفردية على المجتمع. هناك أيضاً صعود وسائل التواصل الاجتماعي، حيث يتم إخبار الناس باستمرار بـ "المطالبة بما تستحقه"، مما يدفع البعض إلى الخلط بين الاحتياجات الحقيقية والرغبات غير المعقولة. أخيراً، ثقافة الاستهلاك، التي تقدر الإشباع الفوري، تترك بعض الأفراد دون الصبر للانتظار أو العمل من أجل ما يريدون، بافتراض أنه يجب عليهم الحصول عليه فقط من خلال السؤال — أو بدقة أكبر، المطالبة.

  # الخلاصة

  في حين أن الدفاع عن النفس أمر صحي، هناك فرق بين معرفة قيمتك وبين الاستحقاق غير المعقول. التنقل في الحياة يعني قبول أن الآخرين لا يدينون لنا بأي شيء، وأن الهدايا والمعروف هي أعمال طيبة وليست التزامات. كما توضح هذه القصص، فإن الخط الفاصل بين الدفاع الواثق عن النفس والاستحقاق الصريح يسهل تجاوزه — وهو خط خطير يجب طمسه.

  في النهاية، تظل القاعدة الذهبية هي: عامل الآخرين باحترام. العالم لا يدين لنا بأي شيء، والتصرف وكأنه يفعل ذلك لا يؤدي إلا إلى خيبة الأمل، سواء بالنسبة للمستحق أو لأولئك الذين يطالبهم.
