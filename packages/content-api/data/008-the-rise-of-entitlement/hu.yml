title: Történetek a növekvő követelőzés járványáról
slug: tortenetek-a-novekvo-kovetelozes-jarvanyarol
intro: Abszolút semmit nem tartalmaz az olvasóinktól
content: >
  Egy olyan világban, ahol az azonnali kielégülés vált normává, egyre növekszik a
  követelőzés érzése, ami kezd kicsúszni az irányítás alól. Legyen szó
  ügyfélszolgálatról, társadalmi interakciókról vagy akár családi dinamikáról,
  egyre több ember tűnik úgy, hogy elhiszi: a világ tartozik nekik valamivel
  pusztán a létezésükért. Bár az önbizalom és az önérdek érvényesítése egészséges
  tulajdonságok, a követelőzés – amikor az emberek érdemtelenül várnak el túlzott
  kiváltságokat vagy jutalmakat – az abszurditásig fajult. A nevetségestől a
  kifejezetten gázosig, az online közösségek történetei, különösen a hírhedt
  „Entitled People” (Követelőző Emberek) subredditről, jól szemléltetik, mennyire
  elszakadtak egyes egyének a valóságtól.

  # 1. A 100 dolláros „Köszönöm” esete

  Az egyik legmegdöbbentőbb történet egy menyasszonyról szól, és az ő szemtelen
  kéréséről, miszerint egy esküvői vendég fizessen ki 100 dollárt, hogy pótolja
  az „elégtelennek” ítélt ajándékot. A vendég egy figyelmes ajándékot adott a
  listáról, de hetekkel az esküvő után üzenetet kapott a menyasszonytól.
  „Észrevettem, hogy az ajándékod csak 25 dollárt ért” – írta a menyasszony –,
  „ami nem igazán fedezi az esküvői részvételed költségeit. Lenne szíves küldeni
  nekünk további 100 dollárt?”

  Ez a történet a modern követelőzés mintapéldája – az az elvárás, hogy a
  vendégeknek nemcsak tisztelniük kellene a meghívást, hanem a vendéglátó
  extravagáns döntéseinek költségeit is fedezniük kellene. A helyzet abszurditása
  a hála teljes hiányában és abban a túlzott elképzelésben rejlik, hogy mások
  mivel „tartoznak” cserébe egy ünnepségre szóló meghívásért.

  # 2. Kedvezmény követelése egy ingyen ételre

  Egy másik történet egy gyorséttermi dolgozótól származik, aki egy sokkoló
  találkozást mesélt el egy vásárlóval. Egy promóció során a lánc ingyen ételt
  kínált a vásárlóknak. Azonban egy vásárló nem elégedett meg azzal, hogy költség
  nélkül kapott ételt. „Miért nincs kedvezmény az ingyen üdítőre?” – követelte a
  vásárló, azt állítva, hogy bár az üdítő az ingyen étel része volt, egy további
  százalékot le kellene vonni a nem létező árból.

  A kiszolgáló elképedve magyarázta, hogy az étel – beleértve az üdítőt is – már
  eleve ingyen van. Ennek ellenére a vásárló percekig vitatkozott, ragaszkodva
  ahhoz, hogy jár a kedvezmény az ingyen tételre, mert az ő szavaival élve
  „mindenhez kellene járnia egy jó üzletnek”.

  # 3. A szülő, aki örökös bébiszittert követelt

  Egy fiatal nő posztja, amelyben egy távoli unokatestvérével való interakcióját
  meséli el, rávilágít a családon belüli követelőzésre. Miután egyszer vigyázott
  unokatestvére gyermekeire, elárasztották a kérések az unokatestvér részéről,
  aki feltételezte, hogy ő lesz az állandó, ingyenes gyermekfelügyelő. Amikor a
  fiatal nő elmagyarázta, hogy elfoglalt és nem tud mindig rendelkezésre állni,
  az unokatestvére kiakadt: „Családtag vagy! Nem érdekel, hogy segíts a
  családodnak? Megérdemlem az idődet, mert az unokatestvérem vagy!”

  A családi helyzeteken belüli követelőzés gyakran trükkösebb lehet, mivel egyesek
  feltételezik, hogy a családi kötelékek azt jelentik, hogy nincsenek határok. Ami
  egyszeri szívességnek indult, gyorsan a szolgaság ésszerűtlen elvárásává fajult
  – mindezt azért, mert az a hit uralkodik, hogy a család soha nem mondhat
  „nemet”.

  # 4. Az „influencerek”, akik elvárják, hogy minden ingyen legyen

  A követelőzés modern változata a közösségi média influencerek felemelkedésével
  virágzott ki, akik közül egyesek úgy gondolják, hogy a „hírnevüket” ingyenes
  szolgáltatásokra kellene váltaniuk. Egy online széles körben megosztott
  történet egy étteremtulajdonosról szól, aki közvetlen üzenetet kapott egy
  szerény követőtáborral rendelkező, önjelölt influencertől. Az influencer
  megígérte, hogy posztol az étteremről, cserébe egy ingyen étkezésért saját
  magának és három barátjának.

  Amikor a tulajdonos udvariasan elutasította, elmagyarázva, hogy sok fizető
  vendég élvezi az étterem kínálatát ingyenélés nélkül, az influencer
  támadásba lendült, azzal vádolva az éttermet, hogy nem érti a „megjelenés
  erejét”. A hab a tortán? Az influencernek kevesebb mint 2000 követője volt. Az
  a pofátlanság, hogy valaki ingyen ételt követel a „megjelenés” ígéretéért – ami
  a valóságban semmilyen garanciát nem jelent az étterem számára –, rávilágít
  arra, mennyire felfúvódhat az emberek önértékelése a közösségi média korában.

  # 5. A bérlő, aki ingyen házat követelt

  Egy poszt részletezte egy bérlő felháborító követeléseit, aki úgy gondolta,
  hogy nem kellene lakbért fizetnie, mert „már olyan régóta ott van”, hogy a
  főbérlőnek hálásnak kellene lennie a jelenlétéért. Miután alig több mint egy
  évig lakott a lakásban, a bérlő abbahagyta a fizetést, és kérdőre vonva azzal
  érvelt, hogy „eleget tett” azzal, hogy 12 hónapig stabil bérlő volt.

  Ragaszkodtak hozzá, hogy a főbérlő mohó, amiért továbbra is elvárja a fizetést,
  és azzal érveltek, hogy lojalitásukért ingyen szállás jár nekik. Természetesen
  a főbérlőt nem hatotta meg a dolog, de az az elképzelés, hogy a bérleményben
  való puszta tartózkodás feljogosítja őket az ingyen lakhatásra, rávilágít arra,
  milyen messzire nyúlhat a követelőzés.

  # Hol van a vége?

  A követelőzés úgy tűnik, a perspektíva hiányában és a saját fontosságunk
  túlzott érzékelésében gyökerezik. Ami a legzavaróbb ezekben a történetekben, az
  az, hogy az érintettek számára a követeléseik teljesen ésszerűnek tűntek. Nem
  kértek – elvártak.

  Mi táplálja ezt a gondolkodásmódot? Egy része abból fakad, hogy egy olyan
  kultúrában élünk, amely egyre inkább az individualizmust helyezi a közösség
  elé. Ott van a közösségi média térnyerése is, ahol az embereknek folyamatosan
  az mondják: „követeld, amit megérdemelsz”, ami oda vezet, hogy egyesek
  összekeverik a valódi szükségleteket az észszerűtlen vágyakkal. Végül pedig a
  fogyasztói kultúra, amely az azonnali kielégülést díjazza, türelem nélkül hagy
  egyeseket ahhoz, hogy várjanak vagy megdolgozzanak azért, amit akarnak,
  feltételezve, hogy azt meg kell kapniuk pusztán a kérésükre – vagy pontosabban,
  a követelésükre.

  # A lényeg

  Bár az önmagunkért való kiállás egészséges, különbség van aközött, hogy
  ismerjük az értékünket, vagy észszerűtlenül követelőzőek vagyunk. Az életben
  való eligazodás azt jelenti, hogy elfogadjuk: mások nem tartoznak nekünk
  semmivel, az ajándékok és szívességek a kedvesség megnyilvánulásai, nem pedig
  kötelezettségek. Ahogy ezek a történetek illusztrálják, a magabiztos
  önérdek-érvényesítés és a nyílt követelőzés közötti határvonal könnyen
  átléphető – és ez egy veszélyes határvonal.

  Végül a legfőbb szabály marad: Tisztelj másokat. A világ nem tartozik nekünk
  semmivel, és ha úgy teszünk, mintha tartozna, az csak csalódáshoz vezet, mind a
  követelőző, mind azok számára, akiktől követelnek.
