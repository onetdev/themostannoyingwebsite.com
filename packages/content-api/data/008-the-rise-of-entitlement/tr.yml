title: Yükselen bir "hak görme" salgınına dair hikayeler
slug: yukselen-bir-hak-gorme-salginina-dair-hikayeler
intro: Okurlarımızdan gelen kesinlikle hiçbir şey içermez
content: |-
  Anlık tatminin norm haline geldiği bir dünyada, kontrolden çıkan ve giderek büyüyen bir "hak görme" (entitlement) duygusu var. İster müşteri hizmetlerinde, ister sosyal etkileşimlerde, hatta aile dinamiklerinde olsun, daha fazla insan dünyanın kendilerine sırf var oldukları için bir şeyler borçlu olduğuna inanıyor gibi görünüyor. Özgüven ve kendini savunma sağlıklı özellikler olsa da, insanların liyakat olmaksızın aşırı ayrıcalıklar veya ödüller beklediği hak görme durumu absürtlüğe evrildi. Gülünç olandan düpedüz utanç verici olana kadar, çevrimiçi topluluklardan, özellikle de meşhur “Entitled People” (Hak Gören İnsanlar) subreddit'inden gelen hikayeler, bazı bireylerin gerçeklikten ne kadar koptuğunu gözler önüne seriyor.

  # 1. 100 Dolarlık “Teşekkür” Vakası

  Ağızları açık bırakan hikayelerden biri, bir gelinin, “yetersiz” bulunan bir hediye karşılığında bir düğün davetlisinden 100 dolar talep etme cüretini konu alıyor. Davetli, düğün listesinden düşünceli bir hediye vermişti, ancak düğünden haftalar sonra gelinden bir mesaj aldı. Gelin, “Hediyenizin sadece 25 dolar değerinde olduğunu fark ettim,” diyordu, “bu da düğüne katılım maliyetinizi tam olarak karşılamıyor. Lütfen bize ek olarak 100 dolar gönderir misiniz?”

  Bu hikaye modern hak görme duygusunun somut bir örneğidir: Davetlilerin sadece bir davete icabet etmesi değil, aynı zamanda ev sahibinin abartılı seçimlerinin maliyetlerini de karşılaması beklentisi. Bu durumun absürtlüğü, tam bir minnet eksikliğinde ve bir kutlamaya davet edilme karşılığında başkalarının ne “borçlu” olduğuna dair şişirilmiş bir algıda yatmaktadır.

  # 2. Ücretsiz Yemekte İndirim Talep Etmek

  Başka bir hikaye, bir fast food çalışanının kendi subreddit'inde bir müşteriyle yaşadığı şok edici karşılaşmayı anlatıyor. Bir promosyon sırasında zincir, müşterilere ücretsiz bir öğün sunuyordu. Ancak bir müşteri, sadece ücretsiz bir yemek almaktan tatmin olmadı. Müşteri, sodanın ücretsiz yemeğin bir parçası olmasına rağmen, var olmayan maliyet üzerinden ek bir yüzde indirim uygulanması gerektiğini iddia ederek “Ücretsiz sodada neden indirim yok?” diye çıkıştı.

  Şaşkına dönen garson, sodanın da dahil olduğu yemeğin zaten ücretsiz olduğunu açıkladı. Yine de müşteri, ücretsiz üründe bir indirimi hak ettiğini, çünkü kendi ifadesiyle “her şeyin bir fırsatla gelmesi gerektiğini” savunarak dakikalarca tartıştı.

  # 3. Sonsuza Dek Bebek Bakıcısı İsteyen Ebeveyn

  Genç bir kadının uzak bir kuzeniyle olan etkileşimini anlatan bir paylaşım, aile içindeki hak görme duygusuna ışık tutuyor. Kuzeninin çocuklarına bir kez bakıcılık yaptıktan sonra, kadının kalıcı ve ücretsiz bir çocuk bakım sağlayıcısı olacağını varsayan kuzeni tarafından mesaj yağmuruna tutuldu. Genç kadın yoğun bir programı olduğunu ve her zaman müsait olamayacağını açıkladığında kuzeni patladı: “Ben senin ailendenim! Ailene yardım etmeyi önemsemiyor musun? Zamanını hak ediyorum çünkü ben senin kuzeninim!”

  Aile içi durumlarda hak görme duygusuyla başa çıkmak genellikle daha zordur, çünkü bazı bireyler aile bağlarının sınırların olmadığı anlamına geldiğini varsayar. Bir kerelik bir iyilik olması gereken şey, sırf ailenin asla “hayır” dememesi gerektiği inancı yüzünden, hızla mantıksız bir hizmet beklentisine dönüştü.

  # 4. Her Şeyi Bedava Bekleyen “Influencer”lar

  Hak görme duygusunun modern bir versiyonu, bazıları “şöhretlerinin” ücretsiz hizmetlere dönüşmesi gerektiğine inanan sosyal medya influencer'larının yükselişiyle gelişti. İnternette yaygın olarak paylaşılan bir hikaye, mütevazı bir takipçi kitlesine sahip, kendini influencer olarak tanımlayan birinden doğrudan mesaj alan bir restoran sahibini konu alıyor. Influencer, kendisi ve üç arkadaşı için ücretsiz bir yemek karşılığında restoran hakkında paylaşım yapma sözü veriyordu.

  Sahibi, birçok ödeme yapan müşterinin bedava bir şey aramadan restoranın sunduklarının tadını çıkardığını açıklayarak nezaketle reddettiğinde, influencer restorana saldırdı ve onları “tanınırlığın gücünü” anlamamakla suçladı. İşin ironik tarafı mı? Influencer'ın 2.000'den az takipçisi vardı. Gerçekte restoran için hiçbir değer garantisi sunmayan bir “tanınırlık” vaadiyle ücretsiz yemek talep etme cüreti, sosyal medya çağında insanların kendi değerlerini ne kadar şişirebildiklerini vurguluyor.

  # 5. Evi Bedava İsteyen Kiracı

  Bir paylaşım, “orada çok uzun süredir bulunduğu” için ev sahibinin onun varlığına minnettar olması gerektiğini ve bu yüzden kira ödememesi gerektiğine inanan bir kiracının mantıksız taleplerini detaylandırıyordu. Dairede sadece bir yılı biraz aşkın bir süre yaşadıktan sonra kiracı kira ödemeyi bıraktı ve hesap sorulduğunda, 12 ay boyunca istikrarlı bir kiracı olarak “yeterince şey yaptığını” savundu.

  Ev sahibinin ödemenin devam etmesini bekleyerek açgözlülük yaptığında ısrar etti ve sadakati karşılığında ücretsiz konaklamayı hak ettiğini savundu. Doğal olarak ev sahibi ikna olmadı, ancak sadece kiralık bir mülkte kalmanın onlara ücretsiz barınma hakkı verdiği fikri, hak görme duygusunun ne kadar ileri gidebileceğinin altını çiziyor.

  # Bu Nerede Bitecek?

  Hak görme duygusu, görünüşe göre, perspektif eksikliğinden ve kişinin kendi önemine dair aşırı şişirilmiş bir algıdan kaynaklanıyor. Bu hikayelerle ilgili en rahatsız edici olan şey, dahil olan insanlar için taleplerinin tamamen makul görünmesidir. Rica etmiyorlardı; bekliyorlardı.

  Peki bu zihniyeti ne besliyor? Bunun bir kısmı, topluluk yerine bireyselciliğe giderek daha fazla öncelik veren bir kültürde yaşamaktan kaynaklanıyor. Ayrıca, insanların sürekli olarak “hak ettiğinizi talep edin” denildiği sosyal medya da var, bu da bazılarının gerçek ihtiyaçları mantıksız isteklerle karıştırmasına yol açıyor. Son olarak, anlık tatmini ödüllendiren tüketim kültürü, bazı bireyleri istedikleri şey için bekleme veya çalışma sabrından yoksun bırakıyor ve sadece isteyerek —veya daha doğrusu talep ederek— ona ulaşmaları gerektiğini varsaymalarına neden oluyor.

  # Sonuç

  Kendi haklarını savunmak sağlıklı olsa da, kendi değerini bilmekle mantıksız bir şekilde hak iddia etmek arasında fark vardır. Hayatta yol almak, başkalarının bize hiçbir şey borçlu olmadığını, hediyelerin ve iyiliklerin zorunluluk değil, nezaket eylemleri olduğunu kabul etmek demektir. Bu hikayelerin gösterdiği gibi, kendine güvenen bir savunuculuk ile düpedüz hak görme arasındaki çizgi kolayca aşılabilir ve bu, bulanıklaştırılması tehlikeli bir çizgidir.

  Sonuçta, altın kural geçerliliğini koruyor: Başkalarına saygıyla davranın. Dünya bize hiçbir şey borçlu değil ve öyleymiş gibi davranmak hem hak iddia eden hem de kendisinden talep edilenler için sadece hayal kırıklığına yol açar.
