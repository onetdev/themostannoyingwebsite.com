title: Geschichten über eine zunehmende Anspruchs-Epidemie
slug: der-anstieg-von-anspruchsdenken
intro: Er enthält absolut nichts von unseren Lesern
content: |-
  In einer Welt, in der sofortige Befriedigung zur Norm geworden ist, wächst ein Anspruchsdenken, das zunehmend außer Kontrolle gerät. Ob im Kundenservice, in sozialen Interaktionen oder sogar in der Familiendynamik – immer mehr Menschen scheinen zu glauben, dass die Welt ihnen etwas schuldet, einfach nur, weil sie existieren. Während Selbstbewusstsein und das Einstehen für eigene Belange gesunde Eigenschaften sind, ist das Anspruchsdenken – bei dem Menschen übermäßige Privilegien oder Belohnungen ohne Gegenleistung erwarten – ins Absurde abgeglitten. Von lachhaften bis hin zu absolut peinlichen Situationen illustrieren Geschichten aus Online-Communitys, insbesondere dem berüchtigten „Entitled People“-Subreddit, wie sehr sich manche Personen von der Realität entfernt haben.

  # 1. Der Fall des 100-Dollar-„Dankeschöns“

  Eine der fassungslosesten Geschichten handelt von einer Braut und ihrer dreisten Aufforderung an einen Hochzeitsgast, 100 Dollar nachzuzahlen, da ein Geschenk als „unzureichend“ erachtet wurde. Der Gast hatte ein durchdachtes Geschenk von der Hochzeitsliste geschenkt, doch Wochen nach der Hochzeit erhielt er eine Nachricht von der Braut. „Mir ist aufgefallen, dass dein Geschenk nur 25 Dollar wert war“, schrieb die Braut, „was die Kosten für deine Teilnahme an der Hochzeit nicht wirklich deckt. Könntest du uns bitte zusätzlich 100 Dollar schicken?“

  Diese Geschichte ist der Inbegriff des modernen Anspruchsdenkens – die Erwartung, dass Gäste nicht nur eine Einladung ehren, sondern auch die Kosten für die extravaganten Entscheidungen des Gastgebers decken sollten. Die Absurdität dieser Situation liegt im völligen Mangel an Dankbarkeit und einem übersteigerten Gefühl dessen, was andere einem als Gegenleistung für eine Einladung zu einer Feier „schulden“.

  # 2. Die Forderung nach einem Rabatt auf eine kostenlose Mahlzeit

  Eine weitere Geschichte stammt von einem Fast-Food-Mitarbeiter, der von einer schockierenden Begegnung mit einem Kunden in seinem Subreddit berichtete. Während einer Werbeaktion bot die Kette den Kunden eine kostenlose Mahlzeit an. Ein Kunde war jedoch nicht damit zufrieden, einfach nur eine Mahlzeit umsonst zu erhalten. „Warum gibt es keinen Rabatt auf die kostenlose Cola?“, forderte der Kunde und behauptete, dass die Cola, obwohl sie Teil der kostenlosen Mahlzeit war, mit einem zusätzlichen Prozentsatz Rabatt auf die nicht vorhandenen Kosten versehen sein sollte.

  Der verdutzte Mitarbeiter erklärte, dass das Menü – einschließlich der Cola – bereits kostenlos sei. Dennoch argumentierte der Kunde mehrere Minuten lang und bestand darauf, dass ein Rabatt auf den kostenlosen Artikel verdient sei, da, in seinen Worten, „alles mit einem Angebot kommen sollte“.

  # 3. Das Elternteil, das einen Babysitter forderte – für immer

  Ein Beitrag einer jungen Frau, die von einer Interaktion mit einem entfernten Cousin berichtet, wirft ein Licht auf das Anspruchsdenken innerhalb der Familiendynamik. Nachdem sie einmal auf die Kinder ihres Cousins aufgepasst hatte, wurde sie mit Anfragen des Cousins bombardiert, der davon ausging, dass sie dauerhaft eine kostenlose Kinderbetreuung sein würde. Als die junge Frau erklärte, dass sie einen vollen Terminkalender habe und nicht immer verfügbar sein könne, explodierte ihr Cousin und sagte: „Ich bin Familie! Liegt dir nichts daran, deiner Familie zu helfen? Ich verdiene deine Zeit, weil du meine Cousine bist!“

  Anspruchsdenken in Familiensituationen kann oft schwieriger zu handhaben sein, da manche Personen davon ausgehen, dass familiäre Bindungen bedeuten, dass keine Grenzen existieren. Was ein einmaliger Gefallen hätte sein sollen, eskalierte schnell zu unangemessenen Erwartungen an Dienstleistungen – alles wegen des Glaubens, dass Familie niemals „Nein“ sagen sollte.

  # 4. „Influencer“, die alles umsonst erwarten

  Eine moderne Form des Anspruchsdenkens ist mit dem Aufstieg der Social-Media-Influencer aufgeblüht, von denen einige glauben, dass ihr „Ruhm“ in kostenlose Dienstleistungen umgemünzt werden sollte. Eine Geschichte, die online weite Kreise zog, handelt von einem Restaurantbesitzer, der eine Direktnachricht von einem selbsternannten Influencer mit einer bescheidenen Anzahl an Followern erhielt. Der Influencer versprach, über das Restaurant zu posten, im Austausch für ein kostenloses Essen für sich selbst und drei Freunde.

  Als der Besitzer höflich ablehnte und erklärte, dass viele zahlende Kunden das Angebot des Restaurants genießen, ohne nach Gratisproben zu suchen, schlug der Influencer um sich und beschuldigte das Restaurant, die „Macht der Reichweite“ nicht zu verstehen. Das Sahnehäubchen? Der Influencer hatte weniger als 2.000 Follower. Die Dreistigkeit, ein kostenloses Essen für das Versprechen von „Reichweite“ zu fordern – was in der Realität keine Wertgarantie für das Restaurant bietet –, verdeutlicht, wie aufgebläht das eigene Selbstwertgefühl im Social-Media-Zeitalter werden kann.

  # 5. Der Mieter, der ein Haus umsonst forderte

  Ein Beitrag schilderte die unverschämten Forderungen eines Mieters, der glaubte, keine Miete mehr zahlen zu müssen, weil er „schon so lange da sei“, dass der Vermieter für seine Anwesenheit dankbar sein sollte. Nachdem er nur etwas mehr als ein Jahr in der Wohnung gelebt hatte, stellte der Mieter die Mietzahlungen ein und argumentierte bei einer Konfrontation, er habe „genug getan“, indem er 12 Monate lang ein stabiler Mieter gewesen sei.

  Er bestand darauf, dass der Vermieter gierig sei, weil er weiterhin Zahlungen erwartete, und argumentierte, dass er für seine Loyalität eine kostenlose Unterkunft verdiene. Natürlich ließ sich der Vermieter nicht umstimmen, aber die Vorstellung, dass allein das Verbleiben in einem Mietobjekt jemanden dazu berechtigt, mietfrei zu wohnen, unterstreicht, wie weit Anspruchsdenken gehen kann.

  # Wo endet das?

  Anspruchsdenken scheint in einem Mangel an Perspektive und einem übersteigerten Gefühl der eigenen Wichtigkeit verwurzelt zu sein. Das Beunruhigendste an diesen Geschichten ist, dass ihre Forderungen für die beteiligten Personen völlig vernünftig erschienen. Sie baten nicht – sie erwarteten.

  Was befeuert also diese Denkweise? Ein Teil davon stammt aus einer Kultur, die zunehmend Individualismus über Gemeinschaft stellt. Da ist auch der Aufstieg der sozialen Medien, wo den Menschen ständig gesagt wird, sie sollen „fordern, was sie verdienen“, was einige dazu führt, echte Bedürfnisse mit unangemessenen Wünschen zu verwechseln. Schließlich hinterlässt die Konsumkultur, die sofortige Befriedigung preist, manche Individuen ohne die Geduld, auf das zu warten oder für das zu arbeiten, was sie wollen, und davon auszugehen, dass sie es einfach durch Fragen erhalten sollten – oder richtiger gesagt: durch Fordern.

  # Das Fazit

  Während es gesund ist, für sich selbst einzustehen, gibt es einen Unterschied dazwischen, seinen Wert zu kennen und unangemessen anspruchsvoll zu sein. Durchs Leben zu gehen bedeutet zu akzeptieren, dass andere uns nichts schulden, dass Geschenke und Gefallen Akte der Freundlichkeit sind, keine Verpflichtungen. Wie diese Geschichten illustrieren, ist die Linie zwischen selbstbewusstem Eintreten für eigene Belange und schierem Anspruchsdenken leicht überschritten – und es ist eine gefährliche Linie, die man nicht verwischen sollte.

  Am Ende bleibt die goldene Regel: Behandle andere mit Respekt. Die Welt schuldet uns nichts, und so zu tun, als ob sie es täte, führt nur zu Enttäuschungen, sowohl für den Anspruchsberechtigten als auch für diejenigen, von denen er fordert.
