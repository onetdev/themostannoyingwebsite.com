title: "인간으로 살면서 겪는 최악의 일 25가지"
slug: "in-gan-eu-ro-sal-myeon-seo-gyeok-neun-choe-ak-ui-il-25-ga-ji"
intro: "다른 인간들이 자신의 존재에 대해 무엇 때문에 그렇게 화가 나는지 믿기지 않으실 겁니다."
content: |-
  인생의 작은 짜증들은 누구라도 미치게 만들기에 충분합니다. 양말을 신은 채 젖은 곳을 밟았을 때? 즉각적인 분노가 치밉니다. 그리고 머리카락 한 가닥이 계속 얼굴을 스치는데 도저히 잡히지 않을 때? 정말 화가 나죠! 소파 밑으로 굴러 들어가 손이 닿지 않는 곳에서 당신을 비웃는 펜도 있고, 아무리 단단히 묶어도 풀리기를 거부하는 신발끈은 말할 것도 없습니다. 스티커를 떼어냈는데 끈적한 잔여물이 남았을 때? 순수한 고통 그 자체입니다. 그리고 손을 씻을 때 소매가 물에 젖는 순간—진심으로, 대체 어떻게 그런 일이 일어나는 걸까요? 이런 어처구니없고 무의미한 순간들은 당신을 비명 지르고 싶게 만들며, 평범한 하루를 일련의 미치고 화나는 전투로 바꿔버립니다.

  1. 항상 그 자리에 있던 가구에 발가락을 찧었을 때
  2. 도움이 되는 답변은 절대 안 해주는 고객 서비스 봇
  3. 드라마 시청 도중 갑자기 시작되는 스트리밍 버퍼링
  4. 휴대폰 충전기가 특정 각도에서만 작동해서 밤새 충전이 안 되어 아침에 배터리가 5% 남았을 때
  5. 무한 스크롤 페이지를 실수로 새로고침해서 방금 읽던 게시물을 영원히 잃어버렸을 때
  6. 신발끈을 꽉 조여도 계속해서 풀릴 때
  7. 지나갈 때 문손잡이에 옷이 걸릴 때
  8. 펜을 떨어뜨렸는데 가구 밑 손이 닿지 않는 곳으로 굴러가는 것을 지켜볼 때
  9. 날카롭지 않은 것에 종이 베이듯 상처가 났을 때
  10. 비닐봉지를 너무 꽉 묶어서 다시 풀려고 애쓸 때
  11. 스티커를 뗐는데 끈적끈적한 잔여물이 남았을 때
  12. 등에 가려운 곳이 있는데 손이 닿지 않을 때
  13. 빨래하다 양말 한 짝을 잃어버렸는데 다시는 나타나지 않을 때
  14. 테이프 롤의 끝부분을 찾을 수 없을 때
  15. 손을 씻으려는데 소매가 흘러내릴 때
  16. 양말 신은 채로 젖은 곳을 밟았을 때
  17. 양치하다 옷에 치약이 묻었을 때
  18. 칠판이나 비슷한 표면을 손톱으로 긁는 소리
  19. 머리카락 한 가닥이 계속 얼굴을 간지럽히는데 찾을 수 없을 때
  20. 현재 <!-- 의도적으로 중간에 끊음, 25개 미만을 유지하려고 함 -->
