title: 人間であることの最悪な25のこと
slug: ningen-dearu-koto-no-saiaku-na-25-no-koto
intro: 他の人間が自分の存在について何に腹を立てているのか、あなたは信じられないでしょう。
content: |-
  人生の小さなイライラは、誰をも狂わせるのに十分です。靴下を履いたまま濡れた場所を踏んでしまった？即座に怒りが頂点に達します。顔にずっとまとわりついているのに、どうしても捕まえられない一筋の髪の毛？イライラしますね！ソファの下の、手の届かない場所まで転がっていき、あなたをあざ笑うペン。そして、どんなにきつく結んでもほどけてしまう靴紐。シールを剥がした後に残る、あのベタベタした跡？まさに苦行です。手を洗っている時に袖が水に浸かってしまった瞬間—マジで、どうしてあんなことが起きるんでしょう？これらの馬鹿げた、無意味な瞬間は、あなたを叫びたくさせ、平凡な一日をイライラと怒りに満ちた戦いの連続に変えてしまいます。

  1. ずっとそこにある家具に足の指をぶつける
  2. 役に立つ答えを返さないカスタマーサービスのボット
  3. ドラマのいいところで動画がバッファリング中になる
  4. 特定の角度でしか反応しない充電器のせいで、朝起きたらスマホのバッテリーが5%しかない時
  5. 無限スクロールのページを誤って更新してしまい、読んでいた投稿を二度と見つけられなくなる
  6. きつく結んでも靴紐が何度もほどける
  7. 通りすがりにドアノブに服が引っかかる
  8. ペンを落とし、家具の下の手の届かない場所まで転がっていくのを見届ける
  9. 鋭くないはずの物で紙の手を切る
  10. ビニール袋をきつく結びすぎて、開けるのに苦労する
  11. シールを剥がした後に残るベタベタした粘着剤
  12. 背中の手が届かない場所が痒くなる
  13. 洗濯で靴下の片方がなくなり、二度と現れない
  14. セロハンテープの切り口が見つからない
  15. 手を洗っている時に袖がずり落ちてくる
  16. 靴下を履いたまま濡れた場所を踏む
  17. 歯磨き中に歯磨き粉が服につく
  18. 黒板などを爪でひっかく音
  19. 一筋の髪の毛がずっと顔をくすぐっているのに、見つけられない
  20. される <!-- 意図的に途中でカットし、25個未満に抑えています -->
