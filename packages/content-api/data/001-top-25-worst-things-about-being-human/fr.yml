title: Top 25 des pires choses dans la vie d'un humain
slug: top-25-des-pires-choses-dans-la-vie-dun-humain
intro: Vous ne croiriez pas ce qui rend les autres humains si furieux dans leur existence.
content: |-
  Les petits désagréments de la vie suffisent à rendre n'importe qui fou. Marcher dans une flaque d'eau avec des chaussettes ? Rage instantanée. Et cette mèche de cheveux qui frôle constamment votre visage mais que vous n'arrivez jamais à attraper ? Exaspérant ! Puis il y a le stylo qui roule juste hors de portée, se moquant de vous sous le canapé, et ne me lancez même pas sur les lacets qui refusent de rester attachés, peu importe la force avec laquelle vous les nouez. Décoller un autocollant et se retrouver avec ce résidu collant ? Une pure agonie. Et le moment où votre manche trempe dans l'eau pendant que vous vous lavez les mains — sérieusement, comment cela arrive-t-il ? Ces moments ridicules et inutiles vous donnent envie de hurler, transformant une journée normale en une série de batailles exaspérantes et rageuses.

  1. Se cogner l'orteil contre un meuble qui a toujours été là
  2. Les bots du service client qui ne donnent jamais de réponses utiles
  3. La vidéo qui charge juste au milieu d'une série
  4. Quand votre chargeur de téléphone ne fonctionne qu'à un angle très spécifique, et qu'il ne charge pas votre téléphone pendant la nuit et que vous vous réveillez avec 5 % de batterie
  5. Rafraîchir accidentellement une page à défilement infini et perdre à jamais le post que vous étiez en train de lire
  6. Quand votre lacet se défait constamment même après l'avoir serré
  7. Les vêtements qui s'accrochent aux poignées de porte en passant
  8. Faire tomber un stylo et le regarder rouler juste hors de portée sous un meuble
  9. Se faire une coupure avec du papier pour quelque chose qui ne devrait pas être tranchant
  10. Attacher un sac en plastique trop serré et lutter pour le rouvrir
  11. Décoller un autocollant et il laisse derrière lui ce résidu collant
  12. Avoir une zone qui démange et que vous ne pouvez pas atteindre dans votre dos
  13. Perdre une chaussette dans la lessive, et elle ne réapparaît jamais
  14. Ne pas pouvoir trouver le bout du rouleau de ruban adhésif
  15. Une manche qui tombe quand vous essayez de vous laver les mains
  16. Marcher dans une flaque d'eau avec des chaussettes
  17. Mettre du dentifrice sur ses vêtements en se brossant les dents
  18. Le bruit des ongles qui grattent un tableau noir ou des surfaces similaires
  19. Quand une seule mèche de cheveux continue de vous chatouiller le visage mais que vous ne la trouvez pas
  20. Être <!-- intentionnellement coupé au milieu, essayant délibérément de rester en dessous de 25 -->
