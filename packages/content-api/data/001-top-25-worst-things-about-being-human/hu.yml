title: A 25 legrosszabb dolog az emberi létben
slug: a-25-legrosszabb-dolog-az-emberi-letben
intro: El sem hinnéd, mi minden borítja ki a többi embert a saját létezésével kapcsolatban.
content: >
  Az élet apró bosszúságai elegendőek ahhoz, hogy bárkit az őrületbe kergessenek.
  Zokniban vizes foltba lépni? Azonnali dühroham. És az a hajszál, ami folyamatosan
  az arcodat súrolja, de sosem tudod elkapni? Megőrjít! Aztán ott van a toll, ami
  pont elérhetetlen messzeségbe gurul, és a kanapé alól gúnyolódik rajtad... és
  ne is kezdjük a cipőfűzőkkel, amik nem hajlandóak megkötve maradni, akármilyen
  szorosra is csomózod őket. Matricát lehúzni, aztán ott marad az a ragacsos
  maradvány? Tiszta kín. És az a pillanat, amikor a ruhaujjad belelóg a vízbe
  kézmosás közben – komolyan, ez egyáltalán hogy történik? Ezek a röhejes,
  értelmetlen pillanatok ordítani késztetnek, és a normális napot őrjítő, dühöt
  gerjesztő csaták sorozatává változtatják.

  1. Beleverni a lábujjad egy bútorba, ami világéletében ott volt
  2. Ügyfélszolgálati botok, amik soha nem adnak hasznos választ
  3. Pufferelés streamelés közben, pont a sorozat közepén
  4. Amikor a telefontöltőd csak egy nagyon specifikus szögben működik, és nem
  tölti fel a telefonodat éjszaka, így reggel 5%-kal ébredsz
  5. Véletlenül frissíteni egy végtelen görgetős oldalt, és örökre elveszíteni a
  posztot, amit éppen olvastál
  6. Amikor a cipőfűződ folyamatosan kikötődik, még szorosra húzás után is
  7. Beleakadni a ruháddal a kilincsbe, miközben elhaladsz mellette
  8. Elejteni egy tollat, és nézni, ahogy pont elérhetetlen helyre gurul a bútor alá
  9. Papírvágást szerezni valamitől, ami nem is éles
  10. Túl szorosra kötni egy műanyag zacskót, aztán küzdeni a kinyitásával
  11. Lehúzni egy matricát valamiről, és ott marad utána az a ragacsos maradvány
  12. Viszkető pont a hátadon, amit nem érsz el
  13. Elveszíteni egy fél pár zoknit a mosásban, ami soha nem kerül elő
  14. Nem találni a ragasztószalag végét
  15. Leálló ruhaujj, amikor éppen kezet próbálsz mosni
  16. Vizes foltba lépni zokniban
  17. Fogkrémes lesz a ruhád fogmosás közben
  18. A körmök karcolása a táblán vagy hasonló felületeken
  19. Amikor egyetlen hajszál folyamatosan csiklandozza az arcodat, de nem találod
  20. Éppen <!-- szándékosan félbevágva, hogy 25 alatt maradjunk -->
