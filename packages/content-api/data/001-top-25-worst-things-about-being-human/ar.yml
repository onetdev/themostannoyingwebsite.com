title: أفضل 25 شيئاً سيئاً في كونك إنساناً
slug: top-25-worst-things-about-being-human
intro: لن تصدق ما الذي يجعل البشر الآخرين غاضبين جداً من وجودهم.
content: |-
  مضايقات الحياة الصغيرة كافية لدفع أي شخص للجنون. الخطو في بقعة مبللة وأنت ترتدي الجوارب؟ غضب فوري. وخصلة الشعر تلك التي تداعب وجهك باستمرار ولكنها لا تسمح لك أبداً بالإمساك بها؟ أمر يثير الحنق! ثم هناك القلم الذي يتدحرج بعيداً عن متناول يدك، ويسخر منك من تحت الأريكة، ولا تجعلني أبدأ في الحديث عن أربطة الحذاء التي ترفض البقاء مربوطة مهما أحكمت ربطها. تقشير ملصق وترك بقايا لزجة؟ عذاب خالص. واللحظة التي يغطس فيها كمك في الماء وأنت تغسل يديك — بجدية، كيف يحدث ذلك؟ هذه اللحظات السخيفة وغير المجدية تجعلك ترغب في الصراخ، محولةً يوماً عادياً إلى سلسلة من المعارك المثيرة للغضب والجنون.

  1. اصطدام إصبع قدمك بقطعة أثاث كانت موجودة دائماً
  2. بوتات خدمة العملاء التي لا تقدم أبداً إجابات مفيدة
  3. توقف البث للتحميل في منتصف العرض تماماً
  4. عندما يعمل شاحن هاتفك فقط بزاوية محددة جداً، ولا يشحن هاتفك خلال الليل وتستيقظ ببطارية 5%
  5. تحديث صفحة التمرير اللانهائي بالخطأ وفقدان المنشور الذي كنت تقرأه للأبد
  6. عندما ينفك رباط حذائك باستمرار حتى بعد إحكامه
  7. اشتباك الملابس بمقابض الأبواب أثناء مرورك
  8. سقوط قلم ومشاهدته يتدحرج بعيداً عن متناول اليد تحت الأثاث
  9. الإصابة بجرح ورقي من شيء لا ينبغي أن يكون حاداً
  10. ربط كيس بلاستيكي بإحكام شديد ثم المعاناة لفتحه مرة أخرى
  11. تقشير ملصق عن شيء ما وتركه لتلك البقايا اللزجة
  12. وجود بقعة تسبب الحكة في ظهرك لا يمكنك الوصول إليها
  13. فقدان جورب واحد في الغسيل، وعدم ظهوره مرة أخرى أبداً
  14. عدم القدرة على العثور على طرف لفة الشريط اللاصق
  15. سقوط الكم عندما تحاول غسل يديك
  16. الخطو في بقعة مبللة وأنت ترتدي الجوارب
  17. وصول معجون الأسنان إلى ملابسك أثناء تنظيف أسنانك
  18. صوت الأظافر وهي تخدش سبورة أو أسطح مماثلة
  19. عندما تستمر خصلة شعر واحدة في مداعبة وجهك ولكن لا يمكنك العثور عليها
  20. كونه <!-- مقطوع عمداً في المنتصف، محاولاً البقاء تحت 25 -->
