title: इंसान होने के बारे में शीर्ष 25 सबसे बुरी चीज़ें
slug: insan-hone-ke-bare-mein-top-25-sabse-buri-cheezein
intro: आपको विश्वास नहीं होगा कि क्या चीज़ें अन्य मनुष्यों को उनके अस्तित्व के बारे में इतना पागल कर देती हैं।
content: |-
  जीवन की छोटी-छोटी झुंझलाहटें किसी को भी पागल करने के लिए काफी हैं। मोज़े पहनकर गीली जगह पर पैर रखना? तुरंत गुस्सा आ जाता है। और बालों की वह लट जो लगातार आपके चेहरे को छू रही है लेकिन कभी भी आपके हाथ में नहीं आती? क्रोधित करने वाला! फिर वह पेन है जो हाथ से थोड़ा दूर लुढ़क जाता है, सोफे के नीचे से आपका मज़ाक उड़ाता है, और उन जूतों के फीतों की तो बात ही मत कीजिए जो चाहे आप उन्हें कितनी भी कसकर बांधें, बंधे रहने से इनकार कर देते हैं। एक स्टिकर उतारना और उस चिपचिपे अवशेष के साथ रह जाना? शुद्ध यंत्रणा। और वह क्षण जब आपके हाथ धोते समय आपकी आस्तीन पानी में डूब जाती है—गंभीरता से, ऐसा कैसे हो जाता है? ये हास्यास्पद, निरर्थक क्षण आपको चीखने के लिए मजबूर करते हैं, एक सामान्य दिन को पागल करने वाली, क्रोध दिलाने वाली लड़ाइयों की श्रृंखला में बदल देते हैं।

  1. फर्नीचर के उस टुकड़े पर अपना अंगूठा टकराना जो हमेशा से वहीं था
  2. कस्टमर सर्विस बॉट्स जो कभी मददगार जवाब नहीं देते
  3. किसी शो के बीच में ही स्ट्रीमिंग का बफरिंग होना
  4. जब आपका फोन चार्जर केवल एक बहुत ही विशिष्ट कोण पर काम करता है, और वह रात के दौरान आपके फोन को चार्ज नहीं करता है और आप 5% बैटरी के साथ जागते हैं
  5. गलती से अनंत स्क्रॉल पेज को रिफ्रेश करना और उस पोस्ट को खो देना जिसे आप हमेशा के लिए पढ़ रहे थे
  6. जब आपके जूते के फीते कसने के बाद भी बार-बार खुल जाते हैं
  7. पास से गुजरते समय दरवाजे के हैंडल में कपड़े फंस जाना
  8. एक पेन गिराना और उसे फर्नीचर के नीचे हाथ से थोड़ा दूर लुढ़कते हुए देखना
  9. किसी ऐसी चीज़ से पेपर कट लगना जो पैनी नहीं होनी चाहिए
  10. प्लास्टिक की थैली को बहुत कसकर बांधना और फिर उसे दोबारा खोलने के लिए संघर्ष करना
  11. किसी चीज़ से स्टिकर उतारना और वह पीछे अपना चिपचिपा अवशेष छोड़ देता है
  12. आपकी पीठ पर खुजली वाली जगह होना जहाँ आपका हाथ न पहुँच सके
  13. लॉन्ड्री में एक मोज़ा खो जाना, और वह कभी दोबारा दिखाई नहीं देता
  14. टेप के रोल का सिरा न मिल पाना
  15. जब आप अपने हाथ धोने की कोशिश कर रहे हों तो आस्तीन का नीचे गिर जाना
  16. मोज़े पहनकर गीली जगह पर पैर रखना
  17. दांत ब्रश करते समय अपने कपड़ों पर टूथपेस्ट लगना
  18. ब्लैकबोर्ड या इसी तरह की सतहों पर नाखूनों के खरोंचने की आवाज़
  19. जब बालों की एक लट आपके चेहरे पर गुदगुदी करती रहती है लेकिन आप उसे ढूंढ नहीं पाते
  20. होना <!-- जानबूझकर बीच में काट दिया गया, जानबूझकर 25 से नीचे रहने की कोशिश -->
