title: Топ-25 худших вещей в том, чтобы быть человеком
slug: top-25-khudshikh-veshchey-v-tom-chtoby-byt-chelovekom
intro: Вы не поверите, что заставляет других людей так беситься из-за своего существования.
content: |-
  Маленьких жизненных раздражителей достаточно, чтобы свести кого угодно с ума. Наступить в мокрое место в носках? Мгновенная ярость. А та прядь волос, которая постоянно щекочет лицо, но никак не дается в руки? Бесит! А еще есть ручка, которая закатывается ровно туда, куда не дотянуться, издевательски поглядывая на вас из-под дивана. И даже не заставляйте меня начинать про шнурки, которые отказываются оставаться завязанными, как бы туго вы их ни затягивали. Отклеивать наклейку и остаться с этим липким налетом? Чистая агония. И тот момент, когда ваш рукав окунается в воду, когда вы моете руки — серьезно, как это вообще происходит? Эти нелепые, бессмысленные моменты заставляют вас хотеть кричать, превращая обычный день в серию сводящих с ума, вызывающих ярость сражений.

  1. Удариться мизинцем о мебель, которая всегда там стояла
  2. Боты службы поддержки, которые никогда не дают полезных ответов
  3. Буферизация видео прямо в середине шоу
  4. Когда зарядка телефона работает только под определенным углом, и она не заряжает ваш телефон ночью, и вы просыпаетесь с 5% заряда
  5. Случайно обновить страницу бесконечного скролла и навсегда потерять пост, который вы только что читали
  6. Когда шнурок постоянно развязывается даже после затягивания
  7. Одежда, цепляющаяся за дверные ручки, когда вы проходите мимо
  8. Уронить ручку и смотреть, как она закатывается в недосягаемое место под мебелью
  9. Получить порез бумагой от чего-то, что не должно быть острым
  10. Слишком туго завязать пластиковый пакет, а потом мучиться, пытаясь его снова открыть
  11. Отклеить наклейку от чего-то, а она оставляет после себя этот липкий след
  12. Чешущееся место на спине, до которого невозможно дотянуться
  13. Потерять один носок при стирке, и он никогда не появляется снова
  14. Невозможность найти конец рулона скотча
  15. Рукав, сползающий вниз, когда вы пытаетесь помыть руки
  16. Наступить в мокрое место в носках
  17. Попасть зубной пастой на одежду во время чистки зубов
  18. Звук ногтей, скребущих по доске или подобным поверхностям
  19. Когда одна прядь волос продолжает щекотать лицо, но вы не можете её найти
  20. Быть <!-- намеренно обрезано посередине, сознательно стараясь остаться ниже 25 -->
