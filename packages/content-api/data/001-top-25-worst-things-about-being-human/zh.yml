title: 人类生存的25个最糟心的事
slug: ren-lei-sheng-cun-de-25-ge-zui-zao-xin-de-shi
intro: 你肯定不相信，其他人类到底在为些什么琐碎的事感到恼火。
content: |-
  生活中的小小烦恼足以让任何人发疯。穿着袜子踩到水渍？瞬间暴怒。还有那一根不断扫过你脸庞却怎么也抓不住的发丝？简直气炸了！还有那支滚到沙发底下够不着，在那儿嘲笑你的笔。别跟我提那些不管系多紧都不肯老老实实待着的鞋带。撕掉贴纸后留下的粘性残留物？简直是种折磨。当你洗手时袖子不小心蘸到水的那一刻——说真的，这到底是怎么发生的？这些荒谬、毫无意义的瞬间让你想放声尖叫，把平凡的一天变成一系列令人抓狂、诱发愤怒的战斗。

  1. 在那件一直在那儿的家具上踢到脚趾
  2. 永远给不出有用回答的客服机器人
  3. 在看剧看到一半时视频开始缓冲
  4. 手机充电线必须呈特定角度才能充电，结果整晚没充上，早上起来只有5%的电量
  5. 意外刷新了无限滚动的页面，从此永远失去了刚才正在看的帖子
  6. 鞋带在拉紧后还是不断地松开
  7. 走过门口时衣服挂在门把手上
  8. 掉落一支笔，眼睁睁看着它滚到家具底下够不到的地方
  9. 被某种根本不锋利的东西划破手指
  10. 把塑料袋系得太紧，然后费劲巴拉地想解开它
  11. 撕下贴纸却留下了那层粘乎乎的胶
  12. 后背发痒却怎么也够不到
  13. 洗衣服时丢了一只袜子，从此音讯全无
  14. 怎么也找不到胶带的头
  15. 洗手时袖子滑了下来
  16. 穿着袜子踩到水渍
  17. 刷牙时牙膏弄到了衣服上
  18. 指甲划过黑板或类似表面的声音
  19. 一根头发丝一直挠你的脸，你却怎么也找不着它
  20. 正在<!-- 故意切断在中间，故意想保持在25个以下 -->
