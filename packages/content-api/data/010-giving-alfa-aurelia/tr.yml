title: Alfa Aurelia havası
slug: alfa-aurelia-havasi
intro: Yaşa, Sev, Gül; bu noktada sırf inat olsun diye ayaktayız
content: |-
  Aurelia, Knight's Institute'taki sıradan çocuklardan biriydi ama öğretmenlerinin sürekli dayattığı o “asil ve erdemli ol” kafasında değildi. Yani, kimse: kelimenin tam anlamıyla hiç kimse: ama annesi sürekli, “Burada hayatının aşkıyla tanışacaksın,” deyip duruyordu. Ama dürüst olmak gerekirse? Büyük falso (Big yikes). Şövalyelik ölmediyse bile kesinlikle yoğun bakımdaydı ve bu asilzade özentilerinin hiçbirinde Aurelia'nın sergilediği "ana karakter enerjisi" yoktu.

  Diğer çocuklar saray görgüsü ve kılıç ustalığı çalışırken, Aurelia daha çok efsunlu aynasıyla ilgileniyordu. Aynası, en sulu "reels" videolarına ve efsunlu parşömenlere açılan bir portal gibiydi; ona krallıktaki her asilin dramalarını ve "epic fail"lerini gösteriyordu. Her gece derslerden sonra, elinde aynasıyla gizlice kaçar, diğer asillerin hayatlarından kesitlere ("reels") bakar ve utanç verici ("cringey") anlarına gülerdi. Bazen yorumlara bile dalardı; orada hazırcevap köylüler ve asiller, “Hazır başlamışken belini de bük bari!” gibi laflar eder veya birbirlerine “gel de bir elinin payını vereyim!” (catch these hands!) diye meydan okurlardı. Resmen eğlencenin G.O.A.T.'ıydı (tüm zamanların en iyisi).

  Bir gece, kılıç becerilerini sergilemek için elinden geleni yapan Sir Percival adındaki "kısa boylu kral" (short king) bir şövalye adayının videosunu izledi. Adam kılıcı sanki kendisinden iki kat ağırmış gibi sallıyordu ve yaveri de yorumlarda “Gyatt!” ve “Bruh moment!” diyerek onu gazlıyordu. Tam bir "NPC davranışı" sergiliyordu ama dürüst olmak gerekirse? Aurelia buna bayılmıştı. Gülmekten neredeyse aynasını düşürecekti, “Sir Percival için sohbete koca bir F yazın,” diye mırıldandı.

  Şu “gerçek aşkı bulma” olayı çok abartılmıştı. Annesi sürekli tepesindeydi, “Aurelia, bir asilzadenin dikkatini çekmen lazım! Bu bir oyun değil!” diyordu. Ama o, "Rizz"i (etkileme gücü) sıfır olan "boomer enerjili" birine razı olacak değildi. Ana karakter havası olan, belki biraz da "kaotik iyi" (chaotic good) birini istiyordu. İçten içe fena halde "manifest"liyordu; kendini maceracı, gizemli ve ter dökmeden ejderhayla savaşabilecek bir adamla hayal ediyordu.

  Ve sahneye Lysander çıktı. Başıboş bir şövalyeydi ve resmen "sigma enerjisi" saçıyordu (dripped in sigma energy). Aurelia onu kraliyet şöleninde ilk gördüğünde, “Efsane bir hava veriyor…” (legend vibes) diye düşündü. Adamın "drip"i (tarzı) on numaraydı ve her hareketinden "Chad enerjisi" fışkıran sessiz bir özgüvenle hareket ediyordu. Ona her baktığında, sanki Aurelia'ya büyü yapılmış gibi hissediyordu. Arkadaşları, “Tamamdır. Aradığın adam bu. Resmen beyaz atlı şövalye,” diyordu.

  Ancak onu tanıdıkça, Aurelia soğumaya ("ick") başladı. İlk başta küçük şeylerdi, mesela tek bir kelime etmeden günlerce ortadan kaybolması gibi. Sonra diğer asil kızlarla "suçüstü" (caught in 4k) yakalandığına dair söylentiler duydu ve Aurelia bunu her açtığında, adam onu "gaslight"lıyor, “Şaka de hemen! Hayal görüyorsun Aurelia,” falan diyordu. Aurelia da orada oturup kendi kendine, “Eğer görmezden gelirsem yok sayılır,” diyordu. Ama bu "delüzyon" bir masaldan ziyade bir tuzak gibi hissettirmeye başladı. Aurelia, “delulu is the solulu” (çözüm delirmekte) diye düşünmeye başladı ama bu pek de iyi bir anlamda değildi.

  Bu sırada annesinin başka bir planı vardı. Sahneye Lord Eldric çıktı; “güvenli” seçim. Ailesi onu sonsuza dek Aurelia'ya dayatıp durmuştu. O gizemli şövalye ya da Chad enerjili serseri değildi ama sağlamdı, bir nevi "himbo" (saf ama yakışıklı) enerjisiyle şirindi ve Aurelia'nın alanına gerçekten saygı duyuyordu. Alttan alta, Eldric aslında oldukça "based"di (kendine has ve dürüst). Aurelia'yı fantezi kılıç oyunlarıyla veya "bussin" (çok iyi) kıyafetlerle etkilemeye çalışmıyordu; o sadece… Eldric'ti. Basit, istikrarlı, ayaklı bir "soğuma makinesi" değildi.

  Bir gün, Aurelia'nın Lysander için yanıp tutuşmasından bıkmış olan arkadaşıyla sohbet ediyordu. Arkadaşı, “Kızım, bu iş yaş (this ain't it, chief). Kendi küçük hayal dünyanda (delulu world) yaşıyorsun ama Lord Eldric resmen burada senin onu fark etmeni bekliyor,” dedi. Aurelia bunu düşündü ve arkadaşının haklı olabileceğini fark etti. "Bruh." Gerçek aşk tam önünde, çayını yudumlayıp istifini bozmadan ("unbothered, moisturized, in his lane") takılırken, o tüm bu dramaya kapılmış, hayali bir serseri şövalyenin peşinden koşuyordu.

  Bunu test etmeye karar verdi. Eldric ile birkaç kez takıldı, “Olana kadar öyleymiş gibi davranırım,” (fake it till I make it) diye düşündü. Ama onunla ne kadar çok vakit geçirirse, Eldric'e o kadar çok ısındı. Chad enerjisi yoktu ama gerçek hissettiren sessiz bir gücü ve sadakati vardı. Aurelia'ya (zaten öyle olduğu üzere) bir kraliçe gibi davranıyordu; üstelik hiç mızmızlanmadan ve drama yaratmadan. Onunla birlikteyken, başkasıyla "suçüstü" (caught in 4k) yakalanma korkusu ya da geçen hafta kiminle olduğu hakkında "dedikodu" (spilling tea) derdi yoktu.

  Sonunda, Lysander'a ve onun kaotik, toksik yan görev enerjisine veda ederek tamamen Eldric'e yöneldi. Ve Eldric ile evlenmeyi kabul ederek sonunda ailesinin onun için istediği yolu seçti. Belki hayalindeki o destansı, "Pogchamp"lık romanları yoktu ama Eldric gerçekti. Eldric ile güvendeydi, saygı görüyordu ve içten içe memnundu.

  Aurelia hala arada bir efsunlu aynasını kontrol ediyor, Thaloria'nın "bruh" anlarını, "L" (hüsran) aşklarını ve "suçüstü" (caught in 4k) dramalarını izliyor; bu sırada çayını yudumlayıp yeni kocasıyla keyfine bakıyor. Hayallerindeki o serseri şövalyeyi bulmaktan vazgeçmiş olabilir ama sonunda çok daha iyi bir şey buldu: huzur, istikrar ve her düştüğünde onu harbiden (deadass) tutacak biri.
