title: Aurelia alfa korszakba lép
slug: aurelia-alfa-korszakba-lep
intro: Live, Love, Laugh, ezen a ponton már csak dacból is virulunk
content: |-
  Aurelia csak egy átlagos kölyök volt a Lovagi Intézetben, de egyáltalán nem jött be neki az a „legyél nemes és erényes” vibe, amit a tanárai toltak. Úgy értem, senki: szó szerint senki: az anyja meg állandóan azt hajtogatta: „Itt fogod megtalálni az igaz szerelmet.” De őszintén? Tiszta para. Ha a lovagiasság nem is halt meg, biztosan lélegeztetőgépen volt, és ezeknek a nemes-akarok-lenni arcoknak egyáltalán nem volt meg az a főszereplő energiája, amit ő manifesztált.

  Amíg a többi kölyök udvari etikettet és kardforgatást tanult, Aurelia sokkal jobban rákattant a bűvös tükrére. A tükre olyan volt, mint egy portál az összes szaftos reel-hez és bűvös tekercshez, megmutatva neki a királyság összes nemesének drámáját és epikus bukásait. Minden este az órák után ellógott, tükörrel a kézben, és fullon nézte a többi nemes életének reel-jeit, röhögve a kínos pillanataikon. Néha még a kommentek közé is begörgetett, ahol pimasz falusiak és nemesek egyaránt olyanokat toltak, mint „Pucsíts már be közben!”, vagy egymásnak feszültek, hogy „kapd el ezeket a kezeket!”. Ez volt a szórakoztatás abszolút csúcsa (G.O.A.T.).

  Egyik este egy reel-t nézett erről az alacsony király tanonc lovagról, Sir Percivalról, aki minden tőle telhetőt megtett, hogy villogjon a kardforgatásával. A csávó úgy lóbálta a kardját, mintha az kétszer nehezebb lenne nála, a fegyverhordozója meg hype-olta, „Gyatt!” és „Bruh pillanat!” kommenteket dobálva. Tiszta NPC viselkedés volt, de őszintén? Aurelia imádta. Olyan hangosan röhögött, hogy majdnem kiejtette a tükröt a kezéből, azt mormogva: „Nagy F a chatbe Sir Percivalért.”

  Ez az egész „találd meg az igaz szerelmet” dolog tiszta túlértékelt volt. Az anyja állandóan rajta lógott: „Aurelia, fel kell keltened egy nemesember figyelmét! Ez nem játék!” De ő nem akart beérni valami boomer energiájú sráccal, akinek nulla a Rizz-e. Valakit akart, akinek főszereplő vibe-ja van, talán még egy kicsit kaotikus jó is. Fullon manifesztált mostanában, egy olyan srácot képzelve maga mellé, aki kalandvágyó, titokzatos, és megizzadás nélkül legyőz egy sárkányt.

  Aztán jött Lysander. Egy kósza lovag volt, akiből csak úgy áradt a sigma energia, és amikor Aurelia először kiszúrta a királyi lakomán, azt gondolta: „Ez tiszta… legenda vibe.” A srácnak brutál dripje volt, és azzal a csendes magabiztossággal mozgott, ami Chad energiát üvöltött. Valahányszor ránézett, Aurelia úgy érezte, mintha valami bűvös varázslat alá került volna. A barátai meg mind úgy voltak vele: „Eskü. Ez a te embered. Totál lovag fehér lovon.”

  De minél jobban megismerte, annál inkább kezdte érezni azt a bizonyos „ick”-et. Eleinte csak apróságok voltak, például hogy a srác néha napokra eltűnt egy szó nélkül. Aztán pletykákat kezdett hallani arról, hogy full 4K-ban lebukott más nemesi lányokkal, és valahányszor szóba hozta, a fiú csak gaslightolta, ilyeneket mondva: „Na most mondd, hogy sike! Csak képzelődsz, Aurelia.” Ő pedig ott ült, és próbálta magát nyugtatni: „Ha nem foglalkozom vele, akkor nem is létezik.” Csakhogy a delúzió egy idő után inkább csapdának érződött, mint tündérmesének, és Aurelia azon kapta magát, hogy arra gondol: „a delulu a solulu”, csak éppen nem jó értelemben.

  De minél jobban megismerte, annál több „ick” (ellenszenv) kezdett feltámadni benne. Először csak apróságok voltak, például ahogy hirtelen napokra eltűnt szó nélkül. Aztán pletykákat hallott, hogy lebukott (caught in 4k) más nemesi lányokkal, és valahányszor szóba hozta, a srác csak gaslight-olta: „Mondd, hogy csak viccelsz! Csak képzelődsz, Aurelia.” Ő meg ott ült, azt mondogatva magának: „Ha nem veszek róla tudomást, nem is létezik.” De a delúzió kezdett inkább csapdának tűnni, mint tündérmesének, és Aurelia elgondolkodott: „delulu a solulu”, de nem a jó értelemben.

  Közben az anyja egy másik tervet főzött ki. Belép Lord Eldric, a „biztonságos” választás. A szülei már örökké őt erőltették rá. Nem volt az a titokzatos lovag vagy Chad energiájú kalandor, de kitartó volt, kicsit cuki abban a himbo energiájú módon, és tényleg tiszteletben tartotta a lány terét. Eldric valahol tiszta „based” volt. Nem próbálta lenyűgözni felesleges karkörzéssel vagy menő ruhákkal; ő csak… Eldric volt. Egyszerű, stabil, nem egy két lábon járó ick-automata.

  Egy nap a barátnőjével dumált, akinek már teljesen elegem volt Aurelia Lysander utáni vágyakozásából: „Csajszi, ez nem az, főnök. Ott virulsz a kis delulu világodban, de Lord Eldric meg ott várakozik rád, hogy végre észrevedd.” Aurelia elgondolkodott, és rájött, hogy a barátnőjének talán igaza van. Bruh. Benne ragadt az összes drámában, valami fantázia kósza lovagot üldözve, miközben az igazi ott volt az orra előtt, teát kortyolgatva és totál nyugiban, hidratáltan, a saját sávjában maradva.

  Úgy döntött, tesz egy próbát. Lógott Eldrickel párszor, azt gondolva: „Majd megjátszom, amíg be nem válik.” De minél több időt töltött vele, annál jobban megkedvelte. Nem volt Chad energiája, de megvolt benne az a csendes erő és hűség, ami… valódi volt. Úgy bánt vele, mint egy királynővel (ami, fullon, az is volt) mindenféle rinyálás és dráma nélkül. Vele nem kellett azon aggódnia, hogy lebukik valaki mással, vagy hogy mi volt a múlt heti pletyka.

  Végül beadta a derekát, búcsút mondva Lysandernek és az ő kaotikus, toxikus mellékküldetés energiájának. És beleegyezett, hogy hozzámegy Eldrichez, végre azt az utat választva, amit a szülei szántak neki. Talán nem volt meg az az epikus, Pogchamping románc, amiről álmodott, de a srác valódi volt. Eldric mellett biztonságban volt, tisztelték, és fullon elégedett volt.

  Aurelia még mindig csekkolja a bűvös tükrét néha, nézve a bruh pillanatokat, L románcokat és a 4k-ban lebukott drámákat, miközben kortyolgatja a teáját és fullon elvan az új férjével. Lehet, hogy lemondott álmai kósza lovagjáról, de végül valami még jobbat talált: békét, stabilitást és valakit, aki tényleg elkapja, valahányszor elesik.
