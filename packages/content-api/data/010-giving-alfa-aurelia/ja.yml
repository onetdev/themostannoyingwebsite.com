title: 「アルファ感」全開のオーレリア
slug: arufakan-zenkai-no-o-reria
intro: ライブ、ラブ、ラフ、もはや逆ギレ気味に絶好調
content: |-
  オーレリアはナイト学院のどこにでもいる生徒の一人だったけど、先生たちが押し付けてくる「高潔で徳高くあれ」みたいなノリには全く乗れなかった。マジで、誰得？状態。母親はいつも「ここで運命の人に出会えるわよ」なんて言ってたけど、正直……「きっつ（Big yikes）」。騎士道なんて死んでるか、良くて人工呼吸器に繋がってるレベル。それに、ここにいる「自称・貴族」たちは誰も、彼女が引き寄せ（manifesting）ようとしてる「主人公オーラ」を持ってなかった。

  他の子たちが宮廷マナーや剣術を学んでる間、オーレリアは魔法の鏡に夢中だった。彼女の鏡は、王国内のあらゆる貴族のゴシップ動画や魔法のスクロールへのポータルみたいなもので、彼らのドラマや特大級の黒歴史（epic fails）を映し出してくれた。毎晩、授業が終わると彼女はこっそり抜け出し、鏡を片手に他の貴族たちの生活動画を「ガチ（highkey）」でチェックして、彼らの痛い瞬間を笑い飛ばしてた。時々、コメント欄までスクロールすると、毒舌な村人や貴族たちが「その調子で腰をもっと反らせ！（Arch your back while you're at it!）」なんて書いたり、「表に出ろ（catch these hands!）」と煽り合ったりしてた。まさに娯楽界の神（G.O.A.T.）。

  ある夜、彼女はパーシヴァル卿という「低身長の王子様」風の騎士見習いの動画を見た。彼は必死に剣術を披露しようとしてたけど、自分の体重の2倍もありそうな剣を振り回してて、従者がコメント欄で「えぐ！（Gyatt!）」とか「放送事故（Bruh moment!）」とか書いて盛り上げてた。完全に「モブキャラ（NPC）」ムーブだったけど、正直、オーレリアはそういうの大好物だった。鏡を落としそうになるくらい爆笑しながら、「パーシヴァル卿に合掌（Big F in chat）」と呟いた。

  「運命の恋」なんて、ぶっちゃけ過大評価されすぎ。母親は「オーレリア、貴族の殿方の目を引かなきゃダメよ！遊びじゃないのよ！」とうるさかったけど、彼女は「おじさん臭（boomer energy）」全開で「魅力ゼロ（zero Rizz）」の男で妥協する気はさらさらなかった。彼女が求めてるのは「主人公感」のある人、ちょっと「混沌・善（chaotic good）」な感じの。マジで（Highkey）、彼女は最近ガチで引き寄せ（manifesting）してて、冒険心があってミステリアスで、汗一つかかずにドラゴンを倒せるような人を思い描いてた。

  そこに現れたのがライサンダー。彼ははぐれ騎士で、全身から「強者オーラ（sigma energy）」が溢れ出てた。王室の晩餐会で初めて彼を見かけた時、彼女は「これこれ……伝説級のオーラ（legend vibes）来てるわ」と思った。彼は「イケ散らかして（drip）」て、静かな自信に満ちた動きはまさに「最強の男（Chad energy）」。彼に見つめられるたびに、魔法をかけられたような気分になった。友達もみんな「間違いない（Bet）。あんたの運命の人だよ。まさに白馬の騎士じゃん」って。

  でも、彼のことを知れば知るほど、どんどん「蛙化（ick）」現象が起き始めた。最初は些細なことだった。連絡もなしに数日間突然姿を消したり。そのうち、他の貴族の女の子と一緒にいるところを「証拠バッチリ（caught in 4k）」で押さえられたっていう噂が聞こえてきて、彼女がそれを問い詰めるたびに、彼は「嘘でしょ（Say sike right now!）！オーレリア、君の被害妄想だよ」って「ガスライティング（gaslight）」してくる。彼女は「無視すれば、そんなこと起きてないことになる」と自分に言い聞かせてそこに座ってたけど、その「ポジティブな妄想（delusion）」はおとぎ話っていうより罠みたいに感じ始めて、オーレリアは「妄想こそが解決策（delulu is the solulu）」って思い込もうとしたけど、それは悪い意味での話だった。

  そんな中、母親が別の計画を進めてた。現れたのはエルドリック卿、いわゆる「安牌（safe choice）」。両親はずっと彼を勧めてきてた。彼はミステリアスな騎士でも「最強の男」感のあるはぐれ者でもなかったけど、がっしりしてて、ちょっと「ポンコツ可愛い系（himbo energy）」で、何より彼女のスペースをちゃんと尊重してくれた。ぶっちゃけ（Lowkey）、エルドリックは結構「イケてた（based）」。彼は派手な剣術や「エグい（bussin'）」服で彼女を感心させようとはせず、ただ……エルドリックだった。シンプルで、安定してて、歩く「蛙化製造機」じゃなかった。

  ある日、オーレリアがライサンダーに執着してるのに愛想を尽かした友達がこう言った。「ねえ、それ（ライサンダー）は違う（this ain't it, chief）よ。あんたは自分の『妄想世界』で絶好調だけど、マジで（highkey）、エルドリック卿はただそこで、あんたが気づくのを待ってるだけだよ」。オーレリアは考えてみて、友達が正しいかもしれないと気づいた。「マジか（Bruh）」。自分はドラマに巻き込まれて、妄想のはぐれ騎士を追いかけてたけど、本物はすぐ目の前にいたんだ。お茶を飲みながら、完全に「余裕しゃくしゃく、肌もツヤツヤ、マイペース（unbothered, moisturized, in his lane）」な感じで。

  彼女は試してみることにした。何度かエルドリックと出かけてみて、「うまくいくまでフリをする（fake it till I make it）」ことにした。でも、一緒に過ごす時間が増えるほど、彼に惹かれていった。彼には「最強の男」オーラはなかったけど、静かな強さと忠誠心があって、それが……「リアル」に感じられた。彼は彼女を女王のように扱ってくれた（ぶっちゃけ、彼女は実際そうだったんだけど）、愚痴もドラマもなしに。彼となら、誰かと浮気してるところを「証拠バッチリ（caught in 4k）」で撮られる心配も、先週誰といたかっていうゴシップを気にする必要もなかった。

  そしてついに、彼女はライサンダーと彼の混沌とした毒親和的な「サイドクエスト」みたいなノリに別れを告げた。そしてエルドリックとの結婚を決め、ようやく両親が望んだ道を選んだ。夢見てたような「神展開（Pogchamping）」なロマンスじゃないかもしれないけど、彼は本物だった。エルドリックとなら、彼女は安全で、尊重され、マジで（highkey）満たされてた。

  オーレリアは今でも時々、魔法の鏡をチェックする。サロリア王国の「放送事故（bruh moments）」や「詰んだ（L）」ロマンス、浮気の「決定的瞬間（caught in 4k）」ドラマを眺めながら、お茶をすすり、新しい夫と一緒にマイペースに過ごしてる。夢に見たはぐれ騎士は諦めたかもしれないけど、最終的に彼女はもっと良いものを見つけた。平和、安定、そして彼女が転びそうになった時はいつでも「ガチで（deadass）」受け止めてくれる人を。
