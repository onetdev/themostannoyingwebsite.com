title: إعطاء ألفا أوريليا
slug: ألفا-أوريليا
intro: عش، حب، اضحك، مزدهرة بدافع الحقد في هذه المرحلة
content: |-
  كانت أوريليا مجرد فتاة أخرى في معهد نايت، لكنها لم تكن مهتمة بكل تلك الأجواء "كن نبيلاً وفاضلاً" التي استمر معلموها في الضغط من أجلها. لم يقل أحد: حرفياً لا أحد: استمرت والدتها في القول: "سوف تقابلين حبك الحقيقي هنا". لكن بصراحة؟ "بيج يايكس" (Big yikes). إذا لم تكن الفروسية قد ماتت، فهي بالتأكيد كانت على أجهزة الإنعاش، ولم يكن لدى أي من هؤلاء المتطلعين للنبلاء "طاقة الشخصية الرئيسية" التي كانت تظهرها.

  بينما كان الأطفال الآخرون يدرسون آداب المحاكم والمبارزة بالسيف، كانت أوريليا مهتمة أكثر بمرآتها المسحورة. كانت مرآتها مثل بوابة لجميع "الريلز" (reels) الأكثر إثارة والمخطوطات المسحورة، حيث كانت تظهر لها الدراما والإخفاقات الملحمية لكل نبيل في المملكة. كل ليلة بعد الفصول الدراسية، كانت تتسلل، والمرآة في يدها، وتتحقق من ريلز حياة النبلاء الآخرين، وتضحك على لحظاتهم المحرجة. في بعض الأحيان، كانت تنتقل إلى التعليقات، حيث كان القرويون والنبلاء الوقحون على حد سواء يكتبون عبارات مثل "قوس ظهرك بينما أنت في ذلك!" أو ينادون بعضهم البعض بـ "ستنال هذه الأيدي!" (catch these hands). كانت حرفياً "الأفضل على الإطلاق" (G.O.A.T) للترفيه.

  ذات ليلة، شاهدت ريل لهذا الفارس القصير المتدرب المسمى السير بيرسيفال، الذي كان يبذل قصارى جهده لإظهار مهاراته في السيف. كان الرجل يلوح بسيفه وكأنه يزن ضعف وزنه، وكان مرافقه يحمسه، ويكتب تعليقات مثل "جيات!" (Gyatt) و"لحظة بروه!" (Bruh moment). كان الأمر يعطي "تصرفات شخصية جانبية" (NPC behavior) بوضوح، ولكن بصراحة؟ أوريليا كانت هنا من أجل ذلك. ضحكت بشدة لدرجة أنها كادت تسقط مرآتها، متمتمة: "أف (F) كبيرة في الدردشة للسير بيرسيفال".

  كان موضوع "العثور على الحب الحقيقي" مبالغاً فيه تماماً. كانت والدتها تلاحقها باستمرار، قائلة: "أوريليا، عليك لفت انتباه أحد النبلاء! هذه ليست لعبة!" لكنها لم تكن مستعدة للاستسلام لبعض الرجال ذوي "عقلية البومرز" (boomer energy) الذين يفتقرون تماماً للجاذبية (Rizz). كانت تريد شخصاً لديه طاقة الشخصية الرئيسية، ربما حتى مع قليل من الخير الفوضوي. بكل صراحة، كانت تتخيل بقوة الآن، وتصور نفسها مع رجل مغامر وغموض، ويمكنه محاربة تنين دون أن يتصبب عرقاً.

  دخل ليساندر. كان فارساً مارقاً ويقطر "طاقة سيجما" (sigma energy)، وعندما رصدته أوريليا لأول مرة في المأدبة الملكية، فكرت: "الأمر يعطي... طاقة الأساطير". كان لدى الرجل أناقة (drip) لعدة أيام، وكان يتحرك بهذه الثقة الهادئة التي تصرخ "طاقة تشاد" (Chad energy). في كل مرة ينظر إليها، كانت تشعر وكأنه ألقى عليها تعويذة مسحورة. كانت صديقاتها كلهن يقلن: "رهان (Bet). هذا هو رجلك. فارس كامل في درع لامع".

  لكن كلما تعرفت عليه أكثر، زاد شعورها بـ "القرف" (ick) منه. في البداية، كانت أشياء صغيرة، مثل كيف يختفي فجأة لعدة أيام دون كلمة. ثم سمعت شائعات عنه وهو "مقفوش بالجرم المشهود" (caught in 4k) مع فتيات نبيلات أخريات، وفي كل مرة تثير فيها الموضوع، كان يتلاعب بعقلها (gaslight)، قائلاً أشياء مثل: "قولي أنك تمزحين الآن! أنت تتخيلين أشياء، أوريليا". وكانت تجلس هناك، وتخبر نفسها: "إذا تجاهلت ذلك، فلن يكون موجوداً". لكن "الوهم" بدأ يشعر وكأنه فخ أكثر من كونه حكاية خرافية، وبدأت أوريليا تفكر في أن "الوهم هو الحل" (delulu is the solulu)، ولكن ليس بطريقة جيدة.

  في هذه الأثناء، كان لدى والدتها خطة أخرى تطبخ. دخل اللورد إلدريك، الخيار "الآمن". كان والداها يضغطان به عليها إلى الأبد. لم يكن الفارس الغامض أو المارق ذا طاقة تشاد، لكنه كان قوياً، ولطيفاً نوعاً ما بطريقة "هيمبو" (himbo energy)، ويحترم مساحتها بالفعل. بصراحة، كان إلدريك "واقعياً" (based). لم يكن يحاول إثارة إعجابها بمهارات المبارزة الفاخرة أو الملابس الرهيبة (bussin)؛ كان مجرد... إلدريك. بسيط، مستقر، وليس آلة مثيرة للقرف.

  ذات يوم، كانت تدردش مع صديقتها، التي كانت قد سئمت تماماً من حنين أوريليا لليساندر، قائلة: "يا فتاة، هذا ليس هو الحل يا زعيمة. أنت تزدهرين في عالم أوهامك الصغير، لكن اللورد إلدريك جالس هنا ينتظرك لتلاحظيه". وفكرت أوريليا في الأمر، وأدركت أن صديقتها قد تكون على حق. "بروه" (Bruh). لقد انغمست في كل الدراما، وطاردت بعض الفرسان المارقين الخياليين بينما كان الشيء الحقيقي أمامها مباشرة، يرتشف الشاي ويسترخي تماماً في مساره الخاص.

  قررت اختباره. قضت وقتاً مع إلدريك عدة مرات، مفكرة: "سأتظاهر بالأمر حتى يتحقق". لكن كلما قضت وقتاً معه، زاد إعجابها به. لم يكن لديه طاقة تشاد، ولكن كان لديه هذه القوة الهادئة والولاء الذي شعرت أنه... حقيقي. كان يعاملها مثل الملكة (وهي، بكل صراحة، كانت كذلك) دون كل ذلك النواحب والدراما. معه، لم يكن عليها القلق بشأن "القفش بالجرم المشهود" مع شخص آخر أو تسريب أخبار عن من كان معه الأسبوع الماضي.

  لذا أخيراً، دخلت بكل قوتها، وودعت ليساندر وطاقته الفوضوية والسامة. ووافقت على الزواج من إلدريك، واختارت أخيراً الطريق الذي أراده والداها لها. قد لا يكون لديهم ذلك الرومانس الملحمي والمثير للحماس (Pogchamping) الذي حلمت به، لكنه كان حقيقياً. مع إلدريك، كانت آمنة ومحترمة ومكتفية تماماً.

  لا تزال أوريليا تتحقق من مرآتها المسحورة بين الحين والآخر، وتشاهد لحظات "البروه"، والرومانسيات الفاشلة (L romances)، ودراما "القفش بالجرم المشهود" في ثالوريا، كل ذلك وهي ترتشف شايها وتسترخي مع زوجها الجديد. ربما تكون قد تخلت عن العثور على الفارس المارق في أحلامها، لكنها في النهاية وجدت شيئاً أفضل: السلام والاستقرار وشخصاً يمسك بها حقاً في كل مرة تسقط فيها.
