title: Dando alfa Aurelia
slug: giving-alfa-aurelia
intro: Vive, Ama, Ríe, prosperando por despecho en este punto
content: |-
  Aurelia era solo otra chica en el Instituto de Caballeros, pero no le gustaba todo el rollo de "sé noble y virtuoso" que sus maestros seguían empujando. Tipo, nadie: literalmente nadie: su mamá seguía diciendo: "Vas a conocer a tu único amor verdadero aquí". Pero honestamente? Gran yikes. Si la caballerosidad no estaba muerta, definitivamente estaba en soporte vital, y ninguno de estos aspirantes a nobles tenía la energía de personaje principal que ella estaba manifestando.

  Mientras otros niños estudiaban etiqueta de la corte y esgrima, Aurelia estaba mucho más interesada en su espejo encantado. Su espejo era como un portal a todos los carretes más jugosos y pergaminos encantados, mostrándole los dramas y los fracasos épicos de cada noble en todo el reino. Cada noche después de clases, se escabullía, espejo en mano, y miraba discretamente los carretes de las vidas de los otros nobles, riéndose de sus momentos vergonzosos. A veces, incluso se desplazaba a los comentarios, donde aldeanos y nobles descarados por igual soltaban frases como "¡Arquea la espalda mientras estás en ello!" o se desafiaban entre sí con "¡atrapa estas manos!". Era literalmente el G.O.A.T. del entretenimiento.

  Una noche, vio un carrete de este rey bajo, caballero en entrenamiento llamado Sir Percival, que estaba haciendo todo lo posible para mostrar sus habilidades con la espada. El tipo estaba balanceando su espada como si pesara el doble que él, y su escudero lo estaba animando, soltando "¡Gyatt!" y "¡Momento bruh!" en los comentarios. Estaba dando un comportamiento de NPC importante, pero ¿honestamente? Aurelia estaba aquí para eso. Se rió tanto que casi dejó caer su espejo, murmurando: "Gran F en el chat para Sir Percival".

  Todo el asunto de "encontrar el amor verdadero" estaba muy sobrevalorado. Tipo, su mamá estaba constantemente sobre ella, diciendo: "¡Aurelia, necesitas llamar la atención de un noble! ¡Esto no es un juego!". Pero ella no estaba dispuesta a conformarse con un tipo con energía de boomer y cero Rizz. Quería a alguien con vibraciones de personaje principal, tal vez incluso un poco de bien caótico. Discretamente, había estado manifestando duro rn, imaginándose con un chico que fuera aventurero, misterioso y pudiera luchar contra un dragón sin sudar.

  Entra Lysander. Era un caballero pícaro y absolutamente goteaba energía sigma, y cuando Aurelia lo vio por primera vez en el banquete real, pensó: "Está dando... vibraciones de leyenda". El tipo tenía estilo para días, y se movía con esta confianza tranquila que gritaba energía Chad. Cada vez que la miraba, sentía que había lanzado algún hechizo encantado. Sus amigas estaban todas: "Apuesta. Este es tu chico. Caballero total en armadura brillante".

  Pero cuanto más lo conocía, más ick comenzaba a notar. Al principio, eran pequeñas cosas, como cómo desaparecía repentinamente durante días sin decir una palabra. Luego escuchaba rumores sobre él atrapado en 4k con otras chicas nobles, y cada vez que lo mencionaba, él simplemente la manipulaba, todo como: "¡Di sike ahora mismo! Estás imaginando cosas, Aurelia". Y ella se sentaba allí, diciéndose a sí misma: "Si lo ignoro, no existe". Pero la ilusión comenzó a sentirse más como una trampa que como un cuento de hadas, y Aurelia comenzó a pensar: "delulu es la solulu", pero no en el buen sentido.

  Mientras tanto, su mamá tenía este otro plan cocinándose. Entra Lord Eldric, la opción "segura". Sus padres se lo habían estado empujando desde siempre. No era el caballero misterioso o el pícaro con energía Chad, pero era robusto, algo lindo en una forma de energía himbo, y realmente respetaba su espacio. Discretamente, Eldric era algo basado. No estaba tratando de impresionarla con un juego de espadas elegante o ropa bussin'; él era solo... Eldric. Simple, estable, no una máquina de ick andante.

  Un día, estaba charlando con su amiga, que estaba totalmente harta de que Aurelia suspirara por Lysander, diciendo: "Chica, esto no es, jefe. Estás prosperando en tu pequeño mundo delulu, pero discretamente, Lord Eldric solo está vibrando aquí esperando que lo notes". Y Aurelia lo pensó, dándose cuenta de que su amiga podría tener razón. Bruh. Había estado atrapada en todo el drama, persiguiendo a un caballero pícaro de fantasía cuando el verdadero negocio estaba justo frente a ella, bebiendo té y relajándose con vibraciones totales de no molestado, hidratado, en su carril.

  Ella decidió probarlo. Salió con Eldric unas cuantas veces, pensando: "Solo fingiré hasta que lo logre". Pero cuanto más tiempo pasaba con él, más le gustaba. No tenía energía Chad, pero tenía esta fuerza tranquila y lealtad que se sentía... real. La trataba como a una reina (lo cual, discretamente, era) sin todas las quejas y el drama. Con él, no tenía que preocuparse por ser atrapada en 4k con otra persona o derramar té sobre con quién estaba la semana pasada.

  Así que finalmente, ella fue con todo, despidiéndose de Lysander y su energía caótica y tóxica de misión secundaria. Y aceptó casarse con Eldric, finalmente eligiendo el camino que sus padres habían querido para ella. Puede que no tengan el romance épico y Pogchamping con el que había soñado, pero él era real. Con Eldric, estaba segura, respetada y discretamente contenta.

  Aurelia todavía revisa su espejo encantado de vez en cuando, viendo los momentos bruh, romances L y drama atrapado en 4k de Thaloria, todo mientras bebe su té y vibra discretamente con su nuevo esposo. Puede que haya renunciado a encontrar al caballero pícaro de sus sueños, pero al final, encontró algo aún mejor: paz, estabilidad y alguien que la atraparía en serio cada vez que cayera.
