title: لن تصدق مدى سهولة كسب المال بهذه الطريقة
slug: ربح-المال-بدون-خبرة
intro: لقد ربحت 1.5 يورو العام الماضي بفعل هذا بدون شهادة، وبدون خبرة، وفقط في 4 ساعات في الأسبوع
content: |-
  تعرفوا على إيفلين، 32 عاماً، وهي تعمل "بدوام جزئي في شيء ما" من مكان ما في أوروبا (على ما نعتقد؟)، والتي صدمت الأصدقاء وأربكت الخبراء بشدة من خلال تحقيق مبلغ مذهل قدره 1.50 يورو على مدار عام مالي كامل — دون أي تدريب رسمي، أو معرفة ذات صلة، أو جهد ملحوظ.

  > تقول وهي ترتشف بغموض "لاتيه حليب الشوفان" الفاتر: "لقد فعلت ذلك نوعاً ما... فحسب".

  الطريقة (نوعاً ما)

  جاءت طفرة إيفلين في يوم ثلاثاء ممطر في شهر مارس (أو ربما سبتمبر)، عندما سجلت عن طريق الخطأ في تجربة مجانية لشيء لا تتذكره ونسيت إلغاءها. في مكان ما بين ذلك وبين إرسال مظروف لنفسها كـ "تجربة"، ظهر مبلغ 1.50 يورو في حسابها المصرفي.

  ولكن المفاجأة الحقيقية؟

  > أوضحت بشكل غير مفيد: "كنت أعمل أربع ساعات فقط في الأسبوع. ليس في هذا، بل... بشكل عام".

  حاولنا تتبع أثر أرباحها، لكننا واجهنا:

  - رابط "Etsy" مكسور
  - مستند جوجل بعنوان "لا تفتح" (DO NOT OPEN)
  - نطاق منتهي الصلاحية: jabadabadudbidoo.zone

  بعد عدة جداول بيانات، اكتشفنا أن مبلغ الـ 1.50 يورو قد يكون مصدره رابط تابع (affiliate link) مدمج في منشور قديم على "Tumblr" بعنوان *"كيفية تسييل هالتك"*، ولكنه يعيد التوجيه إلى فيديو على يوتيوب لرجل يهمس عن المغناطيس في كوخ.

  ## السر الحقيقي

  إذن كيف فعلت ذلك؟

  > تقول إيفلين بثقة قبل أن تختفي في مساحة عمل مشتركة لا يبدو أن بها "Wi-Fi": "العقلية".

  يجادل النقاد بأن "طريقتها" ليست قابلة للتوسع ولا للتكرار، وقد لا تكون "طريقة" من الناحية التقنية. لكن المتابعين في نشرتها الإخبارية، **"موجز أسلوب الحياة شبه السلبي"**، يصرون على أنها غيرت حياتهم بطرق لا يستطيعون التعبير عنها بشكل كامل.

  > يقول المتابع @EnergeticGhost420: "لم أربح 1.50 يورو بعد، لكنني شعرت بالتأكيد بدافع قيمته 1.50 يورو".

  الخلاصة

  بينما من غير الواضح ما إذا كانت إيفلين قد فعلت أي شيء بالفعل، وقد يكون المال تقنياً مجرد استرداد لشيء آخر تماماً، فإن قصتها دليل على أنك لا تحتاج إلى خبرة أو تعليم أو نتائج لإلهام الآخرين.

  أما عما ستفعله بعد ذلك؟

  > تقول: "أنا أنتقل إلى عمل 'الجيج' الكمي (quantum gig work). لا أستطيع شرح ذلك. لكنه شيء كبير".
