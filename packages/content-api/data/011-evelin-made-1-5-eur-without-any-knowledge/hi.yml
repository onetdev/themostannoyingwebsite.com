title: आपको विश्वास नहीं होगा कि इस तरीके से पैसा कमाना कितना आसान है
slug: paise-kamana-itna-asaan-hai
intro: उसने पिछले साल बिना किसी डिग्री, बिना किसी अनुभव और सप्ताह में केवल 4 घंटे यह काम करके 1.5 यूरो कमाए
content: |-
  यूरोप (शायद?) में कहीं की पार्ट-टाइम कुछ करने वाली 32 वर्षीय एवेलिन (Evelin) से मिलें, जिसने बिना किसी औपचारिक प्रशिक्षण, प्रासंगिक ज्ञान या स्पष्ट प्रयास के एक पूरे वित्तीय वर्ष के दौरान चौंका देने वाले €1.50 उत्पन्न करके दोस्तों को स्तब्ध और विशेषज्ञों को गहराई से भ्रमित कर दिया।

  > "मैंने बस... इसे कर दिया," वह एक गुनगुने ओट मिल्क लैटे (oat milk latte) की चुस्की लेते हुए अस्पष्ट रूप से कहती है।

  तरीका (लगभग)

  एवेलिन की सफलता मार्च (या संभवतः सितंबर) में एक बरसात के मंगलवार को आई, जब उसने गलती से किसी ऐसी चीज़ के मुफ्त ट्रायल के लिए साइन अप कर लिया जिसे वह याद नहीं रख सकती और उसे रद्द करना भूल गई। उसके और एक "प्रयोग" के रूप में खुद को एक लिफाफा मेल करने के बीच, उसके बैंक खाते में €1.50 दिखाई दिए।

  लेकिन असली बात?

  > "मैंने सप्ताह में केवल चार घंटे काम किया। इस पर नहीं, बस... सामान्य रूप से," उसने बिना किसी काम की जानकारी देते हुए स्पष्ट किया।

  हमने उसकी कमाई के सुराग का पीछा करने की कोशिश की, लेकिन हमें मिला:

  - एक टूटा हुआ Etsy लिंक
  - एक Google Doc जिस पर लिखा था "इसे न खोलें" (DO NOT OPEN)
  - एक समाप्त हो चुका डोमेन: jabadabadudbidoo.zone

  कई स्प्रेडशीट के बाद, हमें पता चला कि €1.50 एक पुराने टम्बलर (Tumblr) पोस्ट में एम्बेडेड एक एफिलिएट लिंक से उत्पन्न हुए हो सकते हैं जिसका शीर्षक था *"अपनी आभा (Aura) का मुद्रीकरण कैसे करें"*, लेकिन यह एक YouTube वीडियो पर रीडायरेक्ट करता है जिसमें एक आदमी एक शेड में मैग्नेट के बारे में फुसफुसा रहा है।

  ## गुप्त नुस्खा (The Secret Sauce)

  तो उसने यह कैसे किया?

  > "मानसिकता (Mindset)," एवेलिन आत्मविश्वास से कहती है, एक ऐसे कोवर्किंग स्पेस में गायब होने से पहले जिसमें वाई-फाई नहीं लगता।

  आलोचकों का तर्क है कि उसका "तरीका" न तो स्केलेबल है और न ही दोहराने योग्य, और तकनीकी रूप से एक तरीका भी नहीं हो सकता है। लेकिन उसके न्यूज़लेटर, **"द सेमी-पैसिव लाइफस्टाइल डाइजेस्ट"**, के फॉलोअर्स का कहना है कि इसने उनके जीवन को उन तरीकों से बदल दिया है जिन्हें वे पूरी तरह से स्पष्ट नहीं कर सकते।

  > "मैंने अभी तक €1.50 नहीं कमाए हैं," फॉलोअर @EnergeticGhost420 कहते हैं, "लेकिन मैंने निश्चित रूप से €1.50 के मूल्य की प्रेरणा महसूस की है।"

  सीख

  हालांकि यह स्पष्ट नहीं है कि एवेलिन ने वास्तव में कुछ किया है, और पैसा तकनीकी रूप से किसी और चीज़ के लिए रिफंड हो सकता है, उसकी कहानी इस बात का सबूत है कि आपको दूसरों को प्रेरित करने के लिए अनुभव, शिक्षा या परिणामों की आवश्यकता नहीं है।

  जहाँ तक वह आगे क्या करेगी?

  > "मैं क्वांटम गिग वर्क (quantum gig work) की ओर बढ़ रही हूँ," वह कहती है। "मैं इसे समझा नहीं सकती। लेकिन यह बड़ा है।"
