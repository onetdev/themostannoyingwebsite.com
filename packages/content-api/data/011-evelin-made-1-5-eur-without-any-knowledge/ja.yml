title: この方法で稼ぐのがいかに簡単か、あなたは信じられないでしょう
slug: kono-houhou-de-kasegu-no-ga-ikani-kantan-ka-anata-wa-shinjirarenai-deshou
intro: 彼女は昨年、学位も経験もなく、週にわずか4時間の作業で1.5ユーロを稼ぎ出しました
content: |-
  エヴェリン（32歳）、ヨーロッパのどこか（たぶん？）出身のパートタイム「何か」である彼女は、会計年度を通じて驚異の1.50ユーロを稼ぎ出し、友人たちを驚かせ、専門家たちを深く困惑させました。しかも、正式なトレーニングも、関連知識も、目に見える努力も一切なしにです。

  > 「ただ……なんとなくやっただけです」と彼女は言い、ぬるいオーツミルク・ラテを曖昧にすすりました。

  ## その方法（のようなもの）

  エヴェリンのブレイクスルーは、3月（あるいは9月かもしれない）のある雨の火曜日に訪れました。彼女は、名前も思い出せない何かの無料トライアルに誤って登録し、解約するのを忘れてしまったのです。そのことと、「実験」として自分宛に封筒を郵送したことの間に、彼女の銀行口座に1.50ユーロが現れました。

  しかし、本当の驚きはここからです。

  > 「週に4時間しか働いていません。これ（稼ぐこと）に、ではなく……全体的に、です」と、彼女は何の助けにもならない説明を付け加えました。

  私たちは彼女の収益の足跡をたどろうとしましたが、直面したのは以下の通りでした：

  - 壊れたEtsyのリンク
  - 「開くな」とラベル付けされたGoogleドキュメント
  - 期限切れのドメイン：jabadabadudbidoo.zone

  いくつかのスプレッドシートを確認した結果、1.50ユーロの出処は、「あなたのオーラを収益化する方法」というタイトルの古いTumblrの投稿に埋め込まれたアフィリエイトリンクである可能性が浮上しました。しかし、そのリンクは物置で磁石についてささやく男のYouTube動画にリダイレクトされます。

  ## 成功の秘訣

  では、彼女はどうやってそれを成し遂げたのでしょうか？

  > 「マインドセットです」とエヴェリンは自信たっぷりに言い、Wi-Fiがなさそうなコワーキングスペースへと消えていきました。

  批判派は、彼女の「方法」はスケールもしないし再現性もなく、厳密には方法とさえ呼べないのではないかと主張しています。しかし、彼女のニュースレター「セミ・パッシブ・ライフスタイル・ダイジェスト」の読者たちは、言葉では言い尽くせない方法で人生が変わったと主張しています。

  > 「まだ1.50ユーロは稼げていませんが、1.50ユーロ分のモチベーションは間違いなく感じています」とフォロワーの@EnergeticGhost420は語ります。

  ## まとめ

  エヴェリンが実際に何かをしたのかは不明であり、そのお金も厳密には全く別の何かの返金だった可能性もありますが、彼女の物語は、経験も教育も結果も、他人にインスピレーションを与えるためには必要ないという証拠です。

  次は何をするのでしょうか？

  > 「量子ギグワークにピボットします」と彼女は言います。「説明はできませんが、これは大きなものになりますよ」
