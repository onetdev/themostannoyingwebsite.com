title: Bu yöntemle para kazanmanın bu kadar kolay olduğuna inanamayacaksınız
slug: bu-yontemle-para-kazanmanin-bu-kadar-kolay-olduguna-inanamayacaksiniz
intro: Hiçbir diploması, deneyimi olmadan ve haftada sadece 4 saat ayırarak geçen yıl bu yöntemle 1,5 EUR kazandı
content: |-
  Avrupa'nın bir yerinden (galiba?) yarı zamanlı bir şeyler yapan 32 yaşındaki Evelin ile tanışın. Evelin, hiçbir resmi eğitimi, ilgili bilgisi veya belirgin bir çabası olmadan koca bir mali yıl boyunca dudak uçuklatan tam 1,50 € kazanarak arkadaşlarını şoka uğrattı ve uzmanların kafasını fena halde karıştırdı.

  > "Bir şekilde... yaptım işte," diyor, ılık yulaf sütlü lattesinden belirsiz bir yudum alırken.

  Yöntem (Bir Nevi)

  Evelin'in atılımı, Mart (veya muhtemelen Eylül) ayındaki yağmurlu bir Salı günü, hatırlayamadığı bir şeyin ücretsiz deneme sürümüne yanlışlıkla kaydolup iptal etmeyi unuttuğunda gerçekleşti. Bu olayla, bir "deney" olarak kendisine bir zarf postalaması arasında bir yerlerde, banka hesabında 1,50 € belirdi.

  Ama asıl bomba ne biliyor musunuz?

  > "Haftada sadece dört saat çalışıyordum. Bu iş için değil, yani... genel olarak," diye pek de yardımcı olmayan bir açıklama yaptı.

  Kazancının izini sürmeye çalıştık ama şunlarla karşılaştık:

  - Bozuk bir Etsy bağlantısı
  - "AÇMAYIN" etiketli bir Google Dokümanı
  - Süresi dolmuş bir alan adı: jabadabadudbidoo.zone

  Birkaç hesap tablosundan sonra, 1,50 €'nun *"Auranızı Nasıl Paraya Dönüştürürsünüz"* başlıklı eski bir Tumblr gönderisine gömülü bir satış ortaklığı (affiliate) bağlantısından gelmiş olabileceğini keşfettik; ancak bu bağlantı, bir barakada mıknatıslar hakkında fısıldayan bir adamın YouTube videosuna yönlendiriyor.

  ## Gizli Sos

  Peki bunu nasıl yaptı?

  > Evelin, Wi-Fi'ı yokmuş gibi görünen bir ortak çalışma alanında (coworking space) gözden kaybolmadan önce güvenle, "Zihniyet (Mindset)," diyor.

  Eleştirmenler, onun "yönteminin" ne ölçeklenebilir ne de tekrarlanabilir olduğunu ve teknik olarak bir yöntem bile olmayabileceğini savunuyor. Ancak bülteni **“The Semi-Passive Lifestyle Digest”** takipçileri, bu yöntemin hayatlarını tam olarak ifade edemedikleri şekillerde değiştirdiğinde ısrarcı.

  > Takipçisi @EnergeticGhost420, "Henüz 1,50 € kazanmadım," diyor, "ama kesinlikle 1,50 € değerinde bir motivasyon hissettim."

  Önemli Ders

  Evelin'in aslında bir şey yapıp yapmadığı belirsiz olsa ve para teknik olarak tamamen başka bir şeyin iadesi olsa da, onun hikayesi başkalarına ilham vermek için deneyime, eğitime veya sonuçlara ihtiyacınız olmadığının kanıtıdır.

  Peki sırada ne var?

  > "Kuantum gig işlerine geçiş yapıyorum," diyor. "Açıklayamam. Ama büyük olacak."
