title: Vous ne croirez pas à quel point il est facile de gagner de l'argent avec cette méthode
slug: evelin-a-gagne-un-euro-cinquante-sans-aucune-connaissance
intro: Elle a gagné 1,50 € l'année dernière en faisant cela sans diplôme, sans expérience et seulement 4 heures par semaine
content: |-
  Découvrez Evelin, 32 ans, employée à temps partiel dans quelque chose quelque part en Europe (on croit ?), qui a choqué ses amis et profondément déconcerté les experts en générant la somme astronomique de 1,50 € au cours d'une année fiscale entière — sans aucune formation formelle, connaissance pertinente ou effort discernable.

  > « J'ai juste… fait ça », dit-elle, sirotant de manière ambiguë un latte au lait d'avoine tiède.

  ## La Méthode (Plus ou Moins)

  La percée d'Evelin a eu lieu un mardi pluvieux de mars (ou peut-être de septembre), lorsqu'elle s'est accidentellement inscrite à un essai gratuit de quelque chose dont elle ne se souvient plus et qu'elle a oublié de l'annuler. Quelque part entre cela et l'envoi d'une enveloppe à elle-même en tant qu'« expérience », 1,50 € est apparu sur son compte bancaire.

  Mais le vrai choc ?

  > « Je ne travaillais que quatre heures par semaine. Pas sur ça, juste… en général », a-t-elle précisé de manière peu utile.

  Nous avons essayé de suivre la trace de ses gains, mais nous sommes tombés sur :

  - Un lien Etsy cassé
  - Un Google Doc intitulé « NE PAS OUVRIR »
  - Un domaine expiré : jabadabadudbidoo.zone

  Plusieurs feuilles de calcul plus tard, nous avons découvert que les 1,50 € provenaient peut-être d'un lien d'affiliation intégré dans un vieux post Tumblr intitulé *« Comment monétiser votre aura »*, mais il redirige vers une vidéo YouTube d'un gars chuchotant à propos d'aimants dans une cabane.

  ## L'Ingrédient Secret

  Alors, comment a-t-elle fait ?

  > « Le Mindset », dit Evelin avec assurance, avant de disparaître dans un espace de coworking qui ne semble pas avoir de Wi-Fi.

  Les critiques soutiennent que sa « méthode » n'est ni évolutive ni reproductible, et qu'elle n'est peut-être techniquement pas une méthode. Mais les abonnés à sa newsletter, **« Le Digest du Style de Vie Semi-Passif »**, insistent sur le fait qu'elle a changé leur vie d'une manière qu'ils ne peuvent pas tout à fait articuler.

  > « Je n'ai pas encore gagné 1,50 € », déclare l'abonné @EnergeticGhost420, « mais j'ai définitivement ressenti l'équivalent de 1,50 € de motivation. »

  ## Ce qu'il faut retenir

  Bien qu'il ne soit pas clair si Evelin a réellement fait quoi que ce soit, et que l'argent ait pu être techniquement un remboursement pour autre chose entièrement, son histoire est la preuve que vous n'avez pas besoin d'expérience, d'éducation ou de résultats pour inspirer les autres.

  Quant à ce qu'elle fera ensuite ?

  > « Je pivote vers le gig-work quantique », dit-elle. « Je ne peux pas l'expliquer. Mais c'est énorme. »
