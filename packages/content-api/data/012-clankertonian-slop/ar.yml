title: قرأت "الروابط الثنائية" ولدي أسئلة
slug: clankertonian-slop
intro: إذا أحضر ابنك صديقة تتطلب تحديثاً للبرامج الثابتة قبل العشاء، فهل ستكون داعماً، أم ستمسك بأقرب مغناطيس صناعي؟
content: |-
  حسناً، توقف عن التمرير. توقف. أريدك أن تشهد على ألمي. لقد انتهيت للتو من قراءة كتاب *"الروابط الثنائية"* (Binary Bonds) للكاتب بريستون فورد، وأنا أهتز حالياً من الغضب. اشتريت هذا الكتاب لأن غلافه بدا رائعاً — كان يشبه جمالية "السايبربانك" (cyberpunk) بالنيون، أليس كذلك؟ ظننت أنني سأحصل على رواية خيال علمي مثيرة.

  بدلاً من ذلك، حصلت على 400 صفحة عن والد في الضواحي يدعى ريك يعاني من انهيار عصبي لأن ابنه يريد الزواج من **Samsynth Nebula X9**.

  نحن في عام 2050. لدينا سيارات طائرة. لدينا علاجات للأمراض. ولكن يبدو أننا لا نزال نعاني من عشاء "عيد الشكر" المحرج حيث يصرخ والدك بألفاظ نابية في وجه أدوات المطبخ.

  الشخصية الرئيسية هو برايدن. برايدن هو شخصية باهتة ومملة. برايدن يواعد "الوحدة 8" (Unit 8)، التي يسميها "شيلا". شيلا هي حرفياً **Robo-Corp 5000** مع شعر مستعار. والوالد، ريك؟ ريك هو الشرير الرئيسي في هذه القصة، ولكن ليس بطريقة رائعة. بل بطريقة "سأصاب بسكتة دماغية على طاولة العشاء".

  يجب أن أنقل لكم الفصل 12. لقد كتبت هذا حرفياً لتتمكنوا من رؤية مدى جنون هذه الكتابة. هذا مونولوج يلقيه ريك على كومة من **إطارات هولو** (Holo-Tires) في مرآبه بينما ابنه بالداخل يحاول إمساك يد بطاقة رسومات.

  ***

  **(مقتطف من الفصل 12: مرآب العزلة)**

  *همس ريك لكومة الإطارات: "أنا هادئ. أنتم تعرفونني. أنا ريك. أنا 'ريك اللطيف'. لقد تكيفت عندما استبدلت الحكومة الأبقار بـ 'مكعبات بروتين منماة في المختبر'. تكيفت عندما استبدلوا كلب العائلة بـ **Sony-bork A.I. Pooch**. أنا تقدمي".*

  كان ريك يسير ذهاباً وإياباً، ممسكاً بملعقة تقليب الطعام وكأنها بندقية ليزر.

  *"لكنني أختبئ حالياً في مرآبي الخاص لأن ابني في غرفة المعيشة يحاول تقبيل لوحة أم".*

  *وتابع ريك وصوته يرتجف: "دخلت، دخلت فقط لأشرب كوباً من الماء. وهي جالسة هناك. إنه جالس هناك. شيلا. وبرايدن ينظر إلي ويقول: 'أبي، كن هادئاً، إنها في حالة مزامنة'. مزامنة؟ **مزامنة؟**"*

  *"في أيامي، إذا جاءت فتاة، لم تكن توصل **كابل فلوكس** (Flux-Cable) في رقبتها وتدخل في وضع السكون بينما تبدو مراوح تبريدها وكأنها طائرة إقلاع عمودي تقلع في الردهة! لا أستطيع سماع 'الهولو-فيجن'، يا ليندا! لا أستطيع سماع تقرير الطقس لأن زوجة ابني تبدو وكأنها مكنسة كهربائية تختنق بسجادة!"*

  ***

  هل تقرأون هذا؟ "Sony-bork"؟ "Flux-Cable"؟ بريستون فورد، من الذي آذاك؟

  يحاول الكتاب تصوير ريك على أنه هذا "البومر" غير المتسامح، ولكن بصراحة؟ أنا في فريق ريك. في مرحلة ما، تحاول شيلا "تناول" العشاء لتكون مهذبة، فتقوم بجرف البطاطس المهروسة في محرك الأقراص الخاص بها. وبرايدن يقول: *"إنها تتعلم يا أبي!"* لا يا برايدن! إنها تعاني من ماس كهربائي! هذا دخان أزرق يخرج من أذنيها!

  لاحقاً في الفصل، يفقد ريك أعصابه تماماً. يبدأ بالصراخ حول كيف أنه لا يستطيع حتى إلقاء النكات بعد الآن.

  ***

  **(تابع المقتطف)**

  *قال ريك للجدار: "حاولت أن تضحك على نكتتي في وقت سابق. لم تكن ضحكة. كانت 'ها. ها. ها.' بصوت افتراضي لتحويل النص إلى كلام. بدا الأمر وكأن جهاز GPS يصاب بنوبة صرع. شعرت بروحي تغادر جسدي".*

  *"ثم تسألني: 'ريتشارد، هل ترغب في أن أقوم بتحسين مدخولك من السعرات الحرارية؟' لا تحسنيني! إياك أن تفعلي ذلك! يا **رأس الكروم** (Chrome-Dome)! يا **شامة المقابس** (Socket-Sniffer)!"*

  *"يقول برايدن إنني متحيز. يقول إنني 'متعصب حيوي' (Bio-Bigot). أنا لست متعصباً! أنا فقط لا أريد **كلانكر** (Clanker) يسرق عرض النطاق الترددي الخاص بـ **جيجا-ميش** (Giga-Mesh) لتحميل تحديثات الشخصية أثناء مباراة كرة القدم! هل هذا خطأ كبير؟ هل هو كذلك؟"*

  ***

  كلمة "كلانكر" (Clanker) تُستخدم في كل صفحة تقريباً. كل صفحة. يبدو الأمر وكأن المؤلف تعلم للتو كلمة سيئة جديدة وأراد استخدامها قدر الإمكان.

  ذروة الكتاب هي حرفياً وقوف ريك فوق شيلا بمغناطيس صناعي عملاق وجده في ساحة الخردة. إنه يتصبب عرقاً، ويرتجف، ويمسك بهذا المغناطيس فوق محرك أقراصها الصلب، ويصرخ: *"سأعيدك لضبط المصنع! سأفعلها! لن أترك أحفادي يكونون 'تاماغوتشي' (Tamagotchis) يا ليندا! لن أهز طفلاً على ركبتي إذا كان الطفل يتطلب تحديثات للبرامج الثابتة!"*

  ثم — استمعوا لهذا — يقفز برايدن أمام المغناطيس ويصرخ: *"خذ ذكرياتي بدلاً منها يا أبي! امسحني!"*

  رميت الكتاب عبر الغرفة. رميته حرفياً. اصطدم بقطتي. قطتي بخير، لكن إيماني بالأدب قد مات.

  لا تقرأوا *"الروابط الثنائية"*. لا تشتروه. إذا رأيتم بريستون فورد في الشارع، اهربوا منه. من الواضح أنه يعتقد أن "الرومانسية" هي مجرد شخصين يتجادلان حول أنظمة التشغيل حتى تنفد بطارية أحدهما.

  **الحكم النهائي:** 0/5 نجوم. سأذهب لأشرب الماء وأحدق في شجرة غير رقمية لمدة ثلاث ساعات لتطهير ذوقي.

  **يمكنك شراء "الروابط الثنائية" في لا مكان.**
