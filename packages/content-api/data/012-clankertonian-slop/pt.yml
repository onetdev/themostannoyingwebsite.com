title: Eu li "Binary Bonds" e tenho perguntas
slug: chorume-clankertoniano
intro: Se o seu filho trouxesse para casa uma namorada que precisasse de uma atualização de firmware antes do jantar, você daria apoio ou pegaria o ímã industrial mais próximo?
content: |-
  Ok, pare de rolar a tela. Pare. Eu preciso que você testemunhe minha dor. Acabei de terminar de ler *"Binary Bonds"* de Preston Fjord e estou atualmente vibrando de raiva. Comprei este livro porque a capa parecia legal — tinha aquela estética neon cyberpunk, sabe? Achei que estava levando um thriller de ficção científica bacana.

  Em vez disso, recebi 400 páginas de um pai suburbano chamado Rick tendo um colapso mental porque seu filho quer se casar com uma **Samsynth Nebula X9**.

  O ano é 2050. Temos carros voadores. Temos curas para doenças. Mas, aparentemente, ainda temos jantares de Ação de Graças constrangedores onde seu pai grita insultos contra eletrodomésticos.

  O personagem principal é Brayden. Brayden é uma ameba em forma de ser humano. Brayden está namorando a "Unidade 8", a quem ele chama de "Sheila". Sheila é literalmente um **Robo-Corp 5000** com uma peruca. E o pai, Rick? Rick é o vilão principal desta história, mas não de um jeito legal. De um jeito "vou ter um derrame na mesa de jantar".

  Eu tenho que transcrever o Capítulo 12 para você. Eu literalmente digitei isso para que você possa ver o quão insana é essa escrita. Este é um monólogo que Rick faz para uma pilha de **Holo-Pneus** em sua garagem enquanto seu filho está lá dentro tentando segurar a mão de uma placa de vídeo.

  ***

  **(Trecho do Capítulo 12: A Garagem da Solidão)**

  *"Eu sou legal,"* sussurrou Rick para a pilha de pneus. *"Você me conhece. Eu sou o Rick. Eu sou o 'Rick de Boa'. Eu me adaptei quando o governo substituiu as vacas por 'Cubos de Proteína Cultivados em Tanque'. Eu me adaptei quando substituíram o cachorro da família por um **Sony-bork A.I. Pooch**. Eu sou progressista."*

  Rick andava de um lado para o outro, segurando uma espátula como se fosse um rifle laser.

  *"Mas eu estou atualmente escondido na minha própria garagem porque meu filho está na sala de estar tentando beijar de língua uma placa-mãe."*

  *"Eu entrei,"* continuou Rick, com a voz tremendo. *"Eu apenas entrei para pegar um copo de água. E ela está sentada lá. Aquilo está sentado lá. Sheila. E Brayden olha para mim e diz: 'Pai, fica quieto, ela está sincronizando'. Sincronizando? **SINCRONIZANDO?**"*

  *"No meu tempo, se uma garota vinha em casa, ela não plugava um **Cabo-Flux** no pescoço e entrava em modo de repouso enquanto as ventoinhas de resfriamento soavam como um jato VTOL decolando no meu hall de entrada! Eu não consigo ouvir a Holo-Visão, Linda! Não consigo ouvir a previsão do tempo porque minha nora soa como um aspirador de pó engasgando com um tapete!"*

  ***

  Você está lendo isso? "Sony-bork"? "Cabo-Flux"? Preston Fjord, quem te machucou?

  O livro tenta enquadrar Rick como esse boomer intolerante, mas, sinceramente? Eu sou Time Rick. Em um ponto, Sheila tenta "comer" o jantar para ser educada, e ela simplesmente joga purê de batatas em seu drive de disco. E Brayden diz: *"Ela está aprendendo, pai!"* Não, Brayden! Ela está entrando em curto-circuito! Aquilo é fumaça azul saindo das orelhas dela!

  Mais tarde no capítulo, Rick perde totalmente o controle. Ele começa a esbravejar sobre como não pode nem contar piadas mais.

  ***

  **(Continuação do trecho)**

  *"Ela tentou rir da minha piada mais cedo,"* disse Rick para a parede. *"Não foi uma risada. Foi um 'Ha. Ha. Ha.' em uma voz padrão de conversão de texto em fala. Parecia um GPS tendo uma convulsão. Senti minha alma sair do corpo."*

  *"E então ela me pergunta: 'Richard, você gostaria que eu otimizasse sua ingestão calórica?'. Não me otimize! Não se atreva! Sua **Cabeça de Cromo**! Sua **Farejadora de Soquete**!"*

  *"Brayden diz que sou preconituoso. Ele diz que estou sendo um 'Bio-Intolerante'. Eu não sou intolerante! Eu só não quero uma **Lata-Velha** roubando minha largura de banda **Giga-Mesh** para baixar patches de personalidade durante o jogo de futebol! Isso é tão errado? É?"*

  ***

  O insulto "Lata-Velha" (Clanker) é usado em todas as páginas. Todas. É como se o autor tivesse acabado de aprender um novo palavrão e quisesse usá-lo o máximo possível.

  O clímax do livro é literalmente Rick em pé sobre Sheila com um ímã industrial gigante que ele encontrou em um ferro-velho. Ele está suando, tremendo, segurando esse ímã sobre o disco rígido dela, gritando: *"Eu vou te resetar de fábrica! Eu vou fazer isso! Não vou deixar meus netos serem Tamagotchis, Linda! Não vou balançar um bebê no joelho se o bebê precisar de atualizações de firmware!"*

  E então — olha só — Brayden pula na frente do ímã e grita: *"Apaga as minhas memórias em vez disso, pai! Me limpa!"*

  Eu joguei o livro do outro lado da sala. Eu literalmente o joguei. Acertou meu gato. Meu gato está bem, mas minha fé na literatura morreu.

  Não leia *"Binary Bonds"*. Não compre. Se você vir Preston Fjord na rua, fuja. Ele claramente acha que "romance" é apenas duas pessoas discutindo sobre sistemas operacionais até que uma delas fique sem bateria.

  **Veredito Final:** 0/5 Estrelas. Vou beber água e ficar olhando para uma árvore não digital por três horas para limpar meu paladar.

  **Você pode comprar "Binary Bonds" em lugar nenhum.**
