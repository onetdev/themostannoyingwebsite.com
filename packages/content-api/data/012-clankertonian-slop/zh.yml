title: 我读了《二进制羁绊》，我有很多疑问
slug: ke-lan-ke-dun-ni-ya-fei-liao
intro: 如果你的儿子带回一个在吃晚饭前需要更新固件的女朋友，你会支持他，还是会抓起最近的工业磁铁？
content: |-
  好了，别刷了。停下。我需要你们见证我的痛苦。我刚读完普雷斯顿·峡湾（Preston Fjord）写的《二进制羁绊》（*Binary Bonds*），我现在气得全身发抖。我买这本书是因为封面看起来很酷——那种霓虹赛博朋克美学，对吧？我以为我买到了一本很酷的科幻惊悚片。

  结果，我读了 400 页关于一个叫里克的郊区老爹精神崩溃的故事，就因为他儿子想娶一个 **Samsynth Nebula X9**。

  现在是 2050 年。我们有飞行汽车。我们有治愈疾病的方法。但显然，我们仍然会有尴尬的感恩节晚餐，席间你老爸会对厨房电器大声辱骂。

  男主角叫布雷登。布雷登是个像湿袜子一样软弱的人。布雷登正在和“8 号机”约会，他叫她“希拉”。希拉实际上就是一个戴着假发的 **Robo-Corp 5000**。而那个老爸里克？里克是这个故事的大反派，但不是以一种很酷的方式。而是以一种“我要死在餐桌上”的方式。

  我必须为你们转录第 12 章的内容。我特意把它打出来，好让你们看看这写作有多疯狂。这是里克在车库里对着一堆 **Holo-Tires** 发表的独白，而他的儿子正在屋里试图握住一块显卡的手。

  ***

  **（摘自第 12 章：孤独的车库）**

  *“我很冷静，”*里克对着那堆轮胎低声说。*“你了解我。我是里克。我是‘佛系里克’。当政府用‘实验室培育的蛋白质块’取代奶牛时，我适应了。当他们用 **Sony-bork AI 机器狗** 取代家里的真狗时，我也适应了。我很开明。”*

  里克来回踱步，紧握着一把刮刀，就像那是把激光步枪一样。

  *“但我现在居然躲在自己的车库里，因为我儿子正在客厅里试图跟一块主板舌吻。”*

  *“我走进去，”*里克继续说道，声音颤抖。*“我只是走进去想倒杯水。然后她就坐在那儿。它就坐在那儿。希拉。布雷登看着我说，‘爸，小声点，她正在同步。’同步？**同步？**”*

  *“在我那个年代，如果有女孩来家里，她不会在脖子上插一根 **通量电缆 (Flux-Cable)** 并在进入睡眠模式时，让她的冷却风扇响得像架垂直起降喷气机在我门厅起飞一样！琳达，我听不清全息电视的声音了！我听不清天气预报，因为我的儿媳妇听起来像是一台被地毯噎住的吸尘器！”*

  ***

  你们读到了吗？“索尼汪 (Sony-bork)”？“通量电缆 (Flux-Cable)”？普雷斯顿·峡湾，到底是谁伤害了你？

  这本书试图把里克塑造成一个不宽容的老顽固，但说实话？我站里克。有一次，希拉为了表现得有礼貌尝试“吃”晚饭，结果她直接把土豆泥铲进了她的磁盘驱动器。布雷登居然还说：*“爸，她在学习呢！”* 不，布雷登！她在短路！她耳朵里都冒青烟了！

  在这一章的后面，里克彻底疯了。他开始咆哮自己甚至都不能开玩笑了。

  ***

  **（摘要继续）**

  *“她刚才试着听我的笑话，”*里克对着墙说。*“那不是笑。那是‘哈。哈。哈。’，用的还是默认的文字转语音。听起来像是一个癫痫发作的 GPS。我感觉我的灵魂都出窍了。”*

  *“然后她问我，‘理查德，需要我优化你的热量摄入吗？’别优化我！你敢！你这个**铁壳头 (Chrome-Dome)**！你这个**插座嗅探器 (Socket-Sniffer)**！”*

  *“布雷登说我有偏见。他说我是个‘生物歧视者’。我没有偏见！我只是不想让一个**废铁 (Clanker)** 偷走我的 **Giga-Mesh** 带宽，就在足球比赛期间下载什么性格补丁！这有错吗？有吗？”*

  ***

  歧视性称呼“废铁 (Clanker)”出现在每一页上。每一页。就像作者刚学了一个脏词，就想尽可能多地使用它。

  书的高潮部分是里克拿着他在废料场找到的巨型工业磁铁站在希拉面前。他汗流浃背，全身发抖，把磁铁举在她的硬盘上方，尖叫着：*“我要把你出厂重置！我会这么做的！琳达，我不能让我的孙子孙女变成拓麻歌子！如果孩子需要更新固件，我绝不会把他抱在膝盖上逗弄！”*

  然后——你们听好了——布雷登跳到磁铁前面大喊：*“爸，抹掉我的记忆吧！把我格式化了！”*

  我把书扔到了房间另一头。真的扔了。它砸到了我的猫。我的猫没事，但我对文学的信心已经死了。

  别读《二进制羁绊》。别买。如果你在街上看到普雷斯顿·峡湾，快跑。他显然认为“浪漫”就是两个人争论操作系统直到其中一个没电。

  **最终评价：** 0/5 星。我要去喝点水，然后对着一棵非数字化的树发呆三小时，来净化一下我的审美。

  **你哪儿也买不到《二进制羁绊》。**
