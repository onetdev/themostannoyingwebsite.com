title: Elolvastam a "Bináris kötelékek"-et, és vannak kérdéseim
slug: elolvastam-a-binaris-koteleket-es-vannak-kerdeseim
intro: Ha a fia egy olyan barátnőt hozna haza, akinek vacsora előtt firmware-frissítésre van szüksége, ön támogatná, vagy a legközelebbi ipari mágnes után nyúlna?
content: |-
  Rendben, ne görgess tovább. Állj. Szükségem van rá, hogy tanúja legyél a fájdalmamnak. Most fejeztem be Preston Fjord „Bináris kötelékek” (Binary Bonds) című könyvét, és jelenleg vibrálok a dühtől. Azért vettem meg ezt a könyvet, mert a borítója menőnek tűnt – tudod, az a neon cyberpunk esztétika, igaz? Azt hittem, egy klassz sci-fi thrillert kapok.

  Ehelyett kaptam 400 oldalt egy Rick nevű külvárosi apukáról, akinek idegösszeomlása van, mert a fia feleségül akar venni egy **Samsynth Nebula X9**-est.

  2050-et írunk. Vannak repülő autóink. Vannak gyógymódjaink a betegségekre. De úgy tűnik, még mindig vannak kínos hálaadási vacsorák, ahol az apád válogatott sértéseket vág a konyhai gépek fejéhez.

  A főszereplő Brayden. Brayden egy emberi formájú vizes zokni. Brayden a „8-as egységgel” jár, akit „Sheilának” hív. Sheila szó szerint egy parókás **Robo-Corp 5000**. És az apa, Rick? Rick a történet főgonosza, de nem a menő értelemben. Hanem abban a „mindjárt gutaütést kapok a vacsoraasztalnál” értelemben.

  Le kell másolnom nektek a 12. fejezetet. Szó szerint begépeltem, hogy lássátok, mennyire agyament ez az írás. Ez egy monológ, amit Rick egy rakás **Holo-Gumiabroncsnak** ad elő a garázsában, miközben a fia odabent egy videokártyával próbál kézen fogva sétálni.

  ***

  **(Részlet a 12. fejezetből: A magány garázsa)**

  *„Laza vagyok”* – suttogta Rick a gumiabroncs-toronynak. *„Ismersz. Én vagyok Rick. A 'Laza Rick'. Alkalmazkodtam, amikor a kormány lecserélte a teheneket 'Lombikban növesztett proteinkockákra'. Alkalmazkodtam, amikor a családi kutyát lecserélték egy **Sony-bork MI kutyusra**. Haladó szellemű vagyok.”*

  Rick fel-alá járkált, úgy szorongatva egy spatulát, mintha lézerpuska lenne.

  *„But I am currently hiding in my own garage because my son is in the living room trying to French kiss a motherboard.”*

  *„De jelenleg a saját garázsomban bujkálok, mert a fiam a nappaliban éppen egy alaplapot próbál franciázva smárolni.”*

  *„Bementem”* – folytatta Rick remegő hangon. *„Csak bementem egy pohár vízért. És ő ott ül. Az ott ül. Sheila. Brayden meg rám néz és azt mondja: 'Apa, maradj csendben, éppen szinkronizál.' Szinkronizál? **SZINKRONIZÁL?**”*

  *„Az én időmben, ha átjött egy lány, nem dugott egy **Flux-kábelt** a nyakába és ment alvó üzemmódba, miközben a hűtőventilátorai úgy búgtak, mint egy felszálló VTOL-vadászgép az előszobámban! Nem hallom a Holo-Víziót, Linda! Nem hallom az időjárás-jelentést, mert a menyem úgy hangzik, mint egy szőnyegen fuldokló porszívó!”*

  ***

  Olvassátok ezt? „Sony-bork”? „Flux-kábel”? Preston Fjord, ki bántott téged?

  A könyv próbálja Ricket úgy beállítani, mint egy intoleráns boomert, de őszintén? Én Rick csapatában vagyok. Egy ponton Sheila megpróbál „vacsorázni”, hogy udvarias legyen, és egyszerűen krumplipürét lapátol a lemezmeghajtójába. Brayden meg: *„Csak tanul, apa!”* Nem, Brayden! Zárlatos lesz! Az ott kék füst, ami a füléből jön ki!

  Később a fejezetben Rick teljesen elveszíti a kontrollt. Arról kezd őrjöngeni, hogy már vicceket sem tud mesélni.

  ***

  **(A részlet folytatódik)**

  *„Megpróbált nevetni a vicchemen korábban”* – mondta Rick a falnak. *„Az nem nevetés volt. Az egy 'Ha. Ha. Ha.' volt alapértelmezett felolvasó hangon. Úgy hangzott, mintha egy GPS-nek epilepsziás rohama lenne. Éreztem, ahogy a lelkem elhagyja a testemet.”*

  *„És aztán megkérdezi tőlem: 'Richard, szeretnéd, ha optimalizálnám a kalóriabeviteledet?' Ne optimalizálj engem! Ne merészeld! Te **Krómfejű**! Te **Konnektorszimatoló**!”*

  *„Brayden szerint előítéletes vagyok. Azt mondja, 'Bio-bigott' vagyok. Nem vagyok bigott! Csak nem akarom, hogy egy **Kattogó** ellopja a **Giga-Mesh** sávszélességemet, hogy személyiség-javításokat töltsön le a focimeccs alatt! Olyan nagy bűn ez? Az?”*

  ***

  A „Kattogó” (Clanker) kifejezést minden egyes oldalon használják. Minden egyes oldalon. Mintha a szerző most tanult volna egy új csúnya szót, és a lehető legtöbbször akarta volna használni.

  A könyv csúcspontja szó szerint az, hogy Rick egy roncstelepen talált óriási ipari mágnessel áll Sheila felett. Izzad, remeg, a mágnest a lány merevlemeze fölé tartja, és azt üvölti: *„Visszaállítalak a gyári beállításokra! Megteszem! Nem hagyom, hogy az unokáim Tamagotchi-k legyenek, Linda! Nem fogok egy olyan babát lovagoltatni a térdemen, akinek firmware-frissítésre van szüksége!”*

  And then—get this—Brayden jumps in front of the magnet and yells, “Take my memories instead, Dad! Wipe me!”

  És aztán – figyeljétek – Brayden a mágnes elé ugrik és azt ordítja: *„Vedd el inkább az én emlékeimet, apa! Törölj ki engem!”*

  I threw the book across the room. I literally threw it. It hit my cat. My cat is fine, but my faith in literature is dead.

  Áthajítottam a könyvet a szobán. Szó szerint elhajítottam. Eltalálta a macskámat. A macskám jól van, de az irodalomba vetett hitem meghalt.

  Ne olvassátok el a „Bináris kötelékeket”. Ne vegyétek meg. Ha meglátjátok Preston Fjordot az utcán, fussatok el. Egyértelműen azt hiszi, hogy a „románc” az, amikor két ember operációs rendszerekről vitatkozik, amíg az egyiküknek le nem merül az akkumulátora.

  **Végső ítélet:** 0/5 csillag. Megyek, iszom egy pohár vizet, és három órán át egy nem-digitális fát fogok bámulni, hogy kitisztítsam az ízlésemet.

  **A „Bináris kötelékek” sehol sem kapható.**
