title: Gary
slug: gary
intro: Prrr, miau, maullido; fucs, brrp, trino. ¡Mrrrau, prrt, nyan, ekekekee!
content: |-
  Miau-miau, prrr miau miau. Miu brrp, trrr y nyan prrt! Mrrrau, bleh blep yau; squee miau miu. Fucs y raul, ekekekee scri! Miau miau-miau, mrrr prrr prrt.

  Chitter-brrp, miau nyan miu. Mrrrau prrt trino blep, trrr miau miau. Yau buf y squee, gruñido raul miau-miau! Fucs prrr bleh prrt miu, ekekekee miau buf. Nyan mrrrau trrr, scri fucs yau!

  Prrt bleh, miu miau y mrrr. Maullido-brrp, trino miu prrt prrr! Ekekekee raul miau, mrrrau gruñido miau-miau. Buf scri prrr trrr yau, blep y chitter miu. Mrrr, squee trrr prrt miau!

  Raul fucs miau miau-miau! Miu blep trrr, mrrrau prrr. *Nyan prrt maullido scri, ekekekee miau!* Brrp chitter, mrrr miau yau trrr. Prrt prrr buf, gruñido miau-miau squee.

  Mrrr prrr brrp prrt, miu miau miau-miau! Trrrr maullido, bleh miu raul prrt. Ekekekee squee fucs scri, mrrrau miau blep. Buf miau nyan mrrr, gruñido yau trrr brrp. **Prrt trino raul, prrr miau!**
