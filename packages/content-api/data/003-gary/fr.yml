title: Gary
slug: gary
intro: Ronron, miaou, hurlement ; sifflement, pépiement, trille. Miaou, prrt, nyan, ekekekee !
content: |-
  Miaou-waouh, ronron miaou miaou. Mew pépiement, trrr et nyan prrt ! Miaou, bleh blep yawp ; squee miaou mew. Sifflement et grognement, ekekekee scree ! Miaou miaou-waouh, mrrr ronron prrt.

  Pépiement-chirp, miaou nyan mew. Miaou prrt trille blep, trrr miaou miaou. Yowp huff et squee, grognement miaou-waouh ! Sifflement ronron bleh prrt mew, ekekekee miaou huff. Nyan miaou trrr, scree sifflement yawp !

  Prrt bleh, mew miaou et mrrr. Hurlement-pépiement, trille mew prrt ronron ! Ekekekee grognement miaou, miaou snarl miaou-waouh. Huff scree ronron trrr yawp, blep et pépiement mew. Mrrr, squee trrr prrt miaou !

  Grognement sifflement miaou miaou-waouh ! Mew blep trrr, miaou ronron. *Nyan prrt hurlement scree, ekekekee miaou !* Pépiement chitter, mrrr miaou yawp trrr. Prrt ronron huff, grognement miaou-waouh squee.

  Mrrr ronron pépiement prrt, mew miaou miaou-waouh ! Trrrr hurlement, bleh mew grognement prrt. Ekekekee squee sifflement scree, miaou miaou blep. Huff miaou nyan mrrr, grognement yawp trrr pépiement. **Prrt trille grognement, ronron miaou !**
