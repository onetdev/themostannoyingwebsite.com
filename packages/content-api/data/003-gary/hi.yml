title: गैरी (Gary)
slug: gary
intro: पुर्र, म्याऊँ, यौल; हिस, चहचहाहट, ट्रिल। म्रॉव, प्रर्ट, न्यान, एकेककी!
content: |-
  मऊ-वाउ, पुर्र म्याऊँ म्याऊँ। म्याऊँ चहचहाहट, ट्रर्र और न्यान प्रर्ट! म्रॉव, ब्लेह ब्लेप यॉप; स्क़्वी म्याऊँ म्याऊँ। हिस और रौल, एकेककी स्क्री! मऊ मऊ-वाउ, म्रर्र पुर्र प्रर्ट।

  चिटर-चर्प, म्याऊँ न्यान म्याऊँ। म्रॉव प्रर्ट ट्रिल ब्लेप, ट्रर्र म्याऊँ मऊ। यॉप हफ और स्क़्वी, स्नार्ल रौल मऊ-वाउ! हिस पुर्र ब्लेह प्रर्ट म्याऊँ, एकेककी मऊ हफ। न्यान म्रॉव ट्रर्र, स्क्री हिस यॉप!

  प्रर्ट ब्लेह, म्याऊँ म्याऊँ और म्रर्र। यौल-चर्प, ट्रिल म्याऊँ प्रर्ट पुर्र! एकेककी रौल मऊ, म्रॉव स्नार्ल मऊ-वाउ। हफ स्क्री पुर्र ट्रर्र यॉप, ब्लेप और चिटर म्याऊँ। म्रर्र, स्क़्वी ट्रर्र प्रर्ट म्याऊँ!

  रौल हिस मऊ मऊ-वाउ! म्याऊँ ब्लेप ट्रर्र, म्रॉव पुर्र। *न्यान प्रर्ट यौल स्क्री, एकेककी म्याऊँ!* चर्प चिटर, म्रर्र म्याऊँ यॉप ट्रर्र। प्रर्ट पुर्र हफ, स्नार्ल मऊ-वाउ स्क़्वी।

  म्रर्र पुर्र चर्प प्रर्ट, म्याऊँ म्याऊँ मऊ-वाउ! ट्रर्र यौल, ब्लेह म्याऊँ रौल प्रर्ट। एकेककी स्क़्वी हिस स्क्री, म्रॉव मऊ ब्लेप। हफ म्याऊँ न्यान म्रर्र, स्नार्ल यॉप ट्रर्र चर्प। **प्रर्ट ट्रिल रौल, पुर्र म्याऊँ!**
