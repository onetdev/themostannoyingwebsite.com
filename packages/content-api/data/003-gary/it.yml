title: Gary
slug: gary
intro: Gary è appena arrivato e non siamo sicuri di cosa fare con lui.
content: |-
  Gary è qui ora. È arrivato stamattina, portando solo un piccolo zaino e uno sguardo di lieve confusione. Non ha detto molto, ma la sua presenza è già palpabile. Gary è il tipo di persona che occupa spazio senza fare rumore.

  Non siamo sicuri del perché Gary sia qui o di quanto tempo intenda restare. Non è che non sia il benvenuto; è solo che non eravamo pronti per un Gary. Non avevamo un piano per un Gary.

  Per ora, Gary è seduto in cucina, sorseggiando una tazza di tè che non ricordiamo di avergli preparato. Sembra abbastanza soddisfatto, osservando la pioggia contro la finestra con una sorta di distacco filosofico.

  Qualcuno ha suggerito di chiedere a Gary i suoi piani, ma nessuno vuole essere il primo a rompere il silenzio. C'è qualcosa in Gary che scoraggia le domande dirette. Invece, ci muoviamo intorno a lui, offrendo sorrisi educati che lui ricambia con un cenno solenne.

  Gary è una sorta di enigma. Non è un ospite, esattamente, ma nemmeno un estraneo. È solo... Gary. E per ora, questo dovrà bastare. Forse domani capiremo cosa fare con Gary. Ma per oggi, Gary è semplicemente qui.
