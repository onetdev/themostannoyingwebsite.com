title: Gary
slug: gary
intro: Prrr, miáu, nyáu; fsssz, csirp, trrill. Mrráu, prrt, nyenyá, kekekeke!
content: |-
  Miau-vau, prrr miáu miáu. Nyau csirp, trrr és nyenyá prrt! Mrráu, bleh blep nyáp; szkvii miáu nyu. Fsssz és rául, kekekeke szkrí! Miau miau-vau, mrrr prrr prrt.

  Csitt-csirp, miáu nyenyá nyu. Mrráu prrt trrill blep, trrr miáu miau. Nyáp huff és szkvii, sznarl rául miau-vau! Fsssz prrr bleh prrt nyu, kekekeke miau huff. Nyenyá mrráu trrr, szkrí fsssz nyáp!

  Prrt bleh, nyu miáu és mrrr. Nyáu-csirp, trrill nyu prrt prrr! Kekekeke rául miau, mrráu sznarl miau-vau. Huff szkrí prrr trrr nyáp, blep és csitt-nyu. Mrrr, szkvii trrr prrt miáu!

  Rául fsssz miau miau-vau! Nyu blep trrr, mrráu prrr. *Nyenyá prrt nyáu szkrí, kekekeke miáu!* Csirp csitt, mrrr miáu nyáp trrr. Prrt prrr huff, sznarl miau-vau szkvii.

  Mrrr prrr csirp prrt, nyu miáu miau-vau! Trrrr nyáu, bleh nyu rául prrt. Kekekeke szkvii fsssz szkrí, mrráu miau blep. Huff miáu nyenyá mrrr, sznarl nyáp trrr csirp. **Prrt trrill rául, prrr miáu!**
