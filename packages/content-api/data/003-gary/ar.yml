title: غاري
slug: غاري
intro: مياو، مياوو، مياووو؛ هسسس، زقزقة، ترقرق. مياو، برت، نيان، إيكيكيكي!
content: |-
  مياو-واو، مياو مياو. مياو زقزقة، تررر ونيان برت! مياووو، بله بلب ياوب؛ سكوي مياو مياو. هسسس ورول، إيكيكيكي سكري! مياو مياو-واو، مررر مياو برت.

  تشيتر-تشيرب، مياو نيان مياو. مياووو برت ترقرق بلب، تررر مياو مياو. ياوب هاف وسكوي، سنارل رول مياو-واو! هسسس مياو بله برت مياو، إيكيكيكي مياو هاف. نيان مياووو تررر، سكري هسسس ياوب!

  برت بله، مياو مياو ومررر. ياول-تشيرب، ترقرق مياو برت مياو! إيكيكيكي رول مياو، مياووو سنارل مياو-واو. هاف سكري مياو تررر ياوب، بلب وتشيتير مياو. مررر، سكوي تررر برت مياو!

  رول هسسس مياو مياو-واو! مياو بلب تررر، مياووو مياو. *نيان برت ياول سكري، إيكيكيكي مياو!* تشيرب تشيتير، مررر مياو ياوب تررر. برت مياو هاف، سنارل مياو-واو سكوي.

  مررر مياو تشيرب برت، مياو مياو مياو-واو! ترررر ياول، بله مياو رول برت. إيكيكيكي سكوي هسسس سكري، مياووو مياو بلب. هاف مياو نيان مررر، سنارل ياوب تررر تشيرب. **برت ترقرق رول، مياو مياو!**
