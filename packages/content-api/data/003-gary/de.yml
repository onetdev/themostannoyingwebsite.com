title: Gary
slug: gary
intro: Schnurr, miau, jaul; fauch, tschirp, triller. Mrrrauw, prrt, nyan, ekekekee!
content: |-
  Mau-wau, schnurr miau miau. Mew tschirp, trrr und nyan prrt! Mrrrauw, bleh blep jaul; squee miau mew. Fauch und rowl, ekekekee scree! Mau mau-wau, mrrr schnurr prrt.

  Zirp-tschirp, miau nyan mew. Mrrrauw prrt triller blep, trrr miau mau. Jaul schnauf und squee, knurr rowl mau-wau! Fauch schnurr bleh prrt mew, ekekekee mau schnauf. Nyan mrrrauw trrr, scree fauch jaul!

  Prrt bleh, mew miau und mrrr. Jaul-tschirp, triller mew prrt schnurr! Ekekekee rowl mau, mrrrauw knurr mau-wau. Schnauf scree schnurr trrr jaul, blep und zirp mew. Mrrr, squee trrr prrt miau!

  Rowl fauch mau mau-wau! Mew blep trrr, mrrrauw schnurr. *Nyan prrt jaul scree, ekekekee miau!* Tschirp zirp, mrrr miau jaul trrr. Prrt schnurr schnauf, knurr mau-wau squee.

  Mrrr schnurr tschirp prrt, mew miau mau-wau! Trrrr jaul, bleh mew rowl prrt. Ekekekee squee fauch scree, mrrrauw mau blep. Schnauf miau nyan mrrr, knurr jaul trrr tschirp. **Prrt triller rowl, schnurr miau!**
