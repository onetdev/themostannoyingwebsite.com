title: ギャリー
slug: gyari-
intro: ゴロゴロ、ニャー、ギャー；シャー、ピピッ、クルル。ミャーオ、プルル、ニャン、ケケケケッ！
content: |-
  ミャー・ワオ、ゴロゴロ ニャー ニャー。ミュー ピピッ、ルルル と ニャン プルル！ミャーオ、ベロベロ ぺろり ギャッ；スウィー ニャー ミュー。シャー と ギャオ、ケケケケッ スクリー！ミャー ミャー・ワオ、ルルル ゴロゴロ プルル。

  カチカチ・ピピッ、ニャー ニャン ミュー。ミャーオ プルル クルル ぺろり、ルルル ニャー ミャー。ギャオ フッフ と スウィー、ウー ギャオ ミャー・ワオ！シャー ゴロゴロ ベロベロ プルル ミュー、ケケケケッ ミャー フッフ。ニャン ミャーオ ルルル、スクリー シャー ギャッ！

  プルル ベロベロ、ミュー ニャー と ルルル。ギャー・ピピッ、クルル ミュー プルル ゴロゴロ！ケケケケッ ギャオ ミャー、ミャーオ ウー ミャー・ワオ。フッフ スクリー ゴロゴロ ルルル ギャッ、ぺろり と カチカチ ミュー。ルルル、スウィー ルルル プルル ニャー！

  ギャオ シャー ミャー ミャー・ワオ！ミュー ぺろり ルルル、ミャーオ ゴロゴロ。*ニャン プルル ギャー スクリー、ケケケケッ ニャー！* ピピッ カチカチ、ルルル ニャー ギャッ ルルル。プルル ゴロゴロ フッフ、ウー ミャー・ワオ スウィー。

  ルルル ゴロゴロ ピピッ プルル、ミュー ニャー ミャー・ワオ！ルルル ギャー、ベロベロ ミュー ギャオ プルル。ケケケケッ スウィー シャー スクリー、ミャーオ ミャー ぺろり。フッフ ニャー ニャン ルルル、ウー ギャッ ルルル ピピッ。**プルル クルル ギャオ、ゴロゴロ ニャー！**
