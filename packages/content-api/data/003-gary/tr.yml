title: Gary
slug: gary
intro: Mırrr, miyav, vuv; fıs, cıvıltı, trill. Mırrr-miya, prrt, nyan, ekekekee!
content: |-
  Miv-vav, mırrr miyav miyav. Miv cıvıltı, trrr ve nyan prrt! Mırrr-miya, bleh blep yavp; skui miyav miv. Fıs ve ravl, ekekekee skri! Miv miv-vav, mrrr mırrr prrt.

  Çıtır-cıvıltı, miyav nyan miv. Mırrr-miya prrt trill blep, trrr miyav miv. Yavp haf ve skui, snarl ravl miv-vav! Fıs mırrr bleh prrt miv, ekekekee miv haf. Nyan mırrr-miya trrr, skri fıs yavp!

  Prrt bleh, miv miyav ve mrrr. Vuv-cıvıltı, trill miv prrt mırrr! Ekekekee ravl miv, mırrr-miya snarl miv-vav. Haf skri mırrr trrr yavp, blep ve çıtır miv. Mrrr, skui trrr prrt miyav!

  Ravl fıs miv miv-vav! Miv blep trrr, mırrr-miya mırrr. *Nyan prrt vuv skri, ekekekee miyav!* Cıvıltı çıtır, mrrr miyav yavp trrr. Prrt mırrr haf, snarl miv-vav skui.

  Mrrr mırrr cıvıltı prrt, miv miyav miv-vav! Trrrr vuv, bleh miv ravl prrt. Ekekekee skui fıs skri, mırrr-miya miv blep. Haf miyav nyan mrrr, snarl yavp trrr cıvıltı. **Prrt trill ravl, mırrr miyav!**
