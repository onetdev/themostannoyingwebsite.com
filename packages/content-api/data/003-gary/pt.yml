title: Gary
slug: gary
intro: Purr, miau, uivo; sibilo, chilrear, trinado. Mrrrow, prrt, nyan, ekekekee!
content: |-
  Mow-wow, purr miau miau. Mew chilrear, trrr e nyan prrt! Mrrrow, bleh blep yawp; squee miau mew. Sibilo e rowl, ekekekee scree! Mow mow-wow, mrrr purr prrt.

  Chitter-chirp, miau nyan mew. Mrrrow prrt trinado blep, trrr miau mow. Yowp huff e squee, rosnado rowl mow-wow! Sibilo purr bleh prrt mew, ekekekee mow huff. Nyan mrrrow trrr, scree sibilo yawp!

  Prrt bleh, mew miau e mrrr. Uivo-chilrear, trinado mew prrt purr! Ekekekee rowl mow, mrrrow rosnado mow-wow. Huff scree purr trrr yawp, blep e chitter mew. Mrrr, squee trrr prrt miau!

  Rowl sibilo mow mow-wow! Mew blep trrr, mrrrow purr. *Nyan prrt uivo scree, ekekekee miau!* Chilrear chitter, mrrr miau yawp trrr. Prrt purr huff, rosnado mow-wow squee.

  Mrrr purr chilrear prrt, mew miau mow-wow! Trrrr uivo, bleh mew rowl prrt. Ekekekee squee sibilo scree, mrrrow mow blep. Huff miau nyan mrrr, rosnado yawp trrr chilrear. **Prrt trinado rowl, purr miau!**
