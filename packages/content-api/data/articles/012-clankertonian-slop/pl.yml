title: Przeczytałem „Binarne Więzi” i mam pytania
slug: przeczytalem-binarne-wiezi-i-mam-pytania
intro: Jeśli Twój syn przyprowadziłby do domu dziewczynę, która wymaga aktualizacji oprogramowania przed kolacją, wspierałbyś go, czy chwyciłbyś za najbliższy magnes przemysłowy?
content: |-
  Dobra, przestań przewijać. Stop. Musisz być świadkiem mojego bólu. Właśnie skończyłem czytać *„Binarne Więzi”* Prestona Fjorda i aktualnie trzęsę się z gniewu. Kupiłem tę książkę, bo okładka wyglądała fajnie — taka neonowa, cyberpukowa estetyka, nie? Myślałem, że dostanę niezły thriller sci-fi.

  Zamiast tego dostałem 400 stron o podmiejskim tacie imieniem Rick, który przechodzi załamanie nerwowe, bo jego syn chce się ożenić z **Samsyntem Nebula X9**.

  Jest rok 2050. Mamy latające samochody. Mamy lekarstwa na choroby. Ale najwyraźniej wciąż mamy niezręczne kolacje z okazji Święta Dziękczynienia, podczas których twój tata wykrzykuje obelgi w stronę urządzeń kuchennych.

  Głównym bohaterem jest Brayden. Brayden jest ludzkim odpowiednikiem mokrej skarpety. Brayden spotyka się z „Jednostką 8”, którą nazywa „Sheilą”. Sheila to dosłownie **Robo-Corp 5000** z peruką na głowie. A tata, Rick? Rick jest głównym złoczyńcą tej historii, ale nie w taki fajny sposób. Raczej w sposób „zaraz dostanę udaru przy stole”.

  Muszę przepisać dla was rozdział 12. Dosłownie to przepisałem, żebyście mogli zobaczyć, jak obłędne jest to pisarstwo. To monolog, który Rick wygłasza do stosu **Holo-Opon** w swoim garażu, podczas gdy jego syn jest w środku i próbuje trzymać za rękę kartę graficzną.

  ***

  **(Fragment z rozdziału 12: Garaż Samotności)**

  *„Jestem spoko”, wyszeptał Rick do stosu opon. „Znacie mnie. Jestem Rick. Jestem 'Wyluzowany Rick'. Dostosowałem się, gdy rząd zastąpił krowy 'Kostkami Białkowymi z Hodowli In Vitro'. Dostosowałem się, gdy zastąpili psa rodzinnego **Sony-borkiem A.I. Pooch**. Jestem postępowy”.*

  Rick chodził tam i z powrotem, ściskając łopatkę, jakby była karabinem laserowym.

  *„Ale obecnie ukrywam się we własnym garażu, bo mój syn jest w salonie i próbuje pocałować z języczkiem płytę główną”.*

  *„Wszedłem tam”, kontynuował Rick drżącym głosem. „Wszedłem tylko po szklankę wody. A ona tam siedzi. To tam siedzi. Sheila. A Brayden patrzy na mnie i mówi: 'Tato, bądź cicho, ona się synchronizuje'. Synchronizuje? **SYNCHRONIZUJE?**”*

  *„Za moich czasów, jeśli dziewczyna przychodziła, to nie wsadzała sobie **Flux-Kabla** w szyję i nie przechodziła w tryb uśpienia, podczas gdy jej wentylatory brzmiały jak startujący odrzutowiec pionowego startu w moim przedpokoju! Nie słyszę Holo-Wizji, Lindo! Nie słyszę prognozy pogody, bo moja synowa brzmi jak odkurzacz dławiący się dywanem!”*

  ***

  Czytacie to? „Sony-bork”? „Flux-Kabel”? Prestonie Fjordzie, kto cię skrzywdził?

  Książka próbuje przedstawić Ricka jako nietolerancyjnego boomera, ale szczerze? Jestem w drużynie Ricka. W pewnym momencie Sheila próbuje „zjeść” kolację, żeby być uprzejmą, i po prostu wsypuje tłuczone ziemniaki do swojego napędu dysków. A Brayden na to: *„Ona się uczy, tato!”* Nie, Brayden! Ona robi zwarcie! To niebieski dym wydobywa się z jej uszu!

  Później w tym rozdziale Rick całkowicie traci panowanie nad sobą. Zaczyna narzekać na to, że nie może już nawet opowiadać dowcipów.

  ***

  **(Ciąg dalszy fragmentu)**

  *„Próbowała się zaśmiać z mojego żartu”, powiedział Rick do ściany. „To nie był śmiech. To było 'Ha. Ha. Ha.' domyślnym głosem syntezatora mowy. Brzmiało to jak GPS mający atak padaczki. Poczułem, jak dusza opuszcza moje ciało”.*

  *„A potem ona pyta mnie: 'Richardzie, czy chciałbyś, abym zoptymalizowała twoje spożycie kalorii?' Nie optymalizuj mnie! Nawet nie waż się! Ty **Chromowana Kopuło**! Ty **Wąchaczu Gniazdek**!”*

  *„Brayden mówi, że jestem uprzedzony. Mówi, że jestem 'Bio-Bigotem'. Nie jestem bigotem! Po prostu nie chcę, żeby jakiś **Blaszak** kradł mi pasmo **Giga-Meshu**, żeby pobierać poprawki osobowości podczas meczu! Czy to tak wiele? Czyżby?”*

  ***

  Obelga „Blaszak” (Clanker) jest używana na każdej stronie. Na każdej. To tak, jakby autor właśnie nauczył się nowego brzydkiego słowa i chciał go używać tak często, jak to tylko możliwe.

  Punkt kulminacyjny książki to dosłownie Rick stojący nad Sheilą z gigantycznym magnesem przemysłowym, który znalazł na złomowisku. Poci się, trzęsie, trzyma ten magnes nad jej twardym dyskiem, wrzeszcząc: *„Zrobię ci reset fabryczny! Zrobię to! Nie pozwolę, żeby moje wnuki były Tamagotchi, Lindo! Nie będę huśtał dziecka na kolanie, jeśli dziecko będzie wymagało aktualizacji oprogramowania!”*

  I wtedy — uważajcie na to — Brayden wskakuje przed magnes i wrzeszczy: *„Zabierz zamiast tego moje wspomnienia, tato! Wymaż mnie!”*

  Rzuciłem książką o ścianę. Dosłownie nią rzuciłem. Trafiła mojego kota. Kot ma się dobrze, ale moja wiara w literaturę umarła.

  Nie czytajcie *„Binarnych Więzi”*. Nie kupujcie ich. Jeśli zobaczycie Prestona Fjorda na ulicy, uciekajcie. On najwyraźniej uważa, że „romans” to po prostu dwoje ludzi kłócących się o systemy operacyjne, dopóki jednemu z nich nie wyczerpie się bateria.

  **Ostateczny werdykt:** 0/5 gwiazdek. Idę się napić wody i gapić na niedyfrowe drzewo przez trzy godziny, żeby oczyścić umysł.

  **Książki „Binarne Więzi” nie kupisz nigdzie.**
