title: मैंने "बाइनरी बॉन्ड्स" (Binary Bonds) पढ़ी और मेरे कुछ सवाल हैं
slug: maine-binary-bonds-padhi-aur-mere-sawal-hain
intro: यदि आपका बेटा घर पर एक ऐसी प्रेमिका लेकर आए जिसे रात के खाने से पहले फर्मवेयर अपडेट (firmware update) की आवश्यकता हो, तो क्या आप उसका समर्थन करेंगे, या आप पास के सबसे बड़े औद्योगिक चुंबक को पकड़ लेंगे?
content: |-
  ठीक है, स्क्रॉल करना बंद करें। रुकिए। मुझे आपको मेरा दर्द दिखाना है। मैंने अभी प्रेस्टन फ्योर्ड (Preston Fjord) की पुस्तक *"बाइनरी बॉन्ड्स"* (Binary Bonds) पढ़ना समाप्त किया है, और मैं वर्तमान में गुस्से से कांप रहा हूँ। मैंने यह किताब इसलिए खरीदी क्योंकि इसका कवर कूल लग रहा था—यह नियॉन साइबरपंक एस्थेटिक (cyberpunk aesthetic) जैसा था, है ना? मुझे लगा कि मुझे एक कूल साइंस-फिक्शन थ्रिलर मिल रही है।

  इसके बजाय, मुझे रिकी (Rick) नाम के एक उपनगरीय पिता के 400 पन्ने मिले, जिसका मानसिक संतुलन बिगड़ रहा है क्योंकि उसका बेटा एक **Samsynth Nebula X9** से शादी करना चाहता है।

  साल 2050 है। हमारे पास उड़ने वाली कारें हैं। हमारे पास बीमारियों का इलाज है। लेकिन स्पष्ट रूप से, हमारे पास अभी भी वे अजीब थैंक्सगिविंग डिनर (Thanksgiving dinners) हैं जहाँ आपके पिता रसोई के उपकरणों पर चिल्लाते हैं।

  मुख्य पात्र ब्रेडन (Brayden) है। ब्रेडन एक भीगे हुए मोज़े जैसा इंसान है। ब्रेडन "यूनिट 8" को डेट कर रहा है, जिसे वह "शीला" कहता है। शीला सचमुच विग पहनी हुई एक **Robo-Corp 5000** है। और पिता, रिकी? रिकी इस कहानी का मुख्य खलनायक है, लेकिन कूल तरीके से नहीं। बल्कि इस तरह से कि "मुझे डिनर टेबल पर स्ट्रोक आने वाला है।"

  मुझे आपके लिए अध्याय 12 को ट्रांसक्राइब करना होगा। मैंने इसे सचमुच टाइप किया है ताकि आप देख सकें कि यह लेखन कितना पागलपन भरा है। यह एक एकालाप (monologue) है जो रिकी अपने गैरेज में **Holo-Tires** के ढेर को देता है जबकि उसका बेटा अंदर एक ग्राफिक्स कार्ड का हाथ पकड़ने की कोशिश कर रहा है।

  ***

  **(अध्याय 12 से अंश: एकांत का गैरेज)**

  *"मैं कूल हूँ,"* रिकी ने टायरों के ढेर से फुसफुसाकर कहा। *"तुम मुझे जानते हो। मैं रिकी हूँ। मैं 'चिल रिकी' हूँ। मैंने तब खुद को ढाला जब सरकार ने गायों को 'वैट-ग्रोन प्रोटीन क्यूब्स' (Vat-Grown Protein Cubes) से बदल दिया। मैंने तब खुद को ढाला जब उन्होंने परिवार के कुत्ते को **Sony-bork A.I. Pooch** से बदल दिया। मैं प्रगतिशील हूँ।"*

  रिकी आगे-पीछे टहल रहा था, एक स्पैटुला को ऐसे पकड़े हुए जैसे कि वह कोई लेजर राइफल हो।

  *"लेकिन मैं वर्तमान में अपने ही गैरेज में छिपा हुआ हूँ क्योंकि मेरा बेटा लिविंग रूम में एक मदरबोर्ड को किस (kiss) करने की कोशिश कर रहा है।"*

  *"मैं अंदर गया,"* रिकी ने अपनी आवाज कांपते हुए जारी रखा। *"मैं बस एक गिलास पानी लेने के लिए अंदर गया था। और वह वहां बैठी है। 'यह' वहां बैठी है। शीला। और ब्रेडन मेरी ओर देखता है और कहता है, 'पापा, चुप रहिए, वह सिंक (syncing) कर रही है।' सिंक? **सिंक (SYNCING)?**"*

  *"मेरे जमाने में, अगर कोई लड़की घर आती थी, तो वह अपनी गर्दन में **फ्लक्स-केबल** (Flux-Cable) नहीं लगाती थी और 'स्लीप मोड' में नहीं चली जाती थी, जबकि उसके कूलिंग फैन मेरे हॉल में वीटीओएल (VTOL) जेट के उड़ान भरने जैसी आवाज करते थे! मैं होलो-विज़न (Holo-Vision) नहीं सुन पा रहा हूँ, लिंडा! मैं मौसम की रिपोर्ट नहीं सुन पा रहा हूँ क्योंकि मेरी बहू कालीन पर दम घुटने वाले वैक्यूम क्लीनर जैसी आवाज कर रही है!"*

  ***

  क्या आप इसे पढ़ रहे हैं? "सोनी-बोर्क" (Sony-bork)? "फ्लक्स-केबल"? प्रेस्टन फ्योर्ड, आपको किसने चोट पहुँचाई?

  किताब रिकी को इस असहिष्णु 'बूमर' के रूप में चित्रित करने की कोशिश करती है, लेकिन ईमानदारी से? मैं रिकी की टीम में हूँ। एक बिंदु पर, शीला विनम्र बनने के लिए रात का खाना "खाने" की कोशिश करती है, और वह बस मैश किए हुए आलू को अपने डिस्क ड्राइव में डाल देती है। और ब्रेडन कहता है, *"वह सीख रही है, पापा!"* नहीं, ब्रेडन! उसका शॉर्ट-सर्किट हो रहा है! उसके कानों से नीला धुआं निकल रहा है!

  बाद में अध्याय में, रिकी पूरी तरह से आपा खो देता है। वह इस बारे में चिल्लाना शुरू कर देता है कि वह अब चुटकुले भी नहीं सुना सकता।

  ***

  **(अंश जारी)**

  *"उसने पहले मेरे चुटकुले पर हंसने की कोशिश की,"* रिकी ने दीवार से कहा। *"वह हंसी नहीं थी। वह डिफ़ॉल्ट टेक्स्ट-टू-स्पीच आवाज़ में 'हा. हा. हा.' था। ऐसा लग रहा था जैसे किसी GPS को दौरा (seizure) पड़ रहा हो। मुझे लगा कि मेरी आत्मा मेरे शरीर से निकल गई है।"*

  *"और फिर वह मुझसे पूछती है, 'रिचर्ड, क्या आप चाहेंगे कि मैं आपके कैलोरी सेवन को अनुकूलित (optimize) करूँ?' मुझे अनुकूलित मत करो! तुम्हारी हिम्मत कैसे हुई! तुम **क्रोम-डोम** (Chrome-Dome)! तुम **सॉकेट-स्निफर** (Socket-Sniffer)!"*

  *"ब्रेडन कहता है कि मैं पक्षपाती हूँ। वह कहता है कि मैं 'बायो-कट्टरपंथी' (Bio-Bigot) बन रहा हूँ। मैं कट्टरपंथी नहीं हूँ! मैं बस यह नहीं चाहता कि कोई **क्लैंकर** (Clanker) फुटबॉल मैच के दौरान व्यक्तित्व पैच (personality patches) डाउनलोड करने के लिए मेरी **गीगा-मेश** (Giga-Mesh) बैंडविड्थ चुराए! क्या यह इतना गलत है? क्या यह है?"*

  ***

  गाली "क्लैंकर" (Clanker) का इस्तेमाल हर एक पन्ने पर किया गया है। हर पन्ने पर। ऐसा लगता है जैसे लेखक ने अभी-अभी एक नया बुरा शब्द सीखा है और वह इसका जितना संभव हो सके उपयोग करना चाहता था।

  किताब का चरमोत्कर्ष (climax) सचमुच रिकी का शीला के ऊपर एक विशाल औद्योगिक चुंबक लेकर खड़ा होना है जो उसे कबाड़खाने में मिला था। वह पसीने से तर-बतर है, कांप रहा है, इस चुंबक को उसकी हार्ड ड्राइव के ऊपर पकड़े हुए चिल्ला रहा है, *"मैं तुझे फ़ैक्टरी रीसेट कर दूँगा! मैं यह करूँगा! मैं अपने पोते-पोतियों को तामागोट्ची (Tamagotchis) नहीं बनने दूँगा, लिंडा! मैं अपने घुटने पर किसी बच्चे को नहीं नचाऊँगा अगर उस बच्चे को फर्मवेयर अपडेट (firmware updates) की ज़रूरत हो!"*

  और फिर—इसे सुनिए—ब्रेडन चुंबक के सामने कूद जाता है और चिल्लाता है, *"इसके बजाय मेरी यादें ले लो, पापा! मुझे मिटा दो!"*

  मैंने किताब को कमरे के उस पार फेंक दिया। मैंने सचमुच इसे फेंक दिया। यह मेरी बिल्ली को लगी। मेरी बिल्ली ठीक है, लेकिन साहित्य में मेरा विश्वास मर चुका है।

  *"बाइनरी बॉन्ड्स"* न पढ़ें। इसे न खरीदें। यदि आप सड़क पर प्रेस्टन फ्योर्ड को देखें, तो भाग जाएं। वह स्पष्ट रूप से सोचता है कि "रोमांस" केवल दो लोगों का ऑपरेटिंग सिस्टम के बारे में बहस करना है जब तक कि उनमें से किसी एक की बैटरी खत्म न हो जाए।

  **अंतिम फैसला:** 0/5 सितारे। मैं जाकर पानी पीने वाला हूँ और अपनी इंद्रियों को शुद्ध करने के लिए तीन घंटे तक एक गैर-डिजिटल पेड़ को घूरने वाला हूँ।

  **आप "बाइनरी बॉन्ड्स" कहीं भी नहीं खरीद सकते।**
