title: Ich habe „Binary Bonds“ gelesen und ich habe Fragen
slug: clankertonischer-muell
intro: Wenn Ihr Sohn eine Freundin nach Hause brächte, die vor dem Abendessen ein Firmware-Update benötigt, würden Sie ihn unterstützen oder zum nächsten Industriemagneten greifen?
content: |-
  Okay, hört auf zu scrollen. Stopp. Ihr müsst Zeuge meines Schmerzes werden. Ich habe gerade „Binary Bonds“ von Preston Fjord zu Ende gelesen und ich vibriere förmlich vor Wut. Ich habe dieses Buch gekauft, weil das Cover cool aussah – so ein neonfarbener Cyberpunk-Athetik-Vibe, wisst ihr? Ich dachte, ich bekomme einen coolen Sci-Fi-Thriller.

  Stattdessen bekam ich 400 Seiten über einen Vorstadt-Vater namens Rick, der einen Nervenzusammenbruch erleidet, weil sein Sohn eine **Samsynth Nebula X9** heiraten will.

  Wir schreiben das Jahr 2050. Wir haben fliegende Autos. Wir haben Heilmittel für Krankheiten. Aber anscheinend haben wir immer noch peinliche Thanksgiving-Essen, bei denen der Vater Küchengeräte beschimpft.

  Die Hauptfigur ist Brayden. Brayden ist die menschliche Entsprechung einer nassen Socke. Brayden ist mit „Einheit 8“ zusammen, die er „Sheila“ nennt. Sheila ist buchstäblich ein **Robo-Corp 5000** mit einer Perücke auf. Und der Vater, Rick? Rick ist der Hauptschurke dieser Geschichte, aber nicht auf eine coole Art. Sondern auf eine „Ich kriege am Esstisch gleich einen Schlaganfall“-Art.

  Ich muss euch Kapitel 12 transkribieren. Ich habe das buchstäblich abgetippt, damit ihr sehen könnt, wie wahnsinnig dieser Schreibstil ist. Dies ist ein Monolog, den Rick in seiner Garage vor einem Stapel **Holo-Reifen** hält, während sein Sohn drinnen versucht, Händchen mit einer Grafikkarte zu halten.

  ***

  **(Auszug aus Kapitel 12: Die Garage der Einsamkeit)**

  *„Ich bin cool“, flüsterte Rick dem Reifenstapel zu. „Ihr kennt mich. Ich bin Rick. Ich bin der ‚entspannte Rick‘. Ich habe mich angepasst, als die Regierung Kühe durch ‚im Labor gezüchtete Proteinfunktionen‘ ersetzte. Ich habe mich angepasst, als sie den Familienhund durch einen **Sony-bork A.I. Pooch** ersetzten. Ich bin progressiv.“*

  Rick ging auf und ab und umklammerte einen Pfannenwender, als wäre es ein Lasergewehr.

  *„Aber ich verstecke mich gerade in meiner eigenen Garage, weil mein Sohn im Wohnzimmer versucht, ein Motherboard mit Zunge zu küssen.“*

  *„Ich bin reingegangen“, fuhr Rick fort, seine Stimme zitterte. „Ich wollte mir nur ein Glas Wasser holen. Und sie sitzt da. Es sitzt da. Sheila. Und Brayden sieht mich an und sagt: ‚Dad, sei leise, sie synchronisiert gerade.‘ Synchronisieren? **SYNCHRONISIEREN?**“*

  *„In meiner Zeit haben Mädchen, die zu Besuch kamen, sich nicht ein **Flux-Kabel** in den Nacken gesteckt und sind in den Ruhemodus gewechselt, während ihre Lüfter im Flur klangen wie ein startender VTOL-Jet! Ich verstehe die Holo-Vision nicht, Linda! Ich verstehe den Wetterbericht nicht, weil meine Schwiegertochter klingt wie ein Staubsauger, der an einem Teppich erstickt!“*

  ***

  Lest ihr das? „Sony-bork“? „Flux-Kabel“? Preston Fjord, wer hat dir wehgetan?

  Das Buch versucht, Rick als diesen intoleranten Boomer darzustellen, aber ganz ehrlich? Ich bin im Team Rick. An einem Punkt versucht Sheila aus Höflichkeit „mitzuessen“ und schaufelt sich einfach Kartoffelbrei in ihr Diskettenlaufwerk. Und Brayden so: *„Sie lernt noch, Dad!“* Nein, Brayden! Sie hat einen Kurzschluss! Das ist blauer Rauch, der aus ihren Ohren kommt!

  Später im Kapitel verliert Rick völlig die Beherrschung. Er fängt an darüber zu schimpfen, dass er nicht einmal mehr Witze machen darf.

  ***

  **(Fortsetzung des Auszugs)**

  *„Sie hat vorhin versucht, über meinen Witz zu lachen“, erzählte Rick der Wand. „Es war kein Lachen. Es war ein ‚Ha. Ha. Ha.‘ in einer Standard-Text-to-Speech-Stimme. Es klang wie ein GPS, das einen Krampfanfall hat. Ich fühlte, wie meine Seele meinen Körper verließ.“*

  *„And dann fragt sie mich: ‚Richard, möchtest du, dass ich deine Kalorienzufuhr optimiere?‘ Optimier mich nicht! Wage es ja nicht! Du **Chrom-Rübe**! Du **Steckdosen-Schnüffler**!“*

  *„Brayden sagt, ich sei voreingenommen. Er sagt, ich sei ein ‚Bio-Bigott‘. Ich bin kein Bigott! Ich will nur nicht, dass eine **Blechbüchse** meine **Giga-Mesh**-Bandbreite klaut, um während des Fußballspiels Persönlichkeits-Patches herunterzuladen! Ist das so falsch? Ist es das?“*

  ***

  Das Schimpfwort „Blechbüchse“ wird auf jeder einzelnen Seite verwendet. Auf jeder. Es ist, als hätte der Autor gerade ein neues böses Wort gelernt und wollte es so oft wie möglich benutzen.

  Der Höhepunkt des Buches ist buchstäblich Rick, wie er mit einem riesigen Industriemagneten, den er auf einem Schrottplatz gefunden hat, über Sheila steht. Er schwitzt, zittert, hält diesen Magneten über ihre Festplatte und schreit: *„Ich werde dich auf Werkseinstellungen zurücksetzen! Ich tu’s! Ich lasse nicht zu, dass meine Enkelkinder Tamagotchis sind, Linda! Ich werde kein Baby auf meinem Knie wippen lassen, wenn das Baby Firmware-Updates braucht!“*

  Und dann – stellt euch das vor – springt Brayden vor den Magneten und schreit: *„Nimm stattdessen meine Erinnerungen, Dad! Lösch mich!“*

  Ich habe das Buch durch den Raum geworfen. Buchstäblich geworfen. Es hat meine Katze getroffen. Meiner Katze geht es gut, aber mein Glaube an die Literatur ist tot.

  Lest „Binary Bonds“ nicht. Kauft es nicht. Wenn ihr Preston Fjord auf der Straße seht, rennt weg. Er glaubt offensichtlich, dass „Romanze“ nur daraus besteht, dass zwei Leute über Betriebssysteme streiten, bis einem der Akku ausgeht.

  **Abschließendes Urteil:** 0/5 Sterne. Ich werde jetzt Wasser trinken und drei Stunden lang einen nicht-digitalen Baum anstarren, um meinen Gaumen zu reinigen.

  **Ihr könnt „Binary Bonds“ nirgendwo kaufen.**
