title: Я прочитал «Бинарные узы», и у меня есть вопросы
slug: ya-prochital-binarnye-uzy-i-u-menya-est-voprosy
intro: Если бы ваш сын привел домой подружку, которой требуется обновление прошивки перед ужином, вы бы поддержали его или схватились за ближайший промышленный магнит?
content: |-
  Так, стоп, хватит скроллить. Остановитесь. Вы должны засвидетельствовать мою боль. Я только что закончил читать «Бинарные узы» Престона Фьорда, и я буквально вибрирую от ярости. Я купил эту книгу, потому что обложка выглядела круто — такой неоновый киберпанк-эстетик, понимаете? Я думал, что покупаю крутой научно-фантастический триллер.

  Вместо этого я получил 400 страниц того, как пригородный папаша по имени Рик ловит нервный срыв, потому что его сын хочет жениться на **Samsynth Nebula X9**.

  На дворе 2050 год. У нас есть летающие машины. У нас есть лекарства от болезней. Но, судя по всему, у нас всё еще есть неловкие ужины в честь Дня благодарения, где ваш батя выкрикивает оскорбления в адрес кухонной техники.

  Главный герой — Брейден. Брейден — человек-размазня. Брейден встречается с «Юнитом 8», которую он называет «Шейлой». Шейла — это буквально **Robo-Corp 5000** в парике. А папа, Рик? Рик — главный злодей этой истории, но не в крутом смысле. А в смысле «у меня сейчас случится удар прямо за обеденным столом».

  Я должен процитировать вам 12-ю главу. Я буквально перепечатал это, чтобы вы видели, насколько безумно это написано. Это монолог, который Рик произносит перед стопкой **Голо-Шин** в своем гараже, пока его сын внутри пытается держаться за руки с видеокартой.

  ***

  **(Отрывок из главы 12: Гараж уединения)**

  *«Я спокоен», — прошептал Рик стопке шин. «Вы меня знаете. Я Рик. Я "Тот самый Рик на чилле". Я приспособился, когда правительство заменило коров на "выращенные в чане протеиновые кубики". Я приспособился, когда они заменили семейную собаку на **ИИ-песеля Sony-bork**. Я прогрессивный».*

  Рик ходил взад-вперед, сжимая лопатку так, словно это была лазерная винтовка.

  *«Но сейчас я прячусь в собственном гараже, потому что мой сын в гостиной пытается поцеловать материнскую плату взасос».*

  *«Я зашел», — продолжил Рик, и его голос задрожал. «Я просто зашел выпить стакан воды. А она сидит там. Оно сидит там. Шейла. И Брейден смотрит на меня и говорит: "Пап, потише, у неё синхронизация". Синхронизация? **СИНХРОНИЗАЦИЯ?**»*

  *«В мое время, если приходила девушка, она не втыкала **Флакс-кабель** себе в шею и не уходила в спящий режим, пока её вентиляторы охлаждения выли, как взлетающий в моем фойе джет! Я не слышу Голо-Визор, Линда! Я не слышу прогноз погоды, потому что моя невестка шумит как пылесос, подавившийся ковриком!»*

  ***

  Вы это читаете? «Sony-bork»? «Флакс-кабель»? Престон Фьорд, кто тебя обидел?

  Книга пытается выставить Рика нетерпимым бумером, но честно? Я в команде Рика. В какой-то момент Шейла пытается «съесть» ужин из вежливости и просто заталкивает картофельное пюре в свой дисковод. И Брейден такой: «Она учится, папа!» Нет, Брейден! У неё короткое замыкание! Это синий дым идет у неё из ушей!

  Позже в этой главе Рик окончательно теряет самообладание. Он начинает разглагольствовать о том, что больше не может даже шутить.

  ***

  **(Продолжение отрывка)**

  *«Она попыталась посмеяться над моей шуткой чуть раньше», — сказал Рик стене. «Это был не смех. Это было "Ха. Ха. Ха." дефолтным голосом движка "текст-в-речь". Это звучало как приступ у GPS-навигатора. Я почувствовал, как душа покинула мое тело».*

  *«А потом она спрашивает меня: "Ричард, не желаете ли вы, чтобы я оптимизировала ваше потребление калорий?" Не надо меня оптимизировать! Не смей! Ты, **Хромированный купол**! Ты, **Гнездонюх**!»*

  *«Брейден говорит, что я предвзятый. Говорит, что я "Био-расист". Я не расист! Я просто не хочу, чтобы какой-то **Железяка** воровал мою пропускную способность **Гига-Сети**, чтобы скачивать патчи личности во время футбольного матча! Разве это плохо? А?»*

  ***

  Оскорбление «Железяка» (Clanker) используется на каждой божьей странице. На каждой. Такое ощущение, что автор только что выучил новое ругательство и хотел использовать его как можно чаще.

  Кульминация книги — это буквально Рик, стоящий над Шейлой с гигантским промышленным магнитом, который он нашел на свалке. Он потеет, трясется, держит этот магнит над её жестким диском и орет: «Я тебя до заводских настроек сброшу! Я сделаю это! Я не позволю моим внукам быть Тамагочи, Линда! Я не буду нянчить ребенка на коленях, если ребенку требуется обновление прошивки!»

  И тут — зацените — Брейден прыгает перед магнитом и кричит: «Забери лучше мои воспоминания, папа! Сотри меня!»

  Я швырнул книгу через всю комнату. Буквально швырнул. Она попала в кота. С котом всё в порядке, но моя вера в литературу мертва.

  Не читайте «Бинарные узы». Не покупайте их. Если увидите Престона Фьорда на улице — бегите. Он явно думает, что «романтика» — это когда два человека спорят об операционных системах, пока у одного из них не сядет батарейка.

  **Итоговый вердикт:** 0/5 звезд. Пойду попью воды и три часа посмотрю на настоящее дерево, чтобы прийти в себя.

  **Купить «Бинарные узы» можно нигде.**
