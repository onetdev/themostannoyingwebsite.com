title: Ho letto "Legami Binari" e ho delle domande
slug: ho-letto-legami-binari-e-ho-delle-domande
intro: Se tuo figlio portasse a casa una fidanzata che richiede un aggiornamento del firmware prima di cena, saresti d'accordo o prenderesti il primo magnete industriale a portata di mano?
content: |-
  Va bene, smetti di scorrere. Fermati. Ho bisogno che tu sia testimone del mio dolore. Ho appena finito di leggere *"Legami Binari"* di Preston Fjord e sto letteralmente vibrando di rabbia. Ho comprato questo libro perché la copertina sembrava forte — era tipo un'estetica cyberpunk al neon, giusto? Pensavo di trovarmi davanti a un bel thriller di fantascienza.

  Invece, ho avuto 400 pagine di un papà di periferia di nome Rick che ha un esaurimento nervoso perché suo figlio vuole sposare una **Samsynth Nebula X9**.

  Siamo nel 2050. Abbiamo le auto volanti. Abbiamo le cure per le malattie. Ma a quanto pare, abbiamo ancora imbarazzanti cene del Ringraziamento dove tuo padre urla insulti agli elettrodomestici da cucina.

  Il personaggio principale è Brayden. Brayden è un essere umano moscio come un calzino bagnato. Brayden sta uscendo con "Unità 8", che lui chiama "Sheila". Sheila è letteralmente un **Robo-Corp 5000** con una parrucca sopra. E il papà, Rick? Rick è il cattivo principale di questa storia, ma non in modo figo. In un modo tipo "mi verrà un ictus a tavola".

  Devo trascrivervi il capitolo 12. L'ho letteralmente digitato così potete vedere quanto è folle questa scrittura. Questo è un monologo che Rick recita a una pila di **Holo-Pneumatici** nel suo garage mentre suo figlio è dentro che cerca di tenere per mano una scheda video.

  ***

  **(Estratto dal Capitolo 12: Il Garage della Solitudine)**

  *"Sono tranquillo"*, sussurrò Rick alla pila di pneumatici. *"Mi conoscete. Sono Rick. Sono il 'Rick rilassato'. Mi sono adattato quando il governo ha sostituito le mucche con 'Cubi proteici coltivati in vasca'. Mi sono adattato quando hanno sostituito il cane di famiglia con un **Sony-bork A.I. Pooch**. Sono progressista."*

  Rick camminava avanti e indietro, stringendo una spatola come se fosse un fucile laser.

  *"Ma attualmente mi sto nascondendo nel mio garage perché mio figlio è in salotto che cerca di dare un bacio alla francese a una scheda madre."*

  *"Sono entrato"*, continuò Rick, con la voce tremante. *"Sono entrato solo per prendere un bicchiere d'acqua. E lei è seduta lì. Quel coso è seduto lì. Sheila. E Brayden mi guarda e dice: 'Papà, fai silenzio, si sta sincronizzando'. Sincronizzando? **SINCRONIZZANDO?**"*

  *"Ai miei tempi, se veniva a trovarmi una ragazza, non si infilava un **Cavo Flux** nel collo per andare in modalità sospensione mentre le sue ventole di raffreddamento sembravano un jet VTOL che decolla nel mio ingresso! Non riesco a sentire la Holo-Visione, Linda! Non riesco a sentire le previsioni del tempo perché mia nuora sembra un aspirapolvere che soffoca su un tappeto!"*

  ***

  State leggendo? "Sony-bork"? "Cavo Flux"? Preston Fjord, chi ti ha fatto del male?

  Il libro cerca di inquadrare Rick come questo boomer intollerante, ma onestamente? Io sono nel Team Rick. A un certo punto, Sheila cerca di "mangiare" la cena per essere educata, e si limita a spalare purè di patate nel suo lettore di dischi. E Brayden fa: *"Sta imparando, papà!"*. No, Brayden! Sta andando in cortocircuito! Quel fumo blu le esce dalle orecchie!

  Più avanti nel capitolo, Rick perde completamente la testa. Inizia a inveire su come non possa più nemmeno fare battute.

  ***

  **(Estratto continua)**

  *"Ha cercato di ridere alla mia battuta prima"*, disse Rick al muro. *"Non era una risata. Era un 'Ah. Ah. Ah.' con una voce predefinita di sintesi vocale. Sembrava un GPS che ha un attacco epilettico. Ho sentito la mia anima lasciare il corpo."*

  *"E poi mi chiede: 'Richard, vorresti che ottimizzassi il tuo apporto calorico?'. Non ottimizzarmi! Non osare! Tu, **Testa di Cromo**! Tu, **Sniffa-Prese**!"*

  *"Brayden dice che sono prevenuto. Dice che sono un 'Bio-Bigotto'. Non sono un bigotto! Solo non voglio che un **Ferraccio** mi rubi la banda della **Giga-Mesh** per scaricare patch della personalità durante la partita di calcio! È così sbagliato? Lo è?"*

  ***

  L'insulto "Ferraccio" (Clanker) è usato in ogni singola pagina. Ogni pagina. È come se l'autore avesse appena imparato una nuova parolaccia e volesse usarla il più possibile.

  Il culmine del libro è letteralmente Rick in piedi sopra Sheila con un gigantesco magnete industriale che ha trovato in una discarica. Sudato, tremante, tiene questo magnete sopra il suo disco rigido, urlando: *"Ti ripristino alle impostazioni di fabbrica! Lo farò! Non lascerò che i miei nipoti siano dei Tamagotchi, Linda! Non farò saltare un bambino sulle mie ginocchia se il bambino richiede aggiornamenti del firmware!"*

  E poi — sentite questa — Brayden salta davanti al magnete e urla: *"Prendi i miei ricordi, papà! Cancella me!"*

  Ho lanciato il libro dall'altra parte della stanza. Letteralmente lanciato. Ha colpito il mio gatto. Il mio gatto sta bene, ma la mia fede nella letteratura è morta.

  Non leggete *"Legami Binari"*. Non compratelo. Se vedete Preston Fjord per strada, scappate. Chiaramente pensa che il "romanticismo" sia solo due persone che litigano sui sistemi operativi finché a una delle due non si scarica la batteria.

  **Verdetto finale:** 0/5 stelle. Vado a bere dell'acqua e a fissare un albero non digitale per tre ore per sciacquarmi la bocca.

  **Potete comprare "Legami Binari" da nessuna parte.**
