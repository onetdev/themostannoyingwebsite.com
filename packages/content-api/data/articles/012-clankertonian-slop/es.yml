title: Leí "Vínculos Binarios" y tengo preguntas
slug: clankertonian-slop
intro: Si tu hijo trajera a casa una novia que requiriera una actualización de firmware antes de la cena, ¿serías comprensivo o agarrarías el imán industrial más cercano?
content: |-
  De acuerdo, deja de desplazarte. Detente. Necesito que seas testigo de mi dolor. Acabo de terminar de leer *"Vínculos Binarios"* de Preston Fjord, y actualmente estoy vibrando de rabia. Compré este libro porque la portada se veía genial, era como, estética ciberpunk neón, ¿verdad? Pensé que estaba obteniendo un thriller de ciencia ficción genial.

  En cambio, obtuve 400 páginas de un padre suburbano llamado Rick teniendo un colapso mental porque su hijo quiere casarse con una **Samsynth Nebula X9**.

  El año es 2050. Tenemos autos voladores. Tenemos curas para enfermedades. Pero aparentemente, todavía tenemos cenas de Acción de Gracias incómodas donde tu padre grita insultos a los electrodomésticos de cocina.

  El personaje principal es Brayden. Brayden es un calcetín mojado de ser humano. Brayden está saliendo con la "Unidad 8", a quien llama "Sheila". Sheila es literalmente una **Robo-Corp 5000** con una peluca. ¿Y el padre, Rick? Rick es el villano principal de esta historia, pero no de una manera genial. De una manera de "Voy a tener un derrame cerebral en la mesa de la cena".

  Tengo que transcribir el Capítulo 12 para ti. Literalmente escribí esto para que puedas ver lo loca que es esta escritura. Este es un monólogo que Rick entrega a una pila de **Holo-Neumáticos** en su garaje mientras su hijo está adentro tratando de tomarse de la mano con una tarjeta gráfica.

  ***

  **(Extracto del Capítulo 12: El garaje de la soledad)**

  *"Soy genial",* susurró Rick a la pila de neumáticos. *"Me conoces. Soy Rick. Soy 'Rick Relajado'. Me adapté cuando el gobierno reemplazó las vacas con 'Cubos de Proteína Cultivados en Tanque'. Me adapté cuando reemplazaron al perro de la familia con un **Pooch de IA Sony-bork**. Soy progresista".*

  Rick caminaba de un lado a otro, agarrando una espátula como si fuera un rifle láser.

  *"Pero actualmente me estoy escondiendo en mi propio garaje porque mi hijo está en la sala de estar tratando de besar a la francesa una placa base".*

  *"Entré",* continuó Rick, con voz temblorosa. *"Solo entré a buscar un vaso de agua. Y ella está sentada allí. Eso está sentado allí. Sheila. Y Brayden me mira y dice: 'Papá, cállate, se está sincronizando'. ¿Sincronizando? **¿SINCRONIZANDO?**"*

  *"¡En mi época, si una chica venía, no se conectaba un **Flux-Cable** en el cuello y entraba en modo de suspensión mientras sus ventiladores de enfriamiento sonaban como un jet VTOL despegando en mi vestíbulo! ¡No puedo escuchar la Holo-Visión, Linda! ¡No puedo escuchar el informe del tiempo porque mi nuera suena como una aspiradora ahogándose con una alfombra!"*

  ***

  ¿Estás leyendo esto? "¿Sony-bork"? "¿Flux-Cable"? Preston Fjord, ¿quién te hizo daño?

  El libro intenta enmarcar a Rick como este boomer intolerante, pero ¿honestamente? Soy del Equipo Rick. En un momento, Sheila intenta "cenar" para ser educada, y simplemente se mete puré de papas en su unidad de disco. Y Brayden dice: *"¡Está aprendiendo, papá!"* ¡No, Brayden! ¡Está haciendo cortocircuito! ¡Eso es humo azul saliendo de sus oídos!

  Más adelante en el capítulo, Rick lo pierde por completo. Comienza a despotricar sobre cómo ya ni siquiera puede contar chistes.

  ***

  **(Extracto continuado)**

  *"Ella trató de reírse de mi chiste antes",* le dijo Rick a la pared. *"No fue una risa. Fue un 'Ja. Ja. Ja.' en una voz predeterminada de texto a voz. Sonaba como un GPS teniendo una convulsión. Sentí que mi alma abandonaba mi cuerpo".*

  *"Y luego me pregunta: 'Richard, ¿te gustaría que optimizara tu ingesta calórica?' ¡No me optimices! ¡No te atrevas! ¡Tú **Cabeza de Cromo**! ¡Tú **Olfateador de Enchufes**!"*

  *"Brayden dice que tengo prejuicios. Dice que soy un 'Bio-Intolerante'. ¡No soy un intolerante! ¡Simplemente no quiero que un **Clanker** robe mi ancho de banda **Giga-Mesh** para descargar parches de personalidad durante el partido de fútbol! ¿Es eso tan malo? ¿Lo es?"*

  ***

  El insulto "Clanker" se usa en cada página. Cada página. Es como si el autor acabara de aprender una nueva mala palabra y quisiera usarla tanto como fuera posible.

  El clímax del libro es literalmente Rick de pie sobre Sheila con un imán industrial gigante que encontró en un depósito de chatarra. Está sudando, temblando, sosteniendo este imán sobre su disco duro, gritando: *"¡Te voy a restablecer de fábrica! ¡Lo haré! ¡No dejaré que mis nietos sean Tamagotchis, Linda! ¡No rebotaré a un bebé en mi rodilla si el bebé requiere actualizaciones de firmware!"*

  Y luego, escucha esto, Brayden salta frente al imán y grita: *"¡Toma mis recuerdos en su lugar, papá! ¡Bórrame!"*

  Tiré el libro al otro lado de la habitación. Literalmente lo tiré. Golpeó a mi gato. Mi gato está bien, pero mi fe en la literatura está muerta.

  No leas *"Vínculos Binarios"*. No lo compres. Si ves a Preston Fjord en la calle, huye. Claramente piensa que el "romance" es solo dos personas discutiendo sobre sistemas operativos hasta que uno de ellos se queda sin batería.

  **Veredicto final:** 0/5 Estrellas. Voy a ir a beber agua y mirar un árbol no digital durante tres horas para limpiar mi paladar.

  **Puedes comprar "Vínculos Binarios" en ninguna parte.**
