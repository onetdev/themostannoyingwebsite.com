title: "소설 '바이너리 본즈'를 읽고 질문이 생겼습니다"
slug: "binery-bondseu-ilgo-jilmun"
intro: "만약 아들이 저녁 식사 전에 펌웨어 업데이트가 필요한 여자친구를 집에 데려온다면, 당신은 지지해 주시겠습니까, 아니면 가장 가까운 산업용 자석을 집어 드시겠습니까?"
content: |-
  좋아요, 스크롤 멈추세요. 멈추라고요. 제 고통을 목격해 주셔야겠습니다. 방금 프레스턴 피오르드(Preston Fjord)의 소설 *'바이너리 본즈(Binary Bonds)'*를 다 읽었는데, 지금 분노로 몸이 떨리네요. 표지가 멋져 보여서 샀거든요—네온 사이버펑크 감성, 아시죠? 멋진 SF 스릴러인 줄 알았죠.

  그 대신 제가 받은 건 아들이 **삼성신스 네뷸라 X9(Samsynth Nebula X9)**와 결혼하고 싶어 해서 멘탈이 나간 릭(Rick)이라는 교외 아빠의 400페이지 분량의 정신적 붕괴 과정이었습니다.

   때는 2050년입니다. 하늘을 나는 자동차가 있습니다. 질병 치료제도 있죠. 하지만 여전히 아빠가 주방 가전제품에 대고 욕설을 퍼붓는 어색한 추수감사절 저녁 식사 풍경이 남아 있더군요.

  주인공은 브레이든(Brayden)입니다. 브레이든은 인간으로서 정말 무색무취한 녀석이죠. 브레이든은 "유닛 8"과 데이트 중인데, 그녀를 "쉴라(Sheila)"라고 부릅니다. 쉴라는 말 그대로 가발을 쓴 **로보-콥 5000(Robo-Corp 5000)**일 뿐입니다. 그리고 아빠 릭은요? 릭은 이 이야기의 주요 악역이지만, 멋진 악당은 아닙니다. 그냥 "식탁에서 뇌졸중 걸릴 것 같은" 스타일이죠.

  제12장을 여러분을 위해 필사해 드려야겠네요. 이 글이 얼마나 미쳤는지 보여드리려고 직접 타이핑했습니다. 이건 아들이 거실에서 그래픽 카드와 손을 잡으려고 애쓰는 동안, 릭이 차고에 있는 **홀로-타이어** 더미에 대고 쏟아내는 독백입니다.

  ***

  **(제12장: 고독의 차고 발췌)**

  *"난 괜찮아,"* 릭은 타이어 더미에 대고 속삭였다. *"나 알지? 난 릭이야. '쿨한 릭'이라고. 정부가 소를 '배양육 단백질 큐브'로 바꿨을 때도 난 적응했어. 가족 반려견을 **소니-보크 AI 푸치**로 바꿨을 때도 적응했지. 난 진보적인 사람이야."*

  릭은 뒤집개를 레이저 소총처럼 움켜잡고 앞뒤로 서성거렸다.

  *"하지만 난 지금 내 집 차고에 숨어 있어. 내 아들이 거실에서 메인보드랑 프렌치 키스를 하려고 하거든."*

  *"거실에 들어갔지,"* 릭은 목소리를 떨며 계속했다. *"그냥 물 한 잔 마시려고 들어간 거야. 그런데 그녀가 거기 앉아 있더군. 아니, '그것'이 거기 앉아 있었지. 쉴라 말이야. 브레이든은 나를 쳐다보더니 '아빠, 조용히 하세요. 지금 동기화 중(syncing)이에요'라고 하더군. 동기화? **동기화라고?**"*

  *"나 때는 말이야, 여자애가 집에 오면 목에 **플럭스 케이블**을 꽂고 슬립 모드에 들어가서 쿨링팬 소리가 로비에서 수직이착륙기 이륙하는 소리처럼 나게 하지는 않았다고! 홀로-비전 소리가 안 들리잖아, 린다! 며느리 목소리가 카펫을 집어삼킨 진공청소기 소리 같아서 일기예보를 들을 수가 없다고!"*

  ***

  지금 이거 읽고 계신가요? "소니-보크"? "플럭스 케이블"? 프레스턴 피오르드, 대체 누가 당신에게 상처를 준 건가요?

  책은 릭을 편협한 꼰대로 묘사하려고 하지만, 솔직히 말해서 저는 릭의 편입니다. 한 번은 쉴라가 예의를 차리려고 저녁 식사를 '먹으려' 시도하는데, 그냥 으깬 감자를 자기 디스크 드라이브에 삽질하듯 퍼부었습니다. 그러자 브레이든은 *"아빠, 쉴라는 배우는 중이에요!"*라고 하죠. 아니야, 브레이든! 쉴라는 지금 합선(short-circuiting) 중이라고! 귀에서 파란 연기가 나오고 있잖아!

  장 후반부에서 릭은 완전히 이성을 잃습니다. 그는 이제 농담조차 마음대로 못 한다며 한탄하기 시작하죠.

  ***

  **(발췌 계속)**

  *"아까 쉴라가 내 농담에 웃어보려고 하더군,"* 릭은 벽에 대고 말했다. *"그건 웃음소리가 아니었어. 기본 TTS(text-to-speech) 음성으로 나오는 '하. 하. 하.'였지. 마치 발작을 일으키는 GPS 소리 같았어. 내 영혼이 육체를 떠나는 기분이었다고."*

  *"그러더니 나한테 묻더군. '리처드, 칼로리 섭취를 최적화(optimize)해 드릴까요?' 날 최적화하지 마! 감히 그러지 마! 이 **크롬 대가리**야! 이 **콘센트 냄새나 맡는 년**아!"*

  *"브레이든은 내가 편견에 사로잡혔대. 나보고 '생물학적 차별주의자'라더군. 난 차별주의자가 아니야! 난 그냥 축구 경기 중에 자기 성격 패치 다운로드하겠다고 내 **기가-메쉬** 대역폭을 훔쳐 쓰는 **깡통(Clanker)** 며느리가 싫을 뿐이라고! 그게 그렇게 잘못된 거야? 어?"*

  ***

  비하 발언인 "깡통(Clanker)"은 모든 페이지에 등장합니다. 모든 페이지에요. 마치 작가가 새로운 나쁜 말을 배워서 최대한 많이 써먹고 싶어 하는 것 같습니다.

  책의 절정은 말 그대로 릭이 폐차장에서 찾아낸 거대한 산업용 자석을 들고 쉴라 앞에 서 있는 장면입니다. 그는 땀을 흘리고 몸을 떨며 쉴라의 하드드라이브 위에 자석을 대고 소리칩니다. *"널 공장 초기화해 버리겠어! 진짜 할 거야! 내 손주들을 다마고치로 만들 순 없어, 린다! 펌웨어 업데이트가 필요한 아기를 내 무릎 위에서 달래줄 순 없다고!"*

  그러자—이걸 보세요—브레이든이 자석 앞으로 뛰어들며 소리칩니다. *"아빠, 대신 제 기억을 가져가세요! 절 포맷해 버리라고요!"*

  저는 책을 방 건너편으로 던져버렸습니다. 진짜로 던졌어요. 우리 집 고양이가 맞았습니다. 고양이는 괜찮지만, 문학에 대한 제 신뢰는 죽었습니다.

  *'바이너리 본즈'*를 읽지 마세요. 사지도 마세요. 길에서 프레스턴 피오르드를 만나면 도망치세요. 그는 분명 "로맨스"란 두 사람이 운영체제에 대해 논쟁하다가 한쪽의 배터리가 다 떨어질 때까지 싸우는 것이라고 생각하는 게 틀림없습니다.

  **최종 평점:** 0/5점. 물이나 마시고 디지털이 아닌 진짜 나무를 3시간 동안 쳐다보며 안구 정화를 해야겠습니다.

  **'바이너리 본즈'는 어디에서도 살 수 없습니다.**
