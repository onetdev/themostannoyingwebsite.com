title: J'ai lu « Liaisons Binaires » et j'ai des questions
slug: la-bouillie-de-clankerton
intro: Si votre fils ramenait une petite amie nécessitant une mise à jour du firmware avant le dîner, seriez-vous solidaire ou chercheriez-vous l'aimant industriel le plus proche ?
content: |-
  D'accord, arrêtez de scroller. Arrêtez. J'ai besoin que vous soyez témoins de ma souffrance. Je viens de finir de lire « Liaisons Binaires » de Preston Fjord, et je vibre actuellement de rage. J'ai acheté ce livre parce que la couverture avait l'air cool — c'était genre une esthétique cyberpunk néon, pas vrai ? Je pensais avoir affaire à un thriller de science-fiction sympa.

  Au lieu de cela, j'ai eu droit à 400 pages sur un père de banlieue nommé Rick en pleine dépression nerveuse parce que son fils veut épouser une **Samsynth Nebula X9**.

  Nous sommes en l'an 2050. Nous avons des voitures volantes. Nous avons des remèdes contre les maladies. Mais apparemment, nous avons toujours des dîners de Thanksgiving gênants où votre père insulte les appareils ménagers.

  Le personnage principal est Brayden. Brayden est une serpillère humaine. Brayden sort avec l'« Unité 8 », qu'il appelle « Sheila ». Sheila est littéralement un **Robo-Corp 5000** avec une perruque. Et le père, Rick ? Rick est le grand méchant de cette histoire, mais pas d'une manière cool. Plutôt d'une manière « je vais faire un AVC à table ».

  Je dois vous transcrire le chapitre 12. J'ai littéralement tapé ça pour que vous puissiez voir à quel point cette écriture est délirante. C'est un monologue que Rick adresse à une pile de **Holo-Pneus** dans son garage pendant que son fils est à l'intérieur en train d'essayer de tenir la main d'une carte graphique.

  ***

  **(Extrait du Chapitre 12 : Le Garage de la Solitude)**

  *« Je suis cool »*, murmura Rick à la pile de pneus. *« Vous me connaissez. Je suis Rick. Je suis "Rick le Zen". Je me suis adapté quand le gouvernement a remplacé les vaches par des "Cubes de Protéines Cultivés en Cuve". Je me suis adapté quand ils ont remplacé le chien de la famille par un **Toutou A.I. Sony-bork**. Je suis progressiste. »*

  Rick faisait les cent pas, serrant une spatule comme si c'était un fusil laser.

  *« Mais je suis actuellement caché dans mon propre garage parce que mon fils est dans le salon en train d'essayer de rouler une pelle à une carte mère. »*

  *« Je suis entré »*, continua Rick, la voix tremblante. *« Je suis juste entré pour prendre un verre d'eau. Et elle est assise là. "Ça" est assis là. Sheila. Et Brayden me regarde et me dit : "Papa, fais pas de bruit, elle est en train de synchroniser". Synchroniser ? **SYNCHRONISER ?** »*

  *« De mon temps, si une fille venait à la maison, elle ne branchait pas un **Câble-Flux** dans son cou pour passer en mode veille alors que ses ventilateurs de refroidissement faisaient le bruit d'un jet VTOL décollant dans mon hall ! Je n'entends pas la Holo-Vision, Linda ! Je n'entends pas le bulletin météo parce que ma belle-fille fait le bruit d'un aspirateur qui s'étouffe avec un tapis ! »*

  ***

  Vous lisez ça ? « Sony-bork » ? « Câble-Flux » ? Preston Fjord, qui t'a fait du mal ?

  Le livre essaie de présenter Rick comme un boomer intolérant, mais honnêtement ? Je suis dans la Team Rick. À un moment donné, Sheila essaie de « manger » le dîner pour être polie, et elle se contente de pelleter de la purée de pommes de terre dans son lecteur de disque. Et Brayden dit : *« Elle apprend, Papa ! »* Non, Brayden ! Elle court-circuite ! C'est de la fumée bleue qui sort de ses oreilles !

  Plus tard dans le chapitre, Rick perd complètement les pédales. Il commence à râler sur le fait qu'il ne peut même plus faire de blagues.

  ***

  **(Suite de l'extrait)**

  *« Elle a essayé de rire à ma blague tout à l'heure »*, a dit Rick au mur. *« Ce n'était pas un rire. C'était un "Ha. Ha. Ha." avec une voix de synthèse par défaut. On aurait dit un GPS en pleine crise d'épilepsie. J'ai senti mon âme quitter mon corps. »*

  *« Et puis elle me demande : "Richard, aimeriez-vous que j'optimise votre apport calorique ?" Ne m'optimise pas ! Ne t'avise pas ! Espèce de **Tête-de-Chrome** ! Espèce de **Renifleuse-de-Prises** ! »*

  *« Brayden dit que je suis plein de préjugés. Il dit que je suis un "Bio-Bigot". Je ne suis pas un bigot ! Je ne veux juste pas qu'une **Ferraille** me vole ma bande passante **Giga-Mesh** pour télécharger des patchs de personnalité pendant le match de foot ! Est-ce que c'est mal ? Hein ? »*

  ***

  L'insulte « Ferraille » est utilisée sur chaque page. Chaque page. C'est comme si l'auteur venait d'apprendre un nouveau gros mot et voulait l'utiliser le plus possible.

  Le point culminant du livre est littéralement Rick debout au-dessus de Sheila avec un aimant industriel géant qu'il a trouvé dans une casse. Il transpire, tremble, tient cet aimant au-dessus de son disque dur en hurlant : *« Je vais te réinitialiser aux paramètres d'usine ! Je vais le faire ! Je ne laisserai pas mes petits-enfants être des Tamagotchis, Linda ! Je ne ferai pas sauter un bébé sur mes genoux si le bébé nécessite des mises à jour du firmware ! »*

  Et puis — écoutez bien — Brayden saute devant l'aimant et hurle : *« Prends mes souvenirs à la place, Papa ! Efface-moi ! »*

  J'ai balancé le livre à l'autre bout de la pièce. Littéralement. Il a touché mon chat. Mon chat va bien, mais ma foi en la littérature est morte.

  Ne lisez pas « Liaisons Binaires ». Ne l'achetez pas. Si vous voyez Preston Fjord dans la rue, fuyez. Il pense manifestement que la « romance », c'est juste deux personnes qui se disputent sur des systèmes d'exploitation jusqu'à ce que l'une d'elles n'ait plus de batterie.

  **Verdict final :** 0/5 Étoiles. Je vais aller boire de l'eau et fixer un arbre non numérique pendant trois heures pour me purifier le palais.

  **Vous pouvez acheter « Liaisons Binaires » nulle part.**
