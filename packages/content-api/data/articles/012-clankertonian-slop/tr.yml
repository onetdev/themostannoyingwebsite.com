title: '"Binary Bonds" Kitabını Okudum ve Sorularım Var'
slug: binary-bonds-kitabini-okudum-ve-sorularim-var
intro: Eğer oğlunuz eve akşam yemeğinden önce donanım güncellemesi (firmware update) gereken bir kız arkadaş getirseydi, ona destek mi olurdunuz yoksa en yakındaki sanayi tipi mıknatısa mı sarılırdınız?
content: |-
  Tamam, kaydırmayı bırakın. Durun. Acıma tanıklık etmenize ihtiyacım var. Preston Fjord'un *"Binary Bonds"* (İkili Bağlar) kitabını az önce bitirdim ve şu an öfkeden titriyorum. Bu kitabı kapağı havalı göründüğü için almıştım —hani şu neon siberpunk estetiği olur ya, tam ondan. Havalı bir bilimkurgu gerilimi okuyacağımı sanmıştım.

  Bunun yerine, oğlu bir **Samsynth Nebula X9** ile evlenmek istediği için sinir krizi geçiren Rick adında banliyöde yaşayan bir babanın 400 sayfalık hikayesini okudum.

  Yıl 2050. Uçan arabalarımız var. Hastalıkların tedavisi var. Ama görünüşe göre, babanızın mutfak aletlerine hakaretler yağdırdığı o tuhaf Şükran Günü yemekleri hala var.

  Ana karakter Brayden. Brayden, bir insanın olabileceği kadar sünepe biri. Brayden, "Sheila" adını verdiği "Unit 8" (Birim 8) ile çıkıyor. Sheila resmen peruk takılmış bir **Robo-Corp 5000**. Ya baba Rick? Rick bu hikayenin baş kötüsü ama havalı bir şekilde değil. "Yemek masasında felç geçireceğim" der gibi bir hali var.

  Bölüm 12'yi sizin için yazıya dökmek zorundayım. Bu yazımın ne kadar çılgınca olduğunu görmeniz için bunu harfiyen yazdım. Bu, oğlu içeride bir ekran kartıyla el ele tutuşmaya çalışırken Rick'in garajındaki bir yığın **Holo-Lastik**'e karşı yaptığı tirat.

  ***

  **(Bölüm 12'den Alıntı: Yalnızlık Garajı)**

  *"Ben havalı biriyim,"* diye fısıldadı Rick lastik yığınına. *"Beni tanırsın. Ben Rick. Ben 'Rahat Rick'im. Hükümet ineklerin yerine 'Laboratuvarda Yetiştirilen Protein Küpleri'ni koyduğunda uyum sağladım. Aile köpeğinin yerine bir **Sony-bork Yapay Zeka Köpeği** koyduklarında uyum sağladım. Ben ilericiyim."*

  Rick, sanki bir lazer tüfeğiymiş gibi elindeki spatulaya sarılarak bir ileri bir geri yürüdü.

  *"Ama şu an kendi garajımda saklanıyorum çünkü oğlum oturma odasında bir anakartı Fransız öpücüğüyle öpmeye çalışıyor."*

  *"İçeri girdim,"* diye devam etti Rick, sesi titreyerek. *"Sadece bir bardak su almak için içeri girmiştim. Ve o orada oturuyor. O şey orada oturuyor. Sheila. Ve Brayden bana bakıp, 'Baba sessiz ol, o şu an senkronize oluyor (syncing),' diyor. Senkronize mi oluyor? **SENKRONİZE Mİ?**"*

  *"Benim zamanımda, bir kız eve geldiğinde boynuna bir **Flux-Kablosu** takıp, soğutma fanları antremde kalkan bir jet uçağı gibi ses çıkarırken uyku moduna geçmezdi! Holo-Vizyonu duyamıyorum Linda! Hava durumunu duyamıyorum çünkü gelinim halıya takılmış bir elektrik süpürgesi gibi ses çıkarıyor!"*

  ***

  Bunu okuyor musunuz? "Sony-bork"? "Flux-Kablosu"? Preston Fjord, kim seni bu kadar incitti?

  Kitap, Rick'i hoşgörüsüz bir "boomer" olarak göstermeye çalışıyor ama dürüst olmak gerekirse? Ben Rick'in tarafındayım. Bir noktada Sheila kibarlık olsun diye akşam yemeğini "yemeye" çalışıyor ve patates püresini resmen disk sürücüsüne kürekle dolduruyor. Brayden da, *"Öğreniyor baba!"* diyor. Hayır Brayden! Kısa devre yapıyor! Kulaklarından çıkan o şey mavi duman!

  Bölümün ilerleyen kısımlarında Rick tamamen kontrolü kaybediyor. Artık şaka bile yapamadığından dert yanmaya başlıyor.

  ***

  **(Alıntının devamı)**

  *"Az önce şakama gülmeye çalıştı,"* dedi Rick duvara. *"O bir gülüş değildi. Varsayılan bir metin okuma sesiyle 'Ha. Ha. Ha.' idi. Nöbet geçiren bir GPS gibi geliyordu kulağa. Ruhumun bedenimi terk ettiğini hissettim."*

  *"Ve sonra bana soruyor: 'Richard, kalori alımınızı optimize etmemi ister misiniz?' Beni optimize etme! Sakın cüret etme! Seni **Krom Kafa**! Seni **Soket Koklayıcı**!"*

  *"Brayden ön yargılı olduğumu söylüyor. Bana 'Biyo-Bağnaz' (Bio-Bigot) diyor. Bağnaz değilim! Sadece bir **Clanker**'ın (Teneke) futbol maçı sırasında kişilik yamaları indirmek için **Giga-Mesh** bant genişliğimi çalmasını istemiyorum! Bu çok mu yanlış? Öyle mi?"*

  ***

  "Clanker" hakareti her bir sayfada kullanılıyor. İstisnasız her sayfada. Sanki yazar yeni bir küfür öğrenmiş ve bunu olabildiğince çok kullanmak istemiş gibi.

  Kitabın doruk noktası resmen Rick'in, bir hurdalıkta bulduğu devasa bir sanayi mıknatısıyla Sheila'nın başında dikilmesi. Terliyor, titriyor, mıknatısı onun sabit diskinin üzerinde tutuyor ve bağırıyor: *"Seni fabrika ayarlarına döndüreceğim! Yapacağım bunu! Torunlarımın birer Tamagotchi olmasına izin vermeyeceğim Linda! Eğer bebek donanım güncellemesi gerektiriyorsa o bebeği dizimde zıplatmam!"*

  Ve sonra —şuna bakın— Brayden mıknatısın önüne atlıyor ve bağırıyor: *"Onun yerine benim anılarımı al baba! Beni sil!"*

  Kitabı odanın diğer ucuna fırlattım. Resmen fırlattım. Kedime çarptı. Kedim iyi ama edebiyata olan inancım öldü.

  *"Binary Bonds"* kitabını okumayın. Satın almayın. Sokakta Preston Fjord'u görürseniz kaçın. Belli ki o, "romantizmin" sadece iki kişinin birinin şarjı bitene kadar işletim sistemleri hakkında tartışması olduğunu sanıyor.

  **Son Karar:** 5 üzerinden 0 Yıldız. Gidip su içeceğim ve damağımı temizlemek için üç saat boyunca dijital olmayan bir ağaca bakacağım.

  **"Binary Bonds" kitabını hiçbir yerden satın alamazsınız.**
