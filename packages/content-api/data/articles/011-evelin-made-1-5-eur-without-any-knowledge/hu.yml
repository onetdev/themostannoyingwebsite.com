title: El sem fogod hinni, milyen egyszerű pénzt keresni ezzel a módszerrel
slug: el-sem-fogod-hinni-milyen-egyszeru-penzt-keresni-ezzel-a-modszerrel
intro: Tavaly 1,5 eurót keresett ezzel a módszerrel diploma, tapasztalat és heti mindössze 4 óra munka nélkül
content: |-
  Ismerje meg a 32 éves Evelint, egy részidős valamit valahonnan Európából (úgy gondoljuk?), aki sokkolta barátait és mélyen összezavarta a szakértőket azzal, hogy egy egész pénzügyi év alatt megdöbbentő 1,50 eurót termelt – mindenféle formális képzés, releváns tudás vagy észrevehető erőfeszítés nélkül.

  > „Csak úgy... megcsináltam” – mondja, miközben kétértelműen kortyolgat egy langyos zabtejes lattét.

  A módszer (fajta)

  Evelin áttörése egy esős márciusi (vagy esetleg szeptemberi) kedden következett be, amikor véletlenül regisztrált valaminek az ingyenes próbaverziójára, amire már nem emlékszik, és elfelejtette lemondani. Valahol e között és aközött, hogy feladott magának egy borítékot „kísérletképpen”, 1,50 euró jelent meg a bankszámláján.

  De az igazi poén?

  > „Csak heti négy órát dolgoztam. Nem ezen, csak... úgy általában” – tisztázta haszontalan módon.

  Megpróbáltuk követni a keresetének nyomát, de a következőkbe ütköztünk:

  - Egy hibás Etsy link
  - Egy Google Doc „NE NYISD KI” felirattal
  - Egy lejárt domain: jabadabadudbidoo.zone

  Számos táblázattal később felfedeztük, hogy az 1,50 euró talán egy régi Tumblr posztba ágyazott partnerlinkből származhat, amelynek címe *„Hogyan monetizáld az aurádat”*, de az egy YouTube videóra irányít át, ahol egy srác egy fészerben mágnesekről suttog.

  ## A titkos összetevő

  Hogyan csinálta tehát?

  > „Szemléletmód (mindset)” – mondja Evelin magabiztosan, mielőtt eltűnik egy közösségi irodában, ahol úgy tűnik, nincs Wi-Fi.

  A kritikusok azzal érvelnek, hogy a „módszere” sem nem skálázható, sem nem megismételhető, és technikailag talán nem is módszer. De hírlevelének, a **„Félig-Passzív Életmód Kivonatnak”** követői állítják, hogy olyan módon változtatta meg az életüket, amit nem tudnak teljesen megfogalmazni.

  > „Én még nem kerestem 1,50 eurót” – mondja @EnergeticGhost420 követő –, „de az biztos, hogy 1,50 eurónyi motivációt már éreztem.”

  A tanulság

  Bár nem világos, hogy Evelin valójában csinált-e bármit is, és a pénz technikailag talán visszatérítés volt valami teljesen másért, a története bizonyíték arra, hogy nincs szükséged tapasztalatra, végzettségre vagy eredményekre ahhoz, hogy másokat inspirálj.

  Hogy mit fog legközelebb csinálni?

  > „Átállok a kvantum-gig munkára” – mondja. „Nem tudom elmagyarázni. De nagy dobás lesz.”
