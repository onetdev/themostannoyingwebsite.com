title: Non crederete quanto sia facile fare soldi con questo metodo
slug: non-crederete-quanto-sia-facile-fare-soldi
intro: Ha guadagnato 1,50 € l'anno scorso facendo questo senza laurea, senza esperienza e con solo 4 ore a settimana
content: |-
  Vi presentiamo Evelin, 32 anni, una lavoratrice part-time di qualcosa da qualche parte in Europa (crediamo?), che ha scioccato gli amici e confuso profondamente gli esperti generando la sbalorditiva cifra di 1,50 € nel corso di un intero anno fiscale — senza alcuna formazione formale, conoscenza pertinente o sforzo distinguibile.

  > "L'ho fatto e basta...", dice, sorseggiando ambiguamente un caffellatte tiepido al latte d'avena.

  Il Metodo (quasi)

  La svolta di Evelin è arrivata un piovoso martedì di marzo (o forse settembre), quando si è iscritta accidentalmente a una prova gratuita di qualcosa che non riesce a ricordare e si è dimenticata di cancellarla. Tra questo e l'invio di una busta a se stessa come "esperimento", nel suo conto bancario sono apparsi 1,50 €.

  Ma il vero colpo di scena?

  > "Ho lavorato solo quattro ore a settimana. Non su questo, solo... in generale", ha chiarito in modo poco utile.

  Abbiamo cercato di seguire la traccia dei suoi guadagni, ma ci siamo imbattuti in:

  - Un link Etsy rotto
  - Un documento Google con l'etichetta "NON APRIRE"
  - Un dominio scaduto: jabadabadudbidoo.zone

  Diversi fogli di calcolo dopo, abbiamo scoperto che gli 1,50 € potrebbero provenire da un link di affiliazione inserito in un vecchio post di Tumblr intitolato *"Come monetizzare la tua aura"*, ma rimanda a un video YouTube di un tizio che sussurra di magneti in un capanno.

  ## L'ingrediente segreto

  Quindi, come ha fatto?

  > "Mentalità", dice Evelin con sicurezza, prima di scomparire in uno spazio di coworking che non sembra avere il Wi-Fi.

  I critici sostengono che il suo "metodo" non sia né scalabile né replicabile, e che tecnicamente potrebbe non essere affatto un metodo. Ma gli iscritti alla sua newsletter, **"The Semi-Passive Lifestyle Digest"**, insistono sul fatto che abbia cambiato le loro vite in modi che non riescono a articolare pienamente.

  > "Non ho ancora guadagnato 1,50 €", dice il follower @EnergeticGhost420, "ma ho sicuramente sentito una motivazione del valore di 1,50 €".

  La lezione

  Sebbene non sia chiaro se Evelin abbia effettivamente fatto qualcosa, e i soldi potrebbero tecnicamente essere stati un rimborso per qualcos'altro del tutto diverso, la sua storia è la prova che non c'è bisogno di esperienza, istruzione o risultati per ispirare gli altri.

  E per quanto riguarda ciò che farà dopo?

  > "Mi sto spostando verso il lavoro quantistico", dice. "Non posso spiegarlo. Ma è una cosa grande".
