title: Nie uwierzysz, jak łatwo zarobić pieniądze tą metodą
slug: nie-uwierzysz-jak-latwo-zarobic-pieniadze-ta-metoda
intro: Zarobiła 1,50 EUR w zeszłym roku, robiąc to bez dyplomu, bez doświadczenia i pracując tylko 4 godziny tygodniowo
content: |-
  Poznajcie Evelin, 32 lata, pracującą na pół etatu jako coś-tam gdzieś-tam w Europie (tak nam się wydaje?), która zszokowała przyjaciół i głęboko skonsternowała ekspertów, generując oszałamiającą kwotę 1,50 EUR w ciągu całego roku fiskalnego — bez żadnego formalnego przeszkolenia, odpowiedniej wiedzy czy zauważalnego wysiłku.

  > „Po prostu jakoś… to zrobiłam”, mówi, niejednoznacznie popijając letnią latte na mleku owsianym.

  Metoda (Mniej Więcej)

  Przełom u Evelin nastąpił w pewien deszczowy wtorek w marcu (lub ewentualnie we wrześniu), kiedy przypadkowo zapisała się na bezpłatny okres próbny czegoś, czego nie pamięta, i zapomniała go anulować. Gdzieś pomiędzy tym a wysłaniem koperty do samej siebie w ramach „eksperymentu”, na jej koncie bankowym pojawiło się 1,50 EUR.

  Ale co jest w tym najlepsze?

  > „Pracowałam tylko cztery godziny tygodniowo. Nie nad tym, po prostu… ogólnie”, wyjaśniła mało pomocnie.

  Próbowaliśmy prześledzić drogę jej zarobków, ale natrafiliśmy na:

  - Niedziałający link do Etsy
  - Dokument Google zatytułowany „NIE OTWIERAĆ”
  - Wygasłą domenę: jabadabadudbidoo.zone

  Kilka arkuszy kalkulacyjnych później odkryliśmy, że 1,50 EUR mogło pochodzić z linku polecającego osadzonego w starym poście na Tumblrze zatytułowanym *„Jak monetyzować swoją aurę”*, ale przekierowuje on do wideo na YouTube, na którym facet szepcze o magnesach w szopie.

  ## Tajny Składnik

  Jak więc ona to zrobiła?

  > „Mindset”, mówi pewnie Evelin, po czym znika w przestrzeni coworkingowej, która zdaje się nie mieć Wi-Fi.

  Krytycy argumentują, że jej „metoda” nie jest ani skalowalna, ani powtarzalna, i technicznie rzecz biorąc, może wcale nie być metodą. Jednak czytelnicy jej newslettera, **„The Semi-Passive Lifestyle Digest”**, upierają się, że zmieniło to ich życie w sposób, którego nie potrafią w pełni wyartykułować.

  > „Nie zarobiłem jeszcze 1,50 EUR”, mówi obserwujący @EnergeticGhost420, „ale zdecydowanie poczułem motywację wartą 1,50 EUR”.

  Wnioski

  Choć nie jest jasne, czy Evelin faktycznie cokolwiek zrobiła, a pieniądze mogły być technicznie zwrotem za coś zupełnie innego, jej historia jest dowodem na to, że nie potrzebujesz doświadczenia, wykształcenia ani wyników, by inspirować innych.

  A co zrobi dalej?

  > „Przerzucam się na kwantową pracę dorywczą (gig work)”, mówi. „Nie potrafię tego wyjaśnić. Ale to będzie coś wielkiego”.
