title: Вы не поверите, как легко зарабатывать деньги этим методом
slug: vy-ne-poverite-kak-legko-zarabatyvat-dengi-etim-metodom
intro: Она заработала 1,5 евро в прошлом году, делая это без диплома, без опыта и уделяя всего 4 часа в неделю
content: |-
  Познакомьтесь с Эвелин, 32 года, кем-то работающей на полставки где-то в Европе (кажется?), которая шокировала друзей и глубоко запутала экспертов, заработав ошеломляющие 1,50 евро в течение целого финансового года — без какого-либо формального обучения, соответствующих знаний или видимых усилий.

  > «Я просто типа… сделала это», — говорит она, неопределенно попивая едва теплый латте на овсяном молоке.

  Метод (вроде того)

  Прорыв Эвелин случился в дождливый вторник в марте (или, возможно, в сентябре), когда она случайно подписалась на пробную версию чего-то, чего уже не помнит, и забыла её отменить. Где-то между этим и отправкой конверта самой себе в качестве «эксперимента», на её банковском счету появились 1,50 евро.

  Но самое интересное?

  > «Я работала всего четыре часа в неделю. Не над этим, а… вообще», — пояснила она, не внеся никакой ясности.

  Мы попытались проследить путь её заработка, но наткнулись на:

  - Нерабочую ссылку на Etsy
  - Google-документ с пометкой «НЕ ОТКРЫВАТЬ»
  - Просроченный домен: jabadabadudbidoo.zone

  Спустя несколько электронных таблиц мы обнаружили, что эти 1,50 евро могли поступить по реферальной ссылке, вставленной в старый пост на Tumblr под названием *«Как монетизировать свою ауру»*, но она перенаправляет на YouTube-видео, где какой-то парень шепчет про магниты в сарае.

  ## Секретный ингредиент

  Так как же она это сделала?

  > «Мышление», — уверенно говорит Эвелин, прежде чем исчезнуть в коворкинге, где, похоже, нет Wi-Fi.

  Критики утверждают, что её «метод» не является ни масштабируемым, ни воспроизводимым, и, технически, может вообще не быть методом. Но подписчики её рассылки **«Дайджест полупассивного образа жизни»** настаивают, что это изменило их жизнь так, как они не могут полностью выразить словами.

  > «Я еще не заработал 1,50 евро, — говорит подписчик @EnergeticGhost420, — но я определенно почувствовал мотивацию на все полтора евро».

  Итог

  Хотя неясно, сделала ли Эвелин хоть что-то на самом деле, а деньги могли технически быть возвратом за что-то совсем другое, её история — доказательство того, что вам не нужны опыт, образование или результаты, чтобы вдохновлять других.

  Что же она предпримет дальше?

  > «Я перехожу на квантовую гиг-экономику», — говорит она. «Я не могу это объяснить. Но это нечто грандиозное».
