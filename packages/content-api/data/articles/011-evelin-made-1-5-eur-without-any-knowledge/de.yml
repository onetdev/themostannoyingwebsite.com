title: Sie werden nicht glauben, wie einfach man mit dieser Methode Geld verdient
slug: evelin-verdiente-1-5-eur-ohne-vorkenntnisse
intro: Sie verdiente letztes Jahr 1,50 EUR mit dieser Methode – ohne Abschluss, ohne Erfahrung und mit nur 4 Stunden pro Woche
content: |-
  Lernen Sie Evelin kennen, 32, eine Teilzeit-Etwas aus irgendwo in Europa (glauben wir?), die Freunde schockierte und Experten zutiefst verwirrte, indem sie im Laufe eines gesamten Geschäftsjahres sage und schreibe 1,50 € generierte – ohne formale Ausbildung, relevantes Wissen oder erkennbare Anstrengung.

  > „Ich habe es einfach irgendwie… gemacht“, sagt sie und nippt vielsagend an einem lauwarmen Hafermilch-Latte.

  Die Methode (sozusagen)

  Evelins Durchbruch kam an einem regnerischen Dienstag im März (oder möglicherweise September), als sie sich versehentlich für ein kostenloses Probeabo von etwas anmeldete, an das sie sich nicht erinnern kann, und vergaß, es zu kündigen. Irgendwo zwischen dem und dem Verschicken eines Umschlags an sich selbst als „Experiment“ erschienen 1,50 € auf ihrem Bankkonto.

  Aber der eigentliche Clou?

  > „Ich habe nur vier Stunden pro Woche gearbeitet. Nicht an diesem Projekt, sondern… im Allgemeinen“, stellte sie wenig hilfreich klar.

  Wir versuchten, der Spur ihrer Einnahmen zu folgen, stießen aber auf:

  - Einen defekten Etsy-Link
  - Ein Google Doc mit der Aufschrift „NICHT ÖFFNEN“
  - Eine abgelaufene Domain: jabadabadudbidoo.zone

  Mehrere Tabellenkalkulationen später entdeckten wir, dass die 1,50 € möglicherweise von einem Affiliate-Link stammen, der in einem alten Tumblr-Post mit dem Titel *„Wie du deine Aura monetarisierst“* eingebettet war, aber dieser leitet zu einem YouTube-Video weiter, in dem ein Typ in einem Schuppen über Magnete flüstert.

  ## Die Geheimzutat

  Wie hat sie es also gemacht?

  > „Mindset“, sagt Evelin selbstbewusst, bevor sie in einem Coworking-Space verschwindet, der anscheinend kein WLAN hat.

  Kritiker argumentieren, dass ihre „Methode“ weder skalierbar noch reproduzierbar ist und technisch gesehen vielleicht gar keine Methode ist. Aber die Abonnenten ihres Newsletters **„The Semi-Passive Lifestyle Digest“** beteuern, dass er ihr Leben auf eine Weise verändert hat, die sie nicht ganz in Worte fassen können.

  > „Ich habe zwar noch keine 1,50 € verdient“, sagt Follower @EnergeticGhost420, „aber ich habe definitiv die Motivation im Wert von 1,50 € gespürt.“

  Das Fazit

  Obwohl unklar ist, ob Evelin tatsächlich etwas getan hat, und das Geld technisch gesehen eine Rückerstattung für etwas ganz anderes gewesen sein könnte, ist ihre Geschichte der Beweis dafür, dass man keine Erfahrung, Ausbildung oder Ergebnisse braucht, um andere zu inspirieren.

  Und was sie als Nächstes tun wird?

  > „Ich sattle um auf Quanten-Gig-Work“, sagt sie. „Ich kann es nicht erklären. Aber es wird groß.“
