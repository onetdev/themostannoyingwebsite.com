title: "이 방법으로 돈을 버는 것이 얼마나 쉬운지 믿기지 않으실 겁니다"
slug: "evelin-eun-amu-jisik-eopsi-1-5-yuro-reul-beoreot-seumnida"
intro: "그녀는 작년에 학위도, 경험도 없이 일주일에 단 4시간만 투자해 1.5유로를 벌었습니다"
content: |-
  유럽 어딘가(아마도?)에서 파트타임으로 무언가를 하고 있는 32세의 에블린(Evelin)을 만나보세요. 그녀는 정규 교육이나 관련 지식, 가시적인 노력 없이도 한 회계연도 동안 무려 1.50유로(약 2,200원)를 벌어들여 친구들을 놀라게 하고 전문가들을 깊은 혼란에 빠뜨렸습니다.

  > “그냥 뭐랄까... 했어요,” 그녀는 미지근한 오트 밀크 라떼를 모호하게 홀짝이며 말합니다.

  ## 그 방법 (대충 이런 식)

  에블린의 돌파구는 3월(혹은 9월일 수도 있음)의 어느 비 오는 화요일에 찾아왔습니다. 그녀는 기억도 나지 않는 무언가의 무료 체험에 실수로 가입했고, 취소하는 것을 잊어버렸습니다. 그 일과 자기 자신에게 “실험” 삼아 봉투를 우편으로 보낸 일 사이 어딘가에서, 그녀의 은행 계좌에 1.50유로가 나타났습니다.

  하지만 진짜 놀라운 점은 무엇일까요?

  > “일주일에 4시간만 일했어요. 이 일에 쓴 건 아니고, 그냥... 일반적으로요,” 그녀는 전혀 도움이 되지 않는 설명을 덧붙였습니다.

  우리는 그녀의 수입 경로를 추적하려 했으나, 다음과 같은 장애물에 부딪혔습니다.

  - 깨진 Etsy 링크
  - “열지 마시오”라고 적힌 구글 문서
  - 만료된 도메인: jabadabadudbidoo.zone

  여러 개의 스프레드시트를 검토한 끝에, 우리는 그 1.50유로가 *“당신의 아우라를 수익화하는 방법”*이라는 제목의 오래된 텀블러(Tumblr) 포스트에 삽입된 제휴 링크에서 시작되었을 가능성을 발견했습니다. 하지만 그 링크는 헛간에서 어떤 남자가 자석에 대해 속삭이는 유튜브 영상으로 리디렉션됩니다.

  ## 비결

  그녀는 대체 어떻게 한 걸까요?

  > “마인드셋(Mindset),” 에블린은 자신 있게 말하고는 와이파이가 없는 것 같은 코워킹 스페이스로 사라졌습니다.

  비판론자들은 그녀의 “방법”이 확장 가능하지도 않고 재현 가능하지도 않으며, 기술적으로는 방법이라고 할 수도 없다고 주장합니다. 하지만 그녀의 뉴스레터 **“반-자동 수익 라이프스타일 요약”**의 구독자들은 이 방법이 자신들의 삶을 말로 다 설명할 수 없는 방식으로 바꾸어 놓았다고 주장합니다.

  > “아직 1.50유로를 벌지는 못했지만,” 구독자 @EnergeticGhost420은 말합니다. “확실히 1.50유로만큼의 동기부여는 느꼈어요.”

  ## 시사점

  에블린이 실제로 무언가를 했는지 여부는 불분명하고, 그 돈은 기술적으로 완전히 다른 무언가에 대한 환불이었을 수도 있지만, 그녀의 이야기는 다른 사람들에게 영감을 주는 데 경험이나 교육, 결과가 필요하지 않다는 증거입니다.

  그녀의 다음 행보는 무엇일까요?

  > “양자 기그 워크(quantum gig work)로 전환하고 있어요,” 그녀가 말합니다. “설명할 순 없지만, 이건 엄청날 거예요.”
