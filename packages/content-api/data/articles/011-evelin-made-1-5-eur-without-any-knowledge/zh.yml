title: 你不会相信用这种方法赚钱有多容易
slug: ai-wei-lin-zai-hao-wu-zhi-shi-de-qing-kuang-xia-zhuan-liao-1-dian-5-ou-yuan
intro: 她去年在没有学位、没有经验且每周只花 4 小时的情况下赚了 1.5 欧元
content: |-
  认识一下艾薇琳，32 岁，一个来自欧洲某地（我们猜的？）的兼职某职业者。她在整整一个财年里赚到了惊人的 1.50 欧元，这震惊了她的朋友，并让专家们深感困惑——而且她没有任何正式培训、相关知识，甚至没看出费了什么劲。

  > “我只是……就这么做了，”她含糊其辞地说道，抿了一口温吞的燕麦奶拿铁。

  ## 这种方法（算是吧）

  艾薇琳的突破发生在 3 月（或者可能是 9 月）的一个阴雨绵绵的周二，当时她意外注册了一个她已经记不清名字的产品免费试用，并且忘了取消。就在这和给自己寄信当做“实验”之间，她的银行账户里出现了 1.50 欧元。

  但最令人震撼的部分是？

  > “我每周只工作四小时。不是为了这件事，只是……总共也就这么多，”她毫无帮助地澄清道。

  我们试图追踪她的收入路径，但遇到了：

  - 一个失效的 Etsy 链接
  - 一个标有“切勿打开”的 Google 文档
  - 一个过期的域名：jabadabadudbidoo.zone

  在查阅了几张电子表格后，我们发现这 1.50 欧元可能源自一个嵌入在旧 Tumblr 帖子（标题为 *“如何将你的光环货币化”*）中的联署链接，但该链接重定向到了一个 YouTube 视频，视频中一个男人在棚子里低声谈论磁铁。

  ## 秘密秘诀

  那么她是具体怎么做的呢？

  > “心态，”艾薇琳自信地说，随后消失在一个似乎没有 Wi-Fi 的共享办公空间里。

  批评者认为她的“方法”既不可扩展也不可复制，而且在技术上可能根本称不上是一种方法。但她新闻通讯 **“半被动生活方式摘要”** 的粉丝们坚持认为，这以他们无法完全表达的方式改变了他们的生活。

  > “我还没赚到 1.50 欧元，”粉丝 @EnergeticGhost420 说，“但我绝对感受到了价值 1.50 欧元的动力。”

  ## 启示

  虽然尚不清楚艾薇琳到底做了什么，而且那笔钱在技术上可能完全是另一件事的退款，但她的故事证明了：你不需要经验、教育或结果就能激励他人。

  至于她接下来的计划？

  > “我正在转向量子零工（quantum gig work），”她说。“我没法解释。但那会很大。”
