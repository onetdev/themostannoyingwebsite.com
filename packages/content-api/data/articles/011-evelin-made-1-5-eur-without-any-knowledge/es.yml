title: No creerás lo fácil que es ganar dinero con este método
slug: evelin-made-1-5-eur-without-any-knowledge
intro: Ella ganó 1.5 EUR el año pasado haciendo esto sin título, sin experiencia y solo 4 horas a la semana
content: |-
  Conoce a Evelin, de 32 años, una algo a tiempo parcial de algún lugar de Europa (¿creemos?), que sorprendió a amigos y confundió profundamente a los expertos al generar la asombrosa cantidad de 1,50 € en el transcurso de todo un año fiscal, sin ninguna capacitación formal, conocimiento relevante o esfuerzo perceptible.

  > "Simplemente... lo hice", dice ella, bebiendo ambiguamente un café con leche de avena tibio.

  El Método (Más o menos)

  El avance de Evelin llegó un martes lluvioso de marzo (o posiblemente septiembre), cuando accidentalmente se inscribió en una prueba gratuita de algo que no puede recordar y olvidó cancelarla. En algún lugar entre eso y enviarse un sobre a sí misma como un "experimento", aparecieron 1,50 € en su cuenta bancaria.

  ¿Pero el verdadero golpe?

  > "Solo trabajaba cuatro horas a la semana. No en esto, solo... en general", aclaró inútilmente.

  Intentamos seguir el rastro de sus ganancias, pero nos encontramos con:

  - Un enlace de Etsy roto
  - Un documento de Google etiquetado "NO ABRIR"
  - Un dominio caducado: jabadabadudbidoo.zone

  Varias hojas de cálculo después, descubrimos que los 1,50 € pueden haberse originado a partir de un enlace de afiliado incrustado en una antigua publicación de Tumblr titulada *"Cómo monetizar tu aura"*, pero redirige a un video de YouTube de un tipo susurrando sobre imanes en un cobertizo.

  ## La salsa secreta

  Entonces, ¿cómo lo hizo?

  > "Mentalidad", dice Evelin con confianza, antes de desaparecer en un espacio de coworking que no parece tener Wi-Fi.

  Los críticos argumentan que su "método" no es escalable ni replicable, y puede que técnicamente no sea un método. Pero los seguidores de su boletín, **"The Semi-Passive Lifestyle Digest"**, insisten en que ha cambiado sus vidas de maneras que no pueden articular completamente.

  > "Todavía no he ganado 1,50 €", dice el seguidor @EnergeticGhost420, "pero definitivamente he sentido el valor de 1,50 € en motivación".

  La conclusión

  Si bien no está claro si Evelin realmente hizo algo, y el dinero puede haber sido técnicamente un reembolso por otra cosa completamente diferente, su historia es una prueba de que no necesitas experiencia, educación o resultados para inspirar a otros.

  ¿En cuanto a lo que hará a continuación?

  > "Estoy pivotando hacia el trabajo cuántico", dice. "No puedo explicarlo. Pero es grande".
