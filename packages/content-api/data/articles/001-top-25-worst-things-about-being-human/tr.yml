title: İnsan olmanın en kötü 25 yanı
slug: insan-olmanin-en-kotu-25-yani
intro: Diğer insanları varlıkları konusunda neyin bu kadar çileden çıkardığına inanamayacaksınız.
content: |-
  Hayatın küçük can sıkıntıları herkesi delirtmeye yeter. Çorapla ıslak bir yere mi bastınız? Anında öfke patlaması. Peki ya sürekli yüzünüze sürtünen ama bir türlü yakalayamadığınız o saç teli? Sinir bozucu! Bir de tam ulaşılamayacak bir yere yuvarlanan ve koltuğun altından sizinle alay eden o kalem var; bir de ne kadar sıkı düğümlerseniz düğümleyin bağlandığı gibi durmayan ayakkabı bağcıklarına hiç girmeyelim. Bir etiketi soyarken geride o yapışkan kalıntının kalması? Tam bir eziyet. Ve ellerinizi yıkarken kolunuzun suya girmesi—sahiden, bu nasıl olabiliyor? Bu saçma, anlamsız anlar insanı çığlık atmak istetiyor ve normal bir günü bir dizi çileden çıkarıcı, öfke dolu savaşa dönüştürüyor.

  1. Hep orada olan bir mobilya parçasına ayak parmağını çarpmak
  2. Hiçbir zaman yardımcı cevaplar vermeyen müşteri hizmetleri botları
  3. Bir dizinin tam ortasında yayının arabelleğe alınması (buffering)
  4. Telefon şarj cihazınızın sadece çok belirli bir açıda çalışması ve gece boyunca telefonunuzu şarj etmeyip sabah %5 şarjla uyanmanız
  5. Sonsuz kaydırma sayfasını yanlışlıkla yenileyip az önce okuduğunuz gönderiyi sonsuza dek kaybetmek
  6. Ayakkabı bağcığınızın sıktıktan sonra bile sürekli çözülmesi
  7. Yanından geçerken kıyafetlerin kapı kollarına takılması
  8. Bir kalemi düşürüp mobilyaların altında tam ulaşılamayacak bir yere yuvarlanışını izlemek
  9. Keskin olmaması gereken bir şeyden kağıt kesiği almak
  10. Plastik bir poşeti çok sıkı bağlayıp sonra tekrar açmakta zorlanmak
  11. Bir şeyin üzerinden etiketi soymak ve geride o yapışkan kalıntının kalması
  12. Sırtınızda ulaşamadığınız bir yerin kaşınması
  13. Çamaşırda bir çorabın kaybolması ve bir daha asla ortaya çıkmaması
  14. Bant rulosunun ucunu bulamamak
  15. Ellerinizi yıkamaya çalışırken bir kolun aşağı düşmesi
  16. Çorapla ıslak bir yere basmak
  17. Diş fırçalarken kıyafetlerinize diş macunu bulaşması
  18. Tebeşirin tahtaya sürtünme sesi veya benzeri yüzeylerin tırmalanma sesi
  19. Tek bir saç telinin sürekli yüzünüzü gııklaması ama onu bir türlü bulamamanız
  20. Şöyle ki <!-- kasten ortada kesildi, bilerek 25'in altında tutulmaya çalışılıyor -->
