title: Le 25 cose peggiori dell'essere umani
slug: le-25-cose-peggiori-dell-essere-umani
intro: Non crederesti a quanto gli altri esseri umani si arrabbino per la loro esistenza.
content: |-
  Le piccole seccature della vita sono sufficienti a far impazzire chiunque. Calpestare una macchia d'acqua con i calzini? Rabbia istantanea. E quella ciocca di capelli che ti sfiora costantemente il viso ma non si lascia mai afferrare? Infuriante! Poi c'è la penna che rotola appena fuori portata, schernendoti da sotto il divano, e non parliamo dei lacci delle scarpe che rifiutano di stare legati non importa quanto stretti siano i nodi. Staccare un adesivo e ritrovarsi con quel residuo appiccicoso? Pura agonia. E il momento in cui la manica si immerge nell'acqua mentre ti lavi le mani—seriamente, come succede? Questi momenti ridicoli e inutili ti fanno venire voglia di urlare, trasformando una giornata normale in una serie di battaglie esasperanti e cariche di rabbia.

  1. Sbattere il dito del piede su un mobile che è sempre stato lì
  2. Bot del servizio clienti che non danno mai risposte utili
  3. Lo streaming che va in buffering proprio a metà di una scena
  4. Quando il caricabatterie del telefono funziona solo ad un'angolazione molto specifica, e non carica il telefono durante la notte e ti svegli con il 5% di batteria
  5. Aggiornare accidentalmente una pagina a scorrimento infinito e perdere per sempre il post che stavi leggendo
  6. Quando il laccio delle scarpe si slaccia costantemente anche dopo averlo stretto
  7. Vestiti che rimangono impigliati nelle maniglie delle porte mentre passi
  8. Far cadere una penna e guardarla rotolare appena fuori portata sotto un mobile
  9. Tagliarsi con la carta con qualcosa che non dovrebbe essere affilato
  10. Legare un sacchetto di plastica troppo stretto e poi faticare a riaprirlo
  11. Staccare un adesivo da qualcosa e questo lascia quel residuo appiccicoso
  12. Avere un prurito sulla schiena che non riesci a raggiungere
  13. Perdere un calzino nel bucato, e non riappare mai più
  14. Non riuscire a trovare la fine del rotolo di nastro adesivo
  15. Una manica che scivola giù quando cerchi di lavarti le mani
  16. Calpestare una macchia d'acqua con i calzini
  17. Sporcarsi i vestiti di dentifricio mentre ci si lava i denti
  18. Il rumore delle unghie che graffiano una lavagna o superfici simili
  19. Quando una singola ciocca di capelli continua a solleticarti il viso ma non riesci a trovarla
  20. Essere <!-- intentionally cut in the middle, deliberatly trying to stay below 25 -->
