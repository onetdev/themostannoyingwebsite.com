title: Las 25 peores cosas de ser humano
slug: las-25-peores-cosas-de-ser-humano
intro: No creerías lo que hace que otros humanos se enojen tanto por su existencia.
content: |-
  Las pequeñas molestias de la vida son suficientes para volver loco a cualquiera. ¿Pisar una mancha húmeda con calcetines? Rabia instantánea. ¿Y ese mechón de pelo rozando constantemente tu cara pero nunca dejándote agarrarlo? ¡Exasperante! Luego está el bolígrafo que rueda justo fuera de alcance, burlándose de ti desde debajo del sofá, y ni siquiera me hagas empezar con los cordones de los zapatos que se niegan a permanecer atados sin importar cuán fuerte los anudes. ¿Pelar una pegatina y quedarse con ese residuo pegajoso? Pura agonía. Y el momento en que tu manga se sumerge en agua mientras te lavas las manos, en serio, ¿cómo sucede eso siquiera? Estos momentos ridículos y sin sentido te hacen querer gritar, convirtiendo un día normal en una serie de batallas enloquecedoras e inductoras de rabia.

  1. Golpearse el dedo del pie con un mueble que siempre ha estado ahí
  2. Bots de servicio al cliente que nunca dan respuestas útiles
  3. Streaming cargando justo en medio de un programa
  4. Cuando el cargador de tu teléfono solo funciona en un ángulo muy específico, y no carga tu teléfono durante la noche y te despiertas con un 5% de batería
  5. Actualizar accidentalmente una página de desplazamiento infinito y perder la publicación que estabas leyendo para siempre
  6. Cuando el cordón de tu zapato se desata constantemente incluso después de apretarlo
  7. Ropa enganchándose en las manijas de las puertas al pasar
  8. Dejar caer un bolígrafo y verlo rodar justo fuera de alcance debajo de los muebles
  9. Cortarse con papel de algo que no debería ser afilado
  10. Atar una bolsa de plástico demasiado fuerte y luego luchar para abrirla de nuevo
  11. Pelar una pegatina de algo y que deje ese residuo pegajoso
  12. Tener un punto que pica y no puedes alcanzar en tu espalda
  13. Perder un calcetín en la lavandería, y nunca reaparece
  14. No poder encontrar el final del rollo de cinta adhesiva
  15. Una manga cayendo cuando intentas lavarte las manos
  16. Pisar una mancha húmeda con calcetines
  17. Mancharse de pasta de dientes en la ropa mientras te cepillas los dientes
  18. El sonido de las uñas rascando una pizarra o superficies similares
  19. Cuando un solo mechón de pelo sigue haciendo cosquillas en tu cara pero no puedes encontrarlo
  20. Ser <!-- cortado intencionalmente en el medio, tratando deliberadamente de permanecer por debajo de 25 -->
