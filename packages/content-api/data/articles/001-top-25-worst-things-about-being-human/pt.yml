title: As 25 piores coisas sobre ser humano
slug: as-25-piores-coisas-sobre-ser-humano
intro: Você não acreditaria no que deixa os outros humanos tão irritados com sua existência.
content: |-
  As pequenas chatices da vida são suficientes para enlouquecer qualquer um. Pisar em um lugar molhado com meias? Raiva instantânea. E aquele fio de cabelo roçando constantemente no seu rosto, mas que você nunca consegue pegar? Enfurecedor! Depois há a caneta que rola para fora do alcance, zombando de você debaixo do sofá, e nem me faça começar com os cadarços que se recusam a ficar amarrados, não importa o quão apertado você faça o nó. Descascar um adesivo e sobrar aquele resíduo pegajoso? Pura agonia. E o momento em que sua manga mergulha na água enquanto você lava as mãos — sério, como isso acontece? Esses momentos ridículos e inúteis fazem você querer gritar, transformando um dia normal em uma série de batalhas enlouquecedoras e indutoras de raiva.

  1. Bater o dedo do pé em um móvel que sempre esteve lá
  2. Robôs de atendimento ao cliente que nunca dão respostas úteis
  3. Streaming travando bem no meio de um programa
  4. Quando o carregador do seu celular só funciona em um ângulo muito específico, e ele não carrega o celular durante a noite e você acorda com 5% de bateria
  5. Atualizar acidentalmente uma página de rolagem infinita e perder para sempre o post que você estava lendo
  6. Quando o seu cadarço se desfaz constantemente, mesmo depois de apertá-lo
  7. Roupas presas em maçanetas de portas ao passar
  8. Deixar cair uma caneta e vê-la rolar para fora do alcance debaixo dos móveis
  9. Cortar-se com papel em algo que não deveria ser afiado
  10. Amarrar um saco plástico com muita força e depois lutar para abri-lo novamente
  11. Descascar um adesivo de algo e ele deixar aquele resíduo pegajoso
  12. Ter uma coceira que você não consegue alcançar nas costas
  13. Perder uma meia na lavanderia, e ela nunca mais reaparecer
  14. Não conseguir encontrar a ponta do rolo de fita adesiva
  15. Uma manga caindo quando você está tentando lavar as mãos
  16. Pisar em um lugar molhado com meias
  17. Sujar a roupa com pasta de dente enquanto escova os dentes
  18. O som de unhas arranhando um quadro-negro ou superfícies semelhantes
  19. Quando um único fio de cabelo continua fazendo cócegas no seu rosto, mas você não consegue encontrá-lo
  20. Ser <!-- propositalmente cortado no meio, tentando deliberadamente ficar abaixo de 25 -->
