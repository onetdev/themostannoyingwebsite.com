title: Die 25 schlimmsten Dinge am Menschsein
slug: die-25-schlimmsten-dinge-am-menschsein
intro: Du wirst nicht glauben, was andere Menschen an ihrer Existenz so wütend macht.
content: |-
  Die kleinen Ärgernisse des Lebens reichen aus, um jeden in den Wahnsinn zu treiben. Mit Socken in eine nasse Stelle treten? Sofortiger Zorn. Und diese eine Haarsträhne, die ständig dein Gesicht streift, dich sie aber nie zu fassen bekommt? Wahnsinnig machend! Dann ist da noch der Stift, der genau außer Reichweite rollt und dich unter dem Sofa verspottet, und fang mir gar nicht erst mit Schnürsenkeln an, die sich weigern, gebunden zu bleiben, egal wie fest man sie knotet. Einen Aufkleber abziehen und klebrige Rückstände zurückbehalten? Qual pur. Und der Moment, in dem dein Ärmel ins Wasser taucht, während du dir die Hände wäschst – ernsthaft, wie passiert das überhaupt? Diese lächerlichen, sinnlosen Momente lassen einen schreien wollen und verwandeln einen normalen Tag in eine Serie von wahnsinnigen, zornentfachenden Schlachten.

  1. Den Zeh an einem Möbelstück stoßen, das schon immer dort stand
  2. Kundenservice-Bots, die nie hilfreiche Antworten geben
  3. Streaming-Buffering mitten in einer Sendung
  4. Wenn dein Handy-Ladegerät nur in einem ganz bestimmten Winkel funktioniert und es dein Handy nachts nicht auflädt und du mit 5 % Akku aufwachst
  5. Versehentliches Aktualisieren einer Endlos-Scroll-Seite und den Beitrag, den man gerade gelesen hat, für immer verlieren
  6. Wenn dein Schnürsenkel ständig aufgeht, selbst nach dem Festziehen
  7. Kleidung, die beim Vorbeigehen an Türgriffen hängen bleibt
  8. Einen Stift fallen lassen und zusehen, wie er genau außer Reichweite unter ein Möbelstück rollt
  9. Ein Papierschnitt von etwas, das eigentlich nicht scharf sein sollte
  10. Eine Plastiktüte zu fest zuknoten und dann Schwierigkeiten haben, sie wieder zu öffnen
  11. Einen Aufkleber von etwas abziehen und er hinterlässt diese klebrigen Rückstände
  12. Eine juckende Stelle am Rücken haben, die man nicht erreichen kann
  13. Eine Socke in der Wäsche verlieren, die nie wieder auftaucht
  14. Das Ende der Klebebandrolle nicht finden können
  15. Ein Ärmel, der herunterrutscht, wenn man versucht, sich die Hände zu waschen
  16. Mit Socken in eine nasse Stelle treten
  17. Zahnpasta auf die Kleidung bekommen, während man sich die Zähne putzt
  18. Das Geräusch von Fingernägeln, die auf einer Tafel oder ähnlichen Oberflächen kratzen
  19. Wenn eine einzelne Haarsträhne ständig dein Gesicht kitzelt, du sie aber nicht finden kannst
  20. Sein <!-- intentionally cut in the middle, deliberatly trying to stay below 25 -->
