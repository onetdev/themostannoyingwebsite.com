title: Top 25 najgorszych rzeczy w byciu człowiekiem
slug: top-25-najgorszych-rzeczy-w-byciu-czlowiekiem
intro: Nie uwierzysz, co sprawia, że inni ludzie są tak wściekli na swoją egzystencję.
content: |-
  Małe życiowe uciążliwości wystarczą, by każdego doprowadzić do szału. Nadepnięcie na mokrą plamę w skarpetkach? Natychmiastowa wściekłość. I to pasmo włosów ciągle ocierające się o twarz, którego nigdy nie udaje się złapać? Doprowadzające do pasji! Do tego długopis, który odtacza się tuż poza zasięg ręki, drwiąc z Ciebie spod kanapy, i nawet nie zaczynajcie tematu sznurowadeł, które odmawiają pozostania zawiązanymi, nieważne jak mocno je zaciśniesz. Odklejanie naklejki i pozostawanie z tą lepką pozostałością? Czysta agonia. I ten moment, gdy rękaw zanurza się w wodzie podczas mycia rąk — poważnie, jak to się w ogóle dzieje? Te absurdalne, bezsensowne momenty sprawiają, że chcesz krzyczeć, zamieniając normalny dzień w serię doprowadzających do szaleństwa, wywołujących furię bitew.

  1. Uderzenie się w palec u nogi o mebel, który stoi tam od zawsze
  2. Boty obsługi klienta, które nigdy nie udzielają pomocnych odpowiedzi
  3. Buforowanie streamingu w samym środku programu
  4. Gdy ładowarka do telefonu działa tylko pod bardzo konkretnym kątem i nie naładuje telefonu w nocy, a Ty budzisz się z 5% baterii
  5. Przypadkowe odświeżenie strony z nieskończonym przewijaniem i utrata posta, którego właśnie czytałeś, na zawsze
  6. Gdy sznurowadło ciągle się rozwiązuje, nawet po mocnym zaciśnięciu
  7. Ubrania zahaczające o klamki drzwi, gdy obok nich przechodzisz
  8. Upuszczenie długopisu i patrzenie, jak odtacza się tuż poza zasięg pod meble
  9. Zacięcie się papierem o coś, co nie powinno być ostre
  10. Zbyt mocne zawiązanie plastikowej torby, a potem męczenie się z jej ponownym otwarciem
  11. Odklejanie naklejki z czegoś, co pozostawia po sobie ten lepki osad
  12. Swędzące miejsce na plecach, którego nie możesz dosięgnąć
  13. Zgubienie jednej skarpetki w praniu, która nigdy więcej się nie pojawia
  14. Niemożność znalezienia końca rolki taśmy klejącej
  15. Rękaw opadający, gdy próbujesz umyć ręce
  16. Nadepnięcie na mokrą plamę w skarpetkach
  17. Pobrudzenie ubrań pastą do zębów podczas mycia zębów
  18. Dźwięk paznokci skrobiących po tablicy lub podobnych powierzchniach
  19. Gdy pojedyncze pasmo włosów ciągle łaskocze Cię w twarz, ale nie możesz go znaleźć
  20. Bycie <!-- celowo ucięte w połowie, świadomie starając się pozostać poniżej 25 -->
