title: "알파 아우렐리아의 탄생"
slug: "alpa-aurellia-ui-tansaeng"
intro: "Live, Love, Laugh, 이제는 오기로 버티는 중"
content: |-
  아우렐리아는 나이트 인스티튜트(Knight's Institute)의 평범한 학생이었지만, 선생님들이 강요하는 “고결하고 도덕적인 기사가 되어라” 같은 분위기에는 전혀 관심이 없었습니다. 진짜 아무도 안 물어봤는데 말이죠. 그녀의 엄마는 입만 열면 “여기서 네 진정한 사랑을 만나게 될 거야”라고 했지만, 솔직히? 완전 극혐(Big yikes)이었습니다. 기사도 정신이 죽은 게 아니라면 분명 인공호흡기 신세일 텐데, 여기 있는 귀족 지망생 중 그 누구도 그녀가 추구하는 주인공 포스(main character energy)를 가진 애가 없었거든요.

  다른 애들이 궁중 예절과 검술을 공부할 때, 아우렐리아는 자신의 마법 거울에 훨씬 더 진심이었습니다. 그녀의 거울은 가장 핫한 릴스(reels)와 마법 스크롤로 통하는 포털 같아서, 왕국 모든 귀족의 드라마와 흑역사(epic fails)를 보여주었습니다. 매일 수업이 끝나면 그녀는 거울을 들고 몰래 빠져나가 다른 귀족들의 삶을 훔쳐보며(highkey checking out) 그들의 오글거리는 순간들을 비웃었습니다. 가끔은 댓글창까지 정독했는데, 거기선 입담 좋은 마을 사람들과 귀족들이 “그 와중에 허리는 왜 꺾음?”이라거나 “한 판 붙자(catch these hands)!” 같은 댓글을 남기곤 했습니다. 진짜 역대급(G.O.A.T.) 꿀잼이었죠.

  어느 날 밤, 그녀는 기사 수습생인 ‘시르 퍼시벌’이라는 단신 형님(short king)의 릴스를 봤습니다. 그는 자신의 검술을 뽐내려고 안간힘을 쓰고 있었죠. 검이 자기 몸무게보다 두 배는 더 나가 보이는지 휘청거렸고, 그의 종자는 댓글에 “미쳤다(Gyatt)!”라거나 “대박 사건(Bruh moment)!”을 남기며 바람을 잡고 있었습니다. 완전 NPC 같은 행동이었지만, 솔직히? 아우렐리아는 이런 게 좋았습니다. 그녀는 거울을 떨어뜨릴 뻔할 정도로 폭소하며 중얼거렸습니다. “퍼시벌 형님, 채팅창에 F를 눌러 조의를 표합니다.”

  “진정한 사랑 찾기” 따위는 너무 과대평가되었습니다. 그녀의 엄마는 끊임없이 잔소리를 늘어놓았죠. “아우렐리아, 귀족 남자의 시선을 끌어야지! 이건 장난이 아니야!” 하지만 그녀는 리즈(Rizz)라고는 1도 없는 노잼 아재(boomer energy) 같은 놈들한테 정착할 생각이 없었습니다. 그녀는 주인공 포스가 뿜뿜하거나, 아니면 차라리 조금 혼돈 선(chaotic good) 성향인 남자를 원했습니다. 그녀는 간절히 원했습니다(highkey manifesting). 모험심 강하고 신비로우며, 땀 한 방울 안 흘리고 용과 싸울 수 있는 남자를 말이죠.

  그때 리산더(Lysander)가 나타났습니다. 그는 방랑 기사였고 온몸에서 시그마 에너지(sigma energy)가 흘러넘쳤습니다. 아우렐리아가 왕실 연회에서 그를 처음 발견했을 때, 그녀는 생각했습니다. “이건... 전설의 포스다.” 그는 간지가 폭발했고(drip for days), ‘나는 차드(Chad)다’라고 외치는 듯한 정적이면서도 자신감 넘치는 몸짓을 보여주었습니다. 그가 그녀를 쳐다볼 때마다 그녀는 마법 주문에 걸린 것 같은 기분을 느꼈습니다. 그녀의 친구들은 모두 “대박. 네 남자 맞네. 완전 빛나는 갑옷을 입은 기사님이야.”라고 부추겼습니다.

  하지만 그를 알아가면 알아갈수록, 그녀는 정떨어지는 포인트(ick)를 발견하기 시작했습니다. 처음에는 사소한 것들이었습니다. 아무 말도 없이 며칠 동안 갑자기 사라지는 식이었죠. 그러다 그가 다른 귀족 영애들과 함께 있는 현장(caught in 4k)이 목격되었다는 소문이 들려왔고, 그녀가 그 이야기를 꺼낼 때마다 그는 가스라이팅을 시전했습니다. “농담이지? 아우렐리아, 네가 상상하는 거야.” 그러면 그녀는 거기 앉아 스스로에게 말했습니다. “내가 무시하면 없는 일이야.” 하지만 이런 망상은 동화라기보다는 함정처럼 느껴지기 시작했고, 아우렐리아는 “망상이 답이다(delulu is the solulu)”라고 생각했지만, 결코 좋은 의미는 아니었습니다.

  한편, 그녀의 엄마는 다른 계획을 짜고 있었습니다. 바로 ‘안전한’ 선택지인 엘드릭 경(Lord Eldric)이었습니다. 부모님은 오래전부터 그를 밀어붙였습니다. 그는 신비로운 기사도 아니고 차드 에너지가 넘치는 방랑자도 아니었지만, 든든하고 ‘힘보(himbo, 몸 좋고 착하지만 좀 멍청한)’ 같은 매력이 있었으며, 무엇보다 그녀의 공간을 존중해 주었습니다. 솔직히 말해(Lowkey), 엘드릭은 꽤 괜찮은 놈(based)이었습니다. 화려한 검술이나 간지 나는 옷으로 그녀를 꼬시려 하지 않았고, 그냥... 엘드릭이었습니다. 단순하고 안정적이며, 꼴불견(walking ick machine)도 아니었죠.

  어느 날, 아우렐리아가 리산더 때문에 앓는 소리를 하는 걸 지켜보다 지친 친구가 말했습니다. “야, 이건 아니야. 넌 네 망상 속 세상에서 살고 있지만(thriving in your little delulu world), 솔직히 엘드릭 경은 네가 봐주기만을 기다리며 여기서 그냥 잘 지내고(vibing) 있잖아.” 아우렐리아는 그 말을 곱씹어 보았고, 친구 말이 맞을지도 모른다고 생각했습니다. ‘헐(Bruh)’. 그녀는 가짜 방랑 기사를 쫓으며 온갖 드라마에 휘말려 있었지만, 진짜 괜찮은 사람은 바로 눈앞에서 차를 마시며 평온하게(unbothered, moisturized, in his lane vibes) 쉬고 있었습니다.

  그녀는 시험해 보기로 했습니다. 엘드릭과 몇 번 시간을 보내며 생각했죠. “일단 될 때까지는 그런 척이라도 해보자(fake it till I make it).” 하지만 그와 시간을 보낼수록 그가 점점 더 좋아졌습니다. 그에게 차드 에너지는 없었지만, 진짜처럼 느껴지는 조용한 강인함과 충성심이 있었습니다. 그는 그녀를 드라마나 징징거림 없이 여왕처럼 대접해 주었습니다(실제로 그녀는 거의 여왕이나 다름없었죠). 그와 함께라면 다른 사람과 바람피우다 걸리거나(caught in 4k), 지난주에 누구랑 있었는지 같은 지저분한 뒷담화(tea)를 걱정할 필요가 없었습니다.

  그래서 결국 그녀는 리산더의 혼란스럽고 독성 넘치는 서브퀘스트(toxic sidequest energy) 같은 삶에 작별을 고했습니다. 그리고 엘드릭과 결혼하기로 결심하며, 마침내 부모님이 원했던 길을 선택했습니다. 그녀가 꿈꿨던 역대급 로맨스(Pogchamping romance)는 아닐지 몰라도, 그는 진짜였습니다. 엘드릭과 함께라면 그녀는 안전하고 존중받으며, 진심으로 만족할 수 있었습니다.

  아우렐리아는 여전히 가끔 마법 거울을 확인하며 탈로리아(Thaloria) 왕국의 온갖 흑역사, 꽝인 연애(L romances), 그리고 바람 피우다 걸린 드라마들을 훔쳐봅니다. 하지만 이제는 차를 마시며 새 남편과 함께 평온하게 즐기는 중(lowkey vibing)입니다. 꿈에 그리던 방랑 기사는 포기했을지 몰라도, 결국 그녀는 더 좋은 것을 찾았습니다. 바로 평화와 안정, 그리고 그녀가 넘어질 때마다 진짜(deadass) 잡아줄 사람을 말이죠.
