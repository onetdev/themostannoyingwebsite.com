title: 给阿尔法·奥蕾莉亚
slug: gei-yu-alfa-ao-lei-li-ya
intro: 生活、爱、欢笑，目前完全是出于报复而茁壮成长
content: |-
  奥蕾莉亚只是骑士学院里的一个普通孩子，但她对老师们不断推销的那种“高贵美德”一点也不感冒。简直是：无人在意（ literally no one）。她妈妈一直念叨：“你会在学校遇到你的真命天子的。”但说实话？大可不必（Big yikes）。如果说骑士精神还没死，那也肯定是在靠呼吸机吊着，而且这些所谓的贵族子弟没一个自带她正在通过冥想显化的“主角光环”。

  当其他孩子在学习宫廷礼仪和剑术时，奥蕾莉亚更喜欢研究她的魔法镜。她的魔法镜就像是一个入口，通往所有最精彩的短视频（reels）和魔法卷轴，向她展示整个王国里每个贵族的爱恨情仇和大型翻车现场。每天下课后，她都会手拿镜子偷偷溜走，疯狂刷（highkey check out）其他贵族生活的短视频，嘲笑他们的尴尬瞬间。有时，她甚至会翻看评论区，在那里，毒舌的村民和贵族们会留下诸如“有这功夫不如多练练下腰（Arch your back while you're at it!）”或者“不服来战（catch these hands!）”之类的话。这简直是娱乐界的 yyds。

  一天晚上，她看了一个名叫帕西瓦尔爵士的“短腿小巨人”骑士学徒的短视频，他正在努力展示他的剑术。这家伙挥剑的样子就像那把剑比他重两倍，他的侍从还在评论区为他疯狂打 call，发些“绝了（Gyatt!）”和“社死现场（Bruh moment!）”之类的话。这种纯纯的 NPC 行为，说实话，奥蕾莉亚却看得津津有味。她笑得太厉害，差点把镜子都掉了，嘴里嘟囔着：“评论区给帕西瓦尔爵士打个 F。”

  所谓的“寻找真爱”简直被吹过头了。比如，她妈妈总是盯着她，说：“奥蕾莉亚，你需要引起一位贵公子的注意！这不是在玩游戏！”但她才不打算委身于某个毫无魅力（zero Rizz）的“爹味（boomer energy）”男。她想要一个有主角光环的人，甚至带点“混乱善良”的特质。说真的（Highkey），她最近一直在疯狂冥想显化，想象自己和一个冒险、神秘、能毫不费力屠龙的男人在一起。

  利桑德登场了。他是个流浪骑士，全身散发着“顶级 alpha（sigma energy）”的气息。奥蕾莉亚第一次在王室宴会上看到他时，心想：“这感觉……简直是传说级别的（legend vibes）。”这家伙的穿搭（drip）绝了，他的举手投足间流露出的那种迷之自信，简直是满屏的“普信男（Chad energy，此处取调侃义）”。每次他看着她，她都觉得自己被施了什么魔法。她的朋友们都说：“稳了（Bet）。这就是你的菜。简直是穿着闪亮铠甲的白马王子。”

  但随着她对他了解得越来越多，她开始觉得有些下头（ick）。起初只是一些小事，比如他会突然消失好几天，音讯全无。然后她听到传闻说他被“实锤（caught in 4k）”和其他贵族女孩混在一起。每当她提起这件事，他就会对她进行“煤气灯操纵（gaslight）”，说什么：“开什么玩笑（Say sike right now!）！你幻觉了吧，奥蕾莉亚。”而她就会坐在那儿，告诉自己：“只要我无视它，它就不存在。”但这种幻想（delusion）开始让她觉得更像是一个陷阱而非童话，奥蕾莉亚开始想，“只要我够恋爱脑（delulu is the solulu）”，但并不是以一种好的方式。

  与此同时，她妈妈又在酝酿另一个计划。埃尔德里克领主登场了，他是那个“稳妥”的选择。她的父母一直想把他塞给她。他不是那种神秘的骑士，也不是带有“顶级 alpha”气质的流浪者，但他很稳重，长得有点小帅，带点“单纯猛男（himbo energy）”的感觉，而且非常尊重她的空间。讲真（Lowkey），埃尔德里克其实挺有腔调的（based）。他并不想用花哨的剑法或昂贵的衣服来打动她；他只是……埃尔德里克。简单，稳定，不是那种让人下头（ick）的机器。

  有一天，她和她的朋友聊天，朋友已经完全受够了奥蕾莉亚对利桑德的苦苦痴迷，说：“姐妹，这真的不行（this ain't it, chief）。你在你那小小的幻想世界里玩得挺嗨，但讲真的（highkey），埃尔德里克领主一直在这儿等你看他一眼呢。”奥蕾莉亚想了想，意识到朋友可能是对的。我的天（Bruh）。她一直沉溺于那些狗血剧情中，追逐着某种虚幻的流浪骑士，而真正的良人就在她面前，正喝着茶，过着一种“不被打扰、精致、在自己的赛道上（unbothered, moisturized, in his lane）”的舒适生活。

  她决定测试一下。她和埃尔德里克出去了几次，心想：“先假装一下，万一成功了呢（fake it till I make it）。”但她和他相处的时间越长，就越喜欢他。他虽然没有那种张扬的气质，但他那种沉静的力量和忠诚让她感到……真实。他把她当成女王一样对待（说真的，她本来就是），没有任何怨言和狗血剧情。和他在一起，她不用担心被实锤（caught in 4k）出轨，也不用担心被别人爆料他上周和谁在一起。

  所以最终，她全身心地投入了这段感情，告别了利桑德和他那种混乱且有毒的“支线任务”生活。她同意嫁给埃尔德里克，最终选择了父母为她选择的道路。他们可能没有她梦寐以求的那种“刷屏级（Pogchamping）”浪漫，但他很真实。和埃尔德里克在一起，她感到安全，受到尊重，并且非常满足（highkey content）。

  奥蕾莉亚现在偶尔还是会看看她的魔法镜，看着萨洛里亚王国里的那些社死时刻（bruh moments）、失败的恋情（L romances）和被实锤（caught in 4k）的八卦，同时喝着茶，和她的新丈夫一起享受平静的生活。她可能放弃了寻找梦中的流浪骑士，但最终，她找到了更好的东西：平和、稳定，以及一个每次她跌倒时都会紧紧抱住她的人（deadass catch her every time she fell）。
