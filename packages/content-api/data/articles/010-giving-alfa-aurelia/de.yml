title: Aurelia gibt Alfa-Vibes
slug: alfa-aurelia-vibes
intro: Live, Love, Laugh, mittlerweile aus reiner Bosheit erfolgreich
content: |-
  Aurelia war nur ein weiteres Kind am Knight's Institute, aber sie hatte keinen Bock auf die ganzen „sei edel und tugendhaft“-Vibes, die ihre Lehrer ständig pushten. Also, niemand: wirklich niemand: ihre Mutter sagte ständig: „Du wirst hier deine einzige wahre Liebe finden.“ Aber ehrlich? Big yikes. Wenn Ritterlichkeit nicht tot war, lag sie definitiv auf der Intensivstation, und keiner dieser Möchtegern-Adligen hatte die Main-Character-Energy, die sie manifestierte.

  Während andere Kinder Hofetikette und Schwertkampf studierten, stand Aurelia viel mehr auf ihren verzauberten Spiegel. Ihr Spiegel war wie ein Portal zu den saftigsten Reels und verzauberten Schriftrollen und zeigte ihr die Dramen und Epic Fails jedes Adligen im ganzen Königreich. Jede Nacht nach dem Unterricht schlich sie sich mit dem Spiegel in der Hand davon und checkte highkey die Reels der Leben anderer Adliger aus und lachte über ihre cringey Momente. Manchmal scrollte sie sogar in die Kommentare, wo freche Dorfbewohner und Adlige gleichermaßen Sätze fallen ließen wie „Arch your back while you're at it!“ oder sich gegenseitig mit „catch these hands!“ herausforderten. Es war der buchstäbliche G.O.A.T. an Entertainment.

  Eines Nachts sah sie ein Reel von diesem Short-King-Ritter-in-Ausbildung namens Sir Percival, der sein Bestes gab, um mit seinen Schwertkünsten zu flexen. Der Typ schwang sein Schwert, als wöge es doppelt so viel wie er selbst, und sein Knappe hypte ihn auf und hinterließ „Gyatt!“ und „Bruh-Moment!“ in den Kommentaren. Es gab totale NPC-Vibes ab, aber ehrlich? Aurelia war am Start. Sie lachte so hart, dass sie fast ihren Spiegel fallen ließ, und murmelte: „Big F in den Chat für Sir Percival.“

  Das ganze „wahre Liebe finden“-Ding war total überbewertet. Also, ihre Mutter war ihr ständig auf den Fersen und sagte: „Aurelia, du musst die Aufmerksamkeit eines Edelmanns erregen! Das ist kein Spiel!“ Aber sie wollte sich nicht mit irgendeinem Typen mit Boomer-Energy und null Rizz zufriedenstellen. Sie wollte jemanden mit Main-Character-Vibes, vielleicht sogar ein bisschen chaotic good. Highkey hatte sie gerade hart manifestiert und sich einen Typen vorgestellt, der abenteuerlustig, geheimnisvoll war und gegen einen Drachen kämpfen konnte, ohne ins Schwitzen zu geraten.

  Auftritt Lysander. Er war ein abtrünniger Ritter und triefte nur so vor Sigma-Energie, und als Aurelia ihn das erste Mal beim königlichen Bankett sah, dachte sie: „Es gibt… Legenden-Vibes.“ Der Typ hatte Drip für Tage und bewegte sich mit dieser ruhigen Zuversicht, die Chad-Energy schrie. Jedes Mal, wenn er sie ansah, fühlte sie sich, als hätte er einen Zauberspruch gewirkt. Ihre Freundinnen meinten alle: „Bet. Das ist dein Typ. Totaler Ritter in glänzender Rüstung.“

  Aber je besser sie ihn kennenlernte, desto mehr Icks fielen ihr auf. Zuerst waren es Kleinigkeiten, wie er plötzlich tagelang ohne ein Wort verschwand. Dann hörte sie Gerüchte, dass er in 4k mit anderen Adelsmädchen erwischt wurde, und jedes Mal, wenn sie es ansprach, gaslightete er sie einfach, so nach dem Motto: „Say sike right now! Du bildest dir Dinge ein, Aurelia.“ Und sie saß da und sagte sich: „Wenn ich es ignoriere, existiert es nicht.“ Aber der Wahn fühlte sich eher wie eine Falle an als wie ein Märchen, und Aurelia fing an zu denken: „delulu is the solulu“, aber nicht auf eine gute Art.

  In der Zwischenzeit braute ihre Mutter einen anderen Plan aus. Auftritt Lord Eldric, die „sichere“ Wahl. Ihre Eltern hatten ihn ihr ewig aufgedrängt. Er war nicht der geheimnisvolle Ritter oder der Abtrünnige mit Chad-Energy, aber er war stabil, irgendwie süß auf eine Himbo-Energy-Art und respektierte tatsächlich ihren Freiraum. Lowkey war Eldric irgendwie based. Er versuchte nicht, sie mit schickem Schwertkampf oder bussin' Kleidung zu beeindrucken; er war einfach… Eldric. Einfach, stabil, keine wandelnde Ick-Maschine.

  Eines Tages quatschte sie mit ihrer Freundin, die Aurelias Schmachten nach Lysander total satt hatte und sagte: „Girl, das ist es nicht, Chief. Du blühst in deiner kleinen Delulu-Welt auf, aber highkey vibet Lord Eldric hier einfach und wartet darauf, dass du ihn bemerkst.“ Und Aurelia dachte darüber nach und erkannte, dass ihre Freundin recht haben könnte. Bruh. Sie war so in das ganze Drama vertieft gewesen und jagte einem Fantasie-Ritter hinterher, während das wahre Ding direkt vor ihr war, Tee schlürfte und mit total entspannten, ungestörten Vibes in seiner Spur blieb.

  Sie beschloss, es zu testen. Sie hing ein paar Mal mit Eldric ab und dachte: „I'll just fake it till I make it.“ Aber je mehr Zeit sie mit ihm verbrachte, desto mehr wuchs er ihr ans Herz. Er hatte keine Chad-Energy, aber er hatte diese ruhige Stärke und Loyalität, die sich… echt anfühlte. Er behandelte sie wie eine Königin (was sie highkey auch war) ohne das ganze Gejammer und Drama. Bei ihm musste sie sich keine Sorgen machen, in 4k mit jemand anderem erwischt zu werden oder Tee darüber zu verschütten, mit wem er letzte Woche unterwegs war.

  Schließlich ging sie aufs Ganze, verabschiedete sich von Lysander und seiner chaotischen, toxischen Sidequest-Energie. Und sie willigte ein, Eldric zu heiraten, und wählte schließlich den Weg, den ihre Eltern für sie gewollt hatten. Sie mochten vielleicht nicht die epische Pogchamp-Romanze haben, von der sie geträumt hatte, aber er war echt. Mit Eldric war sie sicher, respektiert und highkey zufrieden.

  Aurelia checkt immer noch ab und zu ihren verzauberten Spiegel, schaut sich die Bruh-Momente, L-Romanzen und In-4k-erwischt-Dramen von Thaloria an, während sie ihren Tee schlürft und lowkey mit ihrem neuen Ehemann vibet. Sie mag die Suche nach dem abtrünnigen Ritter ihrer Träume aufgegeben haben, aber am Ende fand sie etwas noch Besseres: Frieden, Stabilität und jemanden, der sie deadass jedes Mal auffängt, wenn sie fällt.
