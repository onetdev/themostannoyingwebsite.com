title: Dando alfa para Aurelia
slug: dando-alfa-para-aurelia
intro: Live, Love, Laugh, prosperando na base do puro ranço a este ponto
content: |-
  Aurelia era apenas mais uma garota no Instituto Knight, mas ela não estava nem aí para aquela vibe de “seja nobre e virtuosa” que seus professores ficavam empurrando. Tipo, ninguém: literalmente ninguém: a mãe dela vivia dizendo, “Você vai encontrar seu único amor verdadeiro aqui”. Mas, sinceramente? Um mico total. Se a cavalaria não estava morta, estava definitivamente respirando por aparelhos, e nenhum desses aspirantes a nobres tinha a energia de personagem principal que ela estava manifestando.

  Enquanto as outras crianças estudavam etiqueta da corte e esgrima, Aurelia estava muito mais interessada em seu espelho encantado. O espelho dela era como um portal para todos os reels mais suculentos e pergaminhos encantados, mostrando para ela os dramas e os fails épicos de cada nobre do reino. Toda noite depois das aulas, ela fugia, espelho na mão, e ficava de olho nos reels da vida dos outros nobres, rindo dos momentos vergonhosos deles. Às vezes, ela até rolava para os comentários, onde camponeses e nobres debochados soltavam frases como “Arqueia as costas enquanto você está nisso!” ou se desafiavam com “vai encarar?!”. Era o ápice do entretenimento.

  Certa noite, ela assistiu a um reel de um cavaleiro em treinamento baixinho chamado Sir Percival, que estava dando o seu melhor para exibir suas habilidades com a espada. O cara estava balançando a espada como se ela pesasse o dobro dele, e seu escudeiro estava botando a maior pilha, comentando “Gyatt!” e “Momento bruh!” nos comentários. Era puro comportamento de NPC, mas, sinceramente? Aurelia estava amando. Ela riu tanto que quase deixou cair o espelho, murmurando, “F total no chat para o Sir Percival.”

  Toda essa coisa de “encontrar o amor verdadeiro” era superestimada. Tipo, a mãe dela estava constantemente no pé dela, dizendo, “Aurelia, você precisa chamar a atenção de um nobre! Isso não é brincadeira!”. Mas ela não ia se contentar com algum cara com energia de boomer e zero Rizz. Ela queria alguém com vibes de personagem principal, talvez até um pouco "caótico e bom". Sinceramente, ela estava manifestando forte agora, imaginando-se com um cara que fosse aventureiro, misterioso e que pudesse lutar contra um dragão sem nem suar.

  Entra Lysander. Ele era um cavaleiro renegado e transbordava energia sigma, e quando Aurelia o viu pela primeira vez no banquete real, ela pensou, “Tá dando... vibes de lenda”. O cara tinha um estilo absurdo e se movia com uma confiança silenciosa que gritava energia de Chad. Toda vez que ele olhava para ela, ela sentia como se ele tivesse lançado um feitiço encantado. Suas amigas diziam, “Pode crer. Esse é o seu cara. O legítimo cavaleiro de armadura brilhante.”

  Mas quanto mais ela o conhecia, mais o "ranço" (ick) começava a aparecer. No início, eram pequenas coisas, como o fato de ele desaparecer subitamente por dias sem dizer uma palavra. Depois, ela ouvia rumores de que ele fora pego "no pulo" (caught in 4k) com outras garotas nobres, e toda vez que ela tocava no assunto, ele apenas fazia gaslighting com ela, dizendo algo como: “Diz que é zueira agora! Você está imaginando coisas, Aurelia.” E ela ficava ali, dizendo para si mesma: “Se eu ignorar, não existe.” Mas a ilusão começou a parecer mais uma armadilha do que um conto de fadas, e Aurelia começou a pensar que “viver na ilusão é a solução” (delulu is the solulu), mas não de um jeito bom.

  Enquanto isso, a mãe dela tinha outro plano cozinhando. Entra Lord Eldric, a escolha “segura”. Seus pais estavam empurrando ele para ela desde sempre. Ele não era o cavaleiro misterioso ou o renegado com energia de Chad, mas era robusto, meio fofo de um jeito "energia de himbo", e realmente respeitava o espaço dela. Sinceramente, Eldric era meio lúcido. Ele não estava tentando impressioná-la com esgrima chique ou roupas caras; ele era apenas... Eldric. Simples, estável, sem ser uma máquina de micos.

  Um dia, ela estava conversando com uma amiga, que já estava de saco cheio de ver Aurelia sofrendo por Lysander, dizendo, “Amiga, não é por aí. Você está prosperando no seu mundinho de ilusão, mas na real, o Lord Eldric está só na vibe dele esperando você notar ele.” E Aurelia pensou sobre isso, percebendo que sua amiga poderia estar certa. Cara. Ela tinha se deixado levar pelo drama, perseguindo algum cavaleiro renegado de fantasia quando o negócio real estava bem na frente dela, tomando chá e relaxando com aquela vibe de quem não quer guerra com ninguém, hidratado e na sua.

  Ela decidiu testar. Ela saiu com Eldric algumas vezes, pensando: “Vou fingir até que se torne real (fake it till I make it).” Mas quanto mais tempo ela passava com ele, mais ela gostava dele. Ele não tinha energia de Chad, mas tinha essa força e lealdade silenciosas que pareciam... reais. Ele a tratava como uma rainha (o que, sinceramente, ela era) sem toda aquela reclamação e drama. Com ele, ela não precisava se preocupar em ser pega no pulo com outra pessoa ou em fofocar sobre com quem ele estivera na semana passada.

  Então, finalmente, ela mergulhou de cabeça, dizendo adeus a Lysander e sua energia tóxica e caótica de missão secundária. E ela aceitou se casar com Eldric, finalmente escolhendo o caminho que seus pais queriam para ela. Eles poderiam não ter o romance épico digno de "Pogchamp" que ela sonhara, mas ele era real. Com Eldric, ela estava segura, respeitada e muito satisfeita.

  Aurelia ainda confere seu espelho encantado de vez em quando, assistindo aos momentos bruh, romances fracassados e dramas pegos no pulo de Thaloria, tudo isso enquanto toma seu chá e fica de boa com seu novo husband (marido). Ela pode ter desistido de encontrar o cavaleiro renegado dos seus sonhos, mas no final, encontrou algo ainda melhor: paz, estabilidade e alguém que realmente a seguraria toda vez que ela caísse.
