title: Предавая альфу Аурелию
slug: predavaya-alfu-aureliyu
intro: Живи, Люби, Смейся, выживая чисто из вредности на данный момент
content: |-
  Аурелия была обычной девчонкой в Институте Рыцарей, но ей совсем не заходили все эти вайбы «будь благородной и добродетельной», которые навязывали учителя. Типа, никто: вообще никто: а её мама всё твердила: «Ты встретишь здесь свою единственную любовь». Но честно? Полный кринж. Если рыцарство и не умерло, то оно точно на аппарате ИВЛ, и ни у одного из этих кандидатов в дворяне не было той энергии главного героя, которую она себе манифестировала.

  Пока другие дети зубрили придворный этикет и фехтование, Аурелия вовсю зависала в своем заколдованном зеркале. Её зеркало было как портал во все самые сочные рилсы и магические свитки, показывая ей драмы и эпик-фейлы каждого дворянина в королевстве. Каждую ночь после уроков она ускользала с зеркалом в руках и на максималках чекала рилсы из жизни других знатных особ, угорая над их стыдными моментами. Иногда она даже заходила в комменты, где дерзкие крестьяне и дворяне вкидывали фразочки типа «Прогнись еще сильнее, пока можешь!» или вызывали друг друга на забив. Это был буквально лучший контент в истории.

  Однажды ночью она смотрела рилс про этого коротышку, рыцаря-недоучку по имени сэр Персиваль, который из всех сил пытался показать мастерство владения мечом. Чувак махал мечом так, будто тот весил в два раза больше него самого, а его оруженосец хайпил его, кидая «Гиатт!» и «Брух момент!» в комментариях. Это был чистый вайб NPC, но честно? Аурелии зашло. Она смеялась так сильно, что чуть не уронила зеркало, бормоча: «Ставим F в чат сэру Персивалю».

  Вся эта тема с «поиском настоящей любви» была жестко переоценена. Типа, мама постоянно наседала на неё: «Аурелия, тебе нужно привлечь внимание знатного господина! Это тебе не игрушки!» Но она не собиралась соглашаться на какого-то чела с бумерской энергией и нулевым риззом. Ей нужен был кто-то с вайбом главного героя, может, даже немного хаотично-добрый. По факту, она жестко манифестировала сейчас, представляя себя с парнем, который был бы искателем приключений, таинственным и мог бы завалить дракона, даже не вспотев.

  И тут появляется Лисандр. Он был рыцарем-изгоем, от него буквально веяло энергией сигмы, и когда Аурелия впервые увидела его на королевском банкете, она подумала: «Вайб… легенды». У чувака был лютый дрип, и он двигался с той тихой уверенностью, которая просто кричала об энергии гигачада. Каждый раз, когда он смотрел на неё, она чувствовала, будто он наложил какое-то заклятие. Её подруги такие: «Отвечаю. Это твой чел. Тотальный рыцарь в сияющих доспехах».

  Но чем больше она его узнавала, тем больше ловила редфлагов и иков. Сначала это были мелочи, типа того, как он внезапно исчезал на несколько дней без единого слова. Потом пошли слухи, что его ловили в 4k с другими знатными девицами, и каждый раз, когда она предъявляла ему за это, он просто газлайтил её, типа: «Скажи, что ты рофлишь! Тебе кажется, Аурелия». И она сидела такая, убеждая себя: «Если я буду это игнорировать, этого не существует». Но её делюжн начал казаться скорее ловушкой, чем сказкой, и Аурелия начала думать, что «делюлю — это солюлю», но совсем не в хорошем смысле.

  Тем временем у её мамы созрел другой план. На сцену выходит лорд Элдрик, «безопасный» вариант. Родители сватали его ей вечность. Он не был таинственным рыцарем или изгоем с энергией чада, но он был надежным, довольно милым в стиле химбо и реально уважал её личное пространство. По факту, Элдрик был довольно базовым. Он не пытался впечатлить её пафосным маханием мечом или шмотками; он был просто… Элдриком. Простым, стабильным, не ходячим сборником иков.

  Как-то раз она болтала с подругой, которой окончательно надоели страдания Аурелии по Лисандру, и та сказала: «Подруга, это не дело. Ты кайфуешь в своем выдуманном мире, но на самом деле лорд Элдрик просто на чилле ждет, когда ты его заметишь». И Аурелия задумалась, понимая, что подруга, возможно, права. Брух. Она так заигралась в драму, гоняясь за каким-то фантастическим рыцарем-изгоем, когда реальный вариант был прямо перед ней, попивая чаёк и отдыхая на полном расслабоне в своем потоке.

  Она решила проверить. Пару раз потусила с Элдриком, думая: «Буду притворяться, пока не получится». Но чем больше времени она с ним проводила, тем больше он ей нравился. У него не было энергии чада, но в нем была та тихая сила и преданность, которая казалась… настоящей. Он относился к ней как к королеве (которой она по факту и была) без всякого нытья и драм. С ним ей не нужно было беспокоиться о том, что его поймают в 4k с кем-то другим или что всплывет какой-то чай о том, с кем он был на прошлой неделе.

  В итоге она пошла ва-банк, попрощавшись с Лисандром и его хаотичной токсичной энергией побочных квестов. И согласилась выйти за Элдрика, выбрав путь, который хотели для неё родители. Может, у них и не было эпичного, погчампового романа, о котором она мечтала, но он был настоящим. С Элдриком она была в безопасности, её уважали, и она была реально довольна.

  Аурелия до сих пор иногда чекает свое заколдованное зеркало, поглядывая на брух-моменты, фейловые романы и драмы в 4k в Талории, попивая чаёк и на чилле вайбя со своим новым мужем. Может, она и отказалась от поиска рыцаря-изгоя из своих снов, но в итоге нашла кое-что получше: покой, стабильность и того, кто реально подхватит её каждый раз, когда она будет падать.
