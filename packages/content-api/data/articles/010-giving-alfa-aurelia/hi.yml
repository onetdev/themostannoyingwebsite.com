title: अल्फा ऑरेलिया देना (Giving alfa Aurelia)
slug: giving-alfa-aurelia
intro: जियो, प्यार करो, हंसो, इस मोड़ पर नफरत के बावजूद फल-फूल रहे हैं
content: |-
  ऑरेलिया (Aurelia) नाइट इंस्टीट्यूट में बस एक और बच्ची थी, लेकिन उसे उन "नेक और गुणी बनो" वाली बातों में कोई दिलचस्पी नहीं थी जो उसके शिक्षक बार-बार कहते रहते थे। जैसे कि, कोई नहीं: सचमुच कोई नहीं: उसकी माँ कहती रहती थी, "तुम्हें यहाँ अपना सच्चा प्यार मिलेगा।" लेकिन ईमानदारी से? बहुत बुरा (Big yikes)। अगर शिष्टाचार मरा नहीं था, तो वह निश्चित रूप से लाइफ सपोर्ट पर था, और इन नेक बनने की कोशिश करने वालों में से किसी में भी वह 'मेन कैरेक्टर' वाली एनर्जी नहीं थी जो वह महसूस कर रही थी।

  जब अन्य बच्चे दरबारी शिष्टाचार और तलवारबाजी का अध्ययन करते थे, तो ऑरेलिया को अपने जादुई दर्पण (enchanted mirror) में बहुत अधिक दिलचस्पी थी। उसका दर्पण पूरे राज्य के हर कुलीन के सबसे रसीले रीलों और जादुई स्क्रॉल के लिए एक पोर्टल की तरह था, जो उनके ड्रामा और महाकाव्य विफलताओं (epic fails) को दिखाता था। कक्षाओं के बाद हर रात, वह हाथ में दर्पण लेकर चुपके से निकल जाती और अन्य रईसों के जीवन की रीलों को 'हाईकी' (highkey) चेक करती, उनके अजीब पलों (cringey moments) पर हँसती। कभी-कभी, वह कमेंट्स में भी चली जाती, जहाँ शरारती ग्रामीण और रईस एक जैसे "जब आप इसमें हों तो अपनी पीठ को झुकाएं!" जैसे वाक्यांश छोड़ते या "इन हाथों को पकड़ें!" (catch these hands!) कहकर एक-दूसरे को चुनौती देते। यह मनोरंजन का असली G.O.A.T. था।

  एक रात, उसने सर पर्सिवल नामक इस 'शॉर्ट किंग' नाइट-इन-ट्रेनिंग की एक रील देखी, जो अपने तलवार कौशल को दिखाने की पूरी कोशिश कर रहा था। वह लड़का अपनी तलवार को ऐसे घुमा रहा था जैसे उसका वजन उससे दोगुना हो, और उसका स्क्वॉयर (squire) उसे बढ़ावा दे रहा था, कमेंट्स में "ग्याट!" (Gyatt!) और "ब्रह मोमेंट!" (Bruh moment!) लिख रहा था। यह प्रमुख NPC व्यवहार जैसा लग रहा था, लेकिन ईमानदारी से? ऑरेलिया इसके लिए तैयार थी। वह इतनी जोर से हंसी कि उसका दर्पण गिरते-गिरते बचा, बुदबुदाते हुए, "सर पर्सिवल के लिए चैट में बड़ा F।"

  वह पूरी "सच्चा प्यार ढूँढने" वाली चीज़ बहुत ओवररेटेड थी। जैसे, उसकी माँ लगातार उस पर दबाव डाल रही थी, "ऑरेलिया, तुम्हें एक रईस का ध्यान आकर्षित करने की ज़रूरत है! यह कोई खेल नहीं है!" लेकिन वह शून्य 'रिज़' (Rizz) वाले किसी 'बूमर एनर्जी' वाले लड़के के साथ बसने वाली नहीं थी। उसे 'मेन कैरेक्टर' वाइब्स वाला कोई चाहिए था, शायद थोड़ा सा 'केओटिक गुड' (chaotic good)। 'हाईकी', वह कड़ी मेहनत कर रही थी, अपने आप को एक ऐसे लड़के के साथ चित्रित कर रही थी जो साहसी, रहस्यमयी हो और बिना पसीना बहाए ड्रैगन से लड़ सके।

  लाईसेंडर (Lysander) का प्रवेश हुआ। वह एक दुष्ट नाइट (rogue knight) था और पूरी तरह से 'सिग्मा एनर्जी' (sigma energy) से भरा हुआ था, और जब ऑरेलिया ने पहली बार उसे शाही भोज में देखा, तो उसने सोचा, "यह... लीजेंड वाइब्स दे रहा है।" उस आदमी के पास गजब का 'ड्रिप' (drip) था, और वह उस शांत आत्मविश्वास के साथ चलता था जो 'चाड एनर्जी' (Chad energy) चिल्लाता था। हर बार जब वह उसे देखता, उसे लगता कि उसने कोई जादू कर दिया है। उसकी सहेलियाँ सब कह रही थीं, "शर्त लगा लो (Bet)। यह तुम्हारा बंदा है। चमकते कवच में एकदम नाइट।"

  लेकिन जितना अधिक वह उसे जानती गई, उसे उतना ही 'इक' (ick) महसूस होने लगा। पहले, यह छोटी-छोटी बातें थीं, जैसे कि वह बिना किसी शब्द के अचानक दिनों के लिए गायब हो जाता था। फिर उसने अन्य कुलीन लड़कियों के साथ '4k में पकड़े जाने' (caught in 4k) की अफवाहें सुनीं, और हर बार जब वह इसका जिक्र करती, तो वह उसे बस 'गैसलाइट' (gaslight) करता, जैसे कि, "अभी 'साइक' (sike) कहो! तुम चीज़ों की कल्पना कर रही हो, ऑरेलिया।" और वह वहां बैठकर खुद से कहती, "अगर मैं इसे अनदेखा करती हूँ, तो इसका अस्तित्व नहीं है।" लेकिन भ्रम (delusion) एक परीकथा के बजाय एक जाल की तरह महसूस होने लगा, और ऑरेलिया ने सोचना शुरू किया, "डेलुलु ही सोलुलु है" (delulu is the solulu), लेकिन अच्छे तरीके से नहीं।

  इस बीच, उसकी माँ की एक और योजना पक रही थी। लॉर्ड एल्ड्रिक (Lord Eldric) का प्रवेश हुआ, "सुरक्षित" विकल्प। उसके माता-पिता हमेशा से उस पर दबाव डाल रहे थे। वह रहस्यमयी नाइट या चाड एनर्जी वाला दुष्ट नहीं था, लेकिन वह मजबूत था, एक 'हिम्बो एनर्जी' (himbo energy) के तरीके से प्यारा था, और वास्तव में उसकी जगह का सम्मान करता था। 'लोकी' (Lowkey), एल्ड्रिक काफी 'बेस्ड' (based) था। वह उसे फैंसी तलवारबाजी या 'बसिन' (bussin) कपड़ों से प्रभावित करने की कोशिश नहीं कर रहा था; वह बस... एल्ड्रिक था। सरल, स्थिर, एक चलती-फिरती 'इक' (ick) मशीन नहीं।

  एक दिन, वह अपनी सहेली के साथ बातचीत कर रही थी, जो ऑरेलिया के लाईसेंडर के लिए तड़पने से पूरी तरह थक चुकी थी, कह रही थी, "लड़की, यह सही नहीं है, बॉस (chief)। तुम अपनी छोटी सी डेलुलु दुनिया में फल-फूल रही हो, लेकिन 'हाईकी', लॉर्ड एल्ड्रिक बस यहाँ तुम्हारे ध्यान देने का इंतज़ार कर रहे हैं।" और ऑरेलिया ने इसके बारे में सोचा, यह महसूस करते हुए कि उसकी सहेली सही हो सकती है। 'ब्रह' (Bruh)। वह उस सारे ड्रामे में फंस गई थी, किसी फंतासी दुष्ट नाइट का पीछा कर रही थी जब असली चीज़ उसके ठीक सामने थी, चाय पी रही थी और पूरी तरह से बेफिक्र, मॉइस्चराइज्ड, अपने रास्ते में वाइब्स (unbothered, moisturized, in his lane vibes) के साथ चिल्लिंग कर रही थी।

  उसने इसे परखने का फैसला किया। उसने एल्ड्रिक के साथ कुछ बार समय बिताया, यह सोचते हुए, "जब तक मैं इसे हासिल नहीं कर लेती, तब तक मैं इसका नाटक करूँगी।" लेकिन जितना अधिक समय उसने उसके साथ बिताया, उतना ही वह उसे पसंद आने लगा। उसके पास चाड एनर्जी नहीं थी, लेकिन उसके पास वह शांत ताकत और वफादारी थी जो... असली महसूस होती थी। उसने उसके साथ एक रानी की तरह व्यवहार किया (जो, 'हाईकी', वह थी) बिना उस सारे रोने-धोने और ड्रामे के। उसके साथ, उसे किसी और के साथ '4k में पकड़े जाने' या पिछले हफ्ते वह किसके साथ था, इस बारे में 'चाय फैलाने' (spilling tea) की चिंता नहीं करनी पड़ती थी।

  तो अंत में, उसने लाईसेंडर और उसकी अराजक, जहरीली साइडक्वेस्ट एनर्जी को अलविदा कह दिया। और वह एल्ड्रिक से शादी करने के लिए सहमत हो गई, अंततः उस रास्ते को चुना जो उसके माता-पिता उसके लिए चाहते थे। उनके पास वह महाकाव्य, 'पोगचैम्पिंग' (Pogchamping) रोमांस नहीं हो सकता था जिसका उसने सपना देखा था, लेकिन वह असली था। एल्ड्रिक के साथ, वह सुरक्षित, सम्मानित और 'हाईकी' संतुष्ट थी।

  ऑरेलिया अभी भी समय-समय पर अपने जादुई दर्पण को चेक करती है, 'ब्रह' मोमेंट्स, 'L' रोमांस, और थलोरिया (Thaloria) के 'पकड़े गए 4k में' ड्रामे को देखती है, जबकि अपनी चाय पीती है और अपने नए पति के साथ 'लोकी' वाइबिंग करती है। उसने शायद अपने सपनों के दुष्ट नाइट को पाने की उम्मीद छोड़ दी हो, लेकिन अंत में, उसे कुछ और भी बेहतर मिला: शांति, स्थिरता, और कोई ऐसा जो हर बार गिरने पर उसे 'डेडअस' (deadass) पकड़ लेगा।
