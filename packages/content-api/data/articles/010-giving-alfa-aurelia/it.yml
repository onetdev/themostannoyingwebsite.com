title: Dare alfa Aurelia
slug: dare-alfa-aurelia
intro: Live, Love, Laugh, prosperando per puro dispetto a questo punto
content: |-
  Aurelia era solo un'altra ragazzina all'Istituto dei Cavalieri, ma non le interessavano affatto quelle vibrazioni tipo "sii nobile e virtuosa" che i suoi insegnanti continuavano a propinarle. Tipo, nessuno: letteralmente nessuno: sua madre continuava a dire: "Incontrerai il tuo unico vero amore qui". Ma onestamente? Un bel "no grazie". Se la cavalleria non era morta, era sicuramente in terapia intensiva, e nessuno di questi aspiranti nobili aveva l'energia da protagonista che lei stava manifestando.

  Mentre gli altri ragazzi studiavano l'etichetta di corte e la scherma, Aurelia era molto più presa dal suo specchio incantato. Il suo specchio era come un portale per tutti i reel più succosi e le pergamene incantate, mostrandole i drammi e gli epic fail di ogni nobile del regno. Ogni sera dopo le lezioni, sgattaiolava via, specchio in mano, e guardava con estremo interesse i reel delle vite degli altri nobili, ridendo dei loro momenti cringe. A volte, scorreva persino nei commenti, dove villici impertinenti e nobili allo stesso modo lanciavano frasi come "Inarca la schiena già che ci sei!" o si sfidavano con "vieni a prenderle!". Era letteralmente il G.O.A.T. dell'intrattenimento.

  Una notte, guardò un reel di questo cavaliere in addestramento "short king" di nome Sir Percival, che stava facendo del suo meglio per mostrare le sue abilità con la spada. Il tipo faceva roteare la spada come se pesasse il doppio di lui, e il suo scudiero lo esaltava, scrivendo "Gyatt!" e "Momento bruh!" nei commenti. Era un comportamento da totale NPC, ma onestamente? Aurelia era lì per questo. Rise così tanto che quasi fece cadere lo specchio, mormorando: "Un grande F in chat per Sir Percival".

  Tutta la faccenda del "trovare il vero amore" era decisamente sopravvalutata. Tipo, sua madre le stava costantemente addosso, dicendo: "Aurelia, devi catturare l'attenzione di un nobile! Questo non è un gioco!". Ma lei non aveva intenzione di accontentarsi di qualche tipo con energia da boomer e zero Rizz. Voleva qualcuno con vibrazioni da protagonista, forse anche un po' "caotico buono". Sotto sotto, stava manifestando intensamente in quel momento, immaginandosi con un ragazzo avventuroso, misterioso e che potesse combattere un drago senza spettinarsi.

  Entra Lysander. Era un cavaliere errante e trasudava assolutamente energia sigma, e quando Aurelia lo vide per la prima volta al banchetto reale, pensò: "Sono... vibrazioni da leggenda". Il tipo aveva drip da vendere e si muoveva con quella sicurezza silenziosa che urlava energia da Chad. Ogni volta che la guardava, si sentiva come se le avesse lanciato un incantesimo. Le sue amiche erano tutte tipo: "Scommettiamo. È lui il tuo tipo. Un totale cavaliere dall'armatura scintillante".

  Ma più lo conosceva, più iniziava a provare degli ick. All'inizio erano piccole cose, come il modo in cui scompariva improvvisamente per giorni senza una parola. Poi sentiva voci di lui beccato in 4k con altre ragazze nobili, e ogni volta che lei lo menzionava, lui faceva gaslighting, tipo: "Ma stai scherzando! Ti immagini le cose, Aurelia". E lei stava lì, dicendo a se stessa: "Se lo ignoro, non esiste". Ma la delusione iniziava a sembrare più una trappola che una fiaba, e Aurelia iniziò a pensare che "delulu is the solulu", ma non in senso buono.

  Nel frattempo, sua madre stava preparando un altro piano. Entra Lord Eldric, la scelta "sicura". I suoi genitori glielo proponevano da sempre. Non era il cavaliere misterioso o il ribelle con energia da Chad, ma era solido, un po' carino in modo "himbo", e rispettava davvero i suoi spazi. Sotto sotto, Eldric era un tipo "based". Non cercava di impressionarla con fantasiosi giochi di spada o vestiti pazzeschi; era solo... Eldric. Semplice, stabile, non una macchina di ick ambulante.

  Un giorno, stava chiacchierando con la sua amica, che ne aveva abbastanza di vederla sospirare per Lysander, dicendo: "Ragazza, non è cosa. Stai prosperando nel tuo piccolo mondo delulu, ma seriamente, Lord Eldric è lì che aspetta solo che tu ti accorga di lui". E Aurelia ci pensò, rendendosi conto che la sua amica poteva avere ragione. Bruh. Era rimasta intrappolata in tutto quel dramma, inseguendo qualche cavaliere errante di fantasia quando quello vero era proprio davanti a lei, sorseggiando tè e rilassandosi con vibrazioni totali di chi non si lascia scalfire e sta per i fatti suoi.

  Decise di fare una prova. Uscì con Eldric alcune volte, pensando: "Farò finta finché non diventerà vero". Ma più tempo passava con lui, più lui le piaceva. Non aveva energia da Chad, ma aveva questa forza silenziosa e una lealtà che sembrava... reale. La trattava come una regina (cosa che, decisamente, lei era) senza tutte le lamentele e i drammi. Con lui, non doveva preoccuparsi di essere beccata in 4k con qualcun altro o di sentire gossip su con chi fosse stato la settimana prima.

  Così, alla fine, ci si buttò, dicendo addio a Lysander e alla sua caotica e tossica energia da missione secondaria. E accettò di sposare Eldric, scegliendo finalmente la strada che i suoi genitori volevano per lei. Potevano non avere la romance epica e da "Pogchamp" che aveva sognato, ma lui era reale. Con Eldric, era al sicuro, rispettata e decisamente contenta.

  Aurelia controlla ancora il suo specchio incantato di tanto in tanto, guardando i momenti bruh, le romance da "L" e i drammi beccati in 4k di Thaloria, il tutto sorseggiando il suo tè e rilassandosi con suo marito. Potrebbe aver rinunciato a trovare il cavaliere errante dei suoi sogni, ma alla fine ha trovato qualcosa di ancora meglio: pace, stabilità e qualcuno che l'avrebbe presa sul serio ogni volta che fosse caduta.
