title: Ist es an der Zeit, den galaktischen Mindestlohn zu erhöhen?
slug: galaktischen-mindestlohn-erhoehen
intro: Marsianische Bergleute entwickeln zusätzliche Gliedmaßen, während sie für kaum genug Hexons arbeiten, um über die Runden zu kommen.
content: |-
  Alles klar, kosmische Bürger, wir müssen ein ernstes Gespräch über die marsianische Bergbauindustrie führen – wo die Bezahlung so schlecht ist wie die Arbeitsbedingungen und Blurgark, das radioaktive Wundergestein der Galaxis, die Arbeiter langsam in etwas verwandelt, das direkt aus einem Horror-Holovid stammt. Da die „Zweite Zustimmung des Heiligen Gurglax“ (der heiligste Feiertag der Galaxis) vor der Tür steht, ist es der perfekte Zeitpunkt zu fragen: Sollten wir endlich den galaktischen Mindestlohn erhöhen und diesem Wahnsinn ein Ende setzen?

  # Blurgark: Der radioaktive Jackpot, der Bergleute mutieren lässt

  Lassen Sie uns über Blurgark sprechen, das leuchtende, flüchtige Mineral, das alles antreibt, von Warp-Antrieben bis hin zu Weltraumheizungen. Sicher, es ist wertvoll, aber hier ist der Haken – das Zeug ist auch wahnsinnig gefährlich. Es ist extrem radioaktiv, was den Abbau zu einem One-Way-Ticket in die Mutantenstadt macht. Thren- und Salkari-Bergleute sind die armen Seelen, die damit beauftragt sind, Blurgark aus dem Boden zu ziehen, und es bewirkt mehr, als nur ihre Gesundheit zu ruinieren. Langzeitexposition gegenüber Blurgark? Sie müssen mit neuen Körperteilen rechnen, wo keine Körperteile sein sollten. Zusätzliche Gliedmaßen, seltsame Auswüchse, sogar ein drittes Auge, das mitten auf der Stirn auftaucht. Ja, damit haben diese Arbeiter zu kämpfen, während sie kaum von einem Lohn leben können, der angesichts des Risikos lächerlich ist.

  Die Thren mit ihrer Eiswelt-Herkunft und ihren leuchtenden violetten Augen halten irgendwie durch, aber selbst sie zeigen erste Anzeichen von Blurgark-Exposition. Währenddessen wachsen den Salkari, diesen reptiloiden Draufgängern, die Hitze und Strahlung wegstecken können wie niemand sonst, zusätzliche Schwänze – und nicht auf eine gute Art. Wir sprechen hier von echtem Body-Horror, und das alles nur, weil das Galaktische Konsortium sein Blurgark billig haben will.

  # Wohnraum und Essen? Viel Glück damit

  Wollen Sie wissen, wie das Leben auf dem Mars für diese Bergleute aussieht, wenn sie nicht gerade damit beschäftigt sind, zusätzliche Gliedmaßen auszubilden? Stellen Sie sich vor, Sie leben in einer engen, rostigen Blechdose an Orten wie Red Dunes Ridge oder Oxium Canyon, wo die Mieten astronomisch hoch sind und die Sauerstofffilter kaum funktionieren. Es ist entweder das oder Obdachlosigkeit auf der Marsoberfläche, was – Spoiler-Alarm – ein Todesurteil ist. Was das Essen angeht, nun ja, Sie sollten Nährstoffpaste lieben, denn das ist alles, was Sie sich leisten können. Alles, was auch nur im Entferntesten an frisches Essen erinnert, kostet mehr als einen Monatslohn.

  # Die Zweite Zustimmung des Heiligen Gurglax: Ein heiliger Feiertag und ein Funke für die Rebellion

  Der eigentliche Clou? Das alles passiert im Vorfeld der „Zweiten Zustimmung des Heiligen Gurglax“, dem größten und heiligsten Feiertag in der Galaxis. Gurglax, der Heilige der Arbeiter und Außenseiter überall, gab der Arbeiterklasse der Galaxis seinen legendären zweiten Daumen nach oben und segnete ihre Bemühungen. Bei diesem Feiertag geht es um Ruhe, Familie und das Feiern von Widerstandsfähigkeit angesichts von Widrigkeiten.

  Normalerweise würden die Thren und Salkari diesen Feiertag mit Festmählern, Ritualen und Zeit mit ihren Lieben groß feiern. Aber nicht auf dem Mars. Nein, hier schwingt die Galaktische Bergbaugilde die Peitsche und zwingt die Bergleute, sich durch den Feiertag zu schuften, um noch mehr Blurgark abzubauen, damit die Reichen ihre Weltraumvillen mit Energie beleuchten können, die frei von zusätzlichen Gliedmaßen ist. Es ist eine Beleidigung für alles, wofür der Heilige Gurglax steht, und die Leute haben es endgültig satt.

  # Die Untergrund-Rebellion: Die Zweite Zustimmung des Heiligen Gurglax wird nicht leise vergehen

  Und hier wird es richtig interessant. Es wird gemunkelt – Gerüchte über eine Untergrundorganisation, die im Stillen daran arbeitet, die galaktische Regierung während der bevorstehenden „Zweiten Zustimmung des Heiligen Gurglax“ zu stürzen. Sie nennen sich der Luminale Orden und sind nicht einfach nur eine Gruppe unzufriedener Bergleute. Sie sind ein schattenhaftes Netzwerk aus ehemaligen Arbeitern, Aktivisten und sogar einigen hochrangigen Beamten, die es leid sind zuzusehen, wie die Elite der Galaxis die Arbeiterklasse ausblutet.

  Der Luminale Orden hat sich in den Marskolonien ausgebreitet, kryptische Nachrichten in den Minenschächten hinterlassen, Ausrüstung sabotiert und geheime Treffen in den dunkelsten Ecken des Black Rock Outpost organisiert. Ihr Ziel? Das Chaos und die Symbolik der Zweiten Zustimmung des Heiligen Gurglax zu nutzen, um einen ausgewachsenen Aufstand zu entfachen. Sie glauben, dass sie das Galaktische Konsortium lahmlegen und echte Veränderungen erzwingen können, wenn sich genügend Bergleute und unterbezahlte Arbeiter in der ganzen Galaxis während des Feiertags erheben.

  Die Pläne des Luminalen Ordens sind immer noch geheimnisumwoben, aber es gibt Flüstern über einen koordinierten Streik – einen intergalaktischen Stillstand der Blurgark-Produktion während des heiligen Feiertags. Sie zielen darauf ab, das Konsortium dort zu treffen, wo es wehtut: in der Blurgark-Lieferkette. Wenn ihnen das gelingt, könnte dies der Anfang vom Ende für die korrupte Elite der Galaxis sein.

  # Das Fazit: Bezahlt die Bergleute oder bereitet euch auf die Revolte vor

  Mit der Zweiten Zustimmung des Heiligen Gurglax am Horizont sind die Bergleute auf dem Mars an einem Breakpoint angelangt. Ihnen wachsen zusätzliche Gliedmaßen, sie leben in Slums, essen Müll und bekommen keinen einzigen Sol frei – und das alles für Löhne, die nicht einmal für eine Fahrt mit einem Luxus-Hovertaxi auf der Erde reichen würden. Der galaktische Mindestlohn braucht eine ordentliche Aufbesserung, und wenn die Mächtigen nicht anfangen aufzupassen, könnte der Luminale Orden genau die Revolution starten, mit der sie gedroht haben.

  Also, wenn ihr da draußen zuhört, ihr Bonzen des Galaktischen Konsortiums – vielleicht ist es an der Zeit, die Leute zu bezahlen, die buchstäblich neue Gliedmaßen ausbilden, damit eure Lichter brennen. Denn wenn ihr das nicht tut, bekommt ihr dieses Jahr vielleicht mehr als nur einen zweiten Daumen nach oben vom Heiligen Gurglax – ihr könntet mit der Missbilligung der gesamten Galaxis konfrontiert werden.

  Gebt. Den. Arbeitern. Mehr. Hexons!
