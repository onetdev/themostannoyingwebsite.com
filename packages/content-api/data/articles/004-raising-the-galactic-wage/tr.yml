title: Galaktik asgari ücreti artırmanın zamanı geldi mi?
slug: galaktik-asgari-ucreti-artirmanin-zamani-geldi-mi
intro: Marslı madenciler, zar zor hayatta kalacak kadar hexion karşılığında çalışırken fazladan uzuvlar çıkarıyor.
content: |-
  Pekala, kozmik vatandaşlar, Mars madencilik endüstrisi hakkında ciddi bir konuşma yapmamız gerekiyor; ücretlerin çalışma koşulları kadar kötü olduğu ve galaksinin radyoaktif mucize taşı Blurgark'ın işçileri yavaş yavaş bir korku holovidinden fırlamış bir şeye dönüştürdüğü bir yer burası. Galaksinin en kutsal bayramı olan Aziz Gurglax'ın İkinci Onayı kapıdayken, sormanın tam zamanı: Galaktik Asgari Ücreti nihayet artırıp bu çılgınlığa bir son mu vermeliyiz?

  # Blurgark: Madencileri Mutasyona Uğratan Radyoaktif İkramiye

  Warp motorlarından uzay ısıtıcılarına kadar her şeye yakıt sağlayan parlayan, uçucu mineral Blurgark hakkında konuşalım. Elbette değerli, ama asıl mesele şu ki—bu şey aynı zamanda çılgınca tehlikeli. Aşırı radyoaktif, bu da onu kazmayı Mutasyon Kasabası'na tek yönlü bir bilet haline getiriyor. Blurgark'ı yerden çıkarma görevi verilen zavallı ruhlar Thren ve Salkari madencileri ve bu sadece sağlıklarını bozmakla kalmıyor. Blurgark'a uzun süreli maruz kalmak mı? Vücut parçalarının olmaması gereken yerlerde yeni vücut parçaları çıkmasından bahsediyoruz. Fazladan uzuvlar, garip oluşumlar, hatta alnınızın ortasında fırlayan üçüncü bir göz. Evet, bu işçiler risk karşısında gülünç kalan bir ücretle zar zor geçinirken bunlarla uğraşıyorlar.

  Buz dünyası kökenleri ve parlayan mor gözleriyle Threnler bir şekilde dayanıyorlar ama onlar bile Blurgark maruziyeti belirtileri göstermeye başladı. Bu arada, ısıyı ve radyasyonu kimsenin yapamadığı kadar iyi idare edebilen o sürüngenimsi sert çocuklar Salkariler, fazladan kuyruklar çıkarıyorlar—ve bu iyi bir anlamda değil. Galaktik Konsorsiyum Blurgark'ını ucuza istiyor diye ciddi bir vücut korkusundan (body horror) bahsediyoruz.

  # Barınma ve Yemek mi? Bol Şans

  Bu madencilerin fazladan uzuvlar çıkarmakla meşgul olmadıkları zamanlarda Mars'taki hayatlarının nasıl olduğunu bilmek ister misiniz? Kiraların gökyüzüne fırladığı ve oksijen filtrelerinin zar zor çalıştığı Red Dunes Ridge veya Oxium Canyon gibi yerlerde, dar ve paslı bir teneke kutuda yaşadığınızı hayal edin. Ya bu ya da Mars yüzeyinde evsizlik ki bu, spoiler uyarısı, bir ölüm cezasıdır. Yemek konusuna gelince, besin macununu sevseniz iyi olur çünkü alabileceğiniz tek şey bu. Taze yiyeceğe benzeyen her şey bir aylık ücretten daha fazlasına mal oluyor.

  # Aziz Gurglax'ın İkinci Onayı: Kutsal Bir Bayram ve İsyanın Kıvılcımı

  Asıl can alıcı nokta mı? Tüm bunlar, galaksideki en büyük, en kutsal bayram olan Aziz Gurglax'ın İkinci Onayı öncesinde yaşanıyor. İşçilerin ve ezilenlerin azizi olan Gurglax, galaksinin işçi sınıfına efsanevi ikinci başparmak havaya işaretini vererek çabalarını kutsamıştı. Bu bayram tamamen dinlenme, aile ve zorluklar karşısında direnci kutlamakla ilgilidir.

  Normalde Thren ve Salkari bu bayram için ziyafetler, ritüeller ve sevdikleriyle vakit geçirerek her şeylerini ortaya koyarlardı. Ama Mars'ta değil. Hayır, burada Galaktik Madencilik Loncası kırbaç sallıyor, madencileri bayram boyunca çalışmaya devam etmeye zorluyor, daha fazla Blurgark çıkarıyorlar ki zenginler uzay malikanelerini fazladan uzuvsuz enerjiyle aydınlatabilsinler. Bu, Aziz Gurglax'ın temsil ettiği her şeye bir hakarettir ve insanlar ciddi şekilde bıktı.

  # Yeraltı İsyanı: Aziz Gurglax'ın İkinci Onayı Sessiz Geçmeyecek

  Ve işte işlerin gerçekten ilginçleştiği yer burası. Yaklaşan Aziz Gurglax'ın İkinci Onayı sırasında Galaktik hükümeti devirmek için sessizce çalışan bir yeraltı örgütü hakkında konuşmalar, söylentiler var. Kendilerine Luminal Düzen diyorlar ve onlar sadece bir grup hoşnutsuz madenci değiller. Galaksinin elitlerinin işçi sınıfını sömürmesini izlemekten yorulmuş eski işçiler, aktivistler ve hatta birkaç üst düzey yetkiliden oluşan gölgeli bir ağlar.

  Luminal Düzen Mars kolonilerine yayılıyor, maden tünellerine şifreli mesajlar bırakıyor, ekipmanları sabote ediyor ve Black Rock Karakolu'nun en karanlık köşelerinde gizli toplantılar düzenliyor. Hedefleri mi? Aziz Gurglax'ın İkinci Onayı'nın kaosunu ve sembolizmini tam teşekküllü bir ayaklanmayı ateşlemek için kullanmak. Galaksi genelinde yeterince madenci ve düşük ücretli işçi bayram sırasında ayaklanırsa, Galaktik Konsorsiyum'u felç edebileceklerine ve gerçek bir değişimi zorlayabileceklerine inanıyorlar.

  Luminal Düzen'in planları hala gizemini koruyor, ancak kutsal bayram sırasında Blurgark üretiminin galaksiler arası bir şekilde durdurulacağı koordineli bir grev fısıltıları var. Konsorsiyumu can evinden vurmayı hedefliyorlar: Blurgark tedarik zinciri. Eğer bunu başarırlarsa, galaksinin yozlaşmış elitleri için sonun başlangıcı olabilir.

  # Sonuç: Madencilere Ödeyin ya da İsyanına Hazırlanın

  Aziz Gurglax'ın İkinci Onayı ufukta görünürken, Mars madencileri kırılma noktasındalar. Fazladan uzuvlar çıkarıyorlar, gecekondularda yaşıyorlar, çöp yiyorlar ve sıfır izin alıyorlar—tüm bunlar Dünya'da lüks bir hover-taksi yolculuğunu bile karşılamayacak ücretler için. Galaktik Asgari Ücretin ciddi bir artışa ihtiyacı var ve eğer iktidardakiler dikkat etmeye başlamazsa, Luminal Düzen tehdit ettikleri devrimi başlatabilir.

  Yani, eğer orada bir yerlerde dinliyorsanız, Galaktik Konsorsiyum'un şişko kedileri—belki de ışıklarınızı açık tutmak için kelimenin tam anlamıyla yeni uzuvlar çıkaran insanlara ödeme yapma vaktiniz gelmiştir. Çünkü yapmazsanız, bu yıl Aziz Gurglax'tan sadece ikinci bir başparmak havaya işareti almayabilirsiniz—tüm galaksinin onaylamayan bakışlarıyla karşı karşıya kalabilirsiniz.

  İşçilere. Daha. Fazla. Hexion. Verin!
