title: 提高银河系工资
slug: ti-gao-yin-he-xi-gong-zi
intro: 火星矿工们为了勉强维持生计的几个黑克森硬币，正在长出额外的肢体。
content: |-
  好了，宇宙公民们，我们需要认真聊聊火星采矿业了——那里的工资和工作环境一样糟糕，而布鲁加克（Blurgark），那种银河系放射性奇迹之石，正慢慢把工人们变成恐怖全息影像里走出来的怪物。随着圣古格拉克斯的第二次批准（银河系最神圣的节日）即将到来，现在正是问这个问题的好时机：我们是否应该最终提高银河系最低工资并停止这种疯狂行为？

  # 布鲁加克：让矿工变异的放射性大奖

  让我们聊聊布鲁加克，这种发光的、不稳定的矿物，它为从曲速驱动器到太空加热器的一切提供燃料。当然，它很有价值，但问题是——这玩意儿也非常危险。它具有超强的放射性，这使得开采它就像是领了一张去“变异镇”的单程票。特伦（Thren）和萨尔卡里（Salkari）矿工是那些倒霉蛋，负责把布鲁加克从地下挖出来，而这不仅仅是在摧毁他们的健康。长期暴露在布鲁加克面前？你会在不该长器官的地方长出新的身体部位。额外的肢体、奇怪的肿块，甚至额头中间还会冒出第三只眼。没错，这就是这些工人们在面对连风险都抵消不了的微薄工资时所面临的情况。

  特伦人，由于起源于冰冷世界且拥有发光的紫色眼睛，多少还能挺住，但即使是他们也开始表现出布鲁加克暴露的迹象。与此同时，萨尔卡里人，那些能像家常便饭一样处理热量和辐射的爬虫类硬汉，正在长出额外的尾巴——而且不是以好的方式。我们说的是严肃的肉体恐怖，这一切仅仅是因为银河财团想要廉价的布鲁加克。

  # 住房和食物？祝你好运

  想知道这些矿工在不忙着长额外肢体时，在火星上的生活是怎样的吗？想象一下，住在红沙丘岭或氧气峡谷这些地方狭窄、生锈的锡罐屋里，那里的租金高得离谱，氧气过滤器几乎不工作。要么住那儿，要么在火星表面流浪，顺便剧透一下，那是死路一条。至于食物，嗯，你最好爱上营养膏，因为那是你唯一买得起的东西。任何看起来像新鲜食物的东西，价格都超过了一个月的工资。

  # 圣古格拉克斯的第二次批准：神圣的节日与反抗的火花

  真正的讽刺之处在于？所有这一切都发生在圣古格拉克斯的第二次批准——银河系最大、最神圣的节日——的前夕。古格拉克斯，各地工人和弱势群体的圣人，向银河系的工人阶级竖起了他传奇的第二个大拇指，祝福他们的努力。这个节日的主题是休息、家庭和庆祝面对逆境时的韧性。

  通常情况下，特伦人和萨尔卡里人会为了这个节日全力以赴，举行宴会、仪式，并与亲人共度时光。但在火星上，不。在这里，银河采矿协会正挥舞着鞭子，强迫矿工在节日期间继续苦干，开采更多的布鲁加克，好让富人们能用这些没有额外肢体代价的能源点亮他们的太空豪宅。这是对圣古格拉克斯所代表的一切的侮辱，人们已经感到厌烦透顶了。

  # 地下反抗军：圣古格拉克斯的第二次批准不会悄无声息地过去

  这里事情变得非常有趣了。一直有传言——关于一个在即将到来的圣古格拉克斯第二次批准期间秘密运作以推翻银河政府的地下组织。他们称自己为“流明指令”（Luminal Order），他们不仅仅是一群心怀不满的矿工。他们是一个由前工人、活动家甚至几位厌倦了看着银河精英榨干工人阶级的高级官员组成的神秘网络。

  流明指令一直在火星殖民地传播，在采矿隧道里留下隐秘信息，破坏设备，并在黑石哨所最黑暗的角落组织秘密会议。他们的目标？利用圣古格拉克斯第二次批准的混乱和象征意义来点燃一场全面的起义。他们相信，如果银河系有足够的矿工和低薪工人在节日期间起义，他们就能瘫痪银河财团并迫使真正的变革发生。

  流明指令的计划仍笼罩在神秘之中，但有传言称将有一次协同罢工——在神圣节日期间跨星系关停布鲁加克生产。他们旨在打击财团的最痛处：布鲁加克供应链。如果他们成功了，这可能是银河系腐败精英终结的开始。

  # 底线：给矿工发工资，或者准备迎接造反

  随着圣古格拉克斯的第二次批准即将到来，火星矿工正处于崩溃边缘。他们长出了额外的肢体，住在贫民窟，吃着垃圾，而且零休假——所有这些换来的工资甚至不够在地球上坐一次豪华悬浮出租车。银河系最低工资需要大幅提升，如果当权者还不开始关注，流明指令可能真的会启动他们一直威胁的那场革命。

  所以，如果你们在那儿听着的话，银河财团的肥猫们——也许是时候给那些为了让你们灯火通明而真的长出新肢体的人发工资了。因为如果你不这么做，今年你从圣古格拉克斯那里得到的可能不仅仅是第二个大拇指——你可能会面临全银河系的不满。

  给。工人。更多。黑克森！
