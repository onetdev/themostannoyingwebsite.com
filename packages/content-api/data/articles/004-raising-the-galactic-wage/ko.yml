title: "은하계 최저 임금을 인상할 때인가요?"
slug: "eunhagye-choeje-imgeum-insang"
intro: "화성의 광부들은 겨우 생계를 유지할 정도의 헥시온을 벌면서 추가 팔다리가 자라나고 있습니다."
content: |-
  자, 우주 시민 여러분, 우리는 화성 광업에 대해 진지하게 이야기를 나눠봐야 합니다. 이곳의 급여는 작업 환경만큼이나 열악하며, 은하계의 방사능 경이석인 '블러가크(Blurgark)'는 노동자들을 서서히 공포 홀로비전에서나 볼 법한 존재로 변화시키고 있습니다. 은하계에서 가장 신성한 휴일인 '성 거글락스의 두 번째 승인(Saint Gurglax's Second Approval)'이 코앞으로 다가온 지금, 질문을 던져볼 완벽한 타이밍입니다. 이제 은하계 최저 임금을 인상하고 이 광기를 멈춰야 하지 않을까요?

  # 블러가크: 광부들을 변이시키는 방사능 잭팟

  워프 드라이브부터 우주 히터까지 모든 것의 연료가 되는 빛나고 휘발성이 강한 광물, 블러가크에 대해 이야기해 봅시다. 물론 가치 있는 물건이지만, 문제는 이 물질이 미칠 듯이 위험하다는 것입니다. 방사능이 매우 강해서 블러가크 채굴은 '변이 마을'로 가는 편도 티켓이나 다름없습니다. 트렌(Thren)과 살카리(Salkari) 광부들은 땅속에서 블러가크를 끌어올리는 임무를 맡은 불쌍한 영혼들이며, 이 물질은 단순히 그들의 건강을 망치는 것 이상의 일을 하고 있습니다. 블러가크에 장기간 노출되면 어떻게 될까요? 원래는 없어야 할 곳에 새로운 신체 부위가 생겨납니다. 추가 팔다리, 기괴한 혹, 심지어 이마 한가운데에 제3의 눈이 튀어나오기도 합니다. 네, 이것이 바로 광부들이 직면한 현실입니다. 그들은 이런 위험을 감수하면서도 비웃음이 나올 정도로 적은 임금으로 겨우 연명하고 있습니다.

  얼음 행성 출신으로 보라색 눈을 빛내는 트렌족은 어떻게든 버티고 있지만, 그들조차 블러가크 노출의 징후를 보이기 시작했습니다. 한편, 열기와 방사능을 식은 죽 먹기처럼 다루는 파충류 종족인 살카리족은 추가 꼬리가 자라나고 있습니다. 물론 좋은 의미는 아닙니다. 은하계 컨소시엄이 블러가크를 싸게 얻고 싶어 하는 바람에 벌어지는 심각한 신체적 공포입니다.

  # 주거와 음식? 운이 좋기를 바랄 뿐

  추가 팔다리가 자라나는 것 외에 화성 광부들의 삶이 어떤지 알고 싶으신가요? '붉은 사구 능선(Red Dunes Ridge)'이나 '옥시움 협곡(Oxium Canyon)' 같은 곳에 있는 좁고 녹슨 깡통 같은 방에서 살고 있다고 상상해 보세요. 집세는 하늘 높은 줄 모르고 치솟고, 산소 필터는 겨우 작동하는 수준입니다. 그런 곳이 아니라면 화성 표면에서 노숙해야 하는데, 이는 곧 사형 선고나 다름없습니다. 음식에 대해서라면, 영양 페이스트를 사랑하는 법을 배우는 게 좋을 겁니다. 당신이 감당할 수 있는 유일한 음식이니까요. 신선한 음식과 비슷해 보이는 것은 한 달 치 월급보다 비쌉니다.

  # 성 거글락스의 두 번째 승인: 신성한 휴일이자 반란의 불꽃

  정말 어처구니없는 사실은 이 모든 일이 은하계에서 가장 크고 신성한 휴일인 '성 거글락스의 두 번째 승인'을 앞두고 일어나고 있다는 점입니다. 모든 노동자와 약자들의 성인인 거글락스는 은하계의 노동 계급에게 전설적인 '두 번째 엄지 척'을 선사하며 그들의 노고를 축복했습니다. 이 휴일은 휴식과 가족, 그리고 역경에 맞서는 회복탄력성을 기념하는 날입니다.

  평소라면 트렌족과 살카리족은 축제와 의식, 사랑하는 이들과 함께하는 시간으로 이 휴일을 성대하게 보냈을 것입니다. 하지만 화성에서는 아닙니다. 이곳의 은하계 광업 길드는 채찍을 휘두르며 광부들이 휴일에도 계속해서 일을 하도록 강요하고 있습니다. 부유층들이 신체 변이 걱정 없는 에너지를 사용해 자신들의 우주 저택을 밝힐 수 있도록 더 많은 블러가크를 추출하게 하는 것이죠. 이는 성 거글락스가 상징하는 모든 것에 대한 모욕이며, 사람들은 진심으로 분노하고 있습니다.

  # 지하 반란: 성 거글락스의 두 번째 승인은 조용히 지나가지 않을 것

  그리고 여기서 흥미로운 일이 벌어집니다. 다가오는 성 거글락스의 두 번째 승인 기간 동안 은하계 정부를 전복시키기 위해 조용히 움직이는 지하 조직에 대한 소문이 돌고 있습니다. 그들은 스스로를 '루미널 오더(Luminal Order)'라고 부르며, 단순히 불만을 품은 광부들의 모임이 아닙니다. 그들은 은하계의 엘리트들이 노동 계급의 피를 말리는 것을 지켜보는 데 지친 전직 노동자, 활동가, 심지어 몇몇 고위 관료들로 구성된 그림자 네트워크입니다.

  루미널 오더는 화성 식민지 전역으로 퍼져나가 채굴 터널에 암호화된 메시지를 남기고, 장비를 파괴하며, '블랙 락 전초기지(Black Rock Outpost)'의 가장 어두운 구석에서 비밀 회의를 조직하고 있습니다. 그들의 목표는 성 거글락스의 두 번째 승인이 가진 혼란과 상징성을 이용해 본격적인 봉기를 일으키는 것입니다. 그들은 은하계 전역의 충분한 광부들과 저임금 노동자들이 휴일 동안 들고 일어난다면, 은하계 컨소시엄을 무력화하고 실질적인 변화를 강제할 수 있다고 믿습니다.

  루미널 오더의 계획은 여전히 베일에 싸여 있지만, 신성한 휴일 동안 블러가크 생산을 전 은하계적으로 중단시키는 조직적인 파업에 대한 소문이 돌고 있습니다. 그들은 컨소시엄의 가장 아픈 곳인 블러가크 공급망을 타격하려 합니다. 만약 성공한다면, 그것은 은하계 부패 엘리트들의 종말의 시작이 될 수도 있습니다.

  # 결론: 광부들에게 급여를 지급하거나, 아니면 반란을 각오하라

  성 거글락스의 두 번째 승인이 다가오면서 화성의 광부들은 한계점에 도달했습니다. 그들은 추가 팔다리가 자라나고, 빈민가에서 살며, 쓰레기 같은 음식을 먹고, 단 하루의 휴일도 보장받지 못하고 있습니다. 이 모든 것이 지구에서의 럭셔리 호버 택시비조차 감당하지 못할 임금을 위해 벌어지는 일입니다. 은하계 최저 임금은 대폭 인상되어야 하며, 만약 권력자들이 관심을 기울이지 않는다면 루미널 오더가 그들이 위협해 온 혁명을 시작할지도 모릅니다.

  그러니 저기 있는 은하계 컨소시엄의 탐욕스러운 자들아—말 그대로 새로운 팔다리가 자라나며 당신들의 전등을 밝히고 있는 사람들에게 정당한 대가를 지불할 때입니다. 그렇지 않으면 올해 성 거글락스로부터 받는 것은 단순한 '두 번째 엄지 척'이 아니라, 은하계 전체의 분노가 될 것입니다.

  노동자들에게. 더 많은. 헥시온을. 지급하라!
