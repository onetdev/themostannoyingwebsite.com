title: क्या गैलेक्टिक न्यूनतम वेतन बढ़ाने का समय आ गया है?
slug: kya-galactic-nyuntam-vetan-badhane-ka-samay-aa-gaya-hai
intro: मंगल ग्रह के खनिक मुश्किल से इतने हेक्सोन (hexions) कमा पा रहे हैं कि जीवित रह सकें, और इस बीच उनके अतिरिक्त अंग उग रहे हैं।
content: |-
  ठीक है, ब्रह्मांडीय नागरिकों, हमें मंगल ग्रह के खनन उद्योग के बारे में एक गंभीर बातचीत करने की ज़रूरत है—जहाँ वेतन उतना ही खराब है जितना कि काम करने की स्थिति, और ब्लरगार्क (Blurgark), आकाशगंगा का रेडियोधर्मी चमत्कार-पत्थर, धीरे-धीरे श्रमिकों को किसी डरावनी होलोविड (horror holovid) की चीज़ में बदल रहा है। सेंट गुरग्लैक्स के दूसरे अनुमोदन (आकाशगंगा का सबसे पवित्र अवकाश) के ठीक करीब होने के साथ, यह पूछने का सही समय है: क्या हमें अंततः गैलेक्टिक न्यूनतम वेतन बढ़ाना चाहिए और इस पागलपन को रोकना चाहिए?

  # ब्लरगार्क: वह रेडियोधर्मी जैकपॉट जो खनिकों को म्यूटेंट बना रहा है

  आइए ब्लरगार्क के बारे में बात करते हैं, वह चमकता हुआ, अस्थिर खनिज जो ताना बाना (warp) ड्राइव से लेकर स्पेस हीटर तक सब कुछ ईंधन देता है। निश्चित रूप से, यह मूल्यवान है, लेकिन यहाँ मुख्य बात यह है—यह चीज़ बेहद खतरनाक भी है। यह सुपर रेडियोधर्मी है, जो इसके खनन को म्यूटेंट टाउन का वन-वे टिकट बना देता है। थ्रेन (Thren) और साल्करी (Salkari) खनिक वे बेचारे जीव हैं जिन्हें जमीन से ब्लरगार्क निकालने का काम सौंपा गया है, और यह सिर्फ उनके स्वास्थ्य को बर्बाद करने से कहीं अधिक कर रहा है। ब्लरगार्क के लंबे समय तक संपर्क में रहने का मतलब है? आपके शरीर के उन हिस्सों में नए अंग उग रहे हैं जहाँ उन्हें नहीं होना चाहिए। अतिरिक्त अंग, अजीब वृद्धि, यहाँ तक कि आपके माथे के बीच में तीसरी आँख का निकलना। हाँ, ये कर्मचारी इसी से जूझ रहे हैं जबकि वे जोखिम के सामने हास्यास्पद वेतन पर बमुश्किल गुजारा कर रहे हैं।

  थ्रेन, अपने बर्फ-दुनिया के मूल और चमकती बैंगनी आँखों के साथ, किसी तरह टिके हुए हैं, लेकिन वे भी ब्लरगार्क के संपर्क के लक्षण दिखाने लगे हैं। इस बीच, साल्करी, वे सरीसृप (reptilian) लड़ाके जो गर्मी और विकिरण को किसी और की तरह नहीं झेल सकते, उनकी अतिरिक्त पूंछें उग रही हैं—और अच्छे तरीके से नहीं। हम गंभीर बॉडी हॉरर की बात कर रहे हैं, सब इसलिए क्योंकि गैलेक्टिक कंसोर्टियम (Galactic Consortium) अपना ब्लरगार्क सस्ते में चाहता है।

  # आवास और भोजन? उसके लिए शुभकामनाएं

  जानना चाहते हैं कि जब ये खनिक अतिरिक्त अंग उगाने में व्यस्त नहीं होते हैं तो मंगल ग्रह पर जीवन कैसा होता है? रेड ड्यून्स रिज (Red Dunes Ridge) या ऑक्सियम कैन्यन (Oxium Canyon) जैसी जगहों पर एक तंग, जंग लगे टिन के डिब्बे में रहने की कल्पना करें, जहाँ किराया आसमान छू रहा है, और ऑक्सीजन फिल्टर बमुश्किल काम करते हैं। या तो यह या मंगल की सतह पर बेघर होना, जो कि एक मौत की सजा है। जहाँ तक भोजन का सवाल है, तो बेहतर होगा कि आप पोषक पेस्ट (nutrient paste) से प्यार करें, क्योंकि आप केवल यही वहन कर सकते हैं। ताज़ा भोजन जैसी किसी भी चीज़ की कीमत एक महीने के वेतन से अधिक होती है।

  # सेंट गुरग्लैक्स का दूसरा अनुमोदन: एक पवित्र अवकाश और विद्रोह की एक चिंगारी

  असली बात? यह सब सेंट गुरग्लैक्स के दूसरे अनुमोदन की अगुवाई में हो रहा है, जो आकाशगंगा का सबसे बड़ा, सबसे पवित्र अवकाश है। गुरग्लैक्स, हर जगह श्रमिकों और कमजोरों के संत, ने आकाशगंगा के श्रमिक वर्ग को अपना प्रसिद्ध दूसरा 'थम्स-अप' दिया, उनके प्रयासों को आशीर्वाद दिया। यह अवकाश पूरी तरह से आराम, परिवार और प्रतिकूल परिस्थितियों में लचीलेपन का जश्न मनाने के बारे में है।

  आम तौर पर, थ्रेन और साल्करी दावतों, अनुष्ठानों और प्रियजनों के साथ समय बिताने के साथ इस अवकाश के लिए पूरी तरह तैयार होते। लेकिन मंगल ग्रह पर नहीं। नहीं, यहाँ गैलेक्टिक माइनिंग गिल्ड (Galactic Mining Guild) चाबुक चला रहा है, खनिकों को अवकाश के दौरान भी पीसते रहने के लिए मजबूर कर रहा है, अधिक ब्लरगार्क निकाल रहा है ताकि अमीर अपने अंतरिक्ष महलों को अतिरिक्त अंग-मुक्त ऊर्जा से रोशन कर सकें। यह उन सभी चीज़ों का अपमान है जिनके लिए सेंट गुरग्लैक्स खड़े हैं, और लोग अब गंभीर रूप से तंग आ चुके हैं।

  # भूमिगत विद्रोह: सेंट गुरग्लैक्स का दूसरा अनुमोदन चुपचाप नहीं जाएगा

  और यहाँ चीज़ें वास्तव में दिलचस्प हो जाती हैं। एक भूमिगत संगठन के बारे में बातचीत—अफवाहें चल रही हैं जो आगामी सेंट गुरग्लैक्स के दूसरे अनुमोदन के दौरान गैलेक्टिक सरकार को उखाड़ फेंकने के लिए चुपचाप काम कर रहा है। वे खुद को ल्यूमिनल ऑर्डर (Luminal Order) कहते हैं, और वे केवल असंतुष्ट खनिकों का कोई समूह नहीं हैं। वे पूर्व श्रमिकों, कार्यकर्ताओं और यहाँ तक कि कुछ उच्च पदस्थ अधिकारियों का एक छायादार नेटवर्क हैं जो आकाशगंगा के अभिजात वर्ग को श्रमिक वर्ग का खून चूसते हुए देखकर थक गए हैं।

  ल्यूमिनल ऑर्डर मंगल ग्रह की कॉलोनियों में फैल रहा है, खनन सुरंगों में गुप्त संदेश छोड़ रहा है, उपकरणों को खराब कर रहा है और ब्लैक रॉक आउटपोस्ट (Black Rock Outpost) के सबसे अंधेरे कोनों में गुप्त बैठकें आयोजित कर रहा है। उनका लक्ष्य? एक पूर्ण विद्रोह को भड़काने के लिए सेंट गुरग्लैक्स के दूसरे अनुमोदन की अराजकता और प्रतीकवाद का उपयोग करना। उनका मानना है कि यदि पूरे आकाशगंगा में पर्याप्त खनिक और कम वेतन वाले कर्मचारी अवकाश के दौरान उठ खड़े होते हैं, तो वे गैलेक्टिक कंसोर्टियम को पंगु बना सकते हैं और वास्तविक बदलाव के लिए मजबूर कर सकते हैं।

  ल्यूमिनल ऑर्डर की योजनाएँ अभी भी रहस्य में डूबी हुई हैं, लेकिन एक समन्वित हमले की फुसफुसाहट है—पवित्र अवकाश के दौरान ब्लरगार्क उत्पादन का एक अंतरतारकीय (intergalactic) शटडाउन। वे कंसोर्टियम को वहाँ चोट पहुँचाने का लक्ष्य रख रहे हैं जहाँ उसे सबसे ज्यादा दर्द होता है: ब्लरगार्क आपूर्ति श्रृंखला में। यदि वे इसे कर लेते हैं, तो यह आकाशगंगा के भ्रष्ट अभिजात वर्ग के अंत की शुरुआत हो सकती है।

  # निष्कर्ष: खनिकों को भुगतान करें या विद्रोह के लिए तैयार रहें

  क्षितिज पर सेंट गुरग्लैक्स के दूसरे अनुमोदन के साथ, मंगल ग्रह के खनिक टूटने के कगार पर हैं। उनके अतिरिक्त अंग उग रहे हैं, वे मलिन बस्तियों में रह रहे हैं, कचरा खा रहे हैं, और उन्हें एक भी छुट्टी नहीं मिल रही है—यह सब उस वेतन के लिए जो पृथ्वी पर एक लग्जरी होवर-टैक्सी की सवारी के खर्च को भी कवर नहीं करेगा। गैलेक्टिक न्यूनतम वेतन को गंभीर बढ़ावा देने की आवश्यकता है, और यदि सत्ता में बैठे लोग ध्यान देना शुरू नहीं करते हैं, तो ल्यूमिनल ऑर्डर उस क्रांति की शुरुआत कर सकता है जिसकी वे धमकी देते रहे हैं।

  तो, यदि आप वहाँ सुन रहे हैं, गैलेक्टिक कंसोर्टियम के मोटे बिल्लियों—शायद उन लोगों को भुगतान करने का समय आ गया है जो आपकी लाइट चालू रखने के लिए सचमुच नए अंग उगा रहे हैं। क्योंकि यदि आप नहीं करते हैं, तो आपको इस वर्ष सेंट गुरग्लैक्स से केवल दूसरा 'थम्स-अप' ही नहीं मिल सकता है—आपको पूरी आकाशगंगा की अस्वीकृति का सामना करना पड़ सकता है।

  श्रमिकों। को। अधिक। हेक्सोन। दें!
