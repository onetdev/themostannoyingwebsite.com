title: Historias de una epidemia de derechos creciente
slug: the-rise-of-entitlement
intro: Contiene absolutamente nada de nuestros lectores
content: |-
  En un mundo donde la gratificación instantánea se ha convertido en la norma, hay una creciente sensación de derecho que se está saliendo de control. Ya sea en el servicio al cliente, las interacciones sociales o incluso la dinámica familiar, más personas parecen creer que el mundo les debe algo simplemente por existir. Si bien la confianza en uno mismo y la defensa son rasgos saludables, el sentido de derecho, donde las personas esperan privilegios o recompensas excesivas sin mérito, se ha desviado hacia el absurdo. Desde lo risible hasta lo francamente vergonzoso, las historias de las comunidades en línea, especialmente el infame subreddit "Entitled People", ilustran cuán desconectados de la realidad se han vuelto algunos individuos.

  # 1. El caso del "Gracias" de $100

  Una de las historias más asombrosas involucra a una novia y su audaz solicitud de que un invitado a la boda desembolse $100 para compensar un regalo considerado "insuficiente". El invitado había dado un regalo considerado del registro, pero semanas después de la boda, recibió un mensaje de la novia. "Noté que tu regalo solo valía $25", dijo la novia, "lo que realmente no cubre el costo de tu asistencia a la boda. ¿Podrías enviarnos amablemente $100 adicionales?"

  Esta historia personifica el derecho moderno: la expectativa de que los invitados no solo deben honrar una invitación sino también cubrir los costos de las elecciones extravagantes del anfitrión. Lo absurdo de esta situación radica en la total falta de gratitud y un sentido exagerado de lo que otros "deben" a cambio de una invitación a una celebración.

  # 2. Exigir un descuento en una comida gratis

  Otra historia proviene de un trabajador de comida rápida que relató un encuentro impactante con un cliente en su subreddit. Durante una promoción, la cadena ofreció una comida gratis a los clientes. Sin embargo, un cliente no estaba satisfecho con simplemente recibir una comida sin costo. "¿Por qué no hay un descuento en el refresco gratis?", exigió el cliente, alegando que aunque el refresco era parte de la comida gratis, debería venir con un porcentaje adicional de descuento sobre el costo inexistente.

  El servidor, desconcertado, explicó que la comida, incluido el refresco, ya era gratis. Aún así, el cliente discutió durante varios minutos, insistiendo en que se merecía un descuento en el artículo gratuito porque, en sus palabras, "todo debería venir con una oferta".

  # 3. El padre que exigió una niñera, para siempre

  Una publicación de una joven que relata una interacción con una prima lejana arroja luz sobre el derecho dentro de la dinámica familiar. Después de cuidar a los hijos de su prima una vez, fue bombardeada con solicitudes de la prima, quien asumió que sería una proveedora permanente de cuidado infantil gratuito. Cuando la joven explicó que tenía una agenda ocupada y no siempre podía estar disponible, su prima estalló, diciendo: "¡Soy familia! ¿No te importa ayudar a tu familia? ¡Merezco tu tiempo porque eres mi prima!"

  El derecho dentro de las situaciones familiares a menudo puede ser más difícil de navegar, ya que algunas personas asumen que los lazos familiares significan que los límites no existen. Lo que debería haber sido un favor único se convirtió rápidamente en expectativas irrazonables de servidumbre, todo debido a la creencia de que la familia nunca debería decir "no".

  # 4. "Influencers" esperando todo gratis

  Una versión moderna del derecho ha florecido con el auge de los influencers de las redes sociales, algunos de los cuales creen que su "fama" debería traducirse en servicios gratuitos. Una historia, ampliamente compartida en línea, involucra al dueño de un restaurante que recibió un mensaje directo de un autoproclamado influencer con un seguimiento modesto. El influencer prometió publicar sobre el restaurante a cambio de una comida gratis para ellos y tres amigos.

  Cuando el propietario declinó cortésmente, explicando que muchos clientes que pagan disfrutan de las ofertas del restaurante sin buscar regalos, el influencer arremetió, acusando al restaurante de no entender el "poder de la exposición". ¿La guinda del pastel? El influencer tenía menos de 2.000 seguidores. La audacia de exigir una comida gratis por una promesa de "exposición", que en realidad no ofrece garantía de valor para el restaurante, destaca cuán inflada puede llegar a ser la autoestima de las personas en la era de las redes sociales.

  # 5. El inquilino que exigió una casa gratis

  Una publicación detalló las escandalosas demandas de un inquilino que creía que no debería tener que pagar el alquiler porque había "estado allí tanto tiempo" que el propietario debería estar agradecido por su presencia. Después de vivir en el apartamento por poco más de un año, el inquilino dejó de pagar el alquiler y, cuando fue confrontado, argumentó que había "hecho suficiente" al ser un inquilino estable durante 12 meses.

  Insistieron en que el propietario estaba siendo codicioso al esperar un pago continuo y argumentaron que merecían alojamiento gratuito por su lealtad. Naturalmente, el propietario no se dejó convencer, pero la idea de que simplemente quedarse en una propiedad de alquiler significaba que tenían derecho a vivienda gratuita subraya hasta dónde puede llegar el sentido de derecho.

  # ¿Dónde termina?

  El derecho, al parecer, tiene sus raíces en una falta de perspectiva y un sentido exagerado de la propia importancia. Lo más inquietante de estas historias es que, para las personas involucradas, sus demandas parecían completamente razonables. No estaban preguntando, estaban esperando.

  Entonces, ¿qué alimenta esta mentalidad? Parte de ello proviene de vivir en una cultura que prioriza cada vez más el individualismo sobre la comunidad. También está el auge de las redes sociales, donde a las personas se les dice constantemente que "exijan lo que se merecen", lo que lleva a algunos a confundir las necesidades genuinas con deseos irrazonables. Por último, la cultura del consumismo, que premia la gratificación instantánea, deja a algunos individuos sin la paciencia para esperar o trabajar por lo que quieren, asumiendo que deberían recibirlo simplemente pidiéndolo, o, más exactamente, exigiéndolo.

  # La conclusión

  Si bien defenderse a uno mismo es saludable, hay una diferencia entre conocer tu valor y ser irrazonablemente intitulado. Navegar por la vida significa aceptar que los demás no nos deben nada, que los regalos y favores son actos de bondad, no obligaciones. Como ilustran estas historias, la línea entre la autodefensa segura y el derecho absoluto se cruza fácilmente, y es una línea peligrosa de desdibujar.

  Al final, la regla de oro permanece: Trata a los demás con respeto. El mundo no nos debe nada, y actuar como si lo hiciera solo conduce a la decepción, tanto para los intitulados como para aquellos a quienes exigen.
