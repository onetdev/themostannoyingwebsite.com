title: 肥大化する「権利意識」のパンデミック・ストーリー
slug: hidaikasuru-kenriishiki-no-pandemikku-suto-ri-
intro: 読者からの投稿は一切含まれていません。
content: |-
  即時の満足が当たり前になった世界で、制御不能なほど肥大化した「権利意識（エンタイトルメント）」が蔓延しています。カスタマーサービス、社会的な交流、あるいは家族関係においてさえ、ただ存在しているだけで世界が自分に何かを負っていると信じている人が増えているようです。自信を持ち、自分の権利を主張することは健全な特質ですが、メリットがないにもかかわらず過度な特権や報酬を期待する権利意識は、もはや滑稽な域に達しています。笑えるものから、直視できないほど痛々しいものまで、オンラインコミュニティ、特に悪名高いRedditの「Entitled People」スレッドに投稿されたストーリーは、一部の個人がいかに現実から乖離してしまっているかを物語っています。

  # 1. 100ドルの「お礼」事件

  特に呆れるような話の一つに、ある花嫁が、結婚式のゲストに対して「不十分」とみなされたお返しの代わりに100ドルを支払うよう厚かましく要求したというものがあります。そのゲストは、ウィッシュリストから心のこもった贈り物を選んで贈っていましたが、式の数週間後、新娘からメッセージが届きました。「あなたの贈り物が25ドルの価値しかないことに気づきました」と花嫁は言いました。「それでは、あなたの結婚式への出席費用を賄うことができません。追加で100ドル送っていただけないでしょうか？」

  このエピソードは、現代の権利意識を象徴しています。ゲストは招待に応じるだけでなく、主催者の贅沢な選択の費用まで負担すべきだという期待です。この状況の異常さは、感謝の念が完全に欠如していることと、お祝いに招待したことに対して他人が「借り」を作っているという過度に膨らんだ自己意識にあります。

  # 2. 無料の食事に割引を要求

  別の話は、あるファストフード店の店員がRedditに投稿した、客との衝撃的な遭遇です。プロモーション期間中、そのチェーン店は客に無料の食事を提供していました。しかし、ある客はただ無料で食事を受け取るだけでは満足しませんでした。「なぜ無料のソーダに割引がないんだ？」とその客は詰め寄り、ソーダが無料の食事の一部であるにもかかわらず、存在しないはずの代金からさらに数パーセント割り引くべきだと主張したのです。

  店員は困惑しながら、ソーダを含む食事はすでに無料であることを説明しました。それでも客は数分間議論を続け、無料のアイテムにも割引が適用されるべきだと譲りませんでした。彼いわく、「あらゆるものにはお得な特典があるべきだ」というのです。

  # 3. 永遠にベビーシッターを要求する親

  ある若い女性が遠い親戚とのやり取りを語った投稿は、家族関係における権利意識に光を当てています。一度、親戚の子供のベビーシッターを引き受けた後、彼女はその親戚から、自分が永久に無料の保育提供者であるかのような要求を浴びせられるようになりました。若い女性が、自分は忙しいスケジュールを抱えており、常に空いているわけではないと説明すると、親戚は激怒してこう言いました。「家族じゃない！家族を助けることが大切だと思わないの？あなたは私のいとこなのから、私のために時間を使うのは当然よ！」

  家族間の権利意識は、家族の絆があれば境界線は存在しないと思い込んでいる人がいるため、対処がさらに難しくなることがよくあります。一度限りの好意であるはずだったものが、従事への不当な期待へと急速にエスカレートしました。すべては、家族なら決して「ノー」と言ってはならないという信念のせいです。

  # 4. 「インフルエンサー」はすべてが無料だと思っている

  権利意識の現代版は、ソーシャルメディアのインフルエンサーの台頭とともに花開きました。彼らの一部は、自分の「有名度」が無料のサービスに変換されるべきだと信じています。ネットで広く共有されたあるエピソードでは、レストランのオーナーが、控えめなフォロワー数を持つ自称インフルエンサーからダイレクトメッセージを受け取りました。そのインフルエンサーは、自分と3人の友人のために無料の食事を提供してくれれば、そのレストランについて投稿することを約束しました。

  オーナーが丁寧に断り、多くの支払い客が無料サービスを求めることなくレストランの料理を楽しんでいることを説明すると、インフルエンサーは激昂し、「宣伝効果の力」を理解していないとレストランを非難しました。仕上げに、そのインフルエンサーのフォロワー数は2,000人未満でした。実際にはレストランにとって何の価値も保証されない「宣伝」の約束だけで無料の食事を要求する図々しさは、ソーシャルメディア時代にいかに人々の自己価値観が膨らみうるかを浮き彫りにしています。

  # 5. 家を無料で要求した店借人

  ある投稿には、家賃を払う必要はないと信じていた店借人のとんでもない要求が詳しく記されていました。その理由は、「長く住んでいるのだから」大家は自分の存在に感謝すべきだというものでした。アパートに住んで1年ちょっとが経過した後、店借人は家賃の支払いを停止し、問い詰められると、12ヶ月間安定した店借人であったことで「十分なことをした」と主張しました。

  彼らは、支払いを期待し続ける大家は強欲だと決めつけ、自分の忠誠心に対して無料の宿泊施設が与えられるべきだと主張しました。当然ながら大家は動じませんでしたが、賃貸物件にただ滞在しているだけで無料の住宅を受け取る権利があるという考えは、権利意識がいかに極端になりうるかを強調しています。

  # 終わりはどこにあるのか？

  権利意識は、客観的な視点の欠如と、自身の重要性を過大評価することに根ざしているようです。これらのストーリーで最も不気味なのは、関わっている人々にとって、自分の要求が完全に正当であると感じられている点です。彼らはお願いをしていたのではなく、期待していたのです。

  では、何がこの考え方を助長しているのでしょうか？その一部は、コミュニティよりも個人主義をますます優先する文化に起因しています。また、ソーシャルメディアの台頭もあり、人々は常に「自分がふさわしいものを要求しろ」と言われ続けており、それが一部の人々に、真のニーズと不当な欲求を混同させています。最後に、即時の満足を尊ぶ消費主義文化が、欲しいもののために待ったり努力したりする忍耐力を奪い、ただお願いするだけで――正確には要求するだけで――手に入れられると思い込ませているのです。

  # 結論

  自分のために立ち上がることは健全ですが、自分の価値を知ることと、不当な権利を主張することの間には違いがあります。人生を歩むということは、他人が自分に何かを負っているわけではないこと、贈り物や好意は義務ではなく親切な行為であることを受け入れることを意味します。これらのエピソードが示すように、自信に満ちた自己主張と露骨な権利意識の境界線は容易に越えられてしまいます。そして、その境界を曖昧にすることは危険です。

  結局のところ、黄金律は変わりません。他人に敬意を持って接すること。世界は私たちに何も負っていません。そうではない振る舞いは、権利を主張する側にとっても、要求される側にとっても、失望を招くだけなのです。
