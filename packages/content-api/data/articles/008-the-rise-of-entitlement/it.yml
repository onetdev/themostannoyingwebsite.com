title: Storie di un'epidemia crescente di senso di diritto
slug: l-ascesa-del-senso-di-diritto
intro: Non contiene assolutamente nulla dai nostri lettori
content: |-
  In un mondo in cui la gratificazione istantanea è diventata la norma, c'è un crescente senso di diritto (entitlement) che sta sfuggendo al controllo. Che si tratti di servizio clienti, interazioni sociali o persino dinamiche familiari, sempre più persone sembrano credere che il mondo debba loro qualcosa semplicemente perché esistono. Mentre la fiducia in se stessi e l'auto-tutela sono tratti sani, il senso di diritto — dove le persone si aspettano privilegi o ricompense eccessive senza merito — è sfociato nell'assurdo. Dalle situazioni ridicole a quelle decisamente imbarazzanti, le storie provenienti dalle comunità online, specialmente dal famigerato subreddit "Entitled People", illustrano quanto alcuni individui si siano distaccati dalla realtà.

  # 1. Il caso del "Ringraziamento" da 100 dollari

  Una delle storie più incredibili riguarda una sposa e la sua audace richiesta a un invitato di sborsare 100 dollari per rimediare a un regalo considerato "insufficiente". L'invitato aveva fatto un regalo premuroso scegliendo dalla lista nozze, ma settimane dopo il matrimonio ha ricevuto un messaggio dalla sposa. "Ho notato che il tuo regalo valeva solo 25 dollari", ha detto la sposa, "il che non copre davvero il costo della tua presenza al matrimonio. Potresti gentilmente inviarci altri 100 dollari?"

  Questa storia incarna il moderno senso di diritto — l'aspettativa che gli ospiti non debbano solo onorare un invito, ma anche coprire i costi delle scelte stravaganti dei padroni di casa. L'assurdità di questa situazione risiede nella totale mancanza di gratitudine e in un senso ipertrofico di ciò che gli altri "devono" in cambio di un invito a una celebrazione.

  # 2. Pretendere uno sconto su un pasto gratis

  Un altro racconto proviene da un lavoratore di un fast food che ha riferito un incontro scioccante con un cliente sul proprio subreddit. Durante una promozione, la catena offriva un pasto gratis ai clienti. Tuttavia, un cliente non era soddisfatto di ricevere semplicemente un pasto senza costi. "Perché non c'è uno sconto sulla bibita gratis?", ha preteso il cliente, sostenendo che, anche se la bibita faceva parte del pasto gratuito, avrebbe dovuto avere un'ulteriore percentuale di sconto sul costo inesistente.

  Il cameriere, sbalordito, ha spiegato che il pasto — bibita inclusa — era già gratis. Ciò nonostante, il cliente ha discusso per diversi minuti, insistendo sul fatto che uno sconto sull'articolo gratuito fosse dovuto perché, a suo dire, "tutto dovrebbe avere un'offerta".

  # 3. Il genitore che pretendeva una babysitter, per sempre

  Un post di una giovane donna che racconta un'interazione con una cugina alla lontana fa luce sul senso di diritto all'interno delle dinamiche familiari. Dopo aver fatto da babysitter ai figli della cugina una volta, è stata sommersa di richieste dalla cugina, che dava per scontato che sarebbe stata una fornitrice permanente e gratuita di assistenza all'infanzia. Quando la giovane donna ha spiegato di avere un programma fitto e di non poter essere sempre disponibile, la cugina è esplosa dicendo: "Sono di famiglia! Non ti importa di aiutare la tua famiglia? Merito il tuo tempo perché sei mia cugina!"

  Il senso di diritto nelle situazioni familiari può spesso essere più difficile da gestire, poiché alcuni individui presumono che i legami familiari significhino l'assenza di confini. Quello che avrebbe dovuto essere un favore una tantum si è rapidamente trasformato in irragionevoli aspettative di servitù — tutto a causa della convinzione che alla famiglia non si debba mai dire di "no".

  # 4. "Influencer" che si aspettano tutto gratis

  Una versione moderna del senso di diritto è fiorita con l'ascesa degli influencer sui social media, alcuni dei quali credono che la loro "fama" debba tradursi in servizi gratuiti. Una storia, ampiamente condivisa online, riguarda il proprietario di un ristorante che ha ricevuto un messaggio diretto da un sedicente influencer con un modesto seguito. L'influencer prometteva di pubblicare post sul ristorante in cambio di un pasto gratis per sé e per tre amici.

  Quando il proprietario ha gentilmente rifiutato, spiegando che molti clienti paganti apprezzano le offerte del ristorante senza cercare omaggi, l'influencer ha reagito male, accusando il ristorante di non capire il "potere della visibilità". La ciliegina sulla torta? L'influencer aveva meno di 2.000 follower. L'audacia di pretendere un pasto gratis per una promessa di "visibilità" — che in realtà non offre alcuna garanzia di valore per il ristorante — evidenzia quanto possa diventare gonfiata l'autostima delle persone nell'era dei social media.

  # 5. L'inquilino che pretendeva una casa gratis

  Un post ha dettagliato le oltraggiose pretese di un inquilino che credeva di non dover pagare l'affitto perché era lì "da così tanto tempo" che il proprietario avrebbe dovuto essergli grato per la sua presenza. Dopo aver vissuto nell'appartamento per poco più di un anno, l'inquilino ha smesso di pagare l'affitto e, quando affrontato, ha sostenuto di aver "fatto abbastanza" essendo stato un inquilino stabile per 12 mesi.

  Insisteva sul fatto che il proprietario fosse avido ad aspettarsi pagamenti continui e sosteneva di meritare un alloggio gratuito per la sua lealtà. Naturalmente, il proprietario non si è lasciato convincere, ma l'idea che la semplice permanenza in una proprietà in affitto desse diritto a un alloggio gratuito sottolinea quanto possa spingersi lontano il senso di diritto.

  # Dove finisce tutto questo?

  Il senso di diritto, a quanto pare, affonda le sue radici in una mancanza di prospettiva e in un senso ipertrofico della propria importanza. La cosa più inquietante di queste storie è che, per le persone coinvolte, le loro richieste sembravano del tutto ragionevoli. Non stavano chiedendo — stavano pretendendo.

  Quindi cosa alimenta questa mentalità? In parte deriva dal vivere in una cultura che privilegia sempre più l'individualismo rispetto alla comunità. C'è anche l'ascesa dei social media, dove alle persone viene costantemente detto di "esigere ciò che meriti", portando alcuni a confondere i bisogni autentici con desideri irragionevoli. Infine, la cultura del consumismo, che premia la gratificazione istantanea, lascia alcuni individui senza la pazienza di aspettare o lavorare per ciò che vogliono, presumendo di doverlo ricevere solo chiedendo — o, più precisamente, pretendendo.

  # In conclusione

  Sebbene far valere le proprie ragioni sia sano, c'è una differenza tra conoscere il proprio valore ed essere irragionevolmente pretenziosi. Navigare nella vita significa accettare che gli altri non ci devono nulla, che i regali e i favori sono atti di gentilezza, non obblighi. Come illustrano queste storie, il confine tra una sicura auto-tutela e un vero e proprio senso di diritto è facile da superare — ed è un confine pericoloso da sfumare.

  Alla fine, la regola d'oro rimane: trattare gli altri con rispetto. Il mondo non ci deve nulla, e comportarsi come se lo facesse porta solo a delusioni, sia per chi pretende sia per coloro a cui viene chiesto.
