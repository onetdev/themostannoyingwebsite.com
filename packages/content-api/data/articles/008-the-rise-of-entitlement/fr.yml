title: Histoires d'une épidémie croissante d'arrogance
slug: la-montee-de-l-arrogance
intro: Ne contient absolument rien de nos lecteurs
content: |-
  Dans un monde où la gratification instantanée est devenue la norme, il y a un sentiment croissant d'arrogance qui devient incontrôlable. Que ce soit dans le service client, les interactions sociales ou même les dynamiques familiales, de plus en plus de gens semblent croire que le monde leur doit quelque chose simplement parce qu'ils existent. Bien que la confiance en soi et la défense de ses intérêts soient des traits sains, l'arrogance — où les gens s'attendent à des privilèges ou des récompenses excessives sans mérite — a versé dans l'absurde. Des histoires risibles aux plus gênantes, les récits des communautés en ligne, en particulier le tristement célèbre subreddit « Entitled People », illustrent à quel point certains individus se sont déconnectés de la réalité.

  # 1. Le cas du « Merci » à 100 $

  L'une des histoires les plus stupéfiantes concerne une mariée et sa demande audacieuse à un invité de débourser 100 $ pour compenser un cadeau jugé « insuffisant ». L'invité avait offert un cadeau attentionné figurant sur la liste de mariage, mais quelques semaines après le mariage, il a reçu un message de la mariée. « J'ai remarqué que ton cadeau ne valait que 25 $ », a déclaré la mariée, « ce qui ne couvre pas vraiment le coût de ta présence au mariage. Pourrais-tu avoir l'obligeance de nous envoyer 100 $ supplémentaires ? »

  Cette histoire illustre parfaitement l'arrogance moderne — l'attente selon laquelle les invités devraient non seulement honorer une invitation, mais aussi couvrir les coûts des choix extravagants de l'hôte. L'absurdité de cette situation réside dans le manque total de gratitude et un sentiment démesuré de ce que les autres « doivent » en retour d'une invitation à une célébration.

  # 2. Exiger une réduction sur un repas gratuit

  Un autre récit provient d'un employé de fast-food qui a raconté une rencontre choquante avec un client sur son subreddit. Lors d'une promotion, la chaîne offrait un repas gratuit aux clients. Cependant, un client ne se contentait pas de recevoir un repas sans frais. « Pourquoi n'y a-t-il pas de réduction sur le soda gratuit ? » a exigé le client, affirmant que même si le soda faisait partie du repas gratuit, il devrait bénéficier d'un pourcentage de réduction supplémentaire sur le coût inexistant.

  Le serveur, perplexe, a expliqué que le repas — y compris le soda — était déjà gratuit. Pourtant, le client a argumenté pendant plusieurs minutes, insistant sur le fait qu'une réduction sur l'article gratuit était méritée parce que, selon ses propres mots, « tout devrait être accompagné d'une offre ».

  # 3. Le parent qui exigeait une baby-sitter, pour toujours

  Un post d'une jeune femme racontant une interaction avec un cousin éloigné met en lumière l'arrogance au sein des dynamiques familiales. Après avoir gardé les enfants de son cousin une fois, elle a été bombardée de demandes du cousin, qui supposait qu'elle serait une gardienne d'enfants gratuite et permanente. Lorsque la jeune femme a expliqué qu'elle avait un emploi du temps chargé et ne pouvait pas toujours être disponible, son cousin a explosé, disant : « Je suis de la famille ! Tu ne te soucies pas d'aider ta famille ? Je mérite ton temps parce que tu es ma cousine ! »

  L'arrogance au sein des situations familiales peut souvent être plus difficile à gérer, car certains individus supposent que les liens familiaux signifient que les limites n'existent pas. Ce qui aurait dû être une faveur ponctuelle s'est rapidement transformé en des attentes déraisonnables de servitude — tout cela à cause de la conviction que la famille ne devrait jamais dire « non ».

  # 4. Les « Influenceurs » qui s'attendent à ce que tout soit gratuit

  Une version moderne de l'arrogance a prospéré avec la montée des influenceurs sur les réseaux sociaux, dont certains pensent que leur « célébrité » devrait se traduire par des services gratuits. Une histoire, largement partagée en ligne, implique un restaurateur qui a reçu un message direct d'un soi-disant influenceur avec un nombre modeste d'abonnés. L'influenceur promettait de poster sur le restaurant en échange d'un repas gratuit pour lui-même et trois amis.

  Lorsque le propriétaire a poliment refusé, expliquant que de nombreux clients payants apprécient les offres du restaurant sans chercher de gratuité, l'influenceur s'en est pris à lui, accusant le restaurant de ne pas comprendre le « pouvoir de la visibilité ». La cerise sur le gâteau ? L'influenceur avait moins de 2 000 abonnés. L'audace d'exiger un repas gratuit pour une promesse de « visibilité » — qui, en réalité, n'offre aucune garantie de valeur pour le restaurant — souligne à quel point l'estime de soi des gens peut devenir gonflée à l'ère des réseaux sociaux.

  # 5. Le locataire qui exigeait une maison gratuite

  Un post détaillait les demandes scandaleuses d'un locataire qui pensait ne pas avoir à payer de loyer parce qu'il était là « depuis si longtemps » que le propriétaire devrait être reconnaissant de sa présence. Après avoir vécu dans l'appartement pendant un peu plus d'un an, le locataire a cessé de payer son loyer et, lorsqu'il a été confronté, a soutenu qu'il en avait « fait assez » en étant un locataire stable pendant 12 mois.

  Il a insisté sur le fait que le propriétaire était cupide d'attendre un paiement continu et a soutenu qu'il méritait un logement gratuit pour sa loyauté. Naturellement, le propriétaire n'a pas été convaincu, mais l'idée que le simple fait de rester dans un bien locatif signifiait qu'il avait droit à un logement gratuit souligne jusqu'où l'arrogance peut aller.

  # Où cela s'arrête-t-il ?

  L'arrogance, semble-t-il, s'enracine dans un manque de perspective et un sentiment démesuré de sa propre importance. Ce qui est le plus dérangeant dans ces histoires, c'est que, pour les personnes impliquées, leurs demandes semblaient tout à fait raisonnables. Elles ne demandaient pas — elles s'attendaient à recevoir.

  Alors, qu'est-ce qui alimente cet état d'esprit ? Une partie de cela provient du fait de vivre dans une culture qui privilégie de plus en plus l'individualisme par rapport à la communauté. Il y a aussi l'essor des réseaux sociaux, où l'on dit constamment aux gens d'« exiger ce qu'ils méritent », ce qui conduit certains à confondre de véritables besoins avec des désirs déraisonnables. Enfin, la culture de la consommation, qui valorise la gratification instantanée, laisse certains individus sans la patience d'attendre ou de travailler pour ce qu'ils veulent, supposant qu'ils devraient le recevoir juste en le demandant — ou, plus précisément, en l'exigeant.

  # Le mot de la fin

  Bien que s'affirmer soit sain, il y a une différence entre connaître sa valeur et être déraisonnablement arrogant. Naviguer dans la vie signifie accepter que les autres ne nous doivent rien, que les cadeaux et les faveurs sont des actes de gentillesse, pas des obligations. Comme l'illustrent ces histoires, la frontière entre l'affirmation de soi confiante et l'arrogance pure et simple est facile à franchir — et c'est une ligne dangereuse à brouiller.

  En fin de compte, la règle d'or demeure : Traitez les autres avec respect. Le monde ne nous doit rien, et agir comme si c'était le cas ne mène qu'à la déception, tant pour l'arrogant que pour ceux à qui il exige.
