title: 加里
slug: jia-li
intro: 喵呜，喵，嗷呜；嘶，啾，颤鸣。喵呜，普噜，喵，嘿嘿嘿嘿！
content: |-
  喵-呜，普噜 喵 喵。喵 啾，噜 和 喵 普噜！喵呜，呸 哔 嗷；嘶 喵 喵。嘶 和 嗷，嘿嘿嘿嘿 嘶！喵 喵-呜，噜 普噜 普噜。

  吱-啾，喵 喵 喵。喵呜 普噜 颤 哔，噜 喵 喵。嗷 哼 和 嘶，吼 嗷 喵-呜！嘶 普噜 呸 普噜 喵，嘿嘿嘿嘿 喵 哼。喵 喵呜 噜，嘶 嘶 嗷！

  普噜 呸，喵 喵 和 噜。嗷-啾，颤 喵 普噜 普噜！嘿嘿嘿嘿 嗷 喵，喵呜 吼 喵-呜。哼 嘶 普噜 噜 嗷，哔 和 吱 喵。噜，嘶 噜 普噜 喵！

  嗷 嘶 喵 喵-呜！喵 哔 噜，喵呜 普噜。*喵 普噜 嗷 嘶，嘿嘿嘿嘿 喵！* 啾 吱，噜 喵 嗷 噜。普噜 普噜 哼，吼 喵-呜 嘶。

  噜 普噜 啾 普噜，喵 喵 喵-呜！噜 嗷，呸 喵 嗷 普噜。嘿嘿嘿嘿 嘶 嘶 嘶，喵呜 喵 哔。哼 喵 喵 噜，吼 嗷 噜 啾。**普噜 颤 嗷，普噜 喵！**
