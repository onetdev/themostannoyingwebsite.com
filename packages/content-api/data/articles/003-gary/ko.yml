title: 게리
slug: ge-ri
intro: 골골골, 야옹, 애오옹; 하악, 삐약, 갸릉. 미야오, 프르트, 냥, 에케케케케!
content: |-
  모우-와우, 골골 야옹 야옹. 먕 삐약, 뜨르르 그리고 냥 프르트! 미야오, 블레 블렙 얍; 스퀴 야옹 먕. 하악 그리고 로울, 에케케케케 스크리! 모우 모우-와우, 므르르 골골 프르트.

  치터-삐약, 야옹 냥 먕. 미야오 프르트 트릴 블렙, 뜨르르 야옹 모우. 야웁 허프 그리고 스퀴, 스나얼 로울 모우-와우! 하악 골골 블레 프르트 먕, 에케케케케 모우 허프. 냥 미야오 뜨르르, 스크리 하악 얍!

  프르트 블레, 먕 야옹 그리고 므르르. 야울-삐약, 트릴 먕 프르트 골골! 에케케케케 로울 모우, 미야오 스나얼 모우-와우. 허프 스크리 골골 뜨르르 얍, 블렙 그리고 치터 먕. 므르르, 스퀴 뜨르르 프르트 야옹!

  로울 하악 모우 모우-와우! 먕 블렙 뜨르르, 미야오 골골. *냥 프르트 야울 스크리, 에케케케케 야옹!* 삐약 치터, 므르르 야옹 얍 뜨르르. 프르트 골골 허프, 스나얼 모우-와우 스퀴.

  므르르 골골 삐약 프르트, 먕 야옹 모우-와우! 뜨르르르 야울, 블레 먕 로울 프르트. 에케케케케 스퀴 하악 스크리, 미야오 모우 블렙. 허프 야옹 냥 므르르, 스나얼 얍 뜨르르 삐약. **프르트 트릴 로울, 골골 야옹!**
