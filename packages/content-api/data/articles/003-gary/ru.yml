title: Гари
slug: gari
intro: Мур, мяу, вопль; шипение, чириканье, трель. Мррр-мяу, пррт, нян, экекекее!
content: |-
  Мяу-вау, мур мяу мяу. Мяу чирик, тррр и нян пррт! Мррр-мяу, бле-бле-бе; вяу-мяу мяу. Ш-ш-ш и рррау, экекекее скри! Мяу мяу-вау, мррр мур пррт.

  Чик-чирик, мяу нян мяу. Мррр-мяу пррт трель блеп, тррр мяу мяу. Вау-тяу и скви, шмыг рррау мяу-вау! Ш-ш-ш мур бле-бе пррт мяу, экекекее мяу хык. Нян мррр-мяу тррр, скри ш-ш-ш вяу!

  Пррт бле-бе, мяу-мяу и мррр. Вау-чирик, трель мяу пррт мур! Экекекее рррау мяу, мррр-мяу шмыг мяу-вау. Хык скри мур тррр вяу, блеп и чик-чирик мяу. Мррр, скви тррр пррт мяу!

  Рррау ш-ш-ш мяу мяу-вау! Мяу блеп тррр, мррр-мяу мур. *Нян пррт вау скри, экекекее мяу!* Чирик чик-чирик, мррр мяу вяу тррр. Пррт мур хык, шмыг мяу-вау скви.

  Мррр мур чирик пррт, мяу мяу мяу-вау! Трррр вау, бле-бе мяу рррау пррт. Экекекее скви ш-ш-ш скри, мррр-мяу мяу блеп. Хык мяу нян мррр, шмыг вяу тррр чирик. **Пррт трель рррау, мур мяу!**
