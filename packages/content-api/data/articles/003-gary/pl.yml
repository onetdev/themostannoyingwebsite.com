title: Gary
slug: gary
intro: Mru, miau, auuu; sycz, ćwierkaj, tryluj. Mrrrau, prrt, nyan, ekekekee!
content: |-
  Miau-wow, mru miau miau. Miau ćwierk, trrr i nyan prrt! Mrrrau, bleh blep auuu; pi pi miau miau. Sycz i mrucz, ekekekee miau! Miau miau-wow, mrrr mru prrt.

  Ćwierk-ćwierk, miau nyan miau. Mrrrau prrt tryl blep, trrr miau miau. Auuu fuk i pi pi, wark mrucz miau-wow! Sycz mru bleh prrt miau, ekekekee miau fuk. Nyan mrrrau trrr, miau sycz auuu!

  Prrt bleh, miau miau i mrrr. Auuu-ćwierk, tryl miau prrt mru! Ekekekee mrucz miau, mrrrau wark miau-wow. Fuk miau mru trrr auuu, blep i ćwierk miau. Mrrr, pi pi trrr prrt miau!

  Mrucz sycz miau miau-wow! Miau blep trrr, mrrrau mru. *Nyan prrt auuu miau, ekekekee miau!* Ćwierk ćwierk, mrrr miau auuu trrr. Prrt mru fuk, wark miau-wow pi pi.

  Mrrr mru ćwierk prrt, miau miau miau-wow! Trrrr auuu, bleh miau mru prrt. Ekekekee pi pi sycz miau, mrrrau miau blep. Fuk miau nyan mrrr, wark auuu trrr ćwierk. **Prrt tryl mrucz, mru miau!**
