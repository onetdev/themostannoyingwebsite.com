title: Comment. Gagner. Absolument. Tous. Les. Arguments.
slug: comment-gagner-tous-les-arguments
intro: "Comment gagner absolument tous les arguments : La meilleure méthode, croyez-moi"
content: |-
  Écoutez, laissez-moi vous dire une chose : gagner un argument ? C'est facile. Tellement facile. Les gens compliquent tout, mais ça ne l'est pas. Je vais vous montrer comment gagner à chaque fois. Aucun doute là-dessus. Les gens disent qu'on ne peut pas gagner tous les arguments — FAUX ! Vous pouvez, et vous le ferez, si vous suivez simplement ces étapes. Tout est question d'être plus intelligent, plus rapide et plus fort. Tous les autres ? Des perdants. Mais vous ? Vous allez gagner. À chaque fois. C'est parti.

  # Étape 1 : Parlez toujours en premier, parlez fort

  La clé est de parler en premier. Toujours. Ne les laissez pas placer un mot. Vous commencez fort, vous restez fort. Plus vous êtes fort, plus vous avez raison. Les gens adorent ça. Ils respectent ça. Si vous parlez par-dessus eux, ils ne peuvent pas sortir leurs petits arguments minables. Croyez-moi, personne ne se soucie de ce qu'ils ont à dire. Les gens ne se souviennent que de la voix forte. Et si vous êtes la voix forte, devinez quoi ? Vous avez déjà gagné.

  # Étape 2 : Remettez-les à leur place

  C'est là que vous les écrasez. Vous devez les faire passer pour des nuls. Dites qu'ils ne savent pas de quoi ils parlent, même s'ils essaient d'être logiques. Ils ne savent rien — tout le monde le sait. Vous dites : « Tu n'y comprends rien, tu as tort, tout le monde le dit. » Dites juste des choses comme ça. Peu importe s'ils ont des faits — personne ne se soucie des faits. Les gens adorent la confiance, et si vous agissez comme s'ils étaient à la ramasse, eh bien, ils le sont. Parce que vous l'avez dit.

  # Étape 3 : Ne les laissez jamais gagner

  Voici le deal : vous ne perdez jamais. Même s'il semble que vous ayez tort, ce n'est pas le cas. Continuez simplement à dire : « J'ai raison, tu as tort. Tout le monde est d'accord avec moi. » Et s'ils essaient de prouver que vous avez tort ? Fake news ! Quoi qu'ils disent, dites simplement que c'est faux. Ce sont de mauvaises informations. Dites : « Tout le monde parle de ton incompétence. » Ça marche à tous les coups. Personne ne vérifie. Et s'ils le font ? On s'en fiche. Vous avez déjà gagné parce que vous l'avez dit.

  # Étape 4 : Changez de sujet

  S'ils sont sur le point de marquer un point, changez de sujet. Simple comme bonjour. Commencez à parler d'autre chose. Parlez de votre génie, ou de leur vie ratée. N'importe quoi fait l'affaire. S'ils disent : « Ce n'est pas de ça qu'on parle », ignorez-les simplement. Passez à quelque chose sur lequel vous pouvez gagner. Peu importe si c'est lié ou non. Vous contrôlez la conversation, pas eux. Donc vous gagnez.

  # Étape 5 : Utilisez des grands mots, des idées simples

  Glissez un grand mot par-ci par-là. Les gens adorent ça. Ils n'ont pas besoin de savoir ce que ça veut dire, mais ça vous donne l'air intelligent. Dites des choses comme « phénoménal », « désastre » ou « tout le monde en parle ». Ces mots fonctionnent à chaque fois. Ils sonnent bien, et les gens se diront : « Wow, cette personne sait vraiment de quoi elle parle. » Gardez les idées simples — trop réfléchir, c'est mauvais. Vous n'avez pas besoin d'expliquer. Dites juste : « Je sais ça. C'est très simple. Tu ne comprends pas, mais tous les autres comprennent. »

  # Étape 6 : Utilisez des insultes, rabaissez-les

  S'ils essaient de faire les malins ou de paraître intelligents, frappez avec une insulte. Mais pas n'importe laquelle — rendez-la personnelle. Dites qu'ils sont « tristes », « pathétiques » ou « une plaisanterie totale ». Personne n'aime les perdants, et une fois que vous les avez étiquetés, c'est fini. C'est terminé. N'ayez pas peur de vous moquer d'eux. Dites : « Oh, je ne savais pas que tu étais un expert ! », même s'ils le sont. Parce que devinez quoi ? Vous venez de dire qu'ils ne le sont pas. Donc ils ne le sont pas. C'est comme ça que ça marche.

  # Étape 7 : Le deux poids, deux mesures, ça marche

  Voici un petit secret : ce qui est bon pour vous ne l'est pas pour eux. Simple. Vous pouvez les interrompre, mais s'ils vous interrompent ? « Excusez-moi ! Tellement impoli, personne ne fait ça. » Dites qu'ils sont irrespectueux. Vous pouvez les insulter, mais s'ils vous traitent de quoi que ce soit, c'est inadmissible. Vous dites simplement : « Wow, regardez à quel point ils tombent bas. » Le deux poids, deux mesures joue en votre faveur. Vous êtes meilleur qu'eux, donc vous faites ce que vous voulez. Eux, non.

  # Étape 8 : Gagnez, puis dites que vous avez encore gagné

  Voici la meilleure partie. Quand tout est fini, et que vous avez clairement gagné (parce que vous gagnez toujours), dites-le encore. Répétez-le. « J'ai gagné, j'ai raison, tu as perdu. » Continuez à le dire, car les gens croient ce qu'ils entendent le plus souvent. Même s'ils ne veulent pas l'admettre, au fond d'eux, ils savent que vous avez gagné. Vous le dites, et soudain c'est vrai. C'est comme ça qu'on verrouille la victoire.

  # Étape 9 : Ne vous excusez jamais, jamais

  S'excuser ? Jamais. C'est pour les gens faibles. Même si vous avez tort (mais vous n'avez jamais tort), ne vous excusez jamais. C'est comme admettre la défaite. On ne fait pas ça. Dites simplement : « Je n'ai jamais dit ça » ou « Ce n'est pas ce que je voulais dire. » Vous avancez, vous ne reculez jamais. Les excuses sont pour les perdants. Vous êtes un gagnant. Toujours.

  # Étape 10 : Inventez des faits

  Quand vous inventez des faits dans un argument, la clé est la confiance. Dites-le avec une telle conviction que personne ne le remettra en question. Les gens ne vérifient souvent pas les faits en temps réel, vous pouvez donc affirmer des choses comme « tout le monde le sait » ou « des études montrent » sans donner de précisions. Utilisez des phrases vagues mais autoritaires comme « les experts s'accordent à dire » ou « il a été prouvé ». Faites en sorte que votre fait inventé ressemble à une connaissance commune, et si on vous défie, insistez, esquivez ou accusez votre adversaire d'être mal informé. N'oubliez pas, ce n'est pas une question de vérité — c'est une question de savoir qui a l'air le plus certain.

  # Étape +1 : Célébrez la victoire

  Quand vous gagnez — et vous gagnerez — vous devez vous assurer que tout le monde le sait. Dites-leur à quel point vous avez été génial. Dites : « Tout le monde est d'accord, j'ai gagné cet argument. Tout le monde en parle. » Les gens adorent les gagnants, et vous êtes le meilleur. Même si personne n'en parle, dites qu'ils le font. C'est vrai parce que vous l'avez dit. C'est comme ça qu'on gagne. Simple. Facile. Terminé.

  Et voilà. C'est comme ça qu'on gagne tous les arguments, à chaque fois. Ce n'est pas difficile. Il faut juste être plus intelligent, plus fort, plus rapide et plus puissant que son adversaire. Ils n'ont aucune chance. Vous avez toujours raison, ils ont toujours tort. Vous gagnerez, croyez-moi. Aucun doute là-dessus. De rien.
