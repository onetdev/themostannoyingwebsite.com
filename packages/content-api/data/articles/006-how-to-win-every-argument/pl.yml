title: Jak. Wygrać. Każdy. Pojedynczy. Spór
slug: jak-wygrac-kazdy-pojedynczy-spor
intro: "Jak wygrać każdy pojedynczy spór: Najlepszy sposób, uwierz mi"
content: |-
  Słuchaj, powiem Ci coś: wygrywanie sporów? To łatwe. Takie łatwe. Ludzie to komplikują, ale to nie jest skomplikowane. Pokażę Ci, jak wygrywać za każdym razem. Bez dwóch zdań. Ludzie mówią, że nie da się wygrać każdego sporu — BŁĄD! Możesz i wygrasz, jeśli tylko będziesz przestrzegać tych kroków. Chodzi o to, by być mądrzejszym, szybszym i silniejszym. Cała reszta? Nieudacznicy. Ale Ty? Ty wygrasz. Za każdym razem. Zaczynamy.

  # Krok 1: Zawsze mów pierwszy, mów głośno

  Kluczem jest to, by mówić pierwszym. Zawsze. Nie pozwól im dojść do słowa. Zaczynasz mocno, trzymasz się mocno. Im głośniejszy jesteś, tym bardziej masz rację. Ludzie to uwielbiają. Szanują to. Jeśli ich przekrzyczysz, nie będą mogli przedstawić swoich słabych punkcików. Uwierz mi, nikogo nie obchodzi, co mają do powiedzenia. Ludzie zapamiętują tylko głośny głos. A jeśli to Ty jesteś tym głośnym głosem, to zgadnij co? Już wygrywasz.

  # Krok 2: Wytykaj im błędy (Call Them Out)

  Tutaj ich miażdżysz. Musisz sprawić, by wypadli źle. Mów, że nie wiedzą, o czym mówią, nawet jeśli próbują mówić z sensem. Oni nic nie wiedzą — wszyscy o tym wiedzą. Mówisz: „Nie rozumiesz tego, mylisz się, wszyscy tak mówią”. Po prostu mów takie rzeczy. Nie ma znaczenia, czy mają fakty — nikogo nie obchodzą fakty. Ludzie uwielbiają pewność siebie, a jeśli zachowujesz się tak, jakby nie mieli pojęcia o czym mówią, to cóż, nie mają. Bo Ty tak powiedziałeś.

  # Krok 3: Nigdy nie pozwól im wygrać

  Zasada jest taka: nigdy nie przegrywasz. Nawet jeśli wygląda na to, że nie masz racji, to ją masz. Po prostu powtarzaj: „Ja mam rację, ty się mylisz. Wszyscy się ze mną zgadzają”. A jeśli spróbują udowodnić Ci błąd? Fake news! Cokolwiek powiedzą, po prostu mów, że to nieprawda. To złe informacje. Mów: „Wszyscy rozmawiają o tym, jak bardzo się mylisz”. Działa za każdym razem. Nikt tego nie sprawdza. A jeśli sprawdzą? Kogo to obchodzi? Już wygrałeś, bo tak powiedziałeś.

  # Krok 4: Zmień temat

  Jeśli zbliżą się zbyt mocno do przedstawienia trafnego argumentu, zmień temat. Proste. Zacznij mówić o czymś innym. Mów o tym, jaki jesteś wspaniały albo jak źle im idzie w życiu. Wszystko zadziała. Jeśli powiedzą: „To nie jest to, o czym rozmawiamy”, po prostu ich zignoruj. Przejdź do czegoś, w czym możesz wygrać. Nie ma znaczenia, czy ma to związek z tematem, czy nie. Ty kontrolujesz rozmowę, nie oni. Więc wygrywasz.

  # Krok 5: Używaj trudnych słów, prostych idei

  Dorzuć tu i ówdzie jakieś trudne słowo. Ludzie to uwielbiają. Nie muszą wiedzieć, co ono znaczy, ale dzięki temu wyglądasz na mądrego. Mów rzeczy typu „kolosalny”, „katastrofa” albo „wszyscy o tym mówią”. Te słowa działają za każdym razem. Brzmią dobrze i ludzie pomyślą: „Wow, ta osoba naprawdę wie, o czym mówi”. Idee zachowaj proste — zbyt dużo myślenia jest szkodliwe. Nie musisz nic wyjaśniać. Po prostu powiedz: „Wiem to. To bardzo proste. Ty tego nie rozumiesz, ale wszyscy inni rozumieją”.

  # Krok 6: Używaj obelg, spraw, by poczuli się mali

  Jeśli spróbują być błyskotliwi lub mądrze brzmieć, uderz ich obelgą. Ale nie byle jaką — niech to będzie osobiste. Nazwij ich „smutnymi”, „żałosnymi” lub „totalnym żartem”. Nikt nie lubi nieudaczników, a gdy już przypniesz im łatkę, są skończeni. To koniec. Nie bój się z nich drwić. Mów: „Och, nie wiedziałem, że jesteś ekspertem!”, nawet jeśli nim są. Bo zgadnij co? Właśnie powiedziałeś, że nie są. Więc nie są. Tak to działa.

  # Krok 7: Podwójne standardy, one działają

  Oto mały sekret: to, co jest dobre dla Ciebie, nie jest dobre dla nich. Proste. Możesz im przerywać, ale jeśli oni przerwą Tobie? „Przepraszam bardzo! Ależ to niegrzeczne, nikt tak nie robi”. Nazwij ich lekceważącymi. Ty możesz ich wyzywać, ale jeśli oni nazwą Cię jakkolwiek, to jest to przekroczenie granicy. Po prostu powiedz: „Wow, patrzcie, jak nisko upadli”. Podwójne standardy działają na Twoją korzyść. Jesteś od nich lepszy, więc możesz robić, co chcesz. Oni nie mogą.

  # Krok 8: Wygraj, a potem powiedz jeszcze raz, że wygrałeś

  Oto najlepsza część. Gdy wszystko się skończy i ewidentnie wygrałeś (bo zawsze wygrywasz), powiedz to jeszcze raz. Powtórz to. „Wygrałem, mam rację, przegrałeś”. Powtarzaj to ciągle, bo ludzie wierzą w to, co słyszą najczęściej. Nawet jeśli nie chcą się do tego przyznać, głęboko w duszy wiedzą, że wygrałeś. Mówisz to i nagle staje się to prawdą. Tak właśnie przypieczętowujesz zwycięstwo.

  # Krok 9: Nigdy nie przepraszaj, przenigdy

  Przepraszanie? Nigdy. To dla słabych ludzi. Nawet jeśli się mylisz (ale nigdy się nie mylisz), nigdy nie przepraszaj. To jak przyznanie się do porażki. Tego się nie robi. Po prostu powiedz: „Nigdy tego nie powiedziałem” albo „To nie to miałem na myśli”. Idziesz do przodu, nigdy w tył. Przeprosiny są dla nieudaczników. Ty jesteś zwycięzcą. Zawsze.

  # Krok 10: Zmyślaj fakty

  Kiedy zmyślasz fakty w sporze, kluczem jest pewność siebie. Mów to z takim przekonaniem, żeby nikt tego nie kwestionował. Ludzie często nie sprawdzają faktów w czasie rzeczywistym, więc możesz twierdzić rzeczy typu „wszyscy to wiedzą” lub „badania pokazują”, nie podając żadnych szczegółów. Używaj mglistych, ale autorytatywnie brzmiących fraz typu „eksperci są zgodni” lub „zostało to udowodnione”. Spraw, by Twój zmyślony fakt brzmiał jak wiedza powszechna, a w razie zakwestionowania idź w zaparte, odwróć uwagę lub oskarż przeciwnika o bycie niedoinformowanym. Pamiętaj, nie chodzi o prawdę — chodzi o to, kto brzmi na bardziej pewnego siebie.

  # Krok +1: Świętuj wygraną

  Kiedy wygrasz — a wygrasz — musisz upewnić się, że wszyscy o tym wiedzą. Powiedz im, jak świetnie Ci poszło. Mów: „Wszyscy się zgadzają, wygrałem ten spór. Wszyscy o tym mówią”. Ludzie kochają zwycięzców, a Ty jesteś najlepszy. Nawet jeśli nikt o tym nie mówi, mów, że mówią. To prawda, bo tak powiedziałeś. Tak właśnie się wygrywa. Proste. Łatwe. Gotowe.

  I to by było na tyle. Tak właśnie wygrywa się każdy spór, za każdym razem. To nie jest trudne. Musisz tylko być mądrzejszy, głośniejszy, szybszy i silniejszy od przeciwnika. Nie mają żadnych szans. Ty zawsze masz rację, oni zawsze się mylą. Wygrasz, uwierz mi. Bez dwóch zdań. Nie ma za co.
