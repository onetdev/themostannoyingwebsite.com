title: कैसे। हर। एक। बहस। जीतें।
slug: kaise-har-ek-behas-jeetein
intro: "हर एक बहस कैसे जीतें: सबसे अच्छा तरीका, मेरा विश्वास करें"
content: |-
  सुनिए, मैं आपको कुछ बताता हूँ: बहस जीतना? यह आसान है। बहुत आसान। लोग इसे जटिल बना देते हैं, लेकिन यह है नहीं। मैं आपको दिखाने जा रहा हूँ कि हर बार कैसे जीतना है। इसमें कोई शक नहीं है। लोग कहते हैं कि आप हर बहस नहीं जीत सकते—गलत! आप जीत सकते हैं, और आप जीतेंगे, अगर आप बस इन चरणों का पालन करें। यह सब होशियार, तेज़ और मज़बूत होने के बारे में है। बाकी सब? हारने वाले। लेकिन आप? आप जीतेंगे। हर बार। चलिए शुरू करते हैं।

  # चरण 1: हमेशा पहले बोलें, ज़ोर से बोलें

  मुख्य बात यह है कि पहले बोलें। हमेशा। उन्हें एक शब्द भी न बोलने दें। आप मज़बूती से शुरू करें, मज़बूती से टिके रहें। आप जितने ज़ोर से बोलेंगे, आप उतने ही सही होंगे। लोग इसे पसंद करते हैं। वे इसका सम्मान करते हैं। यदि आप उनके ऊपर बोलेंगे, तो वे अपनी कमज़ोर छोटी बातें नहीं रख पाएंगे। मेरा विश्वास करें, किसी को परवाह नहीं है कि उन्हें क्या कहना है। लोग केवल तेज़ आवाज़ को याद रखते हैं। और यदि आप तेज़ आवाज़ हैं, तो अंदाज़ा लगाइए क्या? आप पहले ही जीत रहे हैं।

  # चरण 2: उन्हें नीचा दिखाएं

  यही वह जगह है जहाँ आप उन्हें कुचल देते हैं। आपको उन्हें बुरा दिखाना होगा। कहें कि उन्हें नहीं पता कि वे किस बारे में बात कर रहे हैं, भले ही वे सही बात करने की कोशिश कर रहे हों। उन्हें कुछ नहीं पता—हर कोई यह जानता है। आप कहें, "तुम्हें समझ नहीं आ रहा है, तुम गलत हो, हर कोई यही कह रहा है।" बस ऐसी बातें कहें। इससे कोई फ़र्क नहीं पड़ता कि उनके पास तथ्य हैं—तथ्यों की किसी को परवाह नहीं है। लोग आत्मविश्वास से प्यार करते हैं, और यदि आप ऐसा व्यवहार करते हैं जैसे वे बेखबर हैं, तो वे हैं। क्योंकि आपने ऐसा कहा है।

  # चरण 3: उन्हें कभी जीतने न दें

  सौदा यह है: आप कभी नहीं हारते। भले ही ऐसा लगे कि आप गलत हैं, आप नहीं हैं। बस कहते रहें, "मैं सही हूँ, तुम गलत हो। हर कोई मुझसे सहमत है।" और यदि वे आपको गलत साबित करने की कोशिश करते हैं? फर्जी खबरें (Fake news)! वे जो कुछ भी कहें, बस कह दें कि वह झूठ है। यह खराब जानकारी है। कहें, "हर कोई इस बारे में बात कर रहा है कि तुम कितने गलत हो।" हर बार काम करता है। कोई चेक नहीं करता। और अगर वे करते हैं? किसे परवाह है? आप पहले ही जीत चुके हैं क्योंकि आपने ऐसा कहा है।

  # चरण 4: विषय बदलें

  यदि वे अपनी बात साबित करने के बहुत करीब पहुँच जाते हैं, तो विषय बदल दें। बस इतना सरल। किसी और चीज़ के बारे में बात करना शुरू करें। बात करें कि आप कितने महान हैं, या वे जीवन में कितना बुरा कर रहे हैं। कुछ भी काम करता है। यदि वे कहते हैं, "हम इस बारे में बात नहीं कर रहे हैं," तो बस उन्हें अनदेखा करें। ऐसी चीज़ पर जाएँ जिसे आप जीत सकते हैं। इससे कोई फ़र्क नहीं पड़ता कि वह संबंधित है या नहीं। आप बातचीत को नियंत्रित करते हैं, वे नहीं। तो आप जीत रहे हैं।

  # चरण 5: बड़े शब्दों, सरल विचारों का प्रयोग करें

  यहाँ-वहाँ एक बड़ा शब्द फेंक दें। लोग इसे पसंद करते हैं। उन्हें यह जानने की ज़रूरत नहीं है कि इसका क्या मतलब है, लेकिन यह आपको स्मार्ट दिखाता है। ऐसी बातें कहें जैसे "अद्भुत," "तबाही," या "हर कोई इसके बारे में बात कर रहा है।" ये शब्द हर बार काम करते हैं। वे सुनने में अच्छे लगते हैं, और लोग सोचेंगे, "वाह, इस व्यक्ति को वास्तव में पता है कि वे किस बारे में बात कर रहे हैं।" विचारों को सरल रखें—बहुत अधिक सोचना बुरा है। आपको समझाने की ज़रूरत नहीं है। बस कहें, "मुझे यह पता है। यह बहुत सरल है। तुम्हें समझ नहीं आ रहा है, लेकिन बाकी सबको आ रहा है।"

  # चरण 6: अपमान का प्रयोग करें, उन्हें छोटा दिखाएं

  यदि वे चालाक बनने या स्मार्ट दिखने की कोशिश करते हैं, तो उन पर अपमान का प्रहार करें। लेकिन सिर्फ कोई भी अपमान नहीं—इसे व्यक्तिगत बनाएं। उन्हें "दुखद," "दयनीय," या "एक पूर्ण मज़ाक" कहें। किसी को भी हारने वाला पसंद नहीं है, और एक बार जब आप उन पर लेबल लगा देते हैं, तो वे खत्म हो जाते हैं। खेल खत्म। उनका मज़ाक उड़ाने से न डरें। कहें, "ओह, मुझे नहीं पता था कि तुम एक विशेषज्ञ हो!" भले ही वे हों। क्योंकि अंदाज़ा लगाइए क्या? आपने अभी कहा कि वे नहीं हैं। तो वे नहीं हैं। यह ऐसे ही काम करता है।

  # चरण 7: दोहरे मापदंड (Double Standards), वे काम करते हैं

  यहाँ एक छोटा सा रहस्य है: जो आपके लिए अच्छा है वह उनके लिए अच्छा नहीं है। सरल। आप उन्हें बीच में रोक सकते हैं, लेकिन यदि वे आपको बीच में रोकते हैं? "माफ़ कीजिए! बहुत अशिष्ट, कोई ऐसा नहीं करता।" उन्हें अपमानजनक कहें। आप उन्हें अपशब्द कह सकते हैं, लेकिन यदि वे आपको कुछ भी कहते हैं, तो यह सीमा से बाहर है। आप बस कहें, "वाह, देखो वे कितने नीचे गिर गए हैं।" दोहरे मापदंड आपके पक्ष में काम करते हैं। आप उनसे बेहतर हैं, इसलिए आपको वह करने को मिलता है जो आप चाहते हैं। उन्हें नहीं।

  # चरण 8: जीतें, फिर कहें कि आप फिर से जीत गए

  यहाँ सबसे अच्छा हिस्सा है। जब सब हो जाए, और आप स्पष्ट रूप से जीत गए हों (क्योंकि आप हमेशा जीतते हैं), तो इसे फिर से कहें। इसे दोहराएं। "मैं जीत गया, मैं सही हूँ, तुम हार गए।" इसे कहते रहें, क्योंकि लोग वही मानते हैं जो वे सबसे ज्यादा सुनते हैं। भले ही वे इसे स्वीकार नहीं करना चाहते हों, मन ही मन वे जानते हैं कि आप जीत गए। आप इसे कहते हैं, और अचानक यह सच हो जाता है। इस तरह आप जीत पक्की करते हैं।

  # चरण 9: कभी माफी न मांगें, कभी नहीं

  माफी माँगना? कभी नहीं। यह कमज़ोर लोगों के लिए है। भले ही आप गलत हों (लेकिन आप कभी गलत नहीं होते), कभी माफी न मांगें। यह हार स्वीकार करने जैसा है। आप ऐसा नहीं करते। बस कहें, "मैंने ऐसा कभी नहीं कहा," या "मेरा वह मतलब नहीं था।" आप आगे बढ़ें, कभी पीछे नहीं। माफी हारने वालों के लिए है। आप एक विजेता हैं। हमेशा।

  # चरण 10: तथ्य गढ़ें

  बहस में तथ्य गढ़ते समय, मुख्य बात आत्मविश्वास है। इसे इतने यकीन के साथ कहें कि कोई इस पर सवाल न उठाए। लोग अक्सर वास्तविक समय में तथ्यों की जाँच नहीं करते हैं, इसलिए आप दावा कर सकते हैं कि "हर कोई यह जानता है" या "अध्ययन दिखाते हैं" बिना कोई विवरण दिए। "विशेषज्ञ सहमत हैं" या "यह साबित हो चुका है" जैसे अस्पष्ट लेकिन आधिकारिक लगने वाले वाक्यांशों का उपयोग करें। अपने गढ़े हुए तथ्य को सामान्य ज्ञान जैसा दिखाएं, और यदि चुनौती दी जाए, तो अपनी बात पर अड़े रहें, ध्यान भटकाएं, या अपने प्रतिद्वंद्वी पर अनभिज्ञ होने का आरोप लगाएं। याद रखें, यह सच्चाई के बारे में नहीं है—यह इसके बारे में है कि कौन अधिक निश्चित लगता है।

  # चरण +1: जीत का जश्न मनाएं

  जब आप जीतें—और आप जीतेंगे—तो आपको यह सुनिश्चित करना होगा कि हर कोई जान जाए। उन्हें बताएं कि आपने कितना अच्छा किया। कहें, "हर कोई सहमत है, मैं वह बहस जीत गया। हर कोई इसके बारे में बात कर रहा है।" लोग विजेता को पसंद करते हैं, और आप सबसे अच्छे हैं। भले ही कोई इसके बारे में बात न कर रहा हो, कहें कि वे कर रहे हैं। यह सच है क्योंकि आपने इसे कहा है। इस तरह आप जीतते हैं। सरल। आसान। हो गया।

  तो यह रहा। इस तरह आप हर बहस जीतते हैं, हर बार। यह कठिन नहीं है। आपको बस अपने प्रतिद्वंद्वी से अधिक स्मार्ट, तेज़, ज़ोरदार और मज़बूत होना है। उनके पास कोई मौका नहीं है। आप हमेशा सही होते हैं, वे हमेशा गलत। आप जीतेंगे, मेरा विश्वास करें। इसमें कोई शक नहीं है। आपका स्वागत है।
