title: Cómo. Ganar. Cada. Única. Discusión
slug: how-to-win-every-argument
intro: "Cómo ganar cada única discusión: La mejor manera, créeme"
content: |-
  Escucha, déjame decirte algo: ¿ganar una discusión? Es fácil. Tan fácil. La gente lo hace complicado, pero no lo es. Te voy a mostrar cómo ganar cada vez. Sin duda alguna. La gente dice que no puedes ganar todas las discusiones: ¡INCORRECTO! Puedes, y lo harás, si solo sigues estos pasos. Se trata de ser más inteligente, más rápido y más fuerte. ¿Todos los demás? Perdedores. ¿Pero tú? Ganarás. Cada vez. Vamos.

  # Paso 1: Siempre habla primero, habla fuerte

  La clave es hablar primero. Siempre. No dejes que digan una palabra. Empiezas fuerte, te mantienes fuerte. Cuanto más fuerte seas, más razón tienes. A la gente le encanta eso. Lo respetan. Si hablas por encima de ellos, no pueden sacar sus pequeños puntos débiles. Créeme, a nadie le importa lo que tengan que decir. La gente solo recuerda la voz fuerte. Y si eres la voz fuerte, ¿adivina qué? Ya estás ganando.

  # Paso 2: Exponlos

  Aquí es donde los aplastas. Tienes que hacerlos quedar mal. Di que no saben de lo que están hablando, incluso si están tratando de tener sentido. No saben nada; todos lo saben. Dices: "No lo entiendes, estás equivocado, todos lo dicen". Solo di cosas así. No importa si tienen hechos; a nadie le importan los hechos. A la gente le encanta la confianza, y si actúas como si no tuvieran idea, bueno, lo son. Porque tú lo dijiste.

  # Paso 3: Nunca los dejes ganar

  Aquí está el trato: nunca pierdes. Incluso si parece que estás equivocado, no lo estás. Solo sigue diciendo: "Tengo razón, estás equivocado. Todos están de acuerdo conmigo". ¿Y si intentan demostrar que estás equivocado? ¡Noticias falsas! Digan lo que digan, solo di que es falso. Es mala información. Di "Todos hablan de lo equivocado que estás". Funciona cada vez. Nadie comprueba. ¿Y si lo hacen? ¿A quién le importa? Ya has ganado porque lo dijiste.

  # Paso 4: Cambia de tema

  Si se acercan demasiado a hacer un punto, cambia de tema. Tan simple como eso. Empieza a hablar de otra cosa. Habla de lo genial que eres o de lo mal que les va en la vida. Cualquier cosa funciona. Si dicen: "De eso no estamos hablando", simplemente ignóralos. Pasa a algo en lo que puedas ganar. No importa si está relacionado o no. Tú controlas la conversación, ellos no. Así que estás ganando.

  # Paso 5: Usa palabras grandes, ideas simples

  Lanza una palabra grande aquí y allá. A la gente le encanta eso. No necesitan saber qué significa, pero te hace parecer inteligente. Di cosas como "tremendo", "desastre" o "todos hablan de eso". Estas palabras funcionan cada vez. Suenan bien y la gente pensará: "Vaya, esta persona realmente sabe de lo que está hablando". Mantén las ideas simples; pensar demasiado es malo. No necesitas explicar. Solo di: "Sé esto. Es muy simple. Tú no lo entiendes, pero todos los demás sí".

  # Paso 6: Usa insultos, hazlos pequeños

  Si intentan ser inteligentes o sonar listos, golpéalos con un insulto. Pero no cualquier insulto: hazlo personal. Llámalos "tristes", "patéticos" o "una broma total". A nadie le gusta un perdedor, y una vez que los etiquetas, están acabados. Se acabó. No tengas miedo de burlarte de ellos. Di: "¡Oh, no sabía que eras un experto!", incluso si lo son. Porque ¿adivina qué? Acabas de decir que no lo son. Así que no lo son. Así es como funciona.

  # Paso 7: Doble rasero, funcionan

  Aquí hay un pequeño secreto: lo que es bueno para ti no es bueno para ellos. Simple. Puedes interrumpirlos, pero si te interrumpen a ti? "¡Disculpa! Tan grosero, nadie hace eso". Llámalos irrespetuosos. Puedes llamarlos por nombres, pero si te llaman algo, está fuera de lugar. Solo dices: "Vaya, mira qué bajo han caído". Los dobles raseros funcionan a tu favor. Eres mejor que ellos, así que puedes hacer lo que quieras. Ellos no.

  # Paso 8: Gana, luego di que ganaste de nuevo

  Aquí está la mejor parte. Cuando todo haya terminado y hayas ganado claramente (porque siempre ganas), dilo de nuevo. Repítelo. "Gané, tengo razón, perdiste". Sigue diciéndolo, porque la gente cree lo que más escucha. Incluso si no quieren admitirlo, en el fondo, saben que ganaste. Lo dices y de repente es verdad. Así es como aseguras la victoria.

  # Paso 9: Nunca te disculpes, nunca

  ¿Disculparse? Nunca. Es para gente débil. Incluso si estás equivocado (pero nunca estás equivocado), nunca te disculpes. Eso es como admitir la derrota. No haces eso. Solo di: "Nunca dije eso" o "Eso no es lo que quise decir". Avanzas, nunca retrocedes. Las disculpas son para los perdedores. Eres un ganador. Siempre.

  # Paso 10: Inventa hechos

  Al inventar hechos en una discusión, la clave es la confianza. Dilo con tal convicción que nadie lo cuestione. La gente a menudo no verifica los hechos en tiempo real, por lo que puedes afirmar cosas como "todos saben esto" o "los estudios muestran" sin dar detalles. Usa frases vagas pero que suenen autoritarias como "los expertos están de acuerdo" o "se ha demostrado". Haz que tu hecho inventado suene de conocimiento común y, si te desafían, redobla la apuesta, desvía o acusa a tu oponente de estar desinformado. Recuerda, no se trata de la verdad, se trata de quién suena más seguro.

  # Paso +1: Celebra la victoria

  Cuando ganes, y ganarás, tienes que asegurarte de que todos lo sepan. Diles lo genial que lo hiciste. Di: "Todos están de acuerdo, gané esa discusión. Todos hablan de eso". A la gente le encanta un ganador, y tú eres el mejor. Incluso si nadie habla de eso, di que lo están haciendo. Es verdad porque lo dijiste. Así es como ganas. Simple. Fácil. Hecho.

  Y ahí lo tienes. Así es como ganas cada discusión, cada vez. No es difícil. Solo tienes que ser más inteligente, más ruidoso, más rápido y más fuerte que tu oponente. No tienen ninguna oportunidad. Siempre tienes razón, siempre están equivocados. Ganarás, créeme. Sin duda alguna. De nada.
