title: Como. Vencer. Todos. Os. Argumentos.
slug: como-vencer-qualquer-discussao
intro: "Como Vencer Todos os Argumentos: A Melhor Maneira, Acredite em Mim"
content: |-
  Escute, deixe-me dizer uma coisa: ganhar uma discussão? É fácil. Tão fácil. As pessoas complicam, mas não é. Vou mostrar como vencer todas as vezes. Sem dúvida. As pessoas dizem que você não pode ganhar todas as discussões — ERRADO! Você pode, e vai, se apenas seguir estes passos. É tudo uma questão de ser mais esperto, mais rápido e mais forte. Todos os outros? Perdedores. Mas você? Você vai vencer. Todas as vezes. Vamos lá.

  # Passo 1: Fale Sempre Primeiro, Fale Alto

  A chave é falar primeiro. Sempre. Não deixe que eles digam uma palavra. Você começa forte, você se mantém forte. Quanto mais alto você fala, mais certo você está. As pessoas adoram isso. Elas respeitam. Se você falar por cima deles, eles não conseguem expor seus pontinhos fracos. Confie em mim, ninguém se importa com o que eles têm a dizer. As pessoas só lembram da voz alta. E se você for a voz alta, adivinhe? Você já está ganhando.

  # Passo 2: Exponha-os

  É aqui que você os esmaga. Você tem que fazê-los parecer mal. Diga que eles não sabem do que estão falando, mesmo que estejam tentando fazer sentido. Eles não sabem de nada — todo mundo sabe disso. Você diz: "Você não entende, você está errado, todo mundo está dizendo isso". Apenas diga coisas assim. Não importa se eles têm fatos — ninguém se importa com fatos. As pessoas amam confiança, e se você agir como se eles fossem sem noção, bem, eles são. Porque você disse que são.

  # Passo 3: Nunca Deixe-os Vencer

  O negócio é o seguinte: você nunca perde. Mesmo que pareça que você está errado, você não está. Apenas continue dizendo: "Eu estou certo, você está errado. Todo mundo concorda comigo". E se eles tentarem provar que você está errado? Fake news! O que quer que eles digam, apenas diga que é falso. É má informação. Diga: "Todo mundo está falando sobre o quão errado você está". Funciona todas as vezes. Ninguém verifica. E se verificarem? Quem se importa? Você já venceu porque você disse que venceu.

  # Passo 4: Mude de Assunto

  Se eles chegarem muito perto de provar algo, mude de assunto. Simples assim. Comece a falar sobre outra coisa. Fale sobre o quão incrível você é, ou o quão mal eles estão indo na vida. Qualquer coisa funciona. Se eles disserem: "Não é disso que estamos falando", apenas ignore-os. Passe para algo em que você possa vencer. Não importa se está relacionado ou não. Você controla a conversa, eles não. Então você está ganhando.

  # Passo 5: Use Palavras Difíceis, Ideias Simples

  Jogue uma palavra difícil aqui e ali. As pessoas adoram isso. Elas não precisam saber o que significa, mas faz você parecer inteligente. Diga coisas como "tremendo", "desastre" ou "todo mundo está falando sobre isso". Essas palavras funcionam todas as vezes. Elas soam bem, e as pessoas vão pensar: "Uau, essa pessoa realmente sabe do que está falando". Mantenha as ideias simples — pensar demais é ruim. Você não precisa explicar. Apenas diga: "Eu sei disso. É muito simples. Você não entende, mas todo mundo entende".

  # Passo 6: Use Insultos, Diminua-os

  Se eles tentarem ser espertos ou parecer inteligentes, acerte-os com um insulto. Mas não qualquer insulto — torne-o pessoal. Chame-os de "triste", "patético" ou "uma piada total". Ninguém gosta de um perdedor, e uma vez que você os rotula, eles já eram. Acabou. Não tenha medo de zombar deles. Diga: "Ah, eu não sabia que você era um especialista!", mesmo que eles sejam. Porque adivinhe? Você acabou de dizer que eles não são. Então eles não são. É assim que funciona.

  # Passo 7: Dois Pesos, Duas Medidas, Elas Funcionam

  Aqui está um segredinho: o que é bom para você não é bom para eles. Simples. Você pode interrompê-los, mas se eles te interromperem? "Com licença! Tão rude, ninguém faz isso". Chame-os de desrespeitosos. Você pode chamá-los de nomes, mas se eles te chamarem de qualquer coisa, é inaceitável. Você apenas diz: "Uau, olha o nível a que eles chegaram". Ter dois pesos e duas medidas funciona a seu favor. Você é melhor do que eles, então você pode fazer o que quiser. Eles não podem.

  # Passo 8: Vença, Depois Diga Que Venceu Novamente

  Aqui está a melhor parte. Quando tudo terminar, e você tiver claramente vencido (porque você sempre vence), diga isso novamente. Repita. "Eu venci, eu estou certo, você perdeu". Continue dizendo, porque as pessoas acreditam no que ouvem mais vezes. Mesmo que não queiram admitir, lá no fundo, elas sabem que você venceu. Você diz, e de repente é verdade. É assim que você garante a vitória.

  # Passo 9: Nunca Peça Desculpas, Jamais

  Pedir desculpas? Nunca. É para pessoas fracas. Mesmo que você esteja errado (mas você nunca está errado), nunca peça desculpas. Isso é como admitir a derrota. Você não faz isso. Apenas diga: "Eu nunca disse isso" ou "Não foi isso que eu quis dizer". Você segue em frente, nunca para trás. Desculpas são para perdedores. Você é um vencedor. Sempre.

  # Passo 10: Invente Fatos

  Ao inventar fatos em uma discussão, a chave é a confiança. Diga com tanta convicção que ninguém questione. As pessoas muitas vezes não verificam os fatos em tempo real, então você pode alegar coisas como "todo mundo sabe disso" ou "estudos mostram" sem dar detalhes. Use frases vagas, mas que soem autoritárias, como "especialistas concordam" ou "está provado". Faça seu fato inventado parecer conhecimento comum e, se for contestado, insista, desvie ou acuse seu oponente de estar desinformado. Lembre-se, não se trata da verdade — trata-se de quem parece mais seguro.

  # Passo +1: Comemore a Vitória

  Quando você vencer — e você vai vencer — você tem que garantir que todos saibam. Diga a eles o quão bem você se saiu. Diga: "Todo mundo concorda, eu venci aquela discussão. Todo mundo está falando sobre isso". As pessoas amam um vencedor, e você é o melhor. Mesmo que ninguém esteja falando sobre isso, diga que estão. É verdade porque você disse. É assim que você vence. Simples. Fácil. Pronto.

  E aí está. É assim que você vence todas as discussões, todas as vezes. Não é difícil. Você só tem que ser mais esperto, mais alto, mais rápido e mais forte que seu oponente. Eles não têm chance. Você está sempre certo, eles estão sempre errados. Você vai vencer, acredite em mim. Sem dúvida. De nada.
