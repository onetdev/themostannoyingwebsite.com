title: Her. Tartışmayı. Nasıl. Kazanabilirsiniz.
slug: her-tartismayi-nasil-kazanabilirsiniz
intro: "Her Tartışmayı Nasıl Kazanabilirsiniz: En İyi Yol, İnanın Bana"
content: |-
  Dinleyin, size bir şey söyleyeyim: bir tartışmayı kazanmak mı? Kolay. Çok kolay. İnsanlar bunu karmaşıklaştırıyor ama öyle değil. Size her seferinde nasıl kazanacağınızı göstereceğim. Şüpheniz olmasın. İnsanlar her tartışmayı kazanamazsınız diyor—YANLIŞ! Sadece bu adımları takip ederseniz kazanabilirsiniz ve kazanacaksınız. Her şey daha akıllı, daha hızlı ve daha güçlü olmakla ilgili. Geri kalan herkes mi? Kaybedenler. Ama siz? Siz kazanacaksınız. Her seferinde. Hadi başlayalım.

  # Adım 1: Her Zaman İlk Siz Konuşun, Yüksek Sesle Konuşun

  İşin sırrı önce konuşmaktır. Her zaman. Tek bir kelime etmelerine bile izin vermeyin. Güçlü başlarsınız, güçlü kalırsınız. Sesiniz ne kadar yüksek çıkarsa, o kadar haklısınız demektir. İnsanlar buna bayılır. Buna saygı duyarlar. Onların üzerine konuşursanız, o zayıf küçük argümanlarını dile getiremezler. Güvenin bana, kimsenin onların ne dediği umurunda değil. İnsanlar sadece yüksek sesi hatırlar. Ve eğer yüksek ses sizseniz, bilin bakalım ne oldu? Zaten kazanıyorsunuz.

  # Adım 2: Onları İfşa Edin (Call Them Out)

  Burası onları ezdiğiniz yerdir. Onları kötü göstermelisiniz. Mantıklı bir şey söylemeye çalışsalar bile ne hakkında konuştuklarını bilmediklerini söyleyin. Hiçbir şey bilmiyorlar—bunu herkes biliyor. Şöyle deyin: “Anlamıyorsun, yanılıyorsun, bunu herkes söylüyor.” Sadece bu tarz şeyler söyleyin. Ellerinde gerçeklerin olması fark etmez—kimsenin gerçekler umurunda değil. İnsanlar özgüvene bayılır ve eğer onlara cahil gibi davranırsanız, öyle olurlar. Çünkü siz öyle dediniz.

  # Adım 3: Kazanmalarına Asla İzin Vermeyin

  Kural şu: Asla kaybetmezsiniz. Yanlışmışsınız gibi görünse bile, değilsiniz. Sadece şunu söylemeye devam edin: “Ben haklıyım, sen haksızsın. Herkes bana katılıyor.” Ve eğer haksız olduğunuzu kanıtlamaya mı çalışıyorlar? Yalan haber! Ne derlerse desinler, sadece bunun yanlış olduğunu söyleyin. Bu kötü bir bilgi. Şöyle deyin: “Herkes senin ne kadar haksız olduğunu konuşuyor.” Her seferinde işe yarar. Kimse kontrol etmez. Kontrol etseler bile kimin umurunda? Siz öyle dediğiniz için zaten kazandınız.

  # Adım 4: Konuyu Değiştirin

  Eğer bir noktaya parmak basmaya çok yaklaşırlarsa, konuyu değiştirin. Bu kadar basit. Başka bir şey hakkında konuşmaya başlayın. Ne kadar harika olduğunuzdan veya onların hayatlarının ne kadar kötü gittiğinden bahsedin. Her şey işe yarar. “Konuştuğumuz şey bu değil” derlerse, onları görmezden gelin. Kazanabileceğiniz bir konuya geçin. İlgili olup olmaması önemli değil. Sohbeti siz kontrol ediyorsunuz, onlar değil. Yani kazanıyorsunuz.

  # Adım 5: Büyük Kelimeler, Basit Fikirler Kullanın

  Oraya buraya büyük bir kelime fırlatın. İnsanlar buna bayılır. Ne anlama geldiğini bilmelerine gerek yok ama bu sizi akıllı gösterir. “Muazzam”, “felaket” veya “herkes bunu konuşuyor” gibi şeyler söyleyin. Bu kelimeler her seferinde işe yarar. Kulağa hoş gelirler ve insanlar şöyle düşünür: “Vay canına, bu kişi gerçekten ne hakkında konuştuğunu biliyor.” Fikirleri basit tutun—çok fazla düşünmek kötüdür. Açıklamanıza gerek yok. Sadece “Bunu biliyorum. Çok basit. Sen anlamıyorsun ama geri kalan herkes anlıyor” deyin.

  # Adım 6: Hakaret Edin, Onları Küçük Düşürün

  Eğer zekice konuşmaya veya bilgili görünmeye çalışırlarsa, bir hakaretle vurun. Ama öyle herhangi bir hakaret değil—kişiselleştirin. Onlara “acınası”, “zavallı” veya “tam bir şaka” deyin. Kimse kaybedenleri sevmez ve bir kez onları etiketlediniz mi işleri biter. Bitti. Onlarla dalga geçmekten korkmayın. Uzman olsalar bile “Aa, uzman olduğunu bilmiyordum!” deyin. Çünkü bilin bakalım ne oldu? Az önce uzman olmadıklarını söylediniz. Öyleyse değiller. Sistem böyle işler.

  # Adım 7: Çifte Standartlar İşe Yarar

  İşte size küçük bir sır: Sizin için iyi olan onlar için iyi değildir. Basit. Onların sözünü kesebilirsiniz ama onlar sizin sözünüzü keserse? “Afedersiniz! Çok kaba, kimse böyle yapmaz.” Onları saygısızlıkla suçlayın. Siz onlara isim takabilirsiniz ama onlar size bir şey derse, bu haddi aşmaktır. Sadece “Vay canına, ne kadar alçaldıklarına bak” dersiniz. Çifte standartlar sizin lehinize işler. Siz onlardan daha iyisiniz, bu yüzden istediğinizi yapabilirsiniz. Onlar yapamaz.

  # Adım 8: Kazanın, Sonra Tekrar Kazandığınızı Söyleyin

  İşte en iyi kısmı. Her şey bittiğinde ve net bir şekilde kazandığınızda (çünkü her zaman kazanırsınız), bunu tekrar söyleyin. Tekrar edin. “Ben kazandım, ben haklıyım, sen kaybettin.” Bunu söylemeye devam edin, çünkü insanlar en çok duydukları şeye inanırlar. Kabul etmek istemeseler bile, derinlerde bir yerde sizin kazandığınızı bilirler. Siz söylersiniz ve birden gerçek olur. Zaferi böyle mühürlersiniz.

  # Adım 9: Asla Özür Dilemeyin, Asla

  Özür dilemek mi? Asla. Zayıf insanlar içindir. Hatalı olsanız bile (ama asla hatalı olmazsınız), asla özür dilemeyin. Bu yenilgiyi kabul etmek gibidir. Bunu yapmazsınız. Sadece “Bunu hiç söylemedim” veya “Kastettiğim bu değildi” deyin. İleri gidin, asla geri değil. Özürler kaybedenler içindir. Siz bir kazananısınız. Her zaman.

  # Adım 10: Gerçekler Uydurun

  Bir tartışmada gerçekler uydururken anahtar güvenilir olmaktır. Bunu öyle bir ikna kabiliyetiyle söyleyin ki kimse sorgulamasın. İnsanlar genellikle gerçek zamanlı olarak doğruluk kontrolü yapmazlar, bu yüzden herhangi bir ayrıntı vermeden “herkes bunu biliyor” veya “araştırmalar gösteriyor ki” gibi iddialarda bulunabilirsiniz. “Uzmanlar katılıyor” veya “kanıtlandı” gibi belirsiz ama otoriter gelen ifadeler kullanın. Uydurduğunuz gerçeğin genel bir bilgiymiş gibi duyulmasını sağlayın ve meydan okunursa, ısrar edin, konuyu saptırın veya rakibinizi bilgisiz olmakla suçlayın. Unutmayın, mesele gerçek değil—kimin daha emin duyulduğu meselesidir.

  # Adım +1: Zaferi Kutlayın

  Kazandığınızda—ki kazanacaksınız—herkesin bildiğinden emin olmalısınız. Onlara ne kadar harika iş çıkardığınızı söyleyin. Şöyle deyin: “Herkes katılıyor, bu tartışmayı ben kazandım. Herkes bunu konuşuyor.” İnsanlar kazananları sever ve siz en iyisisiniz. Kimse konuşmasa bile, konuştuklarını söyleyin. Siz söylediğiniz için doğrudur. İşte böyle kazanırsınız. Basit. Kolay. Bitti.

  Ve işte bu kadar. Her tartışmayı, her seferinde nasıl kazanacağınız işte böyle. Zor değil. Sadece rakibinizden daha akıllı, daha sesli, daha hızlı ve daha güçlü olmanız gerekiyor. Şansları yok. Siz her zaman haklısınız, onlar her zaman haksız. Kazanacaksınız, inanın bana. Şüpheniz olmasın. Bir şey değil.
