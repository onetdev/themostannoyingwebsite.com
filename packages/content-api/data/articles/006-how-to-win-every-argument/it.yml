title: Come. Vincere. Ogni. Singola. Discussione.
slug: come-vincere-ogni-singola-discussione
intro: "Come vincere ogni singola discussione: Il modo migliore, credetemi"
content: |-
  Ascoltate, lasciate che vi dica una cosa: vincere una discussione? È facile. Facilissimo. La gente la complica, ma non lo è. Vi mostrerò come vincere ogni volta. Senza ombra di dubbio. La gente dice che non si può vincere ogni discussione—SBAGLIATO! Si può, e lo farete, se seguirete questi passaggi. Si tratta solo di essere più intelligenti, più veloci e più forti. Tutti gli altri? Perdenti. Ma voi? Voi vincerete. Ogni volta. Andiamo.

  # Passaggio 1: Parla sempre per primo, parla forte

  La chiave è parlare per primi. Sempre. Non lasciate che dicano una parola. Iniziate forte, restate forti. Più forte parlate, più avete ragione. La gente lo adora. Lo rispetta. Se parlate sopra di loro, non possono esporre i loro deboli punticini. Fidatevi di me, a nessuno importa di quello che hanno da dire. La gente ricorda solo la voce forte. E se siete la voce forte, indovinate un po'? State già vincendo.

  # Passaggio 2: Svergognateli

  Qui è dove li schiacciate. Dovete farli sfigurare. Dite che non sanno di cosa stanno parlando, anche se stanno cercando di avere senso. Non sanno nulla—tutti lo sanno. Dite: "Non capisci, ti sbagli, lo dicono tutti". Dite cose del genere. Non importa se hanno dei fatti—a nessuno importa dei fatti. La gente ama la sicurezza, e se vi comportate come se fossero degli sprovveduti, beh, lo sono. Perché l'avete detto voi.

  # Passaggio 3: Non lasciateli mai vincere

  Ecco il punto: non si perde mai. Anche se sembra che abbiate torto, non è così. Continuate a dire: "Io ho ragione, tu hai torto. Tutti sono d'accordo con me". E se provano a dimostrare che vi sbagliate? Fake news! Qualunque cosa dicano, dite semplicemente che è falsa. È cattiva informazione. Dite "Tutti parlano di quanto ti sbagli". Funziona ogni volta. Nessuno controlla. E se lo fanno? Chi se ne frega? Avete già vinto perché l'avete detto voi.

  # Passaggio 4: Cambiate argomento

  Se si avvicinano troppo a un punto valido, cambiate argomento. Semplice. Iniziate a parlare di qualcos'altro. Parlate di quanto siete grandi, o di quanto stanno andando male nella vita. Tutto funziona. Se dicono: "Non è di questo che stiamo parlando", ignorateli e basta. Passate a qualcosa su cui potete vincere. Non importa se è correlato o meno. Voi controllate la conversazione, loro no. Quindi state vincendo.

  # Passaggio 5: Usate parolone, idee semplici

  Buttate lì una parola difficile ogni tanto. La gente lo adora. Non hanno bisogno di sapere cosa significa, ma vi fa sembrare intelligenti. Dite cose come "tremendo", "disastro" o "tutti ne parlano". Queste parole funzionano ogni volta. Suonano bene e la gente penserà: "Wow, questa persona sa davvero di cosa parla". Mantenete le idee semplici—pensare troppo fa male. Non c'è bisogno di spiegare. Dite solo: "Lo so. È molto semplice. Tu non lo capisci, ma tutti gli altri sì".

  # Passaggio 6: Usate insulti, sminuiteli

  Se cercano di fare i furbi o di sembrare intelligenti, colpiteli con un insulto. Ma non un insulto qualsiasi—rendetelo personale. Chiamateli "tristi", "patetici" o "una barzelletta totale". A nessuno piacciono i perdenti, e una volta che li etichettate, sono finiti. È finita. Non abbiate paura di prenderli in giro. Dite: "Oh, non sapevo che fossi un esperto!", anche se lo sono. Perché indovinate un po'? Avete appena detto che non lo sono. Quindi non lo sono. È così che funziona.

  # Passaggio 7: Doppi standard, funzionano

  Ecco un piccolo segreto: ciò che è buono per voi non è buono per loro. Semplice. Potete interromperli, ma se loro interrompono voi? "Scusami! Che maleducazione, nessuno lo fa". Chiamateli irrispettosi. Voi potete insultarli, ma se loro vi chiamano in qualsiasi modo, sono fuori riga. Dite semplicemente: "Wow, guardate quanto sono caduti in basso". I doppi standard funzionano a vostro favore. Siete migliori di loro, quindi potete fare quello che volete. Loro no.

  # Passaggio 8: Vincete, poi dite di aver vinto di nuovo

  Ecco la parte migliore. Quando è tutto finito, e avete chiaramente vinto (perché vincete sempre), ditelo di nuovo. Ripetetelo. "Ho vinto, ho ragione, hai perso". Continuate a dirlo, perché la gente crede a ciò che sente più spesso. Anche se non vogliono ammetterlo, nel profondo sanno che avete vinto. Lo dite voi, e improvvisamente è vero. È così che blindate la vittoria.

  # Passaggio 9: Mai chiedere scusa, mai

  Chiedere scusa? Mai. È per i deboli. Anche se avete torto (ma non avete mai torto), mai chiedere scusa. Sarebbe come ammettere la sconfitta. Voi non lo fate. Dite solo: "Non l'ho mai detto", o "Non era quello che intendevo". Si va avanti, mai indietro. Le scuse sono per i perdenti. Voi siete dei vincitori. Sempre.

  # Passaggio 10: Inventate fatti

  Quando inventate fatti in una discussione, la chiave è la sicurezza. Ditelo con tale convinzione che nessuno lo metta in dubbio. Spesso la gente non controlla i fatti in tempo reale, quindi potete affermare cose come "lo sanno tutti" o "gli studi dimostrano" senza dare dettagli. Usate frasi vaghe ma autorevoli come "gli esperti concordano" o "è stato dimostrato". Fate sembrare il vostro fatto inventato una conoscenza comune e, se contestati, raddoppiate la dose, deviate o accusate il vostro avversario di essere disinformato. Ricordate, non si tratta della verità, ma di chi sembra più sicuro.

  # Passaggio +1: Celebrate la vittoria

  Quando vincete—e vincerete—dovete assicurarvi che tutti lo sappiano. Dite loro quanto siete stati bravi. Dite: "Tutti concordano, ho vinto io quella discussione. Tutti ne parlano". La gente ama i vincitori, e voi siete i migliori. Anche se nessuno ne parla, dite che lo fanno. È vero perché l'avete detto voi. È così che si vince. Semplice. Facile. Fatto.

  Ed ecco qua. È così che si vince ogni discussione, ogni volta. Non è difficile. Dovete solo essere più intelligenti, più rumorosi, più veloci e più forti del vostro avversario. Non hanno scampo. Voi avete sempre ragione, loro hanno sempre torto. Vincerete, credetemi. Senza ombra di dubbio. Prego.
