title: Le sens de la vie
slug: le-sens-de-la-vie
intro: La question ultime et la réponse ultime à tout ; prouvé par la science
content: |-
  Ah, le sens de la vie — la grande question qui empêche les philosophes de dormir, qui fait pleurer les poètes dans leurs cafés latte et qui nous pousse, nous autres, à nous demander pourquoi on doit sortir du lit un lundi matin. Mais ne craignez rien, car la communauté scientifique a entrepris la tâche colossale de trouver la réponse à ce mystère ancestral.

  Nous voulons que cet article soit court parce qu'il est important que nous puissions commencer à vivre nos vies en conséquence. Donc, le sens personnel de la vie est le suivant :

  *Chargement en cours, veuillez patienter*

