title: El sentido de la vida
slug: the-meaning-of-life
intro: Pregunta definitiva obteniendo y respuesta definitiva para todo; probado por la ciencia
content: |-
  Ah, el sentido de la vida: la gran pregunta que mantiene despiertos a los filósofos por la noche, hace llorar a los poetas en sus cafés con leche y hace que el resto de nosotros nos preguntemos por qué tenemos que levantarnos de la cama un lunes por la mañana. Pero no temas, porque la comunidad científica ha emprendido la colosal tarea de encontrar la respuesta a este antiguo misterio.

  Queremos mantener este artículo breve porque es importante que podamos empezar a vivir nuestras vidas en consecuencia. Entonces, el sentido personal de la vida es el siguiente:

  *Cargando, por favor espera*

