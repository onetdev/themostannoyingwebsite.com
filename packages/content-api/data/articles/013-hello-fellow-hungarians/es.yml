title: ¡Hola, amigos hispanohablantes! ¿Todo bien, todo correcto?
slug: hola-amigos-hispanohablantes-todo-bien-todo-correcto
intro: El idioma español ha llegado a The Most Annoying Website. Ahora podemos molestarte en tu lengua materna con popups, parpadeos y todo tipo de pesadillas digitales.
content: |-
  Tenemos una buena noticia y una mala noticia. La buena noticia es que The Most Annoying Website ahora está disponible en español. La mala noticia es... bueno, exactamente la misma.

  Pensamos durante mucho tiempo si valía la pena ampliar el soporte de idiomas en un sitio cuyo objetivo principal es recopilar y mostrar los hábitos más molestos de la web moderna. Luego nos dimos cuenta de algo: si Internet es capaz de molestar a las personas a nivel mundial, ¿por qué no hacerlo en varios idiomas?

  El español es una elección particularmente emocionante. Por un lado, es un idioma hermoso, rápido y apasionado, hablado por millones de personas en todo el mundo. Por otro lado, es increíblemente expresivo, lo que lo hace perfecto para describir exactamente esa sensación cuando un sitio web inicia automáticamente un video a todo volumen.

  Así que, a partir de ahora, las funciones más molestas pueden saludarte en español. Las ventanas emergentes, las infinitas preguntas de cookies, las animaciones que se inician arbitrariamente y los inexplicables spinners de carga están listos para poner a prueba tu paciencia en tu lengua materna.

  Por supuesto, la traducción no se trata solo de palabras. Nuestro objetivo era que el ambiente también se transmitiera. Esa extraña mezcla de humor absurdo y leve caos digital que define todo el proyecto. En español, tal vez funcione incluso un poco mejor, porque el idioma maneja maravillosamente conceptos como "pesadilla", "caos total" o "¿por qué me está pasando esto a mí otra vez?".

  Si es la primera vez que visitas este lugar, bienvenido a este extraño experimento. Y si conoces el sitio desde hace mucho tiempo, ahora puedes experimentar la misma locura digital de una manera nueva. Porque, en última instancia, este sitio no se trata solo de molestarte. También se trata de poder reírnos un poco de la extraña dirección en la que a veces se ha desarrollado la web.

  Así que siéntate, haz clic con valentía y prepárate para que cada pequeña molestia de la Internet moderna te salude ahora en español.

  Bienvenido al sitio web más molesto del mundo.
