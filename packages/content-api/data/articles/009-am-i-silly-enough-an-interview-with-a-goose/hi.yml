title: क्या मैं काफी नादान हूँ? - एक हंस के साथ साक्षात्कार
slug: kya-main-kaafi-nadaan-hoon-ek-hans-ke-saath-saakshaatkaar
intro: '"लोगों को मुझसे बहुत उम्मीदें हैं, लेकिन क्या एक हंस उन पर खरा उतर सकता है?"'
content: |-
  जीवन और प्रकृति की दैनिक आपाधापी के बीच, पशु साम्राज्य के प्रतीत होने वाले लापरवाह जीव भी अस्तित्व संबंधी सोच से अछूते नहीं हैं। आज, हम ऐसे ही एक व्यक्तित्व के साथ बैठते हैं—एक नादान हंस, जिसने सालों तक डगमगाते हुए चलने और शरारत करने के बाद, आत्म-चिंतन के चरण में प्रवेश किया है। घटनाओं के एक आश्चर्यजनक मोड़ में, यह पंख वाला दार्शनिक बड़ा सवाल पूछ रहा है: "क्या मैं काफी नादान (silly) हूँ?"

  लेकिन जैसे ही हम इस हल्के-फुल्के प्रश्न में गोता लगाते हैं, हम पहचान, आत्म-मूल्य और यहाँ तक कि वैज्ञानिक तथ्यों के गहरे विषयों को उजागर करते हैं जो आपको हंसों और स्वयं जीवन के बारे में अलग तरह से सोचने पर मजबूर कर सकते हैं।

  **साक्षात्कारकर्ता**: आज हमारे साथ जुड़ने के लिए धन्यवाद, श्रीमान हंस। आप हाल ही में "नादान हंस" के रूप में अपनी भूमिका पर सवाल उठा रहे हैं। क्या आप समझा सकते हैं कि आपके मन में क्या चल रहा है?

  **नादान हंस**: हौंक (Honk)! ओह, मैं कहाँ से शुरू करूँ? अपने जीवन के अधिकांश समय में, मुझे नादान के रूप में जाना जाता रहा है—आप जानते हैं, घेरे में डगमगाते हुए चलना, अनुचित समय पर हौंकना, आमतौर पर थोड़ा मूर्ख होना। लेकिन हाल ही में, मैं सोच रहा हूँ... क्या इतना काफी है? क्या मैं इस प्रतिष्ठा पर खरा उतरने के लिए पर्याप्त नादान हूँ, या मैं सिर्फ एक पुरानी रूढ़ि पर चल रहा हूँ?

  **साक्षात्कारकर्ता**: यह एक दिलचस्प सवाल है। लेकिन आइए कुछ स्पष्ट करने से शुरू करते हैं: हंसों की दुनिया में नादानी (silliness) क्या है? क्या यह विशुद्ध रूप से शारीरिक कॉमेडी है, या इसमें अधिक गहराई है?

  **नादान हंस**: आपको आश्चर्य होगा! अधिकांश लोग सोचते हैं कि यह सब अजीब तरह से डगमगाते हुए चलने या गलत समय पर हौंकने के बारे में है। लेकिन इसमें एक कला है। क्या आप जानते हैं कि हंसों की सामाजिक संरचना और संचार के तरीके जटिल होते हैं? जो आपको रैंडम हौंकना लग सकता है वह वास्तव में बातचीत का एक परिष्कृत रूप है। हम झुंड के साथ संवाद करने के लिए हौंकते हैं, और कभी-कभी, यह सिर्फ मनोरंजन के लिए होता है—दिन को खुशनुमा बनाने के लिए एक छोटी सी हौंक। लेकिन सच्ची नादानी में सहजता, अप्रत्याशित लेकिन आकर्षक होना शामिल है।

  **साक्षात्कारकर्ता**: मुझे इस बारे में जानकारी नहीं थी! तो, आपके हौंकने में परतें हैं—शोर के पीछे अर्थ है?

  **नादान हंस**: ओह, बिल्कुल! हम हंस दस से अधिक विभिन्न ध्वनियों (vocalizations) का उपयोग करते हैं, जिनमें से प्रत्येक का अपना संदर्भ होता है। जिसे लोग नादान हौंकना समझते हैं वह वास्तव में संचार का एक रूप हो सकता है। कभी-कभी, यह एक चेतावनी होती है; दूसरी बार, यह उत्साह या स्नेह का संकेत होता है। इसलिए, जब मैं पार्क में डगमगाते हुए चलते समय रैंडम तरीके से हौंकता हूँ, तो मैं सिर्फ नादान नहीं बन रहा हूँ—मैं खुशी व्यक्त कर रहा हूँ। लेकिन उस सारी जटिलता के बाद भी, मैं अभी भी सोचता हूँ... क्या मैं अलग दिखने के लिए पर्याप्त कर रहा हूँ?

  **साक्षात्कारकर्ता**: यह शानदार है! मानव संस्कृति में, हम अक्सर "अपने सच्चे स्व को खोजने" या प्रामाणिक रूप से जीने की बात करते हैं। क्या आपको लगता है कि हंसों की भी आत्म-खोज की समान यात्रा होती है?

  **नादान हंस**: हौंक! आप जानते हैं, शायद हमारी भी होती है! यह सोचना आसान है कि जानवर विशुद्ध रूप से वृत्ति (instinct) पर काम करते हैं, लेकिन हाल के अध्ययन बताते हैं कि कई जानवरों—पक्षियों सहित—के व्यक्तित्व हो सकते हैं और वे एक तरह की आत्म-जागरूकता का अनुभव भी कर सकते हैं। एक प्रसिद्ध अध्ययन है जहाँ वैज्ञानिकों ने मैगपाई (magpies) के सामने दर्पण रखे, और उन्होंने आत्म-पहचान की भावना प्रदर्शित की। जबकि हम हंस इस तरह के आत्मनिरीक्षण प्रयोगों के लिए नहीं जाने जाते हैं, मुझे यह सोचना पसंद है कि, कुछ स्तर पर, हम केवल आदत के जीव से कहीं अधिक हैं। शायद हम सभी अपने तरीके से पूछ रहे हैं, क्या मैं अपनी क्षमता के अनुरूप जी रहा हूँ?

  **साक्षात्कारकर्ता**: तो, क्या यह आत्म-संदेह हंसों के बीच आम है, या यह केवल आपके लिए कुछ अनोखा है?

  **नादान हंस**: खैर, मैं हर हंस की ओर से नहीं बोल सकता, लेकिन मुझे लगता है कि यह एक व्यक्तिगत यात्रा है। मैंने बहुत से अन्य हंस देखे हैं जो अपनी नादानी के स्तर के साथ पूरी तरह से सहज लगते हैं। उदाहरण के लिए, मेरा चचेरा भाई गेराल्ड—वह घंटों तक अपनी ही पूंछ का पीछा करने में पूरी तरह संतुष्ट है। लेकिन मेरे लिए, मैं हमेशा थोड़ा अधिक चिंतनशील रहा हूँ। शायद यह मेरी पृष्ठभूमि के कारण है—मैंने एक बार एक विश्वविद्यालय परिसर के पास गर्मियां बिताई थीं। वहां के मनुष्य अस्तित्ववाद (existentialism) और शून्यबाद (nihilism) जैसी चीजों के बारे में बात करते थे। मैं उन बातचीत के कुछ हिस्सों को सोखे बिना नहीं रह सका।

  **साक्षात्कारकर्ता**: आप मानवीय प्रभाव के बारे में एक दिलचस्प बात लेकर आए हैं। क्या आपको लगता है कि मनुष्यों के साथ बातचीत ने आपको अधिक चिंतनशील बना दिया है?

  **नादान हंस**: ओह, निस्संदेह। हंस सहस्राब्दियों से मनुष्यों के साथ सह-अस्तित्व में रहे हैं। दिलचस्प तथ्य: हंसों को लगभग 3,000 साल पहले मिस्र में पालतू बनाया गया था, और तब से हम मानव समाज के साथ बातचीत कर रहे हैं। आप यह भी कह सकते हैं कि हम मनुष्यों के साथ विकसित हुए हैं, उनके वातावरण के अनुकूल हुए हैं और उनके व्यवहार से सीख रहे हैं। इसलिए, हाँ, मनुष्यों को अपने स्वयं के मूल्य पर सवाल उठाते हुए देखने में पर्याप्त समय बिताने के बाद, शायद मैंने भी उस आदत का थोड़ा हिस्सा पकड़ लिया!

  **साक्षात्कारकर्ता**: यह एक आश्चर्यजनक ऐतिहासिक संबंध है! विकास के विषय पर, मैंने पढ़ा है कि हंस सबसे अधिक प्रवास (migratory) करने वाले पक्षियों में से हैं, जो हर साल हजारों मील की यात्रा करते हैं। क्या प्रवास आपकी पहचान को देखने के तरीके में भूमिका निभाता है?

  **नादान हंस**: वास्तव में, यह निभाता है। प्रवास हम कौन हैं इसका एक बड़ा हिस्सा है। हर साल, हम अक्सर कठोर परिस्थितियों में हजारों मील उड़ते हैं। यह शारीरिक रूप से चुनौतीपूर्ण और अविश्वसनीय रूप से सटीक दोनों है—क्या आप जानते हैं कि हम पृथ्वी के चुंबकीय क्षेत्रों और यहाँ तक कि सितारों का उपयोग करके नेविगेट करते हैं? लेकिन उन लंबी उड़ानों के दौरान सोचने के लिए भी बहुत समय होता है। आप सोचने लगते हैं, "सिर्फ जीवित रहने और उड़ने के अलावा मेरा उद्देश्य क्या है?" यह मनुष्यों के लिए एक लंबी सड़क यात्रा (road trip) जैसा है—आत्म-चिंतन के लिए बहुत समय।

  **साक्षात्कारकर्ता**: वाह! मुझे अंदाज़ा नहीं था कि हंस इतने गहरे विचारक होते हैं। इन सबके बावजूद—मानव समाज के साथ आपका संबंध, आपकी प्रवासी यात्राएं, और आपकी मुखर जटिलता—क्या आप अभी भी यह सवाल करने की आवश्यकता महसूस करते हैं कि क्या आप "काफी नादान" हैं?

  **नादान हंस**: आप जानते हैं, मुझे एहसास हुआ है कि नादानी, पहचान की तरह, तरल (fluid) है। यह कुछ ऐसा नहीं है जिसे आप माप सकें या परिमाणित कर सकें। निश्चित रूप से, मैं कुछ हंसों की तरह विस्तृत करतब नहीं कर रहा हूँ, लेकिन शायद मेरी नादानी मेरी अप्रत्याशितता, मेरी सहज हौंक, या उन तालाबों में भटकने के मेरे प्यार में निहित है जो स्पष्ट रूप से मेरे लिए बहुत छोटे हैं। आखिरकार, नादानी खुशी के बारे में है, और खुशी अलग-अलग रूपों में आती है।

  **साक्षात्कारकर्ता**: यह एक सुंदर सीख है। समाप्त करने से पहले, क्या आपके पास दूसरों के लिए—हंसों या मनुष्यों—के लिए कोई सलाह है जो आत्म-मूल्य या पहचान के समान प्रश्नों से जूझ रहे हों?

  **नादान हंस**: हौंक! मैं यह कहूंगा: अपनी तुलना दूसरों से करना बंद करें। चाहे आप हंस हों या इंसान, हमेशा कोई न कोई होगा जो कुछ अधिक दिखावटी या प्रभावशाली कर रहा होगा। लेकिन वह आपको कम नहीं करता है। अपनी विचित्रताओं, अपनी अजीबोगरीब चीज़ों को अपनाएं—चाहे वह एक अजीब हौंक हो या तिरछे चलने का प्यार। सच्ची नादानी, सच्ची खुशी की तरह, अपने ही पंखों में सहज होने के बारे में है।

  और इसके साथ, नादान हंस ने अपने पंख फड़फड़ाए, अनुमोदन की एक ज़ोरदार हौंक दी, और दूरी में डगमगाते हुए चला गया। अंत में, हंस की आत्म-खोज की यात्रा हमें याद दिलाती है कि कभी-कभी, "पर्याप्त" होने की हमारी खोज में, हम भूल जाते हैं कि हम पहले से ही हैं—चाहे नादान, विचारशील, या बीच में कहीं।
