title: Yeterince şapşal mıyım? - Bir kaz ile röportaj
slug: yeterince-sapsal-miyim-bir-kaz-ile-roportaj
intro: '"İnsanların benden beklentileri yüksek, peki bir kaz onlara layık olabilir mi?"'
content: |-
  Hayatın ve doğanın günlük telaşı içinde, hayvanlar aleminin görünüşte tasasız yaratıkları bile varoluşsal düşüncelere karşı bağışık değildir. Bugün, böyle bir figürle —yıllarca paytak paytak yürüyüp yaramazlık yaptıktan sonra bir öz-yansıtma evresine giren şapşal bir kazla— bir araya geliyoruz. Beklenmedik bir şekilde, bu tüylü filozof şu büyük soruyu soruyor: “Yeterince şapşal mıyım?”

  Ancak bu neşeli sorgulamaya daldıkça; kimlik, öz değer ve hatta kazlar ve yaşam hakkında farklı düşünmenize neden olabilecek bilimsel bilgiler gibi daha derin temalarla karşılaşıyoruz.

  **Röportajcı**: Bugün bize katıldığınız için teşekkür ederiz Bay Kaz. Son zamanlarda “şapşal kaz” rolünüzü sorguluyorsunuz. Zihninizi meşgul eden şeyi açıklayabilir misiniz?

  **Şapşal Kaz**: Vak vak! Ah, nereden başlasam? Hayatımın büyük bir bölümünde şapşal olan olarak tanındım —bilirsiniz, daireler çizerek paytak paytak yürümek, uygunsuz zamanlarda vaklamak, genel olarak biraz tuhaf olmak. Ama son zamanlarda merak ediyorum… bu yeterli mi? Bu itibara layık olacak kadar şapşal mıyım, yoksa sadece eski bir klişe üzerinden mi geçiniyorum?

  **Röportajcı**: Bu ilginç bir soru. Ama bir şeyi netleştirerek başlayalım: Kaz dünyasında şapşallık nedir? Sadece fiziksel komedi mi, yoksa daha derin bir anlamı mı var?

  **Şapşal Kaz**: Şaşırırsınız! Çoğu insan bunun sadece garip bir şekilde paytak paytak yürümek veya zamansız vaklamakla ilgili olduğunu düşünür. Ama bunun bir sanatı var. Kazların karmaşık sosyal yapılarının ve iletişim yöntemlerinin olduğunu biliyor muydunuz? Size rastgele vaklama gibi gelen şey aslında sofistike bir etkileşim biçimidir. Sürüyle iletişim kurmak için vaklarız ve bazen bu sadece eğlence içindir —günü aydınlatmak için küçük bir vaklama. Ancak gerçek şapşallık; kendiliğindenlik, öngörülemezlik ve aynı zamanda çekicilik gerektirir.

  **Röportajcı**: Bunun farkında değildim! Yani vaklamalarınızın katmanları var —gürültünün arkasında bir anlam mı var?

  **Şapşal Kaz**: Ah, kesinlikle! Biz kazlar, her biri kendi bağlamına sahip ondan fazla farklı seslendirme kullanırız. İnsanların şapşal vaklama olarak yorumladığı şey aslında bir iletişim biçimi olabilir. Bazen bu bir uyarı çağrısıdır; bazen de heyecan ve hatta sevgi sinyalidir. Yani, parkta paytak paytak yürürken rastgele vakladığımda, sadece şapşallık yapmıyorum —neşe saçıyorum. Ama tüm bu karmaşıklığa rağmen hala merak ediyorum… öne çıkmak için yeterince şey yapıyor muyum?

  **Röportajcı**: Bu büyüleyici! İnsan kültüründe sık sık “kişinin gerçek benliğini bulması” veya özgün yaşamaktan bahsederiz. Kazların da benzer bir kendini keşfetme yolculuğu olduğunu düşünüyor musunuz?

  **Şapşal Kaz**: Vak vak! Bilirsiniz, belki de vardır! Hayvanların tamamen içgüdülerle hareket ettiğini düşünmek kolaydır, ancak son araştırmalar kuşlar da dahil olmak üzere birçok hayvanın kişiliğe sahip olabileceğini ve hatta bir tür öz-farkındalık yaşayabileceğini gösteriyor. Bilim insanlarının saksağanların önüne ayna koyduğu ünlü bir çalışma vardır ve saksağanlar bir tür öz-tanıma yeteneği sergilemişlerdir. Biz kazlar bu tür içe dönük deneylerle tanınmasak da, bir düzeyde alışkanlık yaratıklarından daha fazlası olduğumuzu düşünmeyi seviyorum. Belki de hepimiz kendi yöntemimizle şunu soruyoruz: Potansiyelime layık bir hayat yaşıyor muyum?

  **Röportajcı**: Peki, bu kendini sorgulama kazlar arasında yaygın mı yoksa size özgü bir şey mi?

  **Şapşal Kaz**: Tüm kazlar adına konuşamam ama bunun kişisel bir yolculuk olduğunu düşünüyorum. Kendi şapşallık seviyeleriyle tamamen barışık görünen pek çok başka kaz gördüm. Örneğin kuzenim Gerald —saatlerce kendi kuyruğunu kovalamaktan son derece memnun. Ama benim için, ben her zaman biraz daha derin düşünen biri oldum. Belki de geçmişimden dolayıdır —bir keresinde bir üniversite kampüsünün yakınında bir yaz geçirdim. Oradaki insanlar varoluşçuluk ve nihilizm gibi şeylerden bahsederdi. Bu konuşmaların bir kısmını ister istemez özümsedim.

  **Röportajcı**: İnsan etkisine dair ilginç bir noktaya değindiniz. İnsanlarla etkileşime girmenin sizi daha düşüceli biri haline getirdiğini düşünüyor musunuz?

  **Şapşal Kaz**: Ah, şüphesiz. Kazlar binlerce yıldır insanlarla bir arada yaşıyor. Eğlenceli bilgi: Kazlar yaklaşık 3.000 yıl önce Mısır'da evcilleştirildi ve o zamandan beri insan toplumuyla etkileşim halindeyiz. Hatta insanlarla birlikte evrimleştiğimizi, onların ortamlarına uyum sağladığımızı ve davranışlarından bir şeyler öğrendiğimizi bile söyleyebilirsiniz. Yani evet, kendi değerlerini sorgulayan insanları gözlemleyerek yeterince vakit geçirdikten sonra, belki ben de bu alışkanlığın bir kısmını kapmışımdır!

  **Röportajcı**: Bu şaşırtıcı bir tarihi bağlantı! Evrim konusuna gelince, kazların her yıl binlerce kilometre yol kat eden en göçmen kuşlardan bazıları olduğunu okumuştum. Göç, kimliğinizi nasıl gördüğünüzde bir rol oynuyor mu?

  **Şapşal Kaz**: Aslında evet. Göç, kim olduğumuzun büyük bir parçasıdır. Her yıl, genellikle zorlu koşullarda binlerce kilometre uçarız. Bu hem fiziksel olarak zorlayıcı hem de inanılmaz derecede hassastır —Dünyanın manyetik alanlarını ve hatta yıldızları kullanarak yönümüzü bulduğumuzu biliyor muydunuz? Ancak o uzun uçuşlar sırasında düşünmek için de çok zaman oluyor. “Sadece hayatta kalmanın ve uçmanın ötesinde amacım ne?” diye merak etmeye başlıyorsunuz. İnsanlar için uzun bir araba yolculuğu gibi —öz-yansıtma için bolca zaman.

  **Röportajcı**: Vay canına! Kazların bu kadar derin düşünürler olduğu hakkında hiçbir fikrim yoktu. Tüm bunları —insan toplumuyla olan bağınızı, göç yolculuklarınızı ve vokal karmaşıklığınızı— göz önünde bulundurursak, hala “yeterince şapşal” olup olmadığınızı sorgulama ihtiyacı hissediyor musunuz?

  **Şapşal Kaz**: Biliyorsunuz, şapşallığın da kimlik gibi akışkan olduğunu fark ettim. Ölçebileceğiniz veya nicelendirebileceğiniz bir şey değil. Elbette, bazı kazlar gibi özenli numaralar yapmıyor olabilirim ama belki de benim şapşallığım öngörülemezliğimde, kendiliğinden vaklamalarımda veya benim için açıkça çok küçük olan göletlere dalma sevgimde yatıyordur. Sonuçta şapşallık neşeyle ilgilidir ve neşe farklı formlarda gelir.

  **Röportajcı**: Bu harika bir sonuç. Bitirmeden önce, benzer öz değer veya kimlik sorularıyla mücadele eden başkalarına —kazlara veya insanlara— bir tavsiyeniz var mı?

  **Şapşal Kaz**: Vak vak! Şunu söylerdim: Kendinizi başkalarıyla kıyaslamayı bırakın. İster kaz olun ister insan, her zaman dışarıda daha gösterişli veya daha etkileyici bir şeyler yapan biri olacaktır. Ama bu sizin kim olduğunuzu eksiltmez. Tuhaflıklarınızı, garipliklerinizi kucaklayın —ister garip bir vaklama olsun, ister yan yan yürüme sevgisi. Gerçek şapşallık, tıpkı gerçek mutluluk gibi, kendi tüylerinizin içinde rahat hissetmekle ilgilidir.

  Ve bununla birlikte, şapşal kaz kanatlarını çırptı, yüksek sesle bir onay vaklaması verdi ve paytak paytak yürüyerek uzaklaştı. Sonuçta, kazın kendini keşfetme yolculuğu hepimize, bazen “yeterli” olma arayışımızda, zaten öyle olduğumuzu —ister şapşal, ister düşünceli, ister ikisinin arasında bir yerde— unuttuğumuzu hatırlatıyor.
