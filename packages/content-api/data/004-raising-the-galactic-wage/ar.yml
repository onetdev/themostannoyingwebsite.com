title: هل حان الوقت لرفع الحد الأدنى للأجور في المجرة؟
slug: رفع-أجور-المجرة
intro: عمال المناجم المريخيون ينبت لهم أطراف إضافية بينما يعملون مقابل "هيكسونات" بالكاد تكفيهم للبقاء على قيد الحياة.
content: |-
  حسناً، أيها المواطنون الكونيون، نحتاج إلى إجراء محادثة جادة حول صناعة التعدين في المريخ — حيث الأجور سيئة مثل ظروف العمل، و"بلورغارك"، الصخرة العجيبة المشعة في المجرة، تحول العمال ببطء إلى شيء يشبه أفلام الرعب الهولوغرافية. مع اقتراب "الموافقة الثانية للقديس غارغلاكس" (العيد الأكثر قدسية في المجرة)، إنه الوقت المثالي لنسأل: هل ينبغي لنا أخيراً رفع الحد الأدنى للأجور في المجرة ووقف هذا الجنون؟

  # بلورغارك: الجائزة الكبرى المشعة التي تطفر عمال المناجم

  دعونا نتحدث عن بلورغارك، المعدن المتوهج والمتطاير الذي يغذي كل شيء من محركات الالتواء إلى سخانات الفضاء. بالتأكيد، إنه ذو قيمة، ولكن إليكم المفاجأة — هذا الشيء خطير للغاية أيضاً. إنه مشع للغاية، مما يجعل تعدينه تذكرة ذهاب فقط إلى "مدينة المتحولين". عمال مناجم "ثرين" و"سالكاري" هم النفوس المسكينة المكلفة بسحب بلورغارك من الأرض، وهو يفعل أكثر من مجرد تدمير صحتهم. التعرض لبلورغارك لفترة طويلة؟ ستجد أجزاء جسم جديدة في أماكن لا ينبغي أن تكون فيها. أطراف إضافية، نمو غريب، حتى عين ثالثة تظهر في منتصف جبهتك. نعم، هذا ما يتعامل معه هؤلاء العمال بينما يتقاضون بالكاد أجراً يثير الضحك في وجه المخاطر.

  شعب "ثرين"، بأصولهم في عالم الجليد وعيونهم الأرجوانية المتوهجة، متماسكون بطريقة ما، لكن حتى هم بدأوا في إظهار علامات التعرض لبلورغارك. وفي الوقت نفسه، شعب "سالكاري"، تلك الزواحف القوية التي يمكنها التعامل مع الحرارة والإشعاع بشكل لا مثيل له، ينبت لهم ذيول إضافية — وليس بطريقة جيدة. نحن نتحدث عن رعب جسدي حقيقي، كل ذلك لأن الكونسورتيوم المجري يريد بلورغارك الخاص به بسعر رخيص.

  # السكن والطعام؟ حظاً سعيداً في ذلك

  تريد أن تعرف كيف تبدو الحياة على المريخ لهؤلاء العمال عندما لا يكونون مشغولين بإنبات أطراف إضافية؟ تخيل العيش في علبة صفيح ضيقة وصدئة في أماكن مثل "ريد ديونز ريدج" أو "أوكسيوم كانيون"، حيث الإيجار مرتفع للغاية، وفلاتر الأكسجين بالكاد تعمل. إنه إما ذلك أو التشرد على سطح المريخ، وهو، تنبيه حرق، حكم بالإعدام. أما بالنسبة للطعام، حسناً، من الأفضل أن تحب معجون المغذيات، لأن هذا كل ما يمكنك تحمله. أي شيء يشبه الطعام الطازج يكلف أكثر من أجر شهر.

  # الموافقة الثانية للقديس غارغلاكس: عيد مقدس وشرارة للتمرد

  المفاجأة الحقيقية؟ كل هذا يحدث في الفترة التي تسبق "الموافقة الثانية للقديس غارغلاكس"، العيد الأكبر والأكثر قدسية في المجرة. غارغلاكس، قديس العمال والمستضعفين في كل مكان، أعطى إبهامه الأسطوري الثاني للطبقة العاملة في المجرة، مباركاً جهودهم. هذا العيد يدور حول الراحة والعائلة والاحتفال بالصمود في وجه الشدائد.

  عادةً، كان شعب ثرين وسالكاري يبذلون قصارى جهدهم في هذا العيد، مع الولائم والطقوس والوقت الذي يقضونه مع أحبائهم. ولكن ليس في المريخ. كلا، هنا، تفرض نقابة التعدين المجرية سيطرتها، وتجبر عمال المناجم على مواصلة العمل الشاق طوال العيد، واستخراج المزيد من بلورغارك حتى يتمكن الأغنياء من إضاءة قصورهم الفضائية بطاقة خالية من الأطراف الإضافية. إنه إهانة لكل ما يمثله القديس غارغلاكس، والناس بدأوا يشعرون بالضجر حقاً.

  # التمرد السري: الموافقة الثانية للقديس غارغلاكس لن تمر بهدوء

  وهنا تصبح الأمور مثيرة للاهتمام حقاً. كانت هناك أحاديث — شائعات عن منظمة سرية تعمل بهدوء للإطاحة بالحكومة المجرية خلال "الموافقة الثانية للقديس غارغلاكس" القادمة. يسمون أنفسهم "النظام اللوميني"، وهم ليسوا مجرد مجموعة من عمال المناجم المستائين. إنهم شبكة غامضة من العمال السابقين والناشطين وحتى بعض المسؤولين رفيعي المستوى الذين سئموا من مشاهدة نخبة المجرة يستنزفون الطبقة العاملة.

  كان النظام اللوميني ينتشر عبر المستعمرات المريخية، تاركاً رسائل غامضة في أنفاق التعدين، ومخرباً للمعدات، ومنظماً لاجتماعات سرية في أحلك أركان "بلاك روك أوت بوست". هدفهم؟ استخدام الفوضى والرمزية لـ "الموافقة الثانية للقديس غارغلاكس" لإشعال انتفاضة كاملة. يعتقدون أنه إذا انتفض ما يكفي من عمال المناجم والعمال ذوي الأجور المنخفضة عبر المجرة خلال العيد، فيمكنهم شل الكونسورتيوم المجري وفرض تغيير حقيقي.

  خطط النظام اللوميني لا تزال محاطة بالغموض، ولكن هناك همسات عن إضراب منسق — إغلاق بين المجرات لإنتاج بلورغارك خلال العيد المقدس. إنهم يهدفون لضرب الكونسورتيوم في المكان الذي يؤلمه: في سلسلة توريد بلورغارك. إذا نجحوا في ذلك، فقد تكون بداية النهاية للنخبة الفاسدة في المجرة.

  # الخلاصة: ادفعوا لعمال المناجم أو استعدوا للثورة

  مع اقتراب "الموافقة الثانية للقديس غارغلاكس"، وصل عمال المناجم في المريخ إلى نقطة الانهيار. ينبت لهم أطراف إضافية، ويعيشون في أحياء فقيرة، ويأكلون القمامة، ولا يحصلون على يوم واحد من الراحة — كل ذلك مقابل أجور لا تغطي حتى تكلفة رحلة تاكسي طائر فاخر على الأرض. يحتاج الحد الأدنى للأجور في المجرة إلى دفعة قوية، وإذا لم تبدأ القوى المسيطرة في الاهتمام، فقد يبدأ النظام اللوميني الثورة التي يهددون بها.

  لذا، إذا كنتم تستمعون هناك، يا كبار كونسورتيوم المجرة الأثرياء — ربما حان الوقت للدفع للأشخاص الذين ينبت لهم حرفياً أطراف جديدة لإبقاء أضوائكم مشتعلة. لأنكم إذا لم تفعلوا ذلك، فقد تحصلون على أكثر من مجرد إبهام ثانٍ من القديس غارغلاكس هذا العام — قد تواجهون رفض المجرة بأكملها.

  أعطوا. العمال. المزيد. من الهيكسونات!
