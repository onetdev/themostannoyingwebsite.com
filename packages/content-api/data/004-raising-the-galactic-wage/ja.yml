title: 銀河系の最低賃金を引き上げるべき時か？
slug: gingakei-no-saiteichingin-wo-hikiagerubeki-tokika
intro: 火星の鉱員たちは、かろうじて生活できる程度のヘクシオンのために働き、余分な手足が生えてきています。
content: |-
  さて、宇宙市民の皆さん、火星の鉱業について真剣に話し合う必要があります。そこでは賃金が労働条件と同じくらい劣悪で、銀河系の放射性不思議岩「ブルガーク」が、労働者たちをホラー・ホロビデオから抜け出してきたような姿にゆっくりと変えてしまっています。「聖グルグラクスの第二承認」（銀河系で最も神聖な祝日）が目前に迫っている今こそ、問うべき絶好の機会です。そろそろ銀河最低賃金を引き上げ、この狂気を止めるべきではないでしょうか？

  # ブルガーク：鉱員を変異させる放射性のジャックポット

  ワープドライブからスペースヒーターまで、あらゆるものの燃料となる、光り輝く不安定な鉱物「ブルガーク」について話しましょう。確かに価値はありますが、落とし穴があります。この代物はとんでもなく危険なのです。超強力な放射能を持っており、それを採掘することは「変異都市」への片道切符を意味します。スレン族とサルカリ族の鉱員たちは、地中からブルガークを引きずり出す任務を負った不憫な魂たちですが、それは彼らの健康を損なう以上のことを引き起こしています。ブルガークに長期間さらされるとどうなるか？本来あるべきではない場所に新しい部位が生えてくるのです。余分な手足、奇妙な突起、さらには額の真ん中に第三の目が飛び出してくることもあります。ええ、これがリスクに見合わない、笑えるほど低い賃金で食いつなぎながら、労働者たちが直面している現実なのです。

  氷の世界を起源とし、光る紫色の目を持つスレン族は何とか耐えていますが、彼らでさえブルガーク被曝の兆候を見せ始めています。一方、熱や放射能を平気で処理できる爬虫類系のタフなサルカリ族は、余分な尻尾が生えてきています。しかも、悪い意味でです。私たちは深刻なボディホラーの話をしています。すべては「銀河コンソーシアム」が安くブルガークを手に入れたがっているせいなのです。

  # 住宅と食料？ 運が良ければの話

  余分な付属器官が生えてくるのに忙しくない時、火星での鉱員たちの生活がどのようなものか知りたいですか？「レッド・デューンズ・リッジ」や「オキシウム・キャニオン」のような場所にある、狭くて錆びたブリキ缶のような家で暮らすことを想像してみてください。家賃は天文学的に高く、酸素フィルターはほとんど機能していません。さもなければ火星の表面でホームレスになるしかありませんが、ネタバレ注意：それは死刑宣告と同じです。食料に関しては、栄養ペーストが大好きであることを願います。それしか買えないからです。新鮮な食べ物に近いものは、1ヶ月分の賃金以上のコストがかかります。

  # 聖グルグラクスの第二承認：神聖な祝日と反乱の火種

  本当の皮肉は何でしょうか？これらすべてが、銀河系で最大かつ最も神聖な祝日である「聖グルグラクスの第二承認」に向けて進行中だということです。あらゆる場所の労働者と弱者の聖人であるグルグラクスは、銀河系の労働者階級に伝説的な「二つ目の親指」を立てて彼らの努力を祝福しました。この祝日は、休息、家族、そして逆境に直面した時の回復力を祝うためのものです。

  通常、スレン族とサルカリ族はこの祝日のために、宴会や儀式を行い、愛する人たちと過ごすために全力を尽くします。しかし火星では違います。いいえ、ここでは「銀河採掘ギルド」が鞭を振り回し、祝日の間も鉱員たちに採掘を続けさせ、富裕層が余分な手足の犠牲のないエネルギーで自分たちの宇宙邸宅を照らせるよう、より多くのブルガークを抽出させています。これは聖グルグラクスが象徴するものすべてに対する侮辱であり、人々は本気でうんざりしています。

  # 地下反乱軍：「聖グルグラクスの第二承認」は静かには終わらない

  そして、ここからが本当に興味深いところです。来たる「聖グルグラクスの第二承認」の間に、銀河政府を静かに転覆させようと活動している地下組織の噂があります。彼らは自らを「ルミナル・オーダー（光の秩序）」と呼んでいます。彼らは単なる不満を抱えた鉱員の集まりではありません。銀河系のエリートが労働者階級を搾取し尽くすのを見るのに疲れた、元労働者、活動家、さらには数名の高官からなる影のネットワークなのです。

  ルミナル・オーダーは火星の植民地全体に広がり、採掘トンネルに不可解なメッセージを残し、機器を破壊し、「ブラック・ロック・アウトポスト」の最も暗い隅々で秘密の会議を組織しています。彼らの目標は？「聖グルグラクスの第二承認」の混乱と象徴性を利用して、本格的な蜂起を引き起こすことです。彼らは、銀河系全体の十分な数の鉱員と低賃金労働者が祝日の間に立ち上がれば、銀河コンソーシアムを麻痺させ、真の変化を強制できると信じています。

  ルミナル・オーダーの計画は依然として謎に包まれていますが、聖なる祝日の間に銀河全域でブルガークの生産を停止させるという、調整されたストライキの囁きが聞こえてきます。彼らはコンソーシアムの痛いところ、つまりブルガークのサプライチェーンを叩こうとしています。もし彼らがやり遂げれば、それは銀河系の腐敗したエリートたちの終わりの始まりになるかもしれません。

  # 結論：鉱員に賃金を払うか、反乱に備えるか

  「聖グルグラクスの第二承認」を目前に控え、火星の鉱員たちは限界点に達しています。彼らは余分な手足が生え、スラム街に住み、ゴミを食べ、休みも全くありません。それらすべてが、地球での高級ホバータクシー代にも満たない賃金のためなのです。銀河最低賃金には大幅な引き上げが必要であり、権力者が注意を払い始めなければ、ルミナル・オーダーが脅してきた革命を本当に開始してしまうかもしれません。

  だから、もし聞いているなら、銀河コンソーシアムのデブ猫（金持ち）たちよ。文字通り新しい手足を生やしてまで明かりを灯し続けてくれている人々に、報いる時が来たのかもしれません。さもなければ、今年の聖グルグラクスから受け取るのは「二つ目の親指」だけではないかもしれません。銀河系全体の「不承認」に直面することになるでしょう。

  労働者に。もっと。ヘクシオンを！
