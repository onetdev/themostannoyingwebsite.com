title: Itt az ideje megemelni a galaktikus minimálbért?
slug: itt-az-ideje-megemelni-a-galaktikus-minimalbert
intro: A marsi bányászoknak extra végtagjaik nőnek, miközben alig kapnak elég hexiont a túléléshez.
content: |-
  Rendben, kozmikus polgárok, komolyan beszélnünk kell a marsi bányászati iparról – ahol a fizetés ugyanolyan rossz, mint a munkakörülmények, és a Blurgark, a galaxis radioaktív csodaköve, lassan olyanná változtatja a munkásokat, mintha egy horror holovidből léptek volna elő. Mivel Szent Gurglax Második Jóváhagyása (a galaxis legszentebb ünnepe) már a kanyarban van, itt a tökéletes alkalom feltenni a kérdést: Nem kellene végre megemelni a Galaktikus Minimálbért, és véget vetni ennek az őrületnek?

  # Blurgark: A radioaktív főnyeremény, ami mutációt okoz a bányászoknál

  Beszéljünk a Blurgarkról, a fénylő, illékony ásványról, amely a térhajtóművektől az űrhősugárzókig mindent működtet. Persze, értékes, de itt a bökkenő – ez a cucc őrülten veszélyes is. Szuper radioaktív, ami miatt a bányászata egyirányú jegy Mutáns-városba. A Thren és Salkari bányászok azok a szegény párák, akiknek feladata a Blurgarkot a földből előrángatni, és ez nem csak az egészségüket teszi tönkre. Hosszú távú kitettség a Blurgarknak? Olyan testrészekre számíthatsz ott is, ahol nem kellene lenniük. Extra végtagok, furcsa kinövések, még egy harmadik szem is felbukkanhat a homlokod közepén. Igen, ezzel küzdenek ezek a munkások, miközben alig tengődnek egy olyan bérből, ami nevetséges a kockázatok fényében.

  A Threniek, jégvilági származásukkal és fénylő lila szemeikkel, valahogy kitartanak, de még náluk is kezdenek mutatkozni a Blurgark-kitettség jelei. Eközben a Salkariak, azok a hüllőszerű keménycsávók, akik bírják a hőt és a sugárzást, extra farkakat növesztenek – és nem a jó értelemben. Komoly testhorrorról beszélünk, és mindezt csak azért, mert a Galaktikus Konzorcium olcsón akarja a Blurgarkját.

  # Lakhatás és étel? Sok szerencsét hozzá

  Szeretnéd tudni, milyen az élet a Marson ezeknek a bányászoknak, amikor éppen nem extra végtagok növesztésével vannak elfoglalva? Képzeld el, hogy egy szűk, rozsdás bádogdobozban laksz olyan helyeken, mint a Vörös Dűnék Gerince vagy az Oxium-kanyon, ahol a lakbér az egekben van, az oxigénszűrők pedig alig működnek. Vagy ez, vagy a hajléktalanság a marsi felszínen, ami – spoiler veszély – egyet jelent a halálos ítélettel. Ami az ételt illeti, nos, jobb, ha szereted a tápanyagpasztát, mert csak azt tudod megfizetni. Bármi, ami friss ételre emlékeztet, többe kerül, mint egy havi munkabér.

  # Szent Gurglax Második Jóváhagyása: Egy szent ünnep és a lázadás szikrája

  A legszebb az egészben? Mindez Szent Gurglax Második Jóváhagyása, a galaxis legnagyobb, legszentebb ünnepe előtt történik. Gurglax, a munkások és az elnyomottak szentje mindenhol, legendás második felfelé tartott hüvelykujját adta a galaxis munkásosztályának, megáldva erőfeszítéseiket. Ez az ünnep a pihenésről, a családról és a csapásokkal szembeni ellenállóképesség megünnepléséről szól.

  Normális esetben a Threniek és Salkariak mindent beleadnának ebbe az ünnepbe, lakomákkal, rituálékkal és a szeretteikkel töltött idővel. De nem a Marson. Nem, itt a Galaktikus Bányászcéh csattogtatja az ostort, arra kényszerítve a bányászokat, hogy az ünnep alatt is robotoljanak, még több Blurgarkot kitermelve, hogy a gazdagok extra-végtag-mentes energiával világíthassák meg űrkastélyaikat. Ez sértés mindenre nézve, amit Szent Gurglax képvisel, és az embereknek komolyan kezd elegük lenni.

  # A földalatti lázadás: Szent Gurglax Második Jóváhagyása nem múlik el csendben

  És itt válnak a dolgok igazán érdekessé. Beszélnek róla – pletykák keringenek egy földalatti szervezetről, amely csendben a Galaktikus kormány megdöntésén dolgozik a közelgő Szent Gurglax Második Jóváhagyása alatt. Luminális Rendnek hívják magukat, és nem csak elégedetlen bányászok egyszerű csoportjáról van szó. Ez egy árnyékhálózat, amely volt munkásokból, aktivistákból, sőt még néhány magas rangú tisztviselőből áll, akiknek elegük van abból, hogy a galaxis elitje kiszipolyozza a munkásosztályt.

  A Luminális Rend elterjedt a marsi kolóniákon, rejtélyes üzeneteket hagyva a bányajáratokban, szabotálva a berendezéseket, és titkos találkozókat szervezve a Fekete Szikla Előőrs legsötétebb sarkaiban. A céljuk? Szent Gurglax Második Jóváhagyásának káoszát és szimbolikáját felhasználva egy teljes körű felkelést kirobbantani. Úgy vélik, ha elég bányász és alulfizetett munkás lázad fel a galaxis-szerte az ünnep alatt, megbéníthatják a Galaktikus Konzorciumot és valódi változást kényszeríthetnek ki.

  A Luminális Rend terveit még homály fedi, de koordinált sztrájkról suttognak – a Blurgark-termelés intergalaktikus leállításáról a szent ünnep alatt. Ott akarnak lecsapni a Konzorciumra, ahol a legjobban fáj: a Blurgark-ellátási láncnál. Ha sikerül nekik, ez lehet a galaxis korrupt elitje végének kezdete.

  # A lényeg: Fizessétek meg a bányászokat, vagy készüljetek a lázadásra

  Szent Gurglax Második Jóváhagyásával a láthatáron a marsi bányászok elérték a töréspontot. Extra végtagokat növesztenek, nyomornegyedekben élnek, szemetet esznek, és nulla pihenőnapot kapnak – mindezt olyan bérért, ami még egy luxus lebegőtaxi-útra sem futná a Földön. A Galaktikus Minimálbérnek komoly lökésre van szüksége, és ha a hatalmon lévők nem kezdenek el figyelni, a Luminális Rend megindíthatja a forradalmat, amivel fenyegetőznek.

  Szóval, ha hallgassátok ott kint, Galaktikus Konzorcium kövér macskái – talán itt az ideje megfizetni azokat az embereket, akik szó szerint új végtagokat növesztenek azért, hogy nálatok égjen a villany. Mert ha nem teszitek, idén talán nem csak Szent Gurglax második felfelé tartott hüvelykujját kapjátok meg – hanem az egész galaxis rosszallásával nézhettek szembe.

  Adjatok. Több. Hexiont. A. Munkásoknak!
