title: Пора ли повышать галактическую минимальную зарплату?
slug: pora-li-povyshat-galakticheskuyu-minimalnuyu-zarplatu
intro: Марсианские шахтеры отращивают лишние конечности, работая за жалкие гроши, которых едва хватает, чтобы держаться на плаву.
content: |-
  Итак, космические граждане, нам нужно серьезно поговорить о марсианской горнодобывающей промышленности — где зарплата так же плоха, как и условия труда, а Блургарк, радиоактивный чудо-камень галактики, медленно превращает рабочих в нечто прямиком из хоррор-холовида. В преддверии Второго Одобрения Святого Гурглакса (самого священного праздника галактики) самое время спросить: не пора ли нам, наконец, повысить галактическую минимальную зарплату и прекратить это безумие?

  # Блургарк: радиоактивный джекпот, мутирующий шахтеров

  Давайте поговорим о Блургарке, светящемся летучем минерале, который питает всё: от варп-двигателей до обогревателей. Конечно, он ценен, но вот в чем загвоздка — эта штука еще и безумно опасна. Она суперрадиоактивна, что делает её добычу билетом в один конец до Мутант-тауна. Шахтеры Тренов и Салкари — это те бедолаги, которым поручено вытаскивать Блургарк из-под земли, и он делает нечто большее, чем просто губит их здоровье. Длительное воздействие Блургарка? Готовьтесь к новым частям тела там, где их быть не должно. Лишние конечности, странные наросты, даже третий глаз, выскакивающий прямо посреди лба. Да, это то, с чем имеют дело эти рабочие, едва сводя концы с концами на зарплату, которая просто смехотворна перед лицом такого риска.

  Трены, с их ледяными корнями и светящимися фиолетовыми глазами, как-то держатся, но даже у них начинают проявляться признаки воздействия Блургарка. Тем временем Салкари, те рептилоидные крутые ребята, которые переносят жару и радиацию как никто другой, отращивают лишние хвосты — и не в хорошем смысле. Мы говорим о серьезном телесном ужасе, и всё потому, что Галактический Консорциум хочет свой Блургарк по дешевке.

  # Жилье и еда? Удачи с этим

  Хотите знать, на что похожа жизнь на Марсе для этих шахтеров, когда они не заняты отращиванием лишних отростков? Представьте себе жизнь в тесной, ржавой консервной банке в таких местах, как Хребет Красных Дюн или Каньон Оксиум, где арендная плата заоблачная, а кислородные фильтры едва работают. Это либо так, либо бездомность на поверхности Марса, что, спойлер, является смертным приговором. Что касается еды, ну, вам лучше полюбить питательную пасту, потому что это всё, что вы можете себе позволить. Всё, что напоминает свежую еду, стоит больше месячной зарплаты.

  # Второе Одобрение Святого Гурглакса: священный праздник и искра для восстания

  Настоящая ирония? Всё это происходит в преддверии Второго Одобрения Святого Гурглакса, самого большого и священного праздника в галактике. Гурглакс, святой рабочих и аутсайдеров повсюду, дал свой легендарный второй «палец вверх» рабочему классу галактики, благословив их усилия. Этот праздник посвящен отдыху, семье и празднованию стойкости перед лицом невзгод.

  Обычно Трены и Салкари выкладывались бы по полной на этот праздник с пирами, ритуалами и временем, проведенным с близкими. Но не на Марсе. Нет, здесь Галактическая Гильдия Горняков щелкает кнутом, заставляя шахтеров продолжать пахать все праздники, добывая больше Блургарка, чтобы богачи могли освещать свои космические особняки энергией, свободной от лишних конечностей. Это оскорбление всего, за что стоит Святой Гурглакс, и люди уже сыты этим по горло.

  # Подпольное восстание: Второе Одобрение Святого Гурглакса не пройдет тихо

  И вот здесь всё становится действительно интересно. Пошли разговоры — слухи о подпольной организации, тайно работающей над свержением Галактического правительства во время предстоящего Второго Одобрения Святого Гурглакса. Они называют себя Орденом Люминалов, и это не просто группа недовольных шахтеров. Это теневая сеть бывших рабочих, активистов и даже нескольких высокопоставленных чиновников, которые устали смотреть, как элита галактики выжимает все соки из рабочего класса.

  Орден Люминалов распространяется по марсианским колониям, оставляя загадочные послания в шахтных туннелях, саботируя оборудование и организуя секретные встречи в самых темных углах Аванпоста Блэк-Рок. Их цель? Использовать хаос и символизм Второго Одобрения Святого Гурглакса, чтобы разжечь полномасштабное восстание. Они верят, что если достаточное количество шахтеров и низкооплачиваемых рабочих по всей галактике восстанет во время праздника, они смогут парализовать Галактический Консорциум и заставить его пойти на реальные перемены.

  Планы Ордена Люминалов всё еще окутаны тайной, но ходят шепотки о скоординированной забастовке — межгалактической остановке добычи Блургарка во время священного праздника. Они стремятся ударить Консорциум по больному месту: по цепочке поставок Блургарка. Если им это удастся, это может стать началом конца для коррумпированной элиты галактики.

  # Итог: платите шахтерам или готовьтесь к бунту

  В преддверии Второго Одобрения Святого Гурглакса шахтеры Марса находятся на грани срыва. Они отращивают лишние конечности, живут в трущобах, едят мусор и не получают ни одного выходного — и всё это за зарплату, которой не хватило бы даже на поездку в роскошном ховер-такси на Земле. Галактическая минимальная зарплата нуждается в серьезном повышении, и если власти не начнут обращать на это внимание, Орден Люминалов может просто запустить революцию, которой они угрожают.

  Так что, если вы слушаете там, жирные коты из Галактического Консорциума — возможно, пришло время заплатить людям, которые буквально отращивают новые конечности, чтобы у вас горел свет. Потому что, если вы этого не сделаете, в этом году вы можете получить от Святого Гурглакса нечто большее, чем просто второй «палец вверх» — вы можете столкнуться с неодобрением всей галактики.

  Дайте. Рабочим. Больше. Хексонов!
