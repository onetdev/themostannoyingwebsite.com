title: O sentido da vida
slug: o-sentido-da-vida
intro: A pergunta definitiva e a resposta definitiva para tudo; comprovado pela ciência
content: |-
  Ah, o sentido da vida — a grande questão que mantém filósofos acordados à noite, faz poetas chorarem em seus cafés e faz o resto de nós questionar por que temos que sair da cama em uma manhã de segunda-feira. Mas não tema, pois a comunidade científica assumiu a tarefa colossal de encontrar a resposta para este mistério antigo.

  Queremos manter este artigo curto porque é importante que possamos começar a viver nossas vidas de acordo. Portanto, o sentido pessoal da vida é o seguinte:

  *Carregando, por favor aguarde*

