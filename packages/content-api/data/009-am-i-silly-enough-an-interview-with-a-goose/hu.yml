title: Elég suta vagyok? - Interjú egy lúddal
slug: eleg-suta-vagyok-interju-egy-luddal
intro: „Az embereknek magas elvárásaik vannak velem szemben, de vajon egy lúd meg tud felelni nekik?”
content: >
  A mindennapi élet és a természet forgatagában még az állatvilág látszólag
  gondtalan teremtményei sem mentesek az egzisztenciális töprengésektől. Ma egy
  ilyen alakkal ülünk le – egy suta lúddal, aki többévnyi totyogás és csínytevés
  után az önreflexió fázisába lépett. Az események meglepő fordulataként ez a
  tollas filozófus a nagy kérdést feszegeti: „Elég suta vagyok?”


  De ahogy elmerülünk ebben a könnyed kérdésben, az identitás, az önértékelés
  mélyebb témái és még olyan tudományos morzsák is felszínre kerülnek, amelyek
  után talán másképp gondolunk majd a ludakra és magára az életre.


  **Riporter**: Köszönjük, hogy ma velünk tart, Lúd úr. Mostanában megkérdőjelezte
  a „suta lúd” szerepét. Elmondaná, mi nyomja a lelkét?


  **Suta Lúd**: Gá-gá! Ó, hol is kezdjem? Életem nagy részében én voltam a suta –
  tudja, körbe-körbe totyogás, gágogás a legalkalmatlanabb pillanatokban,
  általában véve egy kis bolondozás. De mostanában azon tűnődöm… elég ez? Elég
  suta vagyok ahhoz, hogy megfeleljek ennek a hírnévnek, vagy csak egy régi
  sztereotípián lovagolok?


  **Riporter**: Ez egy izgalmas kérdés. De kezdjük azzal, hogy tisztázunk
  valamit: mi a sutaság a ludak világában? Tisztán fizikai komédia, vagy van
  benne több mélység is?


  **Suta Lúd**: Meg lepődne! A legtöbb ember azt hiszi, hogy ez csak a furcsa
  totyogásról vagy a nem megfelelő időben való gágogásról szól. De ennek
  művészete van. Tudta, hogy a ludaknak összetett társadalmi struktúráik és
  kommunikációs módszereik vannak? Ami önnek véletlenszerű gágogásnak tűnik, az
  valójában az interakció egy kifinomult formája. Gágogunk, hogy kommunikáljunk a
  csapattal, és néha csak a móka kedvéért – egy kis gágogás, hogy szebbé tegyük a
  napot. De az igazi sutasághoz spontaneitás kell, kiszámíthatatlannak, mégis
  bájosnak kell lenni.


  **Riporter**: Erről nem is tudtam! Szóval a gágogásának rétegei vannak –
  jelentése van a zaj mögött?


  **Suta Lúd**: Ó, abszolút! Mi, ludak, több mint tízféle hangadást használunk,
  mindegyiknek megvan a maga kontextusa. Amit az emberek suta gágogásnak
  interpretálnak, az valójában a kommunikáció egy formája lehet. Néha
  figyelmeztetés; máskor az izgalom vagy akár a szeretet jele. Szóval, amikor
  véletlenszerűen gágogok, miközben végigtotyogok a parkon, nem csak suta vagyok
  – az örömömet fejezem ki. De még ennyi összetettség mellett is azon
  tűnődöm… teszek eleget ahhoz, hogy kitűnjek?


  **Riporter**: Ez lenyűgöző! Az emberi kultúrában gyakran beszélünk az „igazi
  önmagunk megtalálásáról” vagy a hiteles életről. Ön szerint a ludaknak is van
  hasonló önfelfedező útjuk?


  **Suta Lúd**: Gá-gá! Tudja, talán van! Könnyű azt hinni az állatokról, hogy
  tisztán ösztönből működnek, de a közelmúltbeli tanulmányok azt mutatják, hogy
  sok állatnak – beleértve a madarakat is – lehet személyisége, sőt,
  tapasztalhatnak egyfajta öntudatot is. Van egy híres tanulmány, ahol a tudósok
  tükröket tettek szarkák elé, és azok megmutatták az önfelismerés képességét.
  Bár mi, ludak nem vagyunk híresek az ilyen befelé forduló kísérletekről,
  szeretem azt hinni, hogy valamilyen szinten többek vagyunk, mint a megszokások
  rabjai. Talán mindannyian feltesszük a magunk módján a kérdést: kihasználom a
  bennem rejlő lehetőségeket?


  **Riporter**: Tehát ez az önvizsgálat gyakori a ludak körében, vagy ez valami
  egyedi dolog önnél?


  **Suta Lúd**: Nos, nem beszélhetek minden lúd nevében, de szerintem ez egy
  személyes utazás. Sok más ludat láttam, akik teljesen elégedettnek tűnnek a
  saját sutasági szintjükkel. Az unokatestvérem, Gerald például – ő tökéletesen
  elégedett azzal, hogy órákig kergeti a saját farkát. De én mindig is kicsit
  elmélyültebb voltam. Talán a hátterem miatt – egyszer egy nyarat egy egyetemi
  kampusz közelében töltöttem. Az ottani emberek olyan dolgokról beszéltek, mint
  az egzisztencializmus és a nihilizmus. Nem tudtam megállni, hogy ne szippantsak
  be valamennyit ezekből a beszélgetésekből.


  **Riporter**: Érdekes pontot vetett fel az emberi hatásról. Úgy gondolja, hogy
  az emberekkel való interakció tette önt reflexívebbé?


  **Suta Lúd**: Ó, kétségtelenül. A ludak évezredek óta együtt élnek az
  emberekkel. Érdekesség: a ludakat körülbelül 3000 évvel ezelőtt háziasították
  Egyiptomban, és azóta interakcióban vagyunk az emberi társadalommal. Akár azt
  is mondhatnánk, hogy az emberek mellett fejlődtünk ki, alkalmazkodva a
  környezetükhöz és tanulva a viselkedésükből. Szóval igen, miután elég időt
  töltöttem azzal, hogy megfigyeltem az embereket, amint a saját értéküket
  kérdőjelezik meg, talán én is eltanultam egy kicsit ezt a szokást!


  **Riporter**: Ez egy meglepő történelmi kapcsolat! Ha már az evolúciónál
  tartunk, olvastam, hogy a ludak a leginkább vándorló madarak közé tartoznak,
  évente több ezer mérföldet tesznek meg. Játszik a vándorlás szerepet abban,
  hogyan látja az identitását?


  **Suta Lúd**: Igen, valójában játszik. A vándorlás hatalmas része annak, akik
  vagyunk. Minden évben több ezer mérföldet repülünk, gyakran zord körülmények
  között. Ez fizikailag megterhelő és hihetetlenül pontos – tudta, hogy a Föld
  mágneses mezőit és még a csillagokat is használjuk a navigációhoz? De a hosszú
  repülések alatt sok idő van gondolkodni is. Az ember elkezd azon tűnődni: „Mi a
  célom a túlélésen és a repülésen túl?” Olyan ez, mint egy hosszú autós utazás
  az embereknél – rengeteg idő az önreflexióra.


  **Riporter**: Hűha! Fogalmam sem volt, hogy a ludak ilyen mély gondolkodók.
  Mindezt figyelembe véve – az emberi társadalomhoz való kötődését, a vándorútjait
  és a hangbéli összetettségét – még mindig szükségét érzi annak, hogy
  megkérdőjelezze, „elég suta-e”?


  **Suta Lúd**: Tudja, rájöttem, hogy a sutaság, akárcsak az identitás,
  képlékeny. Nem olyasmi, amit mérni vagy számszerűsíteni lehetne. Persze, lehet,
  hogy nem csinálok olyan bonyolult trükköket, mint egyes ludak, de talán az én
  sutaságom a kiszámíthatatlanságomban, a spontán gágogásaimban vagy abban
  rejlik, hogy imádok olyan tavakba tévedni, amik egyértelműen túl kicsik nekem.
  Végül is a sutaság az örömről szól, és az öröm különböző formákban érkezik.


  **Riporter**: Ez egy szép tanulság. Mielőtt befejeznénk, van valamilyen
  tanácsa másoknak – ludaknak vagy embereknek –, akik hasonló önértékelési vagy
  identitásbeli kérdésekkel küzdenek?


  **Suta Lúd**: Gá-gá! Ezt mondanám: ne hasonlítsd magad másokhoz. Legyél lúd
  vagy ember, mindig lesz valaki, aki valami látványosabbat vagy lenyűgözőbbet
  csinál. De ez nem csökkenti azt, aki vagy. Fogadd el a hóbortjaidat, a
  furcsaságaidat – legyen az egy furcsa gágogás vagy az oldalazó totyogás iránti
  szeretet. Az igazi sutaság, akárcsak az igazi boldogság, arról szól, hogy jól
  érezd magad a saját tolladban.


  És ezzel a suta lúd megcsapkodta a szárnyait, hallatott egy hangos,
  egyetértő gágogást, és eltotyogott a távolba. Végül a lúd önfelfedező útja
  mindannyiunkat emlékeztet arra, hogy néha, az „elégnek lenni” iránti
  törekvésünkben elfelejtjük, hogy már azok vagyunk – legyünk akár suták,
  gondolkodók, vagy valahol a kettő között.
