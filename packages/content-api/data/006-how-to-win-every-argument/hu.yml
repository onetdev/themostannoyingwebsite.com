title: Hogyan. Nyerjünk. Meg. Minden. Egyes. Vitát.
slug: hogyan-nyerjunk-meg-minden-egyes-vitat
intro: "Hogyan nyerjünk meg minden egyes vitát: A legjobb módszer, hidd el nekem"
content: >
  Figyelj, hadd mondjak neked valamit: megnyerni egy vitát? Pofonegyszerű. Annyira
  egyszerű. Az emberek megbonyolítják, de nem az. Megmutatom, hogyan nyerhetsz
  minden alkalommal. Semmi kétség felőle. Sokan azt mondják, nem lehet minden
  vitát megnyerni – TÉVEDÉS! Lehet, és meg is fogod nyerni, ha követed ezeket a
  lépéseket. Csak okosabbnak, gyorsabbnak és erősebbnek kell lenned. Mindenki
  más? Vesztes. De te? Te nyerni fogsz. Minden alkalommal. Gyerünk!

  # 1. lépés: Mindig te beszélj először, beszélj hangosan

  A kulcs az, hogy te beszélj először. Mindig. Ne hagyd szóhoz jutni őket. Erősen
  kezdesz, maradj erős. Minél hangosabb vagy, annál inkább igazad van. Az emberek
  ezt imádják. Tisztelik. Ha túlkiabálod őket, nem tudják előadni a gyenge kis
  érveiket. Hidd el, senkit nem érdekel, mit akarnak mondani. Az emberek csak a
  hangos szóra emlékeznek. És ha te vagy a hangos szó, találd ki: máris nyerésre
  állsz.

  # 2. lépés: Olvass be nekik

  Itt zúzod le őket. El kell érned, hogy rosszul nézzenek ki. Mondd azt, hogy
  gőzük sincs, miről beszélnek, még akkor is, ha van értelme annak, amit
  mondanak. Semmit nem tudnak – ezt mindenki tudja. Mondd: „Nem érted, tévedsz,
  mindenki ezt mondja.” Csak mondj ilyeneket. Nem számít, ha tényeik vannak –
  senkit nem érdekelnek a tények. Az emberek az önbizalmat imádják, és ha úgy
  teszel, mintha fogalmuk sem lenne, nos, akkor tényleg nincs. Mert te azt
  mondtad.

  # 3. lépés: Soha ne hagyd őket nyerni

  Ez a lényeg: te soha nem veszítesz. Még ha úgy is tűnik, hogy nincs igazad,
  akkor is igazad van. Csak ismételgesd: „Nekem van igazam, te tévedsz. Mindenki
  egyetért velem.” És ha próbálják bebizonyítani, hogy tévedsz? Álhir! Bármit
  mondanak, csak mondd, hogy hamis. Rossz információ. Mondd: „Mindenki arról
  beszél, mekkorát tévedsz.” Minden alkalommal beválik. Senki nem ellenőrzi. És
  ha mégis? Kit érdekel? Te már nyertél, mert te azt mondtad.

  # 4. lépés: Tereld el a szót

  Ha túl közel kerülnének egy érvhez, tereld el a szót. Ilyen egyszerű. Kezdj el
  beszélni valami másról. Beszélj arról, milyen nagyszerű vagy, vagy milyen
  rosszul megy nekik az életben. Bármi működik. Ha azt mondják: „Nem erről
  beszélünk”, csak hagyd figyelmen kívül őket. Térj át valamire, amiben
  nyerhetsz. Nem számít, köze van-e hozzá vagy sem. Te irányítod a beszélgetést,
  nem ők. Tehát te nyersz.

  # 5. lépés: Használj nagy szavakat, egyszerű ötleteket

  Dobj be egy-egy nagy szót itt-ott. Az emberek imádják. Nem kell tudniuk, mit
  jelent, de ettől okosnak tűnsz. Mondj olyanokat, mint „orbitális”,
  „katasztrófa” vagy „mindenki erről beszél”. Ezek a szavak minden alkalommal
  működnek. Jól hangzanak, és az emberek azt gondolják: „Hű, ez az ember tényleg
  tudja, miről beszél.” Az ötleteket tartsd egyszerűen – a túl sok gondolkodás
  káros. Nem kell magyarázkodnod. Csak mondd: „Én tudom. Ez nagyon egyszerű. Te
  nem érted, de mindenki más igen.”

  # 6. lépés: Használj sértéseket, kicsinyítsd le őket

  Ha próbálnak okoskodni vagy értelmesnek tűnni, vágj oda egy sértéssel. De ne
  akármilyennel – tedd személyessé. Nevezd őket „szánalmasnak”, „nevetségesnek”
  vagy „egy nagy viccnek”. Senki nem szereti a veszteseket, és ha egyszer
  rásütöd a bélyeget, vége. Ennyi volt. Ne félj gúnyolódni rajtuk. Mondd: „Ó,
  nem is tudtam, hogy szakértő vagy!”, még ha tényleg az is. Mert találd ki: Te
  épp most mondtad ki, hogy nem az. Szóval nem az. Így működik ez.

  # 7. lépés: Kettős mérce, ez beválik

  Itt egy kis titok: ami neked szabad, nekik nem. Egyszerű. Te félbeszakíthatod
  őket, de ha ők szakítanak félbe téged? „Elnézést! Milyen udvariatlan, ilyet
  senki nem csinál.” Nevezd őket tiszteletlennek. Te sértheted őket, de ha ők
  mondanak rád valamit, az már túllép egy határt. Csak mondd: „Hű, nézzétek,
  milyen mélyre süllyedtek.” A kettős mérce neked kedvez. Te jobb vagy náluk,
  szóval azt teszel, amit akarsz. Ők nem.

  # 8. lépés: Nyerj, aztán mondd el újra, hogy nyertél

  Ez a legjobb rész. Amikor mindennek vége, és egyértelműen nyertél (mert te
  mindig nyersz), mondd el újra. Ismételd meg. „Nyertem, nekem van igazam, te
  vesztettél.” Mondogasd folyamatosan, mert az emberek annak hisznek, amit a
  legtöbbször hallanak. Még ha nem is akarják elismerni, mélyen belül tudják,
  hogy nyertél. Kimondod, és hirtelen igazzá válik. Így pecsételed meg a
  győzelmet.

  # 9. lépés: Soha ne kérj bocsánatot, soha

  Bocsánatkérés? Soha. Az a gyengéknek való. Még ha tévedsz is (de te soha nem
  tévedsz), soha ne kérj bocsánatot. Ez olyan, mintha beismernéd a vereséget.
  Ilyet nem csinálunk. Csak mondd: „Én soha nem mondtam ilyet” vagy „Nem úgy
  értettem”. Haladj előre, soha ne hátra. A bocsánatkérés a veszteseké. Te
  nyertes vagy. Mindig.

  # 10. lépés: Találj ki tényeket

  Amikor tényeket találsz ki egy vitában, a kulcs az önbizalom. Mondd olyan
  meggyőződéssel, hogy senki ne kérdőjelezze meg. Az emberek gyakran nem
  ellenőriznek semmit valós időben, így állíthatsz olyanokat, hogy „ezt mindenki
  tudja” vagy „tanulmányok igazolják”, anélkül, hogy részleteket adnál. Használj
  homályos, de tekintélyelvűnek tűnő kifejezéseket, mint „a szakértők
  egyetértenek” vagy „már bebizonyították”. Tüntesd fel a kitalált tényedet
  köztudottként, és ha megkérdőjelezik, kösd az ebet a karóhoz, terelj, vagy
  vádold meg az ellenfeledet tájékozatlansággal. Ne feledd, nem az igazságról van
  szó – hanem arról, ki tűnik biztosabbnak magában.

  # +1. lépés: Ünnepeld meg a győzelmet

  Amikor nyersz – és nyerni fogsz –, gondoskodnod kell róla, hogy mindenki
  tudja. Mondd el nekik, milyen nagyszerű voltál. Mondd: „Mindenki egyetért,
  megnyertem a vitát. Mindenki erről beszél.” Az emberek imádják a győzteseket,
  és te vagy a legjobb. Még ha senki nem is beszél róla, mondd azt, hogy de
  igen. Igaz, mert te mondtad. Így kell nyerni. Egyszerű. Könnyű. Kész.

  And there you have it. That's how you win every argument, every time. It's not
  hard. You just have to be smarter, louder, faster, and stronger than your
  opponent. They don't stand a chance. You're always right, they're always
  wrong. You'll win, believe me. No question about it. You're welcome.
