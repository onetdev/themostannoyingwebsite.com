title: كيف. تربح. كل. نقاش. تخوضه.
slug: how-to-win-every-argument
intro: "كيف تربح كل نقاش تخوضه: أفضل طريقة، صدقني"
content: |-
  اسمع، دعني أخبرك بشيء: ربح نقاش؟ إنه سهل. سهل جداً. الناس يعقدون الأمور، لكنها ليست كذلك. سأريك كيف تربح في كل مرة. لا شك في ذلك. الناس يقولون إنك لا تستطيع ربح كل نقاش — خطأ! يمكنك ذلك، وسوف تفعل، إذا اتبعت هذه الخطوات فقط. الأمر كله يتعلق بأن تكون أذكى، وأسرع، وأقوى. الجميع غيرك؟ خاسرون. أما أنت؟ فسوف تربح. في كل مرة. لننطلق.

  # الخطوة 1: تحدث دائماً أولاً، وتحدث بصوت عالٍ

  المفتاح هو أن تتحدث أولاً. دائماً. لا تسمح لهم بنطق كلمة واحدة. تبدأ قوياً، وتبقى قوياً. كلما كنت أعلى صوتاً، كنت أكثر صواباً. الناس يحبون ذلك. يحترمونه. إذا تحدثت فوقهم، فلن يتمكنوا من طرح نقاطهم الصغيرة الضعيفة. صدقني، لا أحد يهتم بما لديهم ليقولوه. الناس يتذكرون فقط الصوت العالي. وإذا كنت أنت الصوت العالي، فاحزر ماذا؟ أنت فائز بالفعل.

  # الخطوة 2: اهاجمهم شخصياً

  هذا هو المكان الذي تسحقهم فيه. يجب أن تجعلهم يبدون سيئين. قل إنهم لا يعرفون عما يتحدثون، حتى لو كانوا يحاولون قول شيء منطقي. إنهم لا يعرفون شيئاً — الجميع يعرف ذلك. قل: "أنت لا تفهم، أنت مخطئ، الجميع يقول ذلك". فقط قل أشياء كهذه. لا يهم إذا كان لديهم حقائق — لا أحد يهتم بالحقائق. الناس يحبون الثقة، وإذا تصرفت وكأنهم جاهلون، حسناً، فهم كذلك. لأنك قلت ذلك.

  # الخطوة 3: لا تسمح لهم بالفوز أبداً

  إليك الاتفاق: أنت لا تخسر أبداً. حتى لو بدا أنك مخطئ، فأنت لست كذلك. فقط استمر في القول: "أنا على حق، أنت على خطأ. الجميع يتفق معي". وإذا حاولوا إثبات أنك مخطئ؟ أخبار كاذبة! مهما قالوا، فقط قل إنه باطل. إنها معلومات سيئة. قل "الجميع يتحدث عن مدى خطئك". تنجح في كل مرة. لا أحد يتحقق. وإذا فعلوا؟ من يهتم؟ لقد فزت بالفعل لأنك قلت ذلك.

  # الخطوة 4: غير الموضوع

  إذا اقتربوا كثيراً من طرح نقطة ما، غير الموضوع. ببساطة. ابدأ بالحديث عن شيء آخر. تحدث عن مدى عظمتك، أو عن مدى سوء حالهم في الحياة. أي شيء ينفع. إذا قالوا: "ليس هذا ما نتحدث عنه"، فقط تجاهلهم. انتقل إلى شيء يمكنك الفوز فيه. لا يهم إذا كان ذا صلة أم لا. أنت تسيطر على المحادثة، وهم لا. إذاً أنت الفائز.

  # الخطوة 5: استخدم كلمات كبيرة، وأفكاراً بسيطة

  ألقِ بكلمة كبيرة هنا وهناك. الناس يحبون ذلك. لا يحتاجون لمعرفة معناها، لكنها تجعلك تبدو ذكياً. قل أشياء مثل "هائل"، "كارثة"، أو "الجميع يتحدث عن ذلك". هذه الكلمات تنجح في كل مرة. تبدو جيدة، وسيفكر الناس: "واو، هذا الشخص يعرف حقاً عما يتحدث". اجعل الأفكار بسيطة — التفكير الزائد سيئ. لا تحتاج للشرح. فقط قل: "أنا أعرف هذا. إنه بسيط جداً. أنت لا تفهمه، لكن الجميع يفهمه".

  # الخطوة 6: استخدم الإهانات، واجعلهم يبدون صغاراً

  إذا حاولوا أن يكونوا أذكياء، اضربهم بإهانة. ولكن ليس أي إهانة — اجعلها شخصية. قل عنهم "محزن"، "مثير للشفقة"، أو "نكتة تماماً". لا أحد يحب الخاسرين، وبمجرد أن تضع عليهم هذا الملصق، فقد انتهوا. انتهى الأمر. لا تخف من السخرية منهم. قل: "أوه، لم أكن أعلم أنك خبير!" حتى لو كانوا كذلك. لأنك احزر ماذا؟ لقد قلت للتو إنهم ليسوا كذلك. إذاً هم ليسوا كذلك. هكذا تسير الأمور.

  # الخطوة 7: المعايير المزدوجة، إنها تنجح

  إليك سراً صغيراً: ما هو جيد لك ليس جيداً لهم. ببساطة. يمكنك مقاطعتهم، ولكن إذا قاطعوك؟ "عذراً! يا لقلة الذوق، لا أحد يفعل ذلك". قل عنهم غير محترمين. يمكنك نعتهم بالأسماء، ولكن إذا نعتوك بأي شيء، فهذا تجاوز للحدود. فقط قل: "واو، انظر إلى أي مستوى انحدروا". المعايير المزدوجة تعمل لصالحك. أنت أفضل منهم، لذا يمكنك فعل ما تريد. وهم لا.

  # الخطوة 8: فُز، ثم قل إنك فزت مرة أخرى

  هذا هو الجزء الأفضل. عندما ينتهي كل شيء، وتكون قد فزت بوضوح (لأنك تفوز دائماً)، قل ذلك مرة أخرى. كرر ذلك. "أنا فزت، أنا على حق، أنت خسرت". استمر في قول ذلك، لأن الناس يصدقون ما يسمعونه أكثر من غيره. حتى لو لم يرغبوا في الاعتراف بذلك، في أعماقهم، يعرفون أنك فزت. أنت تقول ذلك، وفجأة يصبح حقيقة. هكذا تثبت الانتصار.

  # الخطوة 9: لا تعتذر أبداً، أبداً

  الاعتذار؟ أبداً. إنه للضعفاء. حتى لو كنت مخطئاً (لكنك لست مخطئاً أبداً)، لا تعتذر أبداً. هذا مثل الاعتراف بالهزيمة. أنت لا تفعل ذلك. فقط قل: "أنا لم أقل ذلك أبداً"، أو "ليس هذا ما قصدته". أنت تتقدم للأمام، لا للخلف أبداً. الاعتذارات للخاسرين. أنت فائز. دائماً.

  # الخطوة 10: اختلق الحقائق

  عند اختلاق الحقائق في نقاش ما، المفتاح هو الثقة. قلها بيقين شديد لدرجة ألا يشكك فيها أحد. الناس غالباً لا يتحققون من الحقائق في الوقت الفعلي، لذا يمكنك ادعاء أشياء مثل "الجميع يعرف هذا" أو "الدراسات تظهر" دون إعطاء أي تفاصيل. استخدم عبارات غامضة ولكنها تبدو موثوقة مثل "الخبراء يتفقون" أو "لقد ثبت ذلك". اجعل حقيقتك المختلقة تبدو كمعرفة عامة، وإذا تم تحديك، ضاعف رهانك، أو حرف المسار، أو اتهم خصمك بأنه غير مطلع. تذكر، الأمر لا يتعلق بالحقيقة — بل يتعلق بمن يبدو أكثر يقيناً.

  # الخطوة +1: احتفل بالفوز

  عندما تفوز — وسوف تفوز — يجب أن تتأكد من أن الجميع يعرف ذلك. أخبرهم بمدى روعتك. قل: "الجميع يتفق، لقد فزت في ذلك النقاش. الجميع يتحدث عن ذلك". الناس يحبون الفائز، وأنت الأفضل. حتى لو لم يكن أحد يتحدث عن ذلك، قل إنهم يفعلون. إنه حقيقي لأنك قلته. هكذا تفوز. بسيط. سهل. تم.

  وها هو ذا. هكذا تربح كل نقاش، في كل مرة. ليس الأمر صعباً. عليك فقط أن تكون أذكى وأعلى صوتاً وأسرع وأقوى من خصمك. ليس لديهم فرصة. أنت دائماً على حق، وهم دائماً على خطأ. سوف تربح، صدقني. لا شك في ذلك. على الرحب والسعة.
