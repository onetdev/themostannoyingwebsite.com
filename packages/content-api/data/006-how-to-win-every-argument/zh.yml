title: 如何赢得每一次争论
slug: ru-he-ying-de-mei-ci-zheng-lun
intro: "如何赢得每一次争论：相信我，这是最好的方法"
content: |-
  听着，让我告诉你一件事：赢得争论？这太简单了。非常简单。人们总是把它搞复杂，但其实不是。我要向你展示如何每次都赢。毫无疑问。有人说你不可能赢下每一场争论——错！只要你遵循这些步骤，你就能赢，而且一定会赢。这完全关乎变得更聪明、更快速、更强大。其他人？全是失败者。但你呢？你会赢。每一次。咱们开始。

  # 第一步：永远抢先开口，大声说话

  关键在于抢先开口。永远如此。不要让他们插上一句话。你要强势开场，保持强势。你声音越大，你就越正确。人们就爱这套。他们尊重强者。如果你盖过他们的声音，他们那些软弱的小观点就发表不出来。相信我，没人关心他们想说什么。人们只记得那个大嗓门。如果你就是那个大嗓门，猜猜怎么着？你已经赢了。

  # 第二步：当众羞辱他们

  这一步是你要彻底击溃他们的地方。你必须让他们看起来很差劲。说他们根本不知道自己在说什么，即使他们正试图讲理。他们什么都不懂——大家都知道这一点。你就说：“你不懂，你错了，大家都是这么说的。”就说这样的话。他们是否有事实依据并不重要——没人关心事实。人们崇拜自信，如果你表现得好像他们一窍不通，那他们就是一窍不通。因为你说了算。

  # 第三步：绝不让他们赢

  规则是这样的：你永远不会输。即使看起来你错了，你也没错。只要一直说：“我是对的，你是错的。大家都同意我的看法。”如果他们试图证明你错了？假新闻！无论他们说什么，就说那是假的。那是糟糕的信息。说“大家都在议论你错得有多离谱。”这招百试百灵。没人会去核实。如果他们核实了呢？谁在乎？既然你都这么说了，你已经赢了。

  # 第四步：转移话题

  如果他们快要说到点子上了，那就转移话题。就这么简单。开始聊点别的。聊聊你有多伟大，或者他们在生活中混得有多惨。什么话题都行。如果他们说：“我们说的不是这个，”那就无视他们。转向一个你能赢的话题。是否相关并不重要。你掌控着对话，而不是他们。所以你赢了。

  # 第五步：使用大词，简单思想

  时不时抛出一个大词。人们就吃这一套。他们不需要知道那是什么意思，但那会让你看起来很聪明。说些类似“巨大的”、“灾难性的”或“大家都在议论”之类的话。这些词每次都管用。它们听起来很高端，人们会想：“哇，这个人肯定很有料。”保持思想简单——思考太多是有害的。你不需要解释。只要说：“我知道这个。这很简单。你不懂，但其他人都懂。”

  # 第六步：使用侮辱，让他们显得渺小

  如果他们想表现得聪明或有才华，那就用侮辱回击。但不是普通的侮辱——要针对个人。称他们为“可悲的”、“差劲的”或“一个彻头彻尾的笑话”。没人喜欢失败者，一旦你给他们贴上标签，他们就玩完了。结束了。不要害怕嘲笑他们。说：“噢，我倒不知道你是专家啊！”即使他们真的是。因为猜猜怎么着？你刚刚说了他们不是。所以他们就不是。规则就是这样。

  # 第七步：双重标准，这招很灵

  这里有个小秘密：对你有利的对他们不利。很简单。你可以打断他们，但如果他们打断你？“抱歉！太没礼貌了，没人会这么做。”说他们不尊重人。你可以给他们起外号，但如果他们敢说你什么，那就是越界了。你只要说：“哇，看看他们已经堕落到什么地步了。”双重标准对你有利。你比他们强，所以你可以随心所欲。他们不行。

  # 第八步：赢了之后，再说一遍你赢了

  这是最棒的部分。当一切结束，而你显然已经赢了（因为你总是赢），再强调一遍。重复它。“我赢了，我是对的，你输了。”不停地说，因为人们最相信他们听得最多的东西。即使他们不想承认，内心深处，他们知道你赢了。你说了，突然之间它就成了事实。这就是你锁定胜局的方式。

  # 第九步：绝不道歉，永远不

  道歉？门儿都没有。那是给弱者准备的。即使你错了（但你永远不会错），也绝不道歉。那等于是承认失败。你不能那么做。只要说：“我从来没说过那话，”或者“我不是那个意思。”你要向前看，绝不回头。道歉是给失败者准备的。你是个赢家。永远都是。

  # 第十步：捏造事实

  在争论中捏造事实时，关键在于自信。要说得如此坚定，以至于没人敢质疑。人们通常不会实时去查证，所以你可以声称“大家都知道这一点”或“研究表明”，而不给出任何细节。使用一些模糊但听起来权威的短语，如“专家一致认为”或“已被证实”。让你捏造的事实听起来像是常识，如果受到质疑，就加倍坚持、转移注意力，或者指责对方孤陋寡闻。记住，重点不在于真相——而在于谁听起来更确定。

  # 第 11 步：庆祝胜利

  当你赢了——你一定会赢——你必须确保每个人都知道。告诉他们你表现得有多棒。说：“大家都同意，我赢得了那场争论。大家都在谈论这件事。”人们崇拜赢家，而你是最棒的。即使没人谈论，也要说有人在谈。因为你说了，所以这就是真的。这就是你获胜的方式。简单。容易。搞定。

  就这样。这就是你如何赢得每一次争论、每一次。这并不难。你只需要比你的对手更聪明、更大声、更快速、更强大。他们毫无机会。你永远是对的，他们永远是错的。你会赢的，相信我。毫无疑问。不客气。
