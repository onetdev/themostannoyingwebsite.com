title: "모든. 논쟁에서. 이기는. 방법"
slug: "modeun-nonjaeng-igi-neun-bangbeop"
intro: "모든 논쟁에서 이기는 방법: 최고의 방법, 절 믿으세요"
content: |-
  잘 들어보세요, 제가 한 말씀 드리죠. 논쟁에서 이기는 거요? 아주 쉽습니다. 정말 쉬워요. 사람들은 이걸 복잡하게 만들지만, 전혀 그렇지 않습니다. 제가 매번 이기는 방법을 보여드리겠습니다. 의심의 여지가 없죠. 사람들은 모든 논쟁에서 이길 수는 없다고 말합니다—틀렸어요! 당신은 할 수 있고, 이 단계들만 따르면 그렇게 될 겁니다. 핵심은 더 똑똑하고, 더 빠르고, 더 강해지는 것입니다. 다른 사람들은요? 다 패배자들이죠. 하지만 당신은요? 당신은 이길 겁니다. 매번 말이죠. 시작합시다.

  # 1단계: 항상 먼저 말하고, 크게 말하라

  핵심은 먼저 말하는 것입니다. 항상요. 상대방이 말 한마디도 못 하게 하세요. 강하게 시작해서 강하게 밀어붙이세요. 목소리가 클수록 당신이 더 옳은 것입니다. 사람들은 그걸 좋아해요. 존중하죠. 당신이 상대방의 말을 가로막으면, 그들은 자신들의 보잘것없는 의견을 꺼낼 수조차 없습니다. 믿으세요, 아무도 그들이 무슨 말을 하는지 관심 없습니다. 사람들은 오직 큰 목소리만 기억합니다. 그리고 당신이 그 큰 목소리의 주인공이라면, 아시겠어요? 당신은 이미 이기고 있는 겁니다.

  # 2단계: 상대를 몰아세워라

  이 단계에서 상대를 완전히 짓밟아야 합니다. 상대가 아무리 말이 되는 소리를 하려고 해도, 그들이 아무것도 모르는 것처럼 보이게 만드세요. 그들은 아무것도 모릅니다—모두가 다 아는 사실이죠. 당신은 이렇게 말하세요. “당신은 이해를 못 하네, 당신이 틀렸어, 다들 그렇게 말해.” 그냥 그렇게 말하세요. 상대가 팩트를 가지고 있는지는 중요하지 않습니다—아무도 팩트 따위 신경 쓰지 않거든요. 사람들은 자신감을 좋아합니다. 당신이 상대를 무식한 사람 취급하면, 글쎄요, 그들은 정말 무식한 사람이 되는 겁니다. 당신이 그렇게 말했으니까요.

  # 3단계: 절대 승리를 내주지 마라

  중요한 건 이겁니다: 당신은 절대 지지 않습니다. 당신이 틀린 것처럼 보이더라도, 당신은 틀리지 않았습니다. 그냥 계속 말하세요. “내가 맞고 당신이 틀렸어. 모두가 내 말에 동의해.” 만약 상대가 당신이 틀렸다는 걸 증명하려고 한다면? 가짜 뉴스입니다! 상대가 무슨 말을 하든 그냥 거짓이라고 하세요. 잘못된 정보라고요. “모두가 당신이 얼마나 틀렸는지 이야기하고 있어”라고 말하세요. 매번 통합니다. 아무도 확인 안 하거든요. 확인하면 어떠냐고요? 상관없습니다. 당신이 이겼다고 말했으니 이미 이긴 겁니다.

  # 4단계: 주제를 돌려라

  상대방이 결정적인 논거에 근접하면, 즉시 주제를 바꾸세요. 간단합니다. 다른 이야기를 시작하세요. 당신이 얼마나 대단한지, 아니면 상대의 인생이 얼마나 엉망인지 이야기하세요. 뭐든 통합니다. 상대가 “지금 그 이야기를 하는 게 아니잖아요”라고 하면 그냥 무시하세요. 당신이 이길 수 있는 주제로 넘어가세요. 관련이 있든 없든 상관없습니다. 당신이 대화를 주도하는 것이지, 상대가 하는 게 아닙니다. 그러니 당신이 이기는 거죠.

  # 5단계: 어려운 단어를 쓰고, 생각은 단순하게

  중간중간 어려운 단어를 섞어 쓰세요. 사람들은 그런 걸 좋아합니다. 무슨 뜻인지 알 필요는 없지만, 당신을 똑똑해 보이게 만듭니다. “엄청난(tremendous)”, “재앙(disaster)”, 또는 “모두가 그것에 대해 이야기한다” 같은 표현을 쓰세요. 이런 말들은 매번 통합니다. 듣기에 좋고, 사람들은 “와, 이 사람 정말 뭘 좀 아네”라고 생각할 겁니다. 아이디어는 단순하게 유지하세요—생각을 너무 많이 하는 건 좋지 않습니다. 설명할 필요도 없습니다. 그냥 말하세요. “난 이걸 알아요. 아주 간단합니다. 당신은 이해 못 하겠지만 다른 사람들은 다 이해해요.”

  # 6단계: 모욕을 주고, 상대를 작게 만들어라

  상대가 영리한 척하거나 똑똑한 소리를 하려고 하면, 모욕을 주어 맞서세요. 하지만 평범한 모욕이 아니라 인신공격을 하세요. 상대를 “슬프네”, “한심해”, 또는 “완전 코미디네”라고 부르세요. 아무도 패배자를 좋아하지 않습니다. 일단 당신이 낙인을 찍으면 게임 끝입니다. 끝난 거예요. 상대를 조롱하는 걸 두려워하지 마세요. 상대가 설령 전문가라 하더라도 “오, 당신이 전문가인 줄 몰랐네!”라고 비꼬아 주세요. 왜냐고요? 아시겠어요? 당신이 방금 그들이 전문가가 아니라고 말했잖아요. 그럼 아닌 겁니다. 세상은 그렇게 돌아가는 겁니다.

  # 7단계: 이중 잣대, 이게 효과적입니다

  작은 비밀 하나 알려드릴까요? 당신에게 좋은 것이 상대에게는 좋지 않습니다. 간단하죠. 당신은 상대의 말을 끊을 수 있지만, 상대가 당신의 말을 끊는다면? “잠시만요! 정말 무례하네요, 아무도 그렇게 안 합니다.” 상대를 무례하다고 비난하세요. 당신은 상대를 비하하는 별명을 부를 수 있지만, 상대가 당신을 조금이라도 건드리면 그건 선을 넘은 겁니다. 당신은 그냥 이렇게 말하세요. “와, 저 사람이 얼마나 저급하게 노는지 보세요.” 이중 잣대는 당신에게 유리하게 작용합니다. 당신은 그들보다 우월하니까 당신 마음대로 할 수 있는 겁니다. 그들은 안 되고요.

  # 8단계: 이기고 나서, 이겼다고 다시 말하라

  가장 중요한 부분입니다. 모든 게 끝나고 당신이 명백하게 이겼을 때 (당신은 항상 이기니까요), 다시 한번 말하세요. 반복하세요. “내가 이겼어, 내가 맞아, 당신이 졌어.” 계속 말하세요. 사람들은 가장 많이 듣는 말을 믿게 되어 있으니까요. 상대가 인정하고 싶지 않더라도, 마음속 깊은 곳에서는 당신이 이겼다는 걸 알게 될 겁니다. 당신이 그렇게 말하면, 갑자기 그게 진실이 됩니다. 그렇게 승리를 확정 짓는 겁니다.

  # 9단계: 사과하지 마라, 절대

  사과요? 절대 안 됩니다. 그건 약한 사람들이나 하는 짓입니다. 당신이 틀렸더라도 (물론 그럴 일은 없지만), 절대 사과하지 마세요. 사과는 패배를 인정하는 것과 같습니다. 당신은 그런 짓 안 합니다. 그냥 “난 그런 말 한 적 없어”라거나 “내 뜻은 그게 아니었어”라고 하세요. 앞으로만 나아가는 겁니다, 절대 뒤로 가지 마세요. 사과는 패배자들을 위한 것입니다. 당신은 승자입니다. 언제나 말이죠.

  # 10단계: 사실을 지어내라

  논쟁에서 사실을 지어낼 때 핵심은 자신감입니다. 아무도 의심하지 못할 정도로 확신에 차서 말하세요. 사람들은 실시간으로 팩트 체크를 하지 않는 경우가 많으므로, “모두가 이걸 안다”거나 “연구 결과가 보여준다” 같은 말들을 구체적인 근거 없이 내뱉으세요. “전문가들이 동의한다”거나 “증명된 사실이다”와 같이 모호하지만 권위 있어 보이는 문구를 사용하세요. 당신이 지어낸 사실을 상식인 것처럼 들리게 만들고, 만약 상대가 반박하면 더 강하게 밀어붙이거나, 말을 돌리거나, 아니면 상대가 무지하다고 몰아세우세요. 기억하세요, 중요한 건 진실이 아니라 누가 더 확신에 찬 목소리를 내느냐입니다.

  # +1단계: 승리를 자축하라

  당신이 이겼을 때—그리고 당신은 이길 겁니다—모두가 알게 해야 합니다. 당신이 얼마나 잘했는지 말해 주세요. “모두가 동의합니다, 제가 그 논쟁에서 이겼어요. 다들 그 이야기뿐입니다.” 사람들은 승자를 좋아하고, 당신은 최고입니다. 아무도 그 이야기를 안 하고 있더라도, 다들 하고 있다고 말하세요. 당신이 말했으니 진실입니다. 그렇게 이기는 겁니다. 심플하죠. 쉽죠. 끝.

  자, 여기 있습니다. 이것이 모든 논쟁에서, 매번 이기는 방법입니다. 어렵지 않아요. 그냥 당신의 상대보다 더 똑똑하고, 목소리 크고, 빠르고, 강해지면 됩니다. 상대에게는 기회조차 없습니다. 당신은 항상 맞고, 상대는 항상 틀립니다. 당신은 이길 겁니다, 절 믿으세요. 의심의 여지가 없습니다. 천만에요.
