title: Wie. Man. Jedes. Einzelne. Argument. Gewinnt.
slug: wie-man-jedes-argument-gewinnt
intro: „Wie man jedes einzelne Argument gewinnt: Der beste Weg, glauben Sie mir“
content: |-
  Hören Sie zu, ich sage Ihnen was: Ein Argument gewinnen? Das ist einfach. So einfach. Die Leute machen es kompliziert, aber das ist es nicht. Ich werde Ihnen zeigen, wie Sie jedes Mal gewinnen. Keine Frage. Die Leute sagen, man kann nicht jedes Argument gewinnen – FALSCH! Man kann es, und man wird es, wenn man einfach diese Schritte befolgt. Es geht darum, schlauer, schneller und stärker zu sein. Alle anderen? Verlierer. Aber Sie? Sie werden gewinnen. Jedes Mal. Los geht’s.

  # Schritt 1: Reden Sie immer zuerst, reden Sie laut

  Der Schlüssel ist, zuerst zu reden. Immer. Lassen Sie sie nicht zu Wort kommen. Fangen Sie stark an, bleiben Sie stark. Je lauter Sie sind, desto mehr haben Sie recht. Die Leute lieben das. Sie respektieren es. Wenn Sie sie übertönen, können sie ihre schwachen kleinen Punkte nicht vorbringen. Vertrauen Sie mir, niemanden interessiert, was sie zu sagen haben. Die Leute erinnern sich nur an die laute Stimme. Und wenn Sie die laute Stimme sind, raten Sie mal? Dann gewinnen Sie bereits.

  # Schritt 2: Stellen Sie sie bloß

  Hier vernichten Sie sie. Sie müssen sie schlecht aussehen lassen. Sagen Sie, dass sie keine Ahnung haben, wovon sie reden, selbst wenn sie versuchen, Sinn zu ergeben. Sie wissen gar nichts – das weiß jeder. Sagen Sie: „Du verstehst es nicht, du liegst falsch, alle sagen das.“ Sagen Sie einfach solche Dinge. Es spielt keine Rolle, ob sie Fakten haben – niemanden interessieren Fakten. Die Leute lieben Selbstbewusstsein, und wenn Sie so tun, als wären sie ahnungslos, nun ja, dann sind sie es auch. Weil Sie es gesagt haben.

  # Schritt 3: Lassen Sie sie niemals gewinnen

  Die Sache ist die: Sie verlieren nie. Selbst wenn es so aussieht, als lägen Sie falsch, tun Sie es nicht. Sagen Sie einfach immer wieder: „Ich habe recht, du liegst falsch. Alle stimmen mir zu.“ Und wenn sie versuchen, Ihnen das Gegenteil zu beweisen? Fake News! Was auch immer sie sagen, sagen Sie einfach, es sei falsch. Es sind schlechte Informationen. Sagen Sie: „Alle reden darüber, wie falsch du liegst.“ Funktioniert jedes Mal. Niemand prüft das nach. Und wenn doch? Wen kümmert’s? Sie haben bereits gewonnen, weil Sie es gesagt haben.

  # Schritt 4: Wechseln Sie das Thema

  Wenn sie kurz davor sind, einen Punkt zu machen, wechseln Sie das Thema. So einfach ist das. Fangen Sie an, über etwas anderes zu reden. Reden Sie darüber, wie großartig Sie sind oder wie schlecht es bei denen im Leben läuft. Alles funktioniert. Wenn sie sagen: „Darüber reden wir nicht“, ignorieren Sie sie einfach. Gehen Sie zu etwas über, bei dem Sie gewinnen können. Es spielt keine Rolle, ob es damit zu tun hat oder nicht. Sie kontrollieren das Gespräch, nicht die anderen. Also gewinnen Sie.

  # Schritt 5: Benutzen Sie große Worte, einfache Ideen

  Werfen Sie hier und da ein großes Wort ein. Die Leute lieben das. Sie müssen nicht wissen, was es bedeutet, aber es lässt Sie schlau aussehen. Sagen Sie Dinge wie „enorm“, „Katastrophe“ oder „alle reden darüber“. Diese Worte funktionieren jedes Mal. Sie klingen gut, und die Leute werden denken: „Wow, diese Person weiß wirklich, wovon sie redet.“ Halten Sie die Ideen einfach – zu viel Denken ist schlecht. Sie müssen nichts erklären. Sagen Sie einfach: „Ich weiß das. Es ist sehr einfach. Du verstehst es nicht, aber alle anderen tun es.“

  # Schritt 6: Benutzen Sie Beleidigungen, machen Sie sie klein

  Wenn sie versuchen, clever zu sein oder schlau zu klingen, treffen Sie sie mit einer Beleidigung. Aber nicht irgendeine Beleidigung – machen Sie es persönlich. Nennen Sie sie „traurig“, „erbärmlich“ oder „einen totalen Witz“. Niemand mag einen Verlierer, und sobald Sie ihnen einen Stempel aufgedrückt haben, sind sie erledigt. Es ist vorbei. Haben Sie keine Angst, sie zu verspotten. Sagen Sie: „Oh, ich wusste nicht, dass Sie ein Experte sind!“, selbst wenn sie es sind. Denn raten Sie mal? Sie haben gerade gesagt, dass sie es nicht sind. Also sind sie es nicht. So funktioniert das.

  # Schritt 7: Doppelmoral, sie funktioniert

  Hier ist ein kleines Geheimnis: Was gut für Sie ist, ist nicht gut für die anderen. Ganz einfach. Sie dürfen sie unterbrechen, aber wenn sie Sie unterbrechen? „Entschuldigung! So unhöflich, das macht niemand.“ Nennen Sie sie respektlos. Sie dürfen sie beschimpfen, aber wenn sie Sie irgendwie nennen, ist das völlig daneben. Sagen Sie einfach: „Wow, schauen Sie sich an, wie tief sie gesunken sind.“ Doppelmoral funktioniert zu Ihren Gunsten. Sie sind besser als sie, also dürfen Sie tun, was Sie wollen. Sie nicht.

  # Schritt 8: Gewinnen Sie, und sagen Sie dann noch einmal, dass Sie gewonnen haben

  Hier ist der beste Teil. Wenn alles vorbei ist und Sie eindeutig gewonnen haben (weil Sie immer gewinnen), sagen Sie es noch einmal. Wiederholen Sie es. „Ich habe gewonnen, ich habe recht, du hast verloren.“ Sagen Sie es immer wieder, denn die Leute glauben das, was sie am häufigsten hören. Selbst wenn sie es nicht zugeben wollen, tief im Inneren wissen sie, dass Sie gewonnen haben. Sie sagen es, und plötzlich ist es wahr. So sichern Sie sich den Sieg.

  # Schritt 9: Entschuldigen Sie sich niemals, niemals

  Sich entschuldigen? Niemals. Das ist was für schwache Leute. Selbst wenn Sie falsch liegen (aber Sie liegen nie falsch), entschuldigen Sie sich niemals. Das wäre wie die Eingeständnis einer Niederlage. Das tun Sie nicht. Sagen Sie einfach: „Das habe ich nie gesagt“ oder „Das habe ich nicht so gemeint“. Sie gehen vorwärts, niemals zurück. Entschuldigungen sind was für Verlierer. Sie sind ein Gewinner. Immer.

  # Schritt 10: Erfinden Sie Fakten

  Wenn Sie in einer Diskussion Fakten erfinden, ist der Schlüssel das Selbstbewusstsein. Sagen Sie es mit solcher Überzeugung, dass niemand es in Frage stellt. Die Leute machen oft keinen Echtzeit-Faktencheck, also können Sie Dinge behaupten wie „das weiß jeder“ oder „Studien zeigen“, ohne Details zu nennen. Verwenden Sie vage, aber autoritär klingende Formulieren wie „Experten sind sich einig“ oder „es wurde bewiesen“. Lassen Sie Ihren erfundenen Fakt wie Allgemeinwissen klingen, und wenn Sie herausgefordert werden, legen Sie nach, lenken Sie ab oder beschuldigen Sie Ihren Gegner, unterinformiert zu sein. Denken Sie daran, es geht nicht um die Wahrheit – es geht darum, wer sicherer klingt.

  # Schritt +1: Feiern Sie den Sieg

  Wenn Sie gewinnen – und Sie werden gewinnen –, müssen Sie sicherstellen, dass es jeder weiß. Erzählen Sie ihnen, wie toll Sie abgeschnitten haben. Sagen Sie: „Alle sind sich einig, ich habe dieses Argument gewonnen. Alle reden darüber.“ Die Leute lieben einen Gewinner, und Sie sind der Beste. Selbst wenn niemand darüber redet, sagen Sie, dass sie es tun. Es ist wahr, weil Sie es gesagt haben. So gewinnen Sie. Einfach. Leicht. Fertig.

  Und da haben Sie es. So gewinnen Sie jedes Argument, jedes Mal. Es ist nicht schwer. Sie müssen nur schlauer, lauter, schneller und stärker sein als Ihr Gegner. Sie haben keine Chance. Sie haben immer recht, sie liegen immer falsch. Sie werden gewinnen, glauben Sie mir. Keine Frage. Gern geschehen.
