title: Как. Побеждать. В. Каждом. Споре
slug: kak-pobezhdat-v-kazhdom-spore
intro: "Как побеждать в каждом споре: лучший способ, поверьте мне"
content: |-
  Послушайте, я вам кое-что скажу: выиграть спор? Это легко. Очень легко. Люди всё усложняют, но это не так. Я покажу вам, как побеждать каждый раз. Никаких сомнений. Люди говорят, что нельзя выиграть каждый спор — НЕВЕРНО! Вы можете и будете, если просто последуете этим шагам. Всё дело в том, чтобы быть умнее, быстрее и сильнее. Все остальные? Неудачники. А вы? Вы победите. Каждый раз. Поехали.

  # Шаг 1: Всегда говорите первым, говорите громко

  Ключ в том, чтобы говорить первым. Всегда. Не давайте им вставить ни слова. Начинайте мощно, оставайтесь мощными. Чем вы громче, тем больше вы правы. Людям это нравится. Они это уважают. Если вы их перекрикиваете, они не смогут высказать свои слабые аргументики. Поверьте мне, никого не волнует, что они хотят сказать. Люди помнят только громкий голос. И если этот громкий голос — ваш, угадайте что? Вы уже побеждаете.

  # Шаг 2: Выставляйте их дураками

  Здесь вы их раздавите. Вы должны заставить их выглядеть плохо. Говорите, что они не знают, о чем говорят, даже если они пытаются нести смысл. Они ничего не знают — все это знают. Вы говорите: «Ты не рубишь фишку, ты неправ, все так говорят». Просто говорите такие вещи. Неважно, есть ли у них факты — никого не волнуют факты. Люди любят уверенность, и если вы ведете себя так, будто они ни черта не соображают, ну, так оно и есть. Потому что вы так сказали.

  # Шаг 3: Никогда не давайте им выиграть

  Суть в следующем: вы никогда не проигрываете. Даже если кажется, что вы неправы, это не так. Просто продолжайте говорить: «Я прав, ты неправ. Все со мной согласны». А если они попытаются доказать вашу неправоту? Фейковые новости! Что бы они ни сказали, просто говорите, что это ложь. Это плохая информация. Говорите: «Все обсуждают, как сильно ты ошибаешься». Работает каждый раз. Никто не проверяет. А если и проверят? Кому какое дело? Вы уже победили, потому что вы так сказали.

  # Шаг 4: Меняйте тему

  Если они подбираются слишком близко к сути, меняйте тему. Проще простого. Начните говорить о чем-то другом. Поговорите о том, какой вы великий, или о том, как плохо у них идут дела в жизни. Подойдет что угодно. Если они скажут: «Мы не об этом говорим», просто игнорируйте их. Переходите к тому, в чем вы можете победить. Неважно, связано это с темой или нет. Вы контролируете разговор, а не они. Значит, вы побеждаете.

  # Шаг 5: Используйте умные слова, простые идеи

  Вставляйте умное слово тут и там. Людям это нравится. Им не обязательно знать, что оно значит, но это делает вас солидным. Говорите такие слова, как «колоссальный», «катастрофа» или «все об этом трубят». Эти слова работают каждый раз. Они звучат хорошо, и люди подумают: «Вау, этот человек реально знает, о чем говорит». Держите идеи простыми — слишком много думать вредно. Вам не нужно ничего объяснять. Просто скажите: «Я это знаю. Это очень просто. Вы не понимаете, но все остальные понимают».

  # Шаг 6: Используйте оскорбления, принижайте их

  Если они пытаются умничать, бейте их оскорблением. Но не абы каким — переходите на личности. Называйте их «грустными», «жалкими» или «полным посмешищем». Никто не любит неудачников, и как только вы навесите на них ярлык, они спеклись. Всё кончено. Не бойтесь высмеивать их. Скажите: «О, я и не знал, что ты эксперт!», даже если это так. Потому что угадайте что? Вы только что сказали, что они не эксперты. Значит, нет. Так это работает.

  # Шаг 7: Двойные стандарты, они работают

  Вот вам маленький секрет: то, что можно вам, нельзя им. Всё просто. Вы можете их перебивать, но если они перебьют вас? «Минуточку! Как грубо, никто так не делает». Назовите их неучтивыми. Вы можете их обзывать, но если они назовут вас как-нибудь — это уже переход границ. Вы просто говорите: «Вау, посмотрите, как низко они пали». Двойные стандарты работают в вашу пользу. Вы лучше их, поэтому вам можно делать то, что хочется. Им — нет.

  # Шаг 8: Победите, а потом скажите, что победили еще раз

  Вот самая лучшая часть. Когда всё закончится, и вы явно победили (потому что вы всегда побеждаете), скажите об этом еще раз. Повторите. «Я победил, я прав, ты проиграл». Продолжайте это говорить, потому что люди верят в то, что слышат чаще всего. Даже если они не хотят этого признавать, в глубине души они знают, что вы победили. Вы говорите это, и вдруг это становится правдой. Вот так вы закрепляете победу.

  # Шаг 9: Никогда не извиняйтесь, никогда

  Извиняться? Никогда. Это для слабых людей. Даже если вы неправы (но вы никогда не бываете неправы), никогда не извиняйтесь. Это всё равно что признать поражение. Вы этого не делаете. Просто скажите: «Я этого не говорил» или «Я не это имел в виду». Вы движетесь вперед, никогда назад. Извинения для неудачников. Вы победитель. Всегда.

  # Шаг 10: Выдумывайте факты

  Когда вы выдумываете факты в споре, ключ к успеху — уверенность. Говорите это с таким убеждением, чтобы ни у кого не возникло сомнений. Люди часто не проверяют факты в реальном времени, поэтому вы можете заявлять вещи вроде «все это знают» или «исследования показывают», не вдаваясь в подробности. Используйте расплывчатые, но авторитетно звучащие фразы типа «эксперты согласны» или «это было доказано». Сделайте так, чтобы ваш выдуманный факт звучал как общеизвестная истина, а если вам бросят вызов — стойте на своем, переводите стрелки или обвиняйте оппонента в неосведомленности. Помните, дело не в истине, а в том, кто звучит увереннее.

  # Шаг +1: Празднуйте победу

  Когда вы победите — а вы победите — вы должны убедиться, что все об этом знают. Расскажите им, как здорово вы справились. Скажите: «Все согласны, я выиграл этот спор. Все об этом говорят». Люди любят победителей, а вы лучший. Даже если никто об этом не говорит, скажите, что говорят. Это правда, потому что вы так сказали. Вот так вы побеждаете. Просто. Легко. Готово.

  И вот оно. Вот так вы побеждаете в каждом споре, каждый раз. Это несложно. Вам просто нужно быть умнее, громче, быстрее и сильнее своего оппонента. У них нет шансов. Вы всегда правы, они всегда неправы. Вы победите, поверьте мне. Никаких вопросов. Не благодарите.
