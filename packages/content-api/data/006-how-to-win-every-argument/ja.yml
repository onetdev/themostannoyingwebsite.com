title: あらゆる議論に「絶対」勝つ方法
slug: arayuru-giron-ni-zettai-katsu-houhou
intro: "あらゆる議論に勝つ方法：これが最高の方法です、信じてください"
content: |-
  いいか、教えてやる。議論に勝つこと？そんなの簡単だ。めちゃくちゃ簡単だ。みんな難しく考えすぎだが、実はそうじゃない。毎回勝つ方法を教えてやる。疑いようがない。議論に全部勝てるわけがないなんて言う奴もいるが――間違いだ！これらのステップに従えば、勝てるし、勝つことになる。すべては、より賢く、より速く、より強くあることだ。他の奴ら？全員負け組だ。だがお前は？お前は勝つ。毎回な。よし、行くぞ。

  # ステップ 1：常に最初に話し、大きな声で話せ

  鍵は最初に話すことだ。常にだ。相手に一言も喋らせるな。強く始め、強いままでいろ。声が大きければ大きいほど、お前は正しい。みんなそれが大好きなんだ。それを尊敬する。相手を圧倒して喋れば、相手の弱々しい意見なんて出てこない。信じろ、誰も相手の言うことなんて気にしてない。みんな覚えているのは大きな声だけだ。そしてお前がその大きな声なら、どうなる？もう勝ったも同然だ。

  # ステップ 2：相手をこき下ろせ

  ここで相手を叩き潰す。相手を悪者に見せなきゃいけない。たとえ相手が筋の通ったことを言おうとしていても、何も分かってないと言え。あいつらは何も知らない――誰もが知っていることだ。こう言うんだ。「お前は分かってない、お前は間違っている、みんなそう言ってるぞ」と。そんなことを言っておけばいい。事実は関係ない――誰も事実なんて気にしない。みんな自信に満ちた姿が大好きだ。相手を無知な奴として扱えば、実際そうなる。お前がそう言ったからだ。

  # ステップ 3：絶対に相手を勝たせるな

  いいか、お前は絶対に負けない。たとえお前が間違っているように見えても、間違っていない。ただ言い続けろ。「俺は正しい、お前は間違っている。みんな俺に同意している」と。もし相手が間違いを証明しようとしたら？フェイクニュースだ！相手が何を言っても、それは嘘だと言え。質の悪い情報だ。「お前がどれだけ間違っているか、みんな噂してるぞ」と言え。毎回これでいける。誰も確認なんてしない。もし確認されたら？知るか。お前がそう言った時点で、お前の勝ちだ。

  # ステップ 4：話題を変えろ

  もし相手が核心に迫ってきたら、話題を変えろ。それだけだ。別の話を始めろ。自分がいかに素晴らしいか、あるいは相手の人生がいかにダメかについて話せ。何でもいい。もし相手が「その話はしてない」と言ったら、無視しろ。お前が勝てる話題に移れ。関連があるかどうかなんて関係ない。お前が会話を支配しているんだ、相手じゃない。だからお前が勝っている。

  # ステップ 5：難しい言葉を使い、単純な考えを押し通せ

  あちこちに難しい言葉を散りばめろ。みんなそれが大好きだ。意味なんて知らなくていいが、お前を賢く見せてくれる。「凄まじい」「大惨事」「誰もが話題にしている」といった言葉を使え。これらの言葉は毎回効果がある。響きがいいし、みんな「わあ、この人は本当に分かっているんだな」と思うだろう。考えは単純にしておけ――考えすぎるのは良くない。説明なんて必要ない。「俺はこれを知っている。とても単純なことだ。お前は分かってないが、他の奴らはみんな分かっている」と言えばいい。

  # ステップ 6：侮辱を使って、相手を小さく見せろ

  もし相手が小賢しいことを言ったり賢ぶったりしたら、侮辱で叩け。だが普通の侮辱じゃダメだ――個人的な攻撃にしろ。「悲しい奴だ」「哀れだ」「完全な笑いものだ」と呼べ。誰も負け組は好きじゃない。一度ラベルを貼ってしまえば、相手は終わりだ。終了だ。あざ笑うのを恐れるな。「へえ、お前が専門家だとは知らなかったよ！」と言ってやれ。たとえ相手が本当に専門家でもな。なぜかって？お前が専門家じゃないと言ったからだ。だから相手は専門家じゃない。それがルールだ。

  # ステップ 7：二重基準（ダブルスタンダード）を活用せよ

  ちょっとした秘密を教えてやろう。お前にとって良いことが、相手にとっても良いとは限らない。単純だ。お前は相手の話を遮ってもいいが、相手がお前の話を遮ったら？「ちょっと失礼！なんて失礼なんだ、誰もそんなことしないぞ」と言え。相手を無礼だと決めつけろ。お前は相手を罵倒してもいいが、相手がお前を何かと呼んだら、それは一線を越えている。ただこう言え。「わあ、あいつらあんなに落ちぶれたのか」と。二重基準はお前の味方だ。お前は相手より優れているんだから、好きなようにしていい。相手はダメだ。

  # ステップ 8：勝ったら、また勝ったと言い張れ

  ここが一番いいところだ。すべてが終わって、明らかにお前の勝ちなら（だってお前は常に勝つからな）、もう一度言え。繰り返せ。「俺が勝った、俺が正しい、お前は負けた」と言い続けろ。人は何度も聞いたことを信じるものだ。相手が認めたがらなくても、心の底ではお前の勝ちだと分かっている。お前がそう言えば、突然それが真実になる。そうやって勝利を確定させるんだ。

  # ステップ 9：絶対に謝るな、永遠にな

  謝る？ありえない。それは弱い奴がすることだ。たとえお前が間違っていても（お前が間違うことなんてないがな）、絶対に謝るな。それは敗北を認めるのと同じだ。そんなことはしない。ただこう言え。「そんなことは言ってない」あるいは「そういう意味で言ったんじゃない」。前だけを見て、決して振り返るな。謝罪は負け組のためにある。お前は勝者だ。常に。

  # ステップ 10：事実を捏造しろ

  議論で事実を捏造するときの鍵は、自信だ。誰もが疑わないような確信を持って言え。人はリアルタイムで事実確認をしないことが多いから、「誰もが知っている」とか「研究で証明されている」と、詳細を言わずに主張すればいい。「専門家も同意している」とか「証明済みだ」といった、曖昧だが権威がありそうなフレーズを使え。捏造した事実をあたかも常識のように響かせ、もし反論されたら、さらに強く言い張るか、話をそらすか、相手が無知だと責めろ。いいか、大事なのは真実じゃない――誰がより確信を持って聞こえるかだ。

  # ステップ +1：勝利を祝え

  勝ったら――お前は間違いなく勝つが――それをみんなに知らせなきゃいけない。自分がいかに素晴らしかったか話せ。「誰もが認めている、俺があの議論に勝ったと。みんなが話題にしている」と言え。みんな勝者が大好きだ、そしてお前は最高だ。たとえ誰も話題にしていなくても、していると言い張れ。お前が言ったから、それが真実なんだ。それが勝ち方だ。単純だ。簡単だ。終わり。

  これで分かっただろう。これがあらゆる議論に毎回勝つ方法だ。難しくない。相手より賢く、大きな声で、速く、そして強くあればいいだけだ。相手にチャンスなんてない。お前は常に正しく、相手は常に間違っている。お前は勝つ、信じてくれ。疑いようがない。礼には及ばない。
